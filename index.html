    // ===== SUPER BOOST =====
    function triggerSuperBoost() {
      if (!barrierActive || superBoostActive) return;
      superBoostActive = true;
      superBoostTimer = 300; // ~5 seconds at 60fps
      shakeAmount = 20;

      // Force all elements ON
      Object.keys(activeElements).forEach(el => {
        activeElements[el] = true;
      });
      document.querySelectorAll('.element-btn').forEach(btn => btn.classList.add('active'));

      // Visual feedback
      document.getElementById('btnSuperBoost').classList.add('boosting');
      document.getElementById('shieldStatus').textContent = 'SUPER BOOST!';
      document.getElementById('shieldStatus').style.color = '#ffaa00';
      document.getElementById('shieldStatus').style.borderColor = '#ffaa0088';
      document.getElementById('shieldStatus').style.boxShadow = '0 0 40px #ffaa0066';

      // Screen flash
      const flash = document.getElementById('boostFlash');
      flash.classList.add('active');
      setTimeout(() => flash.classList.remove('active'), 200);

      // Spawn a wave of monsters then instantly destroy them all
      const boostMonsters = [];
      for (let i = 0; i < 15; i++) {
        const m = new Monster();
        // Place them near the barrier
        const angle = (i / 15) * Math.PI * 2;
        const dist = barrierRadius + 60 + Math.random() * 80;
        m.x = centerX + Math.cos(angle) * dist;
        m.y = (centerY + 20) + Math.sin(angle) * dist * 0.55;
        monsters.push(m);
        boostMonsters.push(m);
      }

      // Massive barrier explosion - destroy all with staggered timing
      boostMonsters.forEach((m, i) => {
        setTimeout(() => {
          if (m.state !== 'approaching') return;
          m.state = 'hit';
          m.hitTime = performance.now();
          const angle = Math.atan2(m.y - (centerY + 20), m.x - centerX);
          m.flyVx = Math.cos(angle) * (15 + Math.random() * 10);
          m.flyVy = Math.sin(angle) * (15 + Math.random() * 10) - 12;
          m.flyRotSpeed = (Math.random() - 0.5) * 0.5;
          monstersDefeated++;
          document.getElementById('monsterCount').textContent = monstersDefeated;
          shakeAmount = Math.max(shakeAmount, 12);

          // Extra large particle burst for boost kills
          for (let j = 0; j < 30; j++) {
            impactParticles.push(new ImpactParticle(
              m.x + (Math.random() - 0.5) * 30,
              m.y + (Math.random() - 0.5) * 30,
              ['rgba(255,0,100,1)', 'rgba(255,150,0,1)', 'rgba(255,255,0,1)', 'rgba(0,255,136,1)', 'rgba(0,200,255,1)', 'rgba(170,0,255,1)'][Math.floor(Math.random() * 6)]
            ));
          }
          spaceTexts.push(new SpaceText(m.x, m.y - 30));

          // Massive projectile barrage
          const bAngle = angle;
          for (let p = 0; p < 3; p++) {
            const el = ['fire', 'ice', 'electric', 'water', 'venom'][Math.floor(Math.random() * 5)];
            const bx = centerX + Math.cos(bAngle) * barrierRadius * 0.9;
            const by = (centerY + 20) + Math.sin(bAngle) * barrierRadius * 0.55 * 0.9;
            projectiles.push(new Projectile(bx, by, m.x, m.y, el));
          }
        }, i * 100);
      });

      // Boost duration
      setTimeout(() => {
        superBoostActive = false;
        document.getElementById('btnSuperBoost').classList.remove('boosting');
        document.getElementById('shieldStatus').textContent = 'Bouclier Actif';
        document.getElementById('shieldStatus').style.color = '';
        document.getElementById('shieldStatus').style.borderColor = '';
        document.getElementById('shieldStatus').style.boxShadow = '';
      }, 5000);
    }

    // Initial button state
    document.getElementById('btnDeactivate').style.display = 'none';
    document.getElementById('btnSuperBoost').style.display = 'none';

    // Element selector - click handler with sound feedback
    function playToggleSound(on) {
      initAudio();
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'sine';
      if (on) {
        osc.frequency.setValueAtTime(400, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.1);
      } else {
        osc.frequency.setValueAtTime(600, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.1);
      }
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.15);
    }

    document.querySelectorAll('.element-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const el = btn.dataset.element;
        activeElements[el] = !activeElements[el];
        btn.classList.toggle('active');
        playToggleSound(activeElements[el]);
      });
    });

    // ===== MOON =====
    function drawMoon(t) {
      const mx = W * 0.85;
      const my = H * 0.12;
      const mr = 35;

      ctx.save();
      ctx.shadowColor = 'rgba(200, 220, 255, 0.5)';
      ctx.shadowBlur = 40;
      const moonGrad = ctx.createRadialGradient(mx - 5, my - 5, 0, mx, my, mr);
      moonGrad.addColorStop(0, '#ffffee');
      moonGrad.addColorStop(0.7, '#dde0cc');
      moonGrad.addColorStop(1, '#bbbbaa');
      ctx.beginPath();
      ctx.arc(mx, my, mr, 0, Math.PI * 2);
      ctx.fillStyle = moonGrad;
      ctx.fill();

      // Craters
      ctx.fillStyle = 'rgba(150, 150, 130, 0.3)';
      [[5, -8, 6], [-10, 5, 4], [8, 10, 3], [-5, -12, 5]].forEach(([ox, oy, r]) => {
        ctx.beginPath();
        ctx.arc(mx + ox, my + oy, r, 0, Math.PI * 2);
        ctx.fill();
      });

      ctx.shadowBlur = 0;
      ctx.restore();
    }

    // ===== MAIN LOOP =====
    function gameLoop(t) {
      // Screen shake
      ctx.save();
      if (shakeAmount > 0) {
        ctx.translate(
          (Math.random() - 0.5) * shakeAmount,
          (Math.random() - 0.5) * shakeAmount
        );
        shakeAmount *= 0.9;
        if (shakeAmount < 0.5) shakeAmount = 0;
      }

      // Background gradient - night sky
      const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
      bgGrad.addColorStop(0, '#020010');
      bgGrad.addColorStop(0.4, '#0a0020');
      bgGrad.addColorStop(0.7, '#0f0a25');
      bgGrad.addColorStop(1, '#050510');
      ctx.fillStyle = bgGrad;
      ctx.fillRect(0, 0, W, H);

      // Aurora effect when barrier active
      if (activationProgress > 0) {
        for (let i = 0; i < 3; i++) {
          const ay = H * 0.1 + i * 30;
          ctx.beginPath();
          ctx.moveTo(0, ay);
          for (let x = 0; x < W; x += 20) {
            ctx.lineTo(x, ay + Math.sin(x * 0.005 + t * 0.001 + i) * 30);
          }
          ctx.lineTo(W, ay + 60);
          ctx.lineTo(0, ay + 60);
          ctx.closePath();
          const auroraColors = ['rgba(0, 255, 136, ', 'rgba(0, 150, 255, ', 'rgba(150, 0, 255, '];
          ctx.fillStyle = auroraColors[i] + (activationProgress * 0.03) + ')';
          ctx.fill();
        }
      }

      // Stars
      stars.forEach(s => s.draw(t));

      // Moon
      drawMoon(t);

      // House
      drawHouse();

      // Barrier activation animation
      if (barrierActive && activationProgress < 1) {
        activationProgress += 0.02;
      }

      // Barrier
      drawBarrier(t);

      // Spawn monsters and water waves
      spawnMonster(t);
      trySpawnWaterWave(t);

      // Update and draw monsters
      for (let i = monsters.length - 1; i >= 0; i--) {
        monsters[i].update(t);
        monsters[i].draw(t);

        // Spawn space text on hit
        if (monsters[i].state === 'hit' && t - monsters[i].hitTime < 20) {
          spaceTexts.push(new SpaceText(monsters[i].x, monsters[i].y - 30));
          // Impact particles
          for (let j = 0; j < 20; j++) {
            impactParticles.push(new ImpactParticle(
              monsters[i].x,
              monsters[i].y,
              ['rgba(255,100,0,1)', 'rgba(0,200,255,1)', 'rgba(255,255,0,1)', 'rgba(170,0,255,1)'][Math.floor(Math.random() * 4)]
            ));
          }
        }

        if (monsters[i].opacity <= 0 || monsters[i].y < -200 || monsters[i].x < -200 || monsters[i].x > W + 200) {
          monsters.splice(i, 1);
        }
      }

      // Update and draw projectiles + check collision with monsters
      for (let i = projectiles.length - 1; i >= 0; i--) {
        projectiles[i].update();
        projectiles[i].draw();
        // Check collision with approaching monsters
        for (let j = monsters.length - 1; j >= 0; j--) {
          if (monsters[j].state !== 'approaching') continue;
          const dx = projectiles[i].x - monsters[j].x;
          const dy = projectiles[i].y - monsters[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < monsters[j].size + projectiles[i].size) {
            // Element-specific hit effects
            spawnElementHitEffect(projectiles[i].x, projectiles[i].y, projectiles[i].element, monsters[j]);
            projectiles[i].life = 0;
            break;
          }
        }
        if (projectiles[i].life <= 0) projectiles.splice(i, 1);
      }

      // Update and draw water waves
      for (let i = waterWaves.length - 1; i >= 0; i--) {
        waterWaves[i].update();
        waterWaves[i].draw();
        if (waterWaves[i].life <= 0) waterWaves.splice(i, 1);
      }

      // Impact particles
      for (let i = impactParticles.length - 1; i >= 0; i--) {
        impactParticles[i].update();
        impactParticles[i].draw();
        if (impactParticles[i].life <= 0) impactParticles.splice(i, 1);
      }

      // Space texts
      for (let i = spaceTexts.length - 1; i >= 0; i--) {
        spaceTexts[i].update();
        spaceTexts[i].draw();
        if (spaceTexts[i].life <= 0) spaceTexts.splice(i, 1);
      }

      ctx.restore();
      requestAnimationFrame(gameLoop);
    }

    requestAnimationFrame(gameLoop);

    // Handle window resize for stars
    window.addEventListener('resize', () => {
      stars.forEach(s => { s.x = Math.random() * W; s.y = Math.random() * H; });
    });

    // ===== SOUND EFFECTS (Web Audio API) =====
    let audioCtx = null;

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
    }

    function playActivationSound() {
      initAudio();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(200, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.5);
      osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.8);
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 1);

      // Second harmonic
      const osc2 = audioCtx.createOscillator();
      const gain2 = audioCtx.createGain();
      osc2.connect(gain2);
      gain2.connect(audioCtx.destination);
      osc2.type = 'triangle';
      osc2.frequency.setValueAtTime(400, audioCtx.currentTime);
      osc2.frequency.exponentialRampToValueAtTime(1600, audioCtx.currentTime + 0.6);
      gain2.gain.setValueAtTime(0.08, audioCtx.currentTime);
      gain2.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.8);
      osc2.start(audioCtx.currentTime);
      osc2.stop(audioCtx.currentTime + 0.8);
    }

    function playDeactivationSound() {
      initAudio();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(800, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.6);
      gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.7);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.7);
    }

    function playImpactSound() {
      initAudio();
      // Zap sound
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(600 + Math.random() * 400, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.15);
      gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.2);

      // Noise burst
      const bufferSize = audioCtx.sampleRate * 0.1;
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 3);
      }
      const noise = audioCtx.createBufferSource();
      noise.buffer = buffer;
      const noiseGain = audioCtx.createGain();
      noise.connect(noiseGain);
      noiseGain.connect(audioCtx.destination);
      noiseGain.gain.setValueAtTime(0.06, audioCtx.currentTime);
      noiseGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
      noise.start(audioCtx.currentTime);
    }

    // Add sound to barrier hum
    let humOsc = null;
    let humGain = null;

    function startBarrierHum() {
      initAudio();
      if (humOsc) return;
      humOsc = audioCtx.createOscillator();
      humGain = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = 200;
      humOsc.connect(filter);
      filter.connect(humGain);
      humGain.connect(audioCtx.destination);
      humOsc.type = 'sine';
      humOsc.frequency.value = 60;
      humGain.gain.setValueAtTime(0, audioCtx.currentTime);
      humGain.gain.linearRampToValueAtTime(0.04, audioCtx.currentTime + 1);
      humOsc.start();
    }

    function stopBarrierHum() {
      if (humOsc && humGain) {
        humGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
        setTimeout(() => {
          try { humOsc.stop(); } catch(e) {}
          humOsc = null;
          humGain = null;
        }, 600);
      }
    }

    // Patch activation functions with sound
    const origActivate = activateBarrier;
    activateBarrier = function() {
      origActivate();
      playActivationSound();
      startBarrierHum();
    };

    const origDeactivate = deactivateBarrier;
    deactivateBarrier = function() {
      origDeactivate();
      playDeactivationSound();
      stopBarrierHum();
    };

    // Patch impact with sound
    const origSpawnProjectiles = spawnProjectiles;
    spawnProjectiles = function(tx, ty, angle) {
      origSpawnProjectiles(tx, ty, angle);
      playImpactSound();
    };

    // Super boost sound
    function playSuperBoostSound() {
      initAudio();
      if (!audioCtx) return;
      // Rising power chord
      [200, 300, 400, 500, 700, 900, 1200].forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = i < 3 ? 'sawtooth' : 'sine';
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime + i * 0.08);
        osc.frequency.exponentialRampToValueAtTime(freq * 2, audioCtx.currentTime + i * 0.08 + 0.3);
        gain.gain.setValueAtTime(0, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.06, audioCtx.currentTime + i * 0.08);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.08 + 0.5);
        osc.start(audioCtx.currentTime + i * 0.08);
        osc.stop(audioCtx.currentTime + i * 0.08 + 0.5);
      });
      // Big boom
      const bufferSize = audioCtx.sampleRate * 0.5;
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 2) * 0.5;
      }
      const noise = audioCtx.createBufferSource();
      noise.buffer = buffer;
      const nGain = audioCtx.createGain();
      const nFilter = audioCtx.createBiquadFilter();
      nFilter.type = 'lowpass';
      nFilter.frequency.value = 300;
      noise.connect(nFilter);
      nFilter.connect(nGain);
      nGain.connect(audioCtx.destination);
      nGain.gain.setValueAtTime(0, audioCtx.currentTime);
      nGain.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + 0.3);
      nGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.5);
      noise.start(audioCtx.currentTime + 0.3);
    }

    // Patch super boost with sound
    const origTriggerSuperBoost = triggerSuperBoost;
    triggerSuperBoost = function() {
      origTriggerSuperBoost();
      playSuperBoostSound();
    };

    // First click to enable audio context
    document.addEventListener('click', initAudio, { once: true });

    // ===== SPACE VIEW SYSTEM =====
    const spaceViewEl = document.getElementById('spaceView');
    const spaceCanvas = document.getElementById('spaceCanvas');
    const sCtx = spaceCanvas.getContext('2d');
    let spaceViewActive = false;
    let spaceViewTimer = 0;
    let spaceMonster = null;
    let spaceStars = [];
    let spacePlanets = [];
    let spaceDebris = [];
    let spaceMonsterAngle = 0;
    let spaceMonsterScale = 1;
    let spaceViewCount = 0;

    function initSpaceView() {
      const rect = spaceViewEl.getBoundingClientRect();
      spaceCanvas.width = rect.width * 2;
      spaceCanvas.height = rect.height * 2;
      // Generate stars for space scene
      spaceStars = Array.from({length: 120}, () => ({
        x: Math.random() * spaceCanvas.width,
        y: Math.random() * spaceCanvas.height,
        size: Math.random() * 2 + 0.5,
        twinkle: Math.random() * Math.PI * 2,
        speed: Math.random() * 0.5 + 0.2
      }));
      // Planets
      spacePlanets = [
        { x: spaceCanvas.width * 0.15, y: spaceCanvas.height * 0.3, r: 20, color: '#884422', rings: true },
        { x: spaceCanvas.width * 0.85, y: spaceCanvas.height * 0.7, r: 35, color: '#224488', rings: false },
        { x: spaceCanvas.width * 0.7, y: spaceCanvas.height * 0.15, r: 12, color: '#666655', rings: false },
      ];
    }

    let lastDefeatedMonster = null;
    let spaceViewIsCloseup = false;
    let spaceViewTimeout = null;

    function showSpaceView(monster, isCloseup) {
      if (spaceViewActive) return;
      if (!isCloseup) {
        spaceViewCount++;
        if (spaceViewCount % 3 !== 0 && !superBoostActive) return;
      }

      spaceViewActive = true;
      spaceMonster = monster;
      spaceViewTimer = 0;
      spaceMonsterAngle = 0;
      spaceViewIsCloseup = !!isCloseup;
      spaceMonsterScale = isCloseup ? 2.5 : 1.5;

      // Toggle closeup class for bigger size
      spaceViewEl.classList.toggle('closeup', !!isCloseup);

      initSpaceView();
      spaceViewEl.classList.add('visible');

      // Generate debris from the monster
      spaceDebris = Array.from({length: isCloseup ? 25 : 15}, () => ({
        x: spaceCanvas.width / 2,
        y: spaceCanvas.height / 2,
        vx: (Math.random() - 0.5) * (isCloseup ? 3 : 4),
        vy: (Math.random() - 0.5) * (isCloseup ? 3 : 4),
        size: Math.random() * (isCloseup ? 8 : 5) + 2,
        color: [monster.palette.body, monster.palette.accent, monster.palette.eye][Math.floor(Math.random() * 3)],
        rot: Math.random() * Math.PI * 2,
        rotSpeed: (Math.random() - 0.5) * 0.1
      }));

      // Auto-hide (longer for close-up)
      if (spaceViewTimeout) clearTimeout(spaceViewTimeout);
      spaceViewTimeout = setTimeout(() => {
        spaceViewEl.classList.remove('visible');
        spaceViewEl.classList.remove('closeup');
        setTimeout(() => { spaceViewActive = false; }, 400);
      }, isCloseup ? 5000 : 3000);
    }

    // Force space view from button: creates a fresh monster and ejects it
    function forceSpaceView() {
      if (spaceViewActive) return;
      // Create a monster to display
      const m = new Monster();
      m.x = centerX;
      m.y = centerY;
      lastDefeatedMonster = m;
      showSpaceView(m, true);
      // Play impact sound for effect
      if (typeof playImpactSound === 'function') {
        try { playImpactSound(); } catch(e) {}
      }
    }

    // Update the space button glow when monsters have been defeated
    function updateSpaceButton() {
      const btn = document.getElementById('btnSpaceView');
      if (monstersDefeated > 0) {
        btn.classList.add('ready');
      }
    }

    function drawSpaceView(t) {
      if (!spaceViewActive || !spaceMonster) return;
      spaceViewTimer++;

      const sw = spaceCanvas.width;
      const sh = spaceCanvas.height;

      // Background
      sCtx.fillStyle = '#02020f';
      sCtx.fillRect(0, 0, sw, sh);

      // Nebula glow
      const nebGrad = sCtx.createRadialGradient(sw * 0.3, sh * 0.5, 0, sw * 0.3, sh * 0.5, sw * 0.6);
      nebGrad.addColorStop(0, 'rgba(40, 10, 60, 0.3)');
      nebGrad.addColorStop(0.5, 'rgba(10, 20, 50, 0.15)');
      nebGrad.addColorStop(1, 'transparent');
      sCtx.fillStyle = nebGrad;
      sCtx.fillRect(0, 0, sw, sh);

      // Stars
      spaceStars.forEach(star => {
        star.x -= star.speed;
        if (star.x < 0) star.x = sw;
        const alpha = 0.5 + 0.5 * Math.sin(t * 0.005 + star.twinkle);
        sCtx.beginPath();
        sCtx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
        sCtx.fillStyle = `rgba(200, 220, 255, ${alpha})`;
        sCtx.fill();
      });

      // Planets
      spacePlanets.forEach(p => {
        const pGrad = sCtx.createRadialGradient(p.x - p.r * 0.3, p.y - p.r * 0.3, 0, p.x, p.y, p.r);
        pGrad.addColorStop(0, p.color);
        pGrad.addColorStop(1, '#000');
        sCtx.beginPath();
        sCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        sCtx.fillStyle = pGrad;
        sCtx.fill();
        if (p.rings) {
          sCtx.beginPath();
          sCtx.ellipse(p.x, p.y, p.r * 1.8, p.r * 0.3, 0.3, 0, Math.PI * 2);
          sCtx.strokeStyle = 'rgba(200, 180, 140, 0.4)';
          sCtx.lineWidth = 3;
          sCtx.stroke();
        }
      });

      // Earth in the distance
      const earthX = sw * 0.88;
      const earthY = sh * 0.85;
      const earthR = 25;
      const eGrad = sCtx.createRadialGradient(earthX - 5, earthY - 5, 0, earthX, earthY, earthR);
      eGrad.addColorStop(0, '#4488cc');
      eGrad.addColorStop(0.5, '#2266aa');
      eGrad.addColorStop(1, '#0a1a3a');
      sCtx.beginPath();
      sCtx.arc(earthX, earthY, earthR, 0, Math.PI * 2);
      sCtx.fillStyle = eGrad;
      sCtx.fill();
      // Continents
      sCtx.fillStyle = '#338844';
      sCtx.beginPath();
      sCtx.ellipse(earthX - 5, earthY - 3, 8, 6, 0.3, 0, Math.PI * 2);
      sCtx.fill();
      sCtx.beginPath();
      sCtx.ellipse(earthX + 8, earthY + 5, 5, 4, -0.2, 0, Math.PI * 2);
      sCtx.fill();
      // Atmosphere
      sCtx.beginPath();
      sCtx.arc(earthX, earthY, earthR + 3, 0, Math.PI * 2);
      sCtx.strokeStyle = 'rgba(100, 180, 255, 0.3)';
      sCtx.lineWidth = 3;
      sCtx.stroke();

      // Monster tumbling in space
      spaceMonsterAngle += 0.03;
      const shrinkRate = spaceViewIsCloseup ? 0.001 : 0.003;
      spaceMonsterScale = Math.max(0.5, spaceMonsterScale - shrinkRate);
      const mx = sw / 2 + Math.sin(spaceViewTimer * 0.02) * 20;
      const my = sh / 2 + Math.cos(spaceViewTimer * 0.015) * 15 - spaceViewTimer * 0.3;

      sCtx.save();
      sCtx.translate(mx, my);
      sCtx.rotate(spaceMonsterAngle);
      sCtx.scale(spaceMonsterScale * 2, spaceMonsterScale * 2);

      // Reuse monster's draw method but in the space canvas context
      const origCtx = ctx;
      const origX = spaceMonster.x;
      const origY = spaceMonster.y;
      const origOpacity = spaceMonster.opacity;
      const origRotation = spaceMonster.flyRotation;

      // Temporarily override context for monster drawing
      spaceMonster.x = 0;
      spaceMonster.y = 0;
      spaceMonster.opacity = 1;
      spaceMonster.flyRotation = 0;

      // Draw simplified monster body in space context
      const ss = spaceMonster.size * 0.8;
      sCtx.beginPath();
      for (let i = 0; i < 12; i++) {
        const a = (i / 12) * Math.PI * 2;
        const r = ss + Math.sin(a * 3 + t * 0.003) * 2;
        sCtx.lineTo(Math.cos(a) * r * spaceMonster.scaleX, Math.sin(a) * r * spaceMonster.scaleY);
      }
      sCtx.closePath();
      const mGrad = sCtx.createRadialGradient(0, 0, 0, 0, 0, ss);
      mGrad.addColorStop(0, spaceMonster.accent);
      mGrad.addColorStop(1, spaceMonster.color);
      sCtx.fillStyle = mGrad;
      sCtx.fill();

      // Eyes in space (dizzy spirals)
      const eyePositions = spaceMonster.eyeCount === 1 ? [[0, -ss * 0.1]] :
                           spaceMonster.eyeCount === 3 ? [[-ss * 0.25, -ss * 0.15], [0, -ss * 0.25], [ss * 0.25, -ss * 0.15]] :
                           [[-ss * 0.3, -ss * 0.15], [ss * 0.3, -ss * 0.15]];
      eyePositions.forEach(([ex, ey]) => {
        const er = spaceMonster.eyeCount === 1 ? ss * 0.25 : ss * 0.15;
        sCtx.beginPath();
        sCtx.arc(ex, ey, er, 0, Math.PI * 2);
        sCtx.fillStyle = spaceMonster.eyeColor;
        sCtx.fill();
        // Dizzy spiral pupil
        sCtx.strokeStyle = '#000';
        sCtx.lineWidth = 1.5;
        sCtx.beginPath();
        for (let sp = 0; sp < 12; sp++) {
          const sa = sp * 0.6 + t * 0.01;
          const sr = sp * 0.8;
          sCtx.lineTo(ex + Math.cos(sa) * sr, ey + Math.sin(sa) * sr);
        }
        sCtx.stroke();
      });

      // Dizzy X mouth
      sCtx.strokeStyle = '#000';
      sCtx.lineWidth = 2;
      sCtx.beginPath();
      sCtx.moveTo(-ss * 0.15, ss * 0.2);
      sCtx.lineTo(ss * 0.15, ss * 0.35);
      sCtx.moveTo(ss * 0.15, ss * 0.2);
      sCtx.lineTo(-ss * 0.15, ss * 0.35);
      sCtx.stroke();

      // Restore monster
      spaceMonster.x = origX;
      spaceMonster.y = origY;
      spaceMonster.opacity = origOpacity;
      spaceMonster.flyRotation = origRotation;

      sCtx.restore();

      // Debris floating around
      spaceDebris.forEach(d => {
        d.x += d.vx;
        d.y += d.vy;
        d.vx *= 0.99;
        d.vy *= 0.99;
        d.rot += d.rotSpeed;
        sCtx.save();
        sCtx.translate(d.x, d.y);
        sCtx.rotate(d.rot);
        sCtx.fillStyle = d.color;
        sCtx.fillRect(-d.size / 2, -d.size / 2, d.size, d.size);
        sCtx.restore();
      });

      // "BYE BYE" text floating
      sCtx.save();
      sCtx.font = 'bold 24px Orbitron, monospace';
      sCtx.textAlign = 'center';
      const textAlpha = Math.max(0, 1 - spaceViewTimer / 180);
      sCtx.fillStyle = `rgba(255, 100, 100, ${textAlpha})`;
      sCtx.shadowColor = 'rgba(255, 0, 0, 0.5)';
      sCtx.shadowBlur = 15;
      const texts = ['PERDU DANS L\'ESPACE!', 'ADIEU MONSTRE!', 'BON VOYAGE!', 'VERS L\'INFINI!'];
      sCtx.fillText(texts[spaceViewCount % texts.length], sw / 2, sh - 30);
      sCtx.shadowBlur = 0;
      sCtx.restore();

      // Distance counter
      const dist = Math.floor(spaceViewTimer * 147);
      sCtx.font = '12px Orbitron, monospace';
      sCtx.fillStyle = 'rgba(100, 200, 255, 0.7)';
      sCtx.textAlign = 'right';
      sCtx.fillText(`${dist.toLocaleString()} km de la Terre`, sw - 20, 30);
    }

    // Hook into the main game loop to draw space view
    const origGameLoop = gameLoop;
    // We need to call drawSpaceView from within the animation frame
    // Patch: add space view rendering to the main loop
    // Find where gameLoop is called and add space view after

    // Instead, let's run space view on its own animation loop
    function spaceViewLoop(t) {
      if (spaceViewActive) {
        drawSpaceView(t);
      }
      requestAnimationFrame(spaceViewLoop);
    }
    requestAnimationFrame(spaceViewLoop);

    // Hook into monster hit to trigger space view
    // We patch where monsters transition to 'hit' state
    const origMonsterUpdate = Monster.prototype.update;
    Monster.prototype.update = function(t) {
      const wasBefore = this.state;
      origMonsterUpdate.call(this, t);
      if (wasBefore === 'approaching' && this.state === 'hit') {
        lastDefeatedMonster = this;
        updateSpaceButton();
        showSpaceView(this);
      }
    };
  </script>
</body>
