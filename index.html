<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barriere Magnetique Elementaire - Protection Maison</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;600&display=swap');

    body {
      overflow: hidden;
      background: #000;
      font-family: 'Exo 2', sans-serif;
      user-select: none;
      -webkit-user-select: none;
    }

    canvas {
      display: block;
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
    }

    #ui-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      pointer-events: none;
      z-index: 10;
    }

    .top-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px 30px;
      gap: 18px;
    }

    .shield-status {
      font-family: 'Orbitron', monospace;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 8px 22px;
      border-radius: 30px;
      border: 2px solid;
      transition: all 0.5s ease;
      text-align: center;
    }

    .shield-status.active {
      color: #00ff88;
      border-color: #00ff8855;
      background: #00ff8815;
      box-shadow: 0 0 20px #00ff8833, inset 0 0 20px #00ff8811;
      animation: statusPulse 2s ease-in-out infinite;
    }

    .shield-status.inactive {
      color: #ff4444;
      border-color: #ff444455;
      background: #ff444415;
      box-shadow: 0 0 20px #ff444433;
    }

    @keyframes statusPulse {
      0%, 100% { box-shadow: 0 0 20px #00ff8833, inset 0 0 20px #00ff8811; }
      50% { box-shadow: 0 0 40px #00ff8855, inset 0 0 30px #00ff8822; }
    }

    .title-area {
      text-align: center;
      padding-top: 8px;
    }

    .title-area h1 {
      font-family: 'Orbitron', monospace;
      font-size: clamp(14px, 3vw, 24px);
      font-weight: 900;
      background: linear-gradient(90deg, #00c6ff, #ff00e5, #ffaa00, #00ff88);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 4s ease infinite;
      text-shadow: none;
      letter-spacing: 2px;
    }

    .title-area p {
      font-size: clamp(10px, 1.8vw, 13px);
      color: #8899bb;
      margin-top: 4px;
      letter-spacing: 1px;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .controls {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 20px;
      pointer-events: all;
      z-index: 20;
    }

    .btn {
      font-family: 'Orbitron', monospace;
      font-size: clamp(11px, 2vw, 15px);
      font-weight: 700;
      letter-spacing: 2px;
      padding: 14px 36px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: -2px; left: -2px;
      right: -2px; bottom: -2px;
      border-radius: 52px;
      z-index: -1;
    }

    .btn-activate {
      background: linear-gradient(135deg, #00ff88, #00c6ff);
      color: #001a0e;
      box-shadow: 0 0 30px #00ff8844, 0 4px 15px rgba(0,0,0,0.3);
    }
    .btn-activate:hover {
      transform: scale(1.08);
      box-shadow: 0 0 50px #00ff8866, 0 6px 25px rgba(0,0,0,0.4);
    }
    .btn-activate:active { transform: scale(0.98); }

    .btn-superboost {
      background: linear-gradient(135deg, #ff0066, #ff8800, #ffee00, #00ff88, #00ccff, #aa00ff);
      background-size: 300% 300%;
      color: #fff;
      font-size: clamp(12px, 2.2vw, 16px);
      text-shadow: 0 0 10px rgba(0,0,0,0.5);
      box-shadow: 0 0 30px #ff006644, 0 0 60px #aa00ff33, 0 4px 15px rgba(0,0,0,0.4);
      animation: boostGradient 2s ease infinite;
      display: none;
    }
    .btn-superboost:hover {
      transform: scale(1.12);
      box-shadow: 0 0 50px #ff006688, 0 0 80px #aa00ff55, 0 6px 25px rgba(0,0,0,0.5);
    }
    .btn-superboost:active { transform: scale(0.95); }
    .btn-superboost.boosting {
      animation: boostGradient 0.3s ease infinite, boostPulse 0.15s ease infinite;
    }

    @keyframes boostGradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    @keyframes boostPulse {
      0%, 100% { transform: scale(1.05); }
      50% { transform: scale(1.15); }
    }

    .btn-ultraboost {
      background: linear-gradient(135deg, #ff0000, #ff6600, #ffcc00, #ff0000, #ff0066, #ffaa00);
      background-size: 500% 500%;
      color: #fff;
      font-size: clamp(13px, 2.5vw, 18px);
      font-weight: 900;
      letter-spacing: 2px;
      text-shadow: 0 0 15px rgba(255,0,0,0.8), 0 0 30px rgba(255,100,0,0.5);
      box-shadow: 0 0 40px #ff000066, 0 0 80px #ff660044, 0 0 120px #ffcc0022, 0 4px 20px rgba(0,0,0,0.5);
      animation: ultraGlow 1.5s ease infinite;
      display: none;
      border: 2px solid rgba(255, 200, 0, 0.5);
    }
    .btn-ultraboost:hover {
      transform: scale(1.15);
      box-shadow: 0 0 60px #ff0000aa, 0 0 100px #ff660066, 0 0 150px #ffcc0044;
    }
    .btn-ultraboost:active { transform: scale(0.95); }
    .btn-ultraboost.ultra-active {
      animation: ultraGlow 0.2s ease infinite, ultraPulse 0.12s ease infinite;
      border-color: #fff;
    }
    @keyframes ultraGlow {
      0% { background-position: 0% 50%; }
      25% { background-position: 50% 100%; }
      50% { background-position: 100% 50%; }
      75% { background-position: 50% 0%; }
      100% { background-position: 0% 50%; }
    }
    @keyframes ultraPulse {
      0%, 100% { transform: scale(1.08); box-shadow: 0 0 60px #ff0000cc, 0 0 100px #ff6600aa; }
      50% { transform: scale(1.2); box-shadow: 0 0 80px #ff0000ff, 0 0 140px #ffcc00cc; }
    }

    .btn-cobra {
      background: linear-gradient(135deg, #00aa22, #44ff44, #008800, #33ee33, #006600);
      background-size: 400% 400%;
      color: #001a00;
      font-size: clamp(10px, 1.8vw, 13px);
      text-shadow: 0 1px 2px rgba(100,255,100,0.3);
      box-shadow: 0 0 25px rgba(0,200,50,0.4), 0 0 50px rgba(100,255,0,0.2), 0 4px 15px rgba(0,0,0,0.4);
      animation: cobraShine 3s ease infinite;
      display: none;
    }
    .btn-cobra:hover {
      transform: scale(1.1);
      box-shadow: 0 0 40px rgba(0,255,50,0.6), 0 0 70px rgba(100,255,0,0.4);
    }
    .btn-cobra:active { transform: scale(0.95); }
    .btn-cobra.cobra-active {
      animation: cobraShine 0.4s ease infinite, boostPulse 0.3s ease infinite;
    }
    @keyframes cobraShine {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .btn-lightning {
      background: linear-gradient(135deg, #0044ff, #00ccff, #ffffff, #00ccff, #4400ff, #00eeff);
      background-size: 600% 600%;
      color: #000022;
      font-size: clamp(10px, 1.8vw, 13px);
      font-weight: 900;
      letter-spacing: 1px;
      text-shadow: 0 0 8px rgba(100,200,255,0.6);
      box-shadow: 0 0 30px rgba(0,150,255,0.5), 0 0 60px rgba(0,200,255,0.3), inset 0 0 15px rgba(255,255,255,0.2), 0 4px 15px rgba(0,0,0,0.4);
      animation: lightningShine 2s ease infinite;
      display: none;
      border: 2px solid rgba(100,200,255,0.6);
    }
    .btn-lightning:hover {
      transform: scale(1.12);
      box-shadow: 0 0 50px rgba(0,150,255,0.8), 0 0 90px rgba(0,200,255,0.5), inset 0 0 20px rgba(255,255,255,0.3);
    }
    .btn-lightning:active { transform: scale(0.95); }
    .btn-lightning.lightning-active {
      animation: lightningShine 0.15s ease infinite, lightningFlash 0.1s ease infinite;
      border-color: #fff;
      color: #fff;
      text-shadow: 0 0 15px #fff, 0 0 30px #00ccff;
    }
    @keyframes lightningShine {
      0% { background-position: 0% 50%; }
      25% { background-position: 100% 0%; }
      50% { background-position: 50% 100%; }
      75% { background-position: 0% 50%; }
      100% { background-position: 100% 50%; }
    }
    @keyframes lightningFlash {
      0%, 100% { transform: scale(1.05); box-shadow: 0 0 40px rgba(0,150,255,0.9), 0 0 80px rgba(100,200,255,0.6); }
      50% { transform: scale(1.15); box-shadow: 0 0 70px rgba(255,255,255,0.9), 0 0 120px rgba(0,200,255,0.8); }
    }

    .btn-fishwave {
      background: linear-gradient(135deg, #0055aa, #00aadd, #44ddff, #0088cc, #006699, #00ccee);
      background-size: 500% 500%;
      color: #001833;
      font-size: clamp(10px, 1.8vw, 13px);
      font-weight: 800;
      text-shadow: 0 1px 3px rgba(100,200,255,0.4);
      box-shadow: 0 0 25px rgba(0,120,200,0.4), 0 0 50px rgba(0,180,255,0.2), 0 4px 15px rgba(0,0,0,0.4);
      animation: fishShine 3s ease infinite;
      display: none;
      border: 2px solid rgba(0,180,255,0.4);
    }
    .btn-fishwave:hover {
      transform: scale(1.1);
      box-shadow: 0 0 40px rgba(0,150,255,0.6), 0 0 70px rgba(0,200,255,0.4);
    }
    .btn-fishwave:active { transform: scale(0.95); }
    .btn-fishwave.fishwave-active {
      animation: fishShine 0.4s ease infinite, fishPulse 0.5s ease infinite;
      border-color: #44eeff;
    }
    @keyframes fishShine {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    @keyframes fishPulse {
      0%, 100% { transform: scale(1.02); }
      50% { transform: scale(1.1); box-shadow: 0 0 50px rgba(0,180,255,0.7), 0 0 80px rgba(0,220,255,0.4); }
    }

    .btn-sharkwave {
      background: linear-gradient(135deg, #003355, #005577, #0088aa, #006688, #002244, #007799);
      background-size: 500% 500%;
      color: #aaeeff;
      font-size: clamp(10px, 1.8vw, 13px);
      font-weight: 800;
      text-shadow: 0 1px 3px rgba(0,50,100,0.6);
      box-shadow: 0 0 25px rgba(0,80,160,0.5), 0 0 50px rgba(0,120,200,0.3), 0 4px 15px rgba(0,0,0,0.5);
      animation: sharkShine 3s ease infinite;
      display: none;
      border: 2px solid rgba(0,150,200,0.5);
    }
    .btn-sharkwave:hover {
      transform: scale(1.1);
      box-shadow: 0 0 40px rgba(0,100,180,0.7), 0 0 70px rgba(0,160,220,0.5);
    }
    .btn-sharkwave:active { transform: scale(0.95); }
    .btn-sharkwave.sharkwave-active {
      animation: sharkShine 0.4s ease infinite, sharkPulse 0.5s ease infinite;
      border-color: #00ccff;
    }
    @keyframes sharkShine {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    @keyframes sharkPulse {
      0%, 100% { transform: scale(1.02); }
      50% { transform: scale(1.1); box-shadow: 0 0 50px rgba(0,100,200,0.8), 0 0 80px rgba(0,180,255,0.5); }
    }

    .btn-metalwave {
      background: linear-gradient(135deg, #888899, #c0c0c0, #ffaa00, #00ccff, #888899);
      background-size: 400% 400%;
      color: #1a1a2e;
      font-size: clamp(10px, 1.8vw, 13px);
      text-shadow: 0 1px 2px rgba(255,255,255,0.3);
      box-shadow: 0 0 25px rgba(192,192,192,0.4), 0 0 50px rgba(255,170,0,0.2), 0 4px 15px rgba(0,0,0,0.4);
      animation: metalShine 3s ease infinite;
      display: none;
    }
    .btn-metalwave:hover {
      transform: scale(1.1);
      box-shadow: 0 0 40px rgba(192,192,192,0.6), 0 0 70px rgba(255,170,0,0.4);
    }
    .btn-metalwave:active { transform: scale(0.95); }
    .btn-metalwave.active-wave {
      animation: metalShine 0.4s ease infinite, boostPulse 0.2s ease infinite;
    }
    @keyframes metalShine {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Left action buttons */
    .btn-deactivate {
      background: linear-gradient(135deg, #ff4444, #ff8800);
      color: #1a0000;
      box-shadow: 0 0 30px #ff444444, 0 4px 15px rgba(0,0,0,0.3);
    }
    .btn-deactivate:hover {
      transform: scale(1.08);
      box-shadow: 0 0 50px #ff444466, 0 6px 25px rgba(0,0,0,0.4);
    }
    .btn-deactivate:active { transform: scale(0.98); }

    /* Super boost screen flash overlay */
    .boost-flash {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      pointer-events: none;
      z-index: 25;
      opacity: 0;
      transition: opacity 0.1s ease;
    }
    .boost-flash.active {
      opacity: 1;
      background: radial-gradient(circle at center, rgba(255,255,255,0.4), rgba(255,100,0,0.2), transparent 70%);
      animation: flashPulse 0.15s ease;
    }
    @keyframes flashPulse {
      0% { opacity: 1; }
      100% { opacity: 0; }
    }

    .element-selector {
      position: fixed;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 30;
    }

    .element-btn {
      width: 64px; height: 64px;
      border-radius: 16px;
      border: 3px solid;
      cursor: pointer;
      transition: all 0.25s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(8px);
      position: relative;
      -webkit-tap-highlight-color: transparent;
    }

    .element-btn .el-label {
      font-family: 'Orbitron', monospace;
      font-size: 7px;
      letter-spacing: 1px;
      margin-top: 2px;
      text-transform: uppercase;
      transition: color 0.25s ease;
    }

    .element-btn .el-status {
      position: absolute;
      top: -4px; right: -4px;
      width: 14px; height: 14px;
      border-radius: 50%;
      border: 2px solid #000;
      transition: all 0.25s ease;
      font-size: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Inactive state (OFF) - clearly dimmed */
    .element-btn {
      opacity: 0.35;
      border-color: #333;
      box-shadow: none;
      filter: grayscale(80%);
    }
    .element-btn .el-label { color: #555; }
    .element-btn .el-status { background: #aa0000; }
    .element-btn .el-status::after { content: ''; }

    /* Active state (ON) - vibrant glow */
    .element-btn.active {
      opacity: 1;
      filter: grayscale(0%);
      transform: scale(1.05);
    }
    .element-btn.active .el-status { background: #00dd44; }
    .element-btn.active .el-status::after { content: ''; }

    .element-btn:hover {
      transform: scale(1.12);
      opacity: 0.85;
    }
    .element-btn.active:hover {
      transform: scale(1.15);
      opacity: 1;
    }
    .element-btn:active { transform: scale(0.95) !important; }

    .element-btn.fire.active { border-color: #ff4400; box-shadow: 0 0 20px #ff4400aa, inset 0 0 12px #ff440033; }
    .element-btn.fire.active .el-label { color: #ff6622; }
    .element-btn.ice.active { border-color: #00ccff; box-shadow: 0 0 20px #00ccffaa, inset 0 0 12px #00ccff33; }
    .element-btn.ice.active .el-label { color: #00ccff; }
    .element-btn.electric.active { border-color: #ffee00; box-shadow: 0 0 20px #ffee00aa, inset 0 0 12px #ffee0033; }
    .element-btn.electric.active .el-label { color: #ffee00; }
    .element-btn.water.active { border-color: #0066ff; box-shadow: 0 0 20px #0066ffaa, inset 0 0 12px #0066ff33; }
    .element-btn.water.active .el-label { color: #4488ff; }
    .element-btn.venom.active { border-color: #aa00ff; box-shadow: 0 0 20px #aa00ffaa, inset 0 0 12px #aa00ff33; }
    .element-btn.venom.active .el-label { color: #cc44ff; }

    .monster-counter {
      position: fixed;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      pointer-events: none;
    }

    .counter-label {
      font-family: 'Orbitron', monospace;
      font-size: 10px;
      color: #ff4444;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .counter-value {
      font-family: 'Orbitron', monospace;
      font-size: 36px;
      font-weight: 900;
      color: #ff6644;
      text-shadow: 0 0 20px #ff664488;
    }

    .counter-sub {
      font-family: 'Orbitron', monospace;
      font-size: 10px;
      color: #00ff88;
      letter-spacing: 2px;
    }

    .address-badge {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Orbitron', monospace;
      font-size: 10px;
      color: #556688;
      letter-spacing: 2px;
      pointer-events: none;
      text-align: center;
    }

    .weather-badge {
      position: fixed;
      bottom: 12px;
      left: 12px;
      font-family: 'Orbitron', monospace;
      font-size: 9px;
      color: #667799;
      letter-spacing: 1px;
      pointer-events: none;
      opacity: 0.7;
    }

    @media (max-width: 600px) {
      .element-selector { right: 6px; gap: 6px; }
      .element-btn { width: 52px; height: 52px; font-size: 18px; border-radius: 12px; }
      .element-btn .el-label { font-size: 6px; }
      .controls { bottom: 20px; gap: 12px; }
      .btn { padding: 12px 24px; font-size: 10px; }
      .monster-counter { left: 8px; }
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <div id="ui-overlay">
    <div class="top-bar">
      <div class="shield-status inactive" id="shieldStatus">Bouclier Inactif</div>
    </div>
    <div class="title-area">
      <h1>Barriere Magnetique Elementaire</h1>
      <p>Systeme de Protection Avance - Maison Argyle</p>
    </div>

    <div class="monster-counter">
      <div class="counter-label">Monstres</div>
      <div class="counter-label">Repousses</div>
      <div class="counter-value" id="monsterCount">0</div>
      <div class="counter-sub">vers l'espace</div>
    </div>

    <div class="address-badge">
      455 Avenue Argyle, Westmount, QC &bull; Protection Active 24/7
    </div>
    <div class="weather-badge" id="weatherBadge"></div>
  </div>

  <div class="element-selector">
    <div class="element-btn fire active" data-element="fire">
      <span>&#128293;</span>
      <span class="el-label">Feu</span>
      <span class="el-status"></span>
    </div>
    <div class="element-btn ice active" data-element="ice">
      <span>&#10052;&#65039;</span>
      <span class="el-label">Glace</span>
      <span class="el-status"></span>
    </div>
    <div class="element-btn electric active" data-element="electric">
      <span>&#9889;</span>
      <span class="el-label">Eclair</span>
      <span class="el-status"></span>
    </div>
    <div class="element-btn water active" data-element="water">
      <span>&#128167;</span>
      <span class="el-label">Eau</span>
      <span class="el-status"></span>
    </div>
    <div class="element-btn venom active" data-element="venom">
      <span>&#9760;&#65039;</span>
      <span class="el-label">Venin</span>
      <span class="el-status"></span>
    </div>
  </div>

  <div class="controls">
    <button class="btn btn-activate" id="btnActivate" onclick="activateBarrier()">
      Activer Bouclier
    </button>
    <button class="btn btn-superboost" id="btnSuperBoost" onclick="triggerSuperBoost()">
      SUPER BOOST
    </button>
    <button class="btn btn-cobra" id="btnCobra" onclick="triggerCobra()">
      COBRA VENIMEUX
    </button>
    <button class="btn btn-lightning" id="btnLightning" onclick="triggerLightningStorm()">
      ⚡ BOOST ÉLECTRIQUE ⚡
    </button>
    <button class="btn btn-fishwave" id="btnFishWave" onclick="triggerFishWave()">
      🐟 VAGUE DU POISSON 🐟
    </button>
    <button class="btn btn-sharkwave" id="btnSharkWave" onclick="triggerSharkWave()">
      🦈 REQUINS 🦈
    </button>
    <button class="btn btn-metalwave" id="btnMetalWave" onclick="triggerMetalWave()">
      VAGUE METAL
    </button>
    <button class="btn btn-ultraboost" id="btnUltraBoost" onclick="triggerUltraBoost()">
      ULTRA BOOST
    </button>
    <button class="btn btn-deactivate" id="btnDeactivate" onclick="deactivateBarrier()">
      Desactiver
    </button>
  </div>

  <div class="boost-flash" id="boostFlash"></div>

  <script>
    // ===== CANVAS SETUP =====
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let W, H, centerX, centerY;
    let barrierActive = false;
    let monstersDefeated = 0;
    let activationProgress = 0;
    let shakeAmount = 0;
    let superBoostActive = false;
    let superBoostTimer = 0;
    let ultraBoostActive = false;

    const activeElements = { fire: true, ice: true, electric: true, water: true, venom: true };

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
      centerX = W / 2;
      centerY = H / 2;
    }
    window.addEventListener('resize', resize);
    resize();

    // ===== MONTREAL DAY/NIGHT CYCLE =====
    function getMontrealTime() {
      const now = new Date();
      const mtl = new Date(now.toLocaleString('en-US', { timeZone: 'America/Montreal' }));
      return { hour: mtl.getHours() + mtl.getMinutes() / 60, month: mtl.getMonth() };
    }

    function getMontrealDaylight() {
      const { hour, month } = getMontrealTime();
      // Approximate sunrise/sunset for Montreal by month (decimal hours)
      const sunTimes = [
        [7.5, 16.5], [7.0, 17.3], [6.3, 18.0], [6.2, 19.5],
        [5.5, 20.3], [5.2, 20.8], [5.3, 20.7], [5.8, 20.0],
        [6.5, 19.0], [7.1, 18.0], [6.7, 16.5], [7.3, 16.2]
      ];
      const [sunrise, sunset] = sunTimes[month];

      // Wide transition zones for realism:
      // Civil twilight ~1.5h before sunrise / after sunset
      // Golden hour ~0.5h around sunrise/sunset
      const twilightDuration = 1.5;
      const dawnStart = sunrise - twilightDuration;
      const duskEnd = sunset + twilightDuration;

      if (hour < dawnStart) return 0;          // Deep night
      if (hour < sunrise) {                     // Dawn twilight
        const t = (hour - dawnStart) / twilightDuration;
        return t * t * 0.4;                     // Slow ease-in, reaches 0.4 at sunrise
      }
      if (hour < sunrise + 0.75) {              // Post-sunrise golden hour
        const t = (hour - sunrise) / 0.75;
        return 0.4 + t * 0.6;                  // 0.4 → 1.0
      }
      if (hour < sunset - 0.75) return 1;      // Full day
      if (hour < sunset) {                      // Pre-sunset golden hour
        const t = (sunset - hour) / 0.75;
        return 0.4 + t * 0.6;                  // 1.0 → 0.4
      }
      if (hour < duskEnd) {                     // Dusk twilight
        const t = (duskEnd - hour) / twilightDuration;
        return t * t * 0.4;                     // 0.4 → 0 slow ease-out
      }
      return 0;                                 // Night
    }

    // Sky phase gives more detail: which part of the cycle are we in
    // Returns: { phase: 'night'|'blueHour'|'dawn'|'goldenHour'|'day'|'goldenHourPM'|'dusk'|'blueHourPM', progress: 0-1 }
    function getSkyPhase() {
      const { hour, month } = getMontrealTime();
      const sunTimes = [
        [7.5, 16.5], [7.0, 17.3], [6.3, 18.0], [6.2, 19.5],
        [5.5, 20.3], [5.2, 20.8], [5.3, 20.7], [5.8, 20.0],
        [6.5, 19.0], [7.1, 18.0], [6.7, 16.5], [7.3, 16.2]
      ];
      const [sunrise, sunset] = sunTimes[month];

      const blueStart = sunrise - 1.5;
      const dawnStart = sunrise - 0.75;
      const goldenAM = sunrise + 0.75;
      const goldenPMStart = sunset - 0.75;
      const duskEnd = sunset + 0.75;
      const blueEnd = sunset + 1.5;

      if (hour < blueStart) return { phase: 'night', progress: 0 };
      if (hour < dawnStart) return { phase: 'blueHour', progress: (hour - blueStart) / (dawnStart - blueStart) };
      if (hour < sunrise) return { phase: 'dawn', progress: (hour - dawnStart) / (sunrise - dawnStart) };
      if (hour < goldenAM) return { phase: 'goldenHour', progress: (hour - sunrise) / (goldenAM - sunrise) };
      if (hour < goldenPMStart) return { phase: 'day', progress: (hour - goldenAM) / (goldenPMStart - goldenAM) };
      if (hour < sunset) return { phase: 'goldenHourPM', progress: (hour - goldenPMStart) / (sunset - goldenPMStart) };
      if (hour < duskEnd) return { phase: 'dusk', progress: (hour - sunset) / (duskEnd - sunset) };
      if (hour < blueEnd) return { phase: 'blueHourPM', progress: (hour - duskEnd) / (blueEnd - duskEnd) };
      return { phase: 'night', progress: 0 };
    }

    // Cache values, update every 10 seconds for smoother transitions
    let daylight = getMontrealDaylight();
    let skyPhase = getSkyPhase();
    setInterval(() => { daylight = getMontrealDaylight(); skyPhase = getSkyPhase(); }, 10000);

    // ===== REAL WEATHER from Open-Meteo (Montreal) =====
    let weather = { cloudCover: 0, weatherCode: 0, precipitation: 0, visibility: 24000, loaded: false };
    // Smoothly interpolated weather for rendering (avoids sudden jumps)
    let weatherSmooth = { cloudCover: 0, weatherCode: 0, precipitation: 0, visibility: 24000 };

    async function fetchWeather() {
      try {
        const url = 'https://api.open-meteo.com/v1/forecast?latitude=45.5017&longitude=-73.5673&current=weather_code,cloud_cover,precipitation,visibility';
        const resp = await fetch(url);
        const data = await resp.json();
        if (data && data.current) {
          weather.cloudCover = data.current.cloud_cover || 0;       // 0-100%
          weather.weatherCode = data.current.weather_code || 0;     // WMO code
          weather.precipitation = data.current.precipitation || 0;  // mm
          weather.visibility = data.current.visibility || 24000;    // meters
          weather.loaded = true;
          if (typeof updateWeatherBadge === 'function') updateWeatherBadge();
        }
      } catch (e) { /* silently ignore - keep last known or defaults */ }
    }
    fetchWeather();
    setInterval(fetchWeather, 10 * 60 * 1000); // refresh every 10 min

    // Weather code helpers
    function isRaining(code) { return (code >= 51 && code <= 67) || (code >= 80 && code <= 82); }
    function isSnowing(code) { return (code >= 71 && code <= 77) || (code >= 85 && code <= 86); }
    function isThunderstorm(code) { return code >= 95 && code <= 99; }
    function isFoggy(code) { return code === 45 || code === 48; }

    function weatherDescription(code) {
      if (code === 0) return 'Ciel degag\u00e9';
      if (code <= 3) return 'Partiellement nuageux';
      if (code === 45 || code === 48) return 'Brouillard';
      if (code >= 51 && code <= 55) return 'Bruine';
      if (code >= 56 && code <= 57) return 'Bruine vergla\u00e7ante';
      if (code >= 61 && code <= 65) return 'Pluie';
      if (code >= 66 && code <= 67) return 'Pluie vergla\u00e7ante';
      if (code >= 71 && code <= 75) return 'Neige';
      if (code === 77) return 'Gr\u00e9sil';
      if (code >= 80 && code <= 82) return 'Averses';
      if (code >= 85 && code <= 86) return 'Averses de neige';
      if (code >= 95) return 'Orage';
      return '';
    }

    function weatherEmoji(code) {
      if (code === 0) return daylight > 0.5 ? '\u2600\uFE0F' : '\uD83C\uDF19';
      if (code <= 3) return daylight > 0.5 ? '\u26C5' : '\uD83C\uDF24\uFE0F';
      if (code === 45 || code === 48) return '\uD83C\uDF2B\uFE0F';
      if (code >= 51 && code <= 67) return '\uD83C\uDF27\uFE0F';
      if (code >= 71 && code <= 86) return '\u2744\uFE0F';
      if (code >= 95) return '\u26A1';
      return '\u2601\uFE0F';
    }

    function updateWeatherBadge() {
      const el = document.getElementById('weatherBadge');
      if (!el || !weather.loaded) return;
      const emoji = weatherEmoji(weather.weatherCode);
      const desc = weatherDescription(weather.weatherCode);
      el.textContent = `${emoji} ${desc} \u2022 Nuages ${Math.round(weather.cloudCover)}%`;
    }
    setInterval(updateWeatherBadge, 5000);

    // Rain/snow particles
    let precipParticles = [];
    const MAX_PRECIP = 200;

    // Helper: interpolate color components
    function lerpColor(c1, c2, t) {
      return [
        Math.round(c1[0] + (c2[0] - c1[0]) * t),
        Math.round(c1[1] + (c2[1] - c1[1]) * t),
        Math.round(c1[2] + (c2[2] - c1[2]) * t)
      ];
    }

    // ===== STARS =====
    class Star {
      constructor() { this.reset(); }
      reset() {
        this.x = Math.random() * W;
        this.y = Math.random() * H;
        this.size = Math.random() * 2 + 0.5;
        this.twinkleSpeed = Math.random() * 0.03 + 0.01;
        this.twinklePhase = Math.random() * Math.PI * 2;
        this.brightness = Math.random() * 0.5 + 0.5;
      }
      draw(t) {
        const nightFactor = 1 - daylight; // stars visible at night only
        if (nightFactor < 0.05) return;
        const alpha = this.brightness * (0.5 + 0.5 * Math.sin(t * this.twinkleSpeed + this.twinklePhase)) * nightFactor;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(200, 220, 255, ${alpha})`;
        ctx.fill();
      }
    }

    const stars = Array.from({ length: 200 }, () => new Star());

    // ===== HOUSE DRAWING =====
    const houseW = Math.min(280, W * 0.35);
    const houseH = houseW * 0.85;

    function drawHouse() {
      const hx = centerX;
      const hy = centerY + 20;
      const hw = houseW;
      const hh = houseH;

      ctx.save();

      // Main house body - stone facade (brighter in daytime)
      const bodyGrad = ctx.createLinearGradient(hx - hw/2, hy - hh/3, hx + hw/2, hy + hh/2);
      const hd = daylight;
      const hc1 = lerpColor([90, 78, 66], [140, 125, 110], hd);
      const hc2 = lerpColor([74, 63, 53], [120, 108, 95], hd);
      const hc3 = lerpColor([61, 51, 40], [100, 90, 78], hd);
      bodyGrad.addColorStop(0, `rgb(${hc1})`);
      bodyGrad.addColorStop(0.5, `rgb(${hc2})`);
      bodyGrad.addColorStop(1, `rgb(${hc3})`);
      ctx.fillStyle = bodyGrad;
      ctx.beginPath();
      ctx.rect(hx - hw/2, hy - hh/3, hw, hh * 0.7);
      ctx.fill();

      // Roof
      const roofGrad = ctx.createLinearGradient(hx, hy - hh/1.2, hx, hy - hh/3);
      const rc1 = lerpColor([42, 42, 53], [80, 75, 70], hd);
      const rc2 = lerpColor([26, 26, 37], [55, 50, 48], hd);
      roofGrad.addColorStop(0, `rgb(${rc1})`);
      roofGrad.addColorStop(1, `rgb(${rc2})`);
      ctx.fillStyle = roofGrad;
      ctx.beginPath();
      ctx.moveTo(hx - hw/2 - 20, hy - hh/3);
      ctx.lineTo(hx, hy - hh/1.2);
      ctx.lineTo(hx + hw/2 + 20, hy - hh/3);
      ctx.closePath();
      ctx.fill();

      // Roof edge highlight
      ctx.strokeStyle = '#3a3a4a';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(hx - hw/2 - 20, hy - hh/3);
      ctx.lineTo(hx, hy - hh/1.2);
      ctx.lineTo(hx + hw/2 + 20, hy - hh/3);
      ctx.stroke();

      // Windows - warm glow at night, sky reflection during day
      const isNight = daylight < 0.5;
      const winColor = isNight
        ? (barrierActive ? 'rgba(255, 220, 140, 0.9)' : 'rgba(255, 200, 100, 0.35)')
        : (barrierActive ? 'rgba(180, 210, 240, 0.8)' : 'rgba(150, 195, 230, 0.6)');
      const winGlow = isNight
        ? (barrierActive ? 'rgba(255, 200, 80, 0.4)' : 'rgba(255, 200, 80, 0.1)')
        : 'rgba(100, 180, 255, 0.1)';
      const winW = hw * 0.16;
      const winH = hh * 0.16;

      // Top windows
      [- 0.25, 0, 0.25].forEach(offset => {
        const wx = hx + hw * offset - winW / 2;
        const wy = hy - hh * 0.18;
        ctx.shadowColor = winGlow;
        ctx.shadowBlur = barrierActive ? 20 : 5;
        ctx.fillStyle = winColor;
        ctx.fillRect(wx, wy, winW, winH);
        ctx.shadowBlur = 0;
        // Window frame
        ctx.strokeStyle = '#2a2520';
        ctx.lineWidth = 2;
        ctx.strokeRect(wx, wy, winW, winH);
        ctx.beginPath();
        ctx.moveTo(wx + winW/2, wy);
        ctx.lineTo(wx + winW/2, wy + winH);
        ctx.moveTo(wx, wy + winH/2);
        ctx.lineTo(wx + winW/2, wy + winH/2);
        ctx.stroke();
      });

      // Bottom windows
      [-0.28, 0.28].forEach(offset => {
        const wx = hx + hw * offset - winW * 0.7;
        const wy = hy + hh * 0.05;
        const bwW = winW * 1.4;
        const bwH = winH * 1.2;
        ctx.shadowColor = winGlow;
        ctx.shadowBlur = barrierActive ? 25 : 5;
        ctx.fillStyle = winColor;
        ctx.fillRect(wx, wy, bwW, bwH);
        ctx.shadowBlur = 0;
        ctx.strokeStyle = '#2a2520';
        ctx.lineWidth = 2;
        ctx.strokeRect(wx, wy, bwW, bwH);
        ctx.beginPath();
        ctx.moveTo(wx + bwW/3, wy);
        ctx.lineTo(wx + bwW/3, wy + bwH);
        ctx.moveTo(wx + bwW*2/3, wy);
        ctx.lineTo(wx + bwW*2/3, wy + bwH);
        ctx.stroke();
      });

      // Front door
      const doorW = hw * 0.14;
      const doorH = hh * 0.28;
      const doorX = hx - doorW / 2;
      const doorY = hy + hh * 0.7 - doorH;
      const doorGrad = ctx.createLinearGradient(doorX, doorY, doorX + doorW, doorY + doorH);
      doorGrad.addColorStop(0, '#3a2618');
      doorGrad.addColorStop(1, '#2a1a10');
      ctx.fillStyle = doorGrad;
      ctx.beginPath();
      ctx.moveTo(doorX, doorY + doorH);
      ctx.lineTo(doorX, doorY + doorW * 0.3);
      ctx.arcTo(doorX, doorY, doorX + doorW / 2, doorY, doorW * 0.5);
      ctx.arcTo(doorX + doorW, doorY, doorX + doorW, doorY + doorW * 0.3, doorW * 0.5);
      ctx.lineTo(doorX + doorW, doorY + doorH);
      ctx.closePath();
      ctx.fill();

      // Door handle
      ctx.beginPath();
      ctx.arc(doorX + doorW * 0.75, doorY + doorH * 0.55, 3, 0, Math.PI * 2);
      ctx.fillStyle = '#c4a53a';
      ctx.fill();

      // Door light
      if (barrierActive) {
        ctx.shadowColor = 'rgba(255, 200, 80, 0.6)';
        ctx.shadowBlur = 30;
        ctx.beginPath();
        ctx.arc(hx, doorY + doorH * 0.15 - 15, 5, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255, 220, 140, 0.9)';
        ctx.fill();
        ctx.shadowBlur = 0;
      }

      // Ground / lawn — brighter during day
      const groundGrad = ctx.createLinearGradient(0, hy + hh * 0.37, 0, H);
      const gc1 = lerpColor([26, 40, 16], [60, 100, 35], hd);
      const gc2 = lerpColor([15, 26, 8], [40, 70, 22], hd);
      const gc3 = lerpColor([5, 10, 3], [20, 38, 12], hd);
      groundGrad.addColorStop(0, `rgb(${gc1})`);
      groundGrad.addColorStop(0.3, `rgb(${gc2})`);
      groundGrad.addColorStop(1, `rgb(${gc3})`);
      ctx.fillStyle = groundGrad;
      ctx.fillRect(0, hy + hh * 0.37, W, H - hy);

      // Path to door
      const pathC = lerpColor([42, 37, 32], [80, 72, 62], hd);
      ctx.fillStyle = `rgb(${pathC})`;
      ctx.beginPath();
      ctx.moveTo(doorX - 5, doorY + doorH);
      ctx.lineTo(doorX - 30, hy + hh * 0.37 + 40);
      ctx.lineTo(doorX + doorW + 30, hy + hh * 0.37 + 40);
      ctx.lineTo(doorX + doorW + 5, doorY + doorH);
      ctx.closePath();
      ctx.fill();

      // Bushes
      [[-0.38, 0.34], [0.38, 0.34], [-0.2, 0.36], [0.2, 0.36]].forEach(([ox, oy]) => {
        ctx.beginPath();
        ctx.arc(hx + hw * ox, hy + hh * oy, hw * 0.08, 0, Math.PI * 2);
        ctx.fillStyle = `rgb(${20 + Math.random() * 15}, ${50 + Math.random() * 20}, ${15 + Math.random() * 10})`;
        ctx.fill();
      });

      // Address label
      ctx.font = '10px Orbitron, monospace';
      ctx.fillStyle = 'rgba(200, 190, 170, 0.5)';
      ctx.textAlign = 'center';
      ctx.fillText('455', hx, doorY + doorH - 8);

      ctx.restore();
    }

    // ===== BARRIER =====
    const barrierRadius = Math.min(houseW * 1.1, W * 0.35);
    let barrierParticles = [];

    class BarrierParticle {
      constructor() { this.reset(); }
      reset() {
        this.angle = Math.random() * Math.PI * 2;
        this.radius = barrierRadius + (Math.random() - 0.5) * 20;
        this.speed = (Math.random() * 0.5 + 0.3) * (Math.random() > 0.5 ? 1 : -1);
        this.size = Math.random() * 3 + 1;
        this.life = 1;
        this.decay = Math.random() * 0.005 + 0.002;
        const elements = Object.keys(activeElements).filter(e => activeElements[e]);
        this.element = elements[Math.floor(Math.random() * elements.length)] || 'electric';
      }
      update() {
        this.angle += this.speed * 0.015;
        this.life -= this.decay;
        if (this.life <= 0) this.reset();
      }
      draw() {
        const x = centerX + Math.cos(this.angle) * this.radius;
        const y = (centerY + 20) + Math.sin(this.angle) * this.radius * 0.55;
        const colors = {
          fire: [`rgba(255, 100, 0, ${this.life})`, `rgba(255, 200, 0, ${this.life * 0.5})`],
          ice: [`rgba(0, 200, 255, ${this.life})`, `rgba(200, 240, 255, ${this.life * 0.5})`],
          electric: [`rgba(255, 255, 0, ${this.life})`, `rgba(200, 200, 255, ${this.life * 0.5})`],
          water: [`rgba(0, 100, 255, ${this.life})`, `rgba(100, 180, 255, ${this.life * 0.5})`],
          venom: [`rgba(170, 0, 255, ${this.life})`, `rgba(0, 255, 100, ${this.life * 0.5})`]
        };
        const [c1, c2] = colors[this.element] || colors.electric;
        ctx.beginPath();
        ctx.arc(x, y, this.size * this.life, 0, Math.PI * 2);
        ctx.fillStyle = c1;
        ctx.shadowColor = c2;
        ctx.shadowBlur = 10;
        ctx.fill();
        ctx.shadowBlur = 0;
      }
    }

    for (let i = 0; i < 150; i++) barrierParticles.push(new BarrierParticle());

    function drawBarrier(t) {
      if (activationProgress <= 0) return;
      const alpha = activationProgress;
      const boostMult = superBoostActive ? 2.5 : 1;

      ctx.save();

      // Super Boost: extra radial shockwave rings
      if (superBoostActive) {
        const boostPhase = (t % 800) / 800;
        for (let w = 0; w < 3; w++) {
          const wave = (boostPhase + w * 0.33) % 1;
          const waveR = barrierRadius * (1 + wave * 0.5);
          ctx.beginPath();
          ctx.ellipse(centerX, centerY + 20, waveR, waveR * 0.55, 0, 0, Math.PI * 2);
          ctx.strokeStyle = `rgba(255, 200, 0, ${(1 - wave) * 0.4})`;
          ctx.lineWidth = 3 * (1 - wave);
          ctx.stroke();
        }
      }

      // Main barrier ellipse glow
      for (let i = 3; i >= 0; i--) {
        const r = barrierRadius + i * 8 * boostMult;
        ctx.beginPath();
        ctx.ellipse(centerX, centerY + 20, r, r * 0.55, 0, 0, Math.PI * 2);
        const glowColor = superBoostActive
          ? `rgba(255, ${150 + Math.sin(t * 0.01) * 100}, 0, ${alpha * 0.15 * (4 - i)})`
          : `rgba(0, 200, 255, ${alpha * 0.08 * (4 - i)})`;
        ctx.strokeStyle = glowColor;
        ctx.lineWidth = (3 + i * 2) * boostMult;
        ctx.stroke();
      }

      // Rotating energy rings
      for (let ring = 0; ring < 3; ring++) {
        const ringOffset = t * 0.001 * (ring + 1) * (ring % 2 === 0 ? 1 : -1);
        ctx.beginPath();
        ctx.ellipse(centerX, centerY + 20, barrierRadius + ring * 5, (barrierRadius + ring * 5) * 0.55, ringOffset, 0, Math.PI * 2);
        const colors = ['rgba(0, 255, 136, ', 'rgba(0, 200, 255, ', 'rgba(255, 100, 0, '];
        ctx.strokeStyle = colors[ring] + (alpha * 0.15) + ')';
        ctx.lineWidth = 1.5;
        ctx.setLineDash([10, 20 + ring * 10]);
        ctx.lineDashOffset = t * 0.05 * (ring % 2 === 0 ? 1 : -1);
        ctx.stroke();
        ctx.setLineDash([]);
      }

      // Hexagonal grid overlay
      const hexSize = 25;
      for (let a = 0; a < Math.PI * 2; a += 0.15) {
        const r = barrierRadius;
        const x = centerX + Math.cos(a) * r;
        const y = (centerY + 20) + Math.sin(a) * r * 0.55;
        const pulse = Math.sin(t * 0.003 + a * 5) * 0.5 + 0.5;
        ctx.beginPath();
        for (let s = 0; s < 6; s++) {
          const hx = x + Math.cos(Math.PI / 3 * s) * hexSize * 0.3;
          const hy = y + Math.sin(Math.PI / 3 * s) * hexSize * 0.3;
          s === 0 ? ctx.moveTo(hx, hy) : ctx.lineTo(hx, hy);
        }
        ctx.closePath();
        ctx.strokeStyle = `rgba(0, 200, 255, ${alpha * pulse * 0.2})`;
        ctx.lineWidth = 1;
        ctx.stroke();
      }

      // Barrier particles
      barrierParticles.forEach(p => {
        p.update();
        p.draw();
      });

      // Electric arcs
      if (activeElements.electric && Math.random() < 0.15) {
        const a1 = Math.random() * Math.PI * 2;
        const a2 = a1 + (Math.random() - 0.5) * 0.8;
        ctx.beginPath();
        const x1 = centerX + Math.cos(a1) * barrierRadius;
        const y1 = (centerY + 20) + Math.sin(a1) * barrierRadius * 0.55;
        const x2 = centerX + Math.cos(a2) * barrierRadius;
        const y2 = (centerY + 20) + Math.sin(a2) * barrierRadius * 0.55;
        ctx.moveTo(x1, y1);
        const midX = (x1 + x2) / 2 + (Math.random() - 0.5) * 30;
        const midY = (y1 + y2) / 2 + (Math.random() - 0.5) * 30;
        ctx.quadraticCurveTo(midX, midY, x2, y2);
        ctx.strokeStyle = `rgba(180, 200, 255, ${alpha * 0.8})`;
        ctx.lineWidth = 1.5;
        ctx.shadowColor = 'rgba(150, 180, 255, 0.8)';
        ctx.shadowBlur = 15;
        ctx.stroke();
        ctx.shadowBlur = 0;
      }

      ctx.restore();
    }

    // ===== MONSTERS =====
    const monsters = [];
    // ===== MONSTER VARIETY SYSTEM =====
    // Body shapes: blob, tall, wide, spiky, ghost, spider, cyclops, bat, slug, squid
    const bodyShapes = ['blob', 'tall', 'wide', 'spiky', 'ghost', 'spider', 'cyclops', 'bat', 'slug', 'squid'];
    const headFeatures = ['horns', 'antennae', 'crown', 'spikes', 'ears', 'none', 'single_horn', 'mushroom'];
    const eyeStyles = ['round', 'angry', 'tiny', 'big', 'vertical', 'three', 'one_big', 'stalks'];
    const mouthStyles = ['teeth', 'fangs', 'wide_grin', 'beak', 'tentacle_mouth', 'drool', 'none', 'zigzag'];
    const limbStyles = ['tentacles', 'claws', 'stubs', 'wings', 'spider_legs', 'ghost_trail', 'none', 'long_arms'];
    const patterns = ['solid', 'spots', 'stripes', 'gradient', 'cracks', 'glow_veins'];

    const colorPalettes = [
      { body: '#8B0000', accent: '#cc2200', eye: '#ffff00', glow: '#ff440088' },
      { body: '#4B0082', accent: '#7722cc', eye: '#ff0000', glow: '#aa00ff88' },
      { body: '#2F4F2F', accent: '#447744', eye: '#00ff00', glow: '#22aa2288' },
      { body: '#3B0B0B', accent: '#661111', eye: '#ff8800', glow: '#ff440088' },
      { body: '#1a1a3a', accent: '#3333aa', eye: '#cc00ff', glow: '#6600cc88' },
      { body: '#2a0a2a', accent: '#880066', eye: '#ff00aa', glow: '#ff00aa88' },
      { body: '#0a2a2a', accent: '#006666', eye: '#00ffcc', glow: '#00ffcc88' },
      { body: '#3a2a0a', accent: '#886600', eye: '#ffcc00', glow: '#ffcc0088' },
      { body: '#1a0a0a', accent: '#440000', eye: '#ff2200', glow: '#ff000088' },
      { body: '#0a0a2a', accent: '#0022aa', eye: '#4488ff', glow: '#0044ff88' },
      { body: '#2a0a1a', accent: '#770033', eye: '#ff4488', glow: '#ff448888' },
      { body: '#1a2a0a', accent: '#446600', eye: '#aaff00', glow: '#88cc0088' },
    ];

    function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    class Monster {
      constructor() {
        this.id = Math.random();
        this.palette = pick(colorPalettes);
        this.color = this.palette.body;
        this.accent = this.palette.accent;
        this.eyeColor = this.palette.eye;
        this.glowColor = this.palette.glow;

        // Randomized traits
        this.bodyShape = pick(bodyShapes);
        this.headFeature = pick(headFeatures);
        this.eyeStyle = pick(eyeStyles);
        this.mouthStyle = pick(mouthStyles);
        this.limbStyle = pick(limbStyles);
        this.pattern = pick(patterns);

        // Size depends on body shape
        const baseSizes = { blob: 32, tall: 28, wide: 35, spiky: 30, ghost: 34, spider: 26, cyclops: 38, bat: 25, slug: 30, squid: 32 };
        this.size = (baseSizes[this.bodyShape] || 32) + Math.random() * 12 - 6;

        this.eyeCount = this.eyeStyle === 'three' ? 3 : (this.eyeStyle === 'one_big' || this.bodyShape === 'cyclops') ? 1 : 2;
        this.tentacles = this.limbStyle === 'tentacles' ? Math.floor(Math.random() * 3) + 3 :
                         this.limbStyle === 'spider_legs' ? 6 :
                         this.limbStyle === 'long_arms' ? 2 : Math.floor(Math.random() * 3) + 2;
        this.hornSize = Math.random() * 15 + 5;
        this.teethCount = Math.floor(Math.random() * 4) + 3;

        // Unique variation seeds
        this.blobSeed = Array.from({length: 12}, () => Math.random() * 6 - 3);
        this.wobbleAmp = Math.random() * 3 + 1;
        this.pulseSpeed = Math.random() * 0.003 + 0.002;
        this.scaleY = this.bodyShape === 'tall' ? 1.4 : this.bodyShape === 'wide' ? 0.7 : 1;
        this.scaleX = this.bodyShape === 'wide' ? 1.4 : this.bodyShape === 'tall' ? 0.75 : 1;

        // Spawn from edges
        const side = Math.floor(Math.random() * 4);
        if (side === 0) { this.x = -50; this.y = Math.random() * H; }
        else if (side === 1) { this.x = W + 50; this.y = Math.random() * H; }
        else if (side === 2) { this.x = Math.random() * W; this.y = -50; }
        else { this.x = Math.random() * W; this.y = H + 50; }

        this.speed = Math.random() * 0.5 + 0.3;
        if (this.bodyShape === 'slug') this.speed *= 0.6;
        if (this.bodyShape === 'bat') this.speed *= 1.4;
        this.wobble = Math.random() * Math.PI * 2;
        this.wobbleSpeed = Math.random() * 0.02 + 0.01;
        this.state = 'approaching';
        this.hitTime = 0;
        this.flyVx = 0;
        this.flyVy = 0;
        this.flyRotation = 0;
        this.flyRotSpeed = 0;
        this.opacity = 1;
        this.mouthPhase = Math.random() * Math.PI;
      }

      update(t) {
        if (this.state === 'caught') return; // Metal wave controls position
        if (this.state === 'venom' || this.state === 'venomDead') return; // Cobra controls position
        if (this.state === 'floating') return; // Fish wave controls position
        if (this.state === 'approaching') {
          const dx = centerX - this.x;
          const dy = (centerY + 20) - this.y;
          const dist = Math.sqrt(dx * dx + dy * dy);

          this.wobble += this.wobbleSpeed;
          const wobbleX = Math.sin(this.wobble) * this.wobbleAmp;
          const wobbleY = Math.cos(this.wobble * 1.3) * this.wobbleAmp;

          this.x += (dx / dist) * this.speed + wobbleX * 0.3;
          this.y += (dy / dist) * this.speed + wobbleY * 0.3;

          const bx = this.x - centerX;
          const by = (this.y - (centerY + 20)) / 0.55;
          const barrierDist = Math.sqrt(bx * bx + by * by);

          if (barrierDist < barrierRadius + 15) {
            if (barrierActive) {
              this.state = 'hit';
              this.hitTime = t;
              const angle = Math.atan2(this.y - (centerY + 20), this.x - centerX);
              this.flyVx = Math.cos(angle) * (8 + Math.random() * 5);
              this.flyVy = Math.sin(angle) * (8 + Math.random() * 5) - 6;
              this.flyRotSpeed = (Math.random() - 0.5) * 0.3;
              monstersDefeated++;
              document.getElementById('monsterCount').textContent = monstersDefeated;
              shakeAmount = 8;
              spawnProjectiles(this.x, this.y, angle);
            } else {
              // Monsters NEVER enter the house - stop at barrier edge
              const bAngle = Math.atan2(by, bx);
              this.x = centerX + Math.cos(bAngle) * (barrierRadius + 18);
              this.y = (centerY + 20) + Math.sin(bAngle) * (barrierRadius + 18) * 0.55;
            }
          }
        } else if (this.state === 'hit') {
          const elapsed = (t - this.hitTime) / 1000;
          if (elapsed < 0.5) {
            this.opacity = 1 - elapsed;
          } else {
            this.state = 'flying';
          }
        } else if (this.state === 'flying') {
          this.x += this.flyVx;
          this.y += this.flyVy;
          this.flyVy -= 0.15;
          this.flyRotation += this.flyRotSpeed;
          this.opacity -= 0.008;
          this.size *= 0.998;
        }
      }

      draw(t) {
        if (this.opacity <= 0) return;
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.flyRotation);
        ctx.globalAlpha = this.opacity;

        const pulse = 1 + Math.sin(t * this.pulseSpeed + this.id * 10) * 0.05;
        const s = this.size * pulse;

        // Shadow/glow
        ctx.shadowColor = this.state === 'hit' ? 'rgba(255,255,255,0.8)' : this.glowColor;
        ctx.shadowBlur = this.state === 'hit' ? 30 : 15;

        // ===== DRAW BODY =====
        ctx.save();
        ctx.scale(this.scaleX, this.scaleY);
        this._drawBody(t, s);
        ctx.restore();

        ctx.shadowBlur = 0;

        // ===== DRAW PATTERN =====
        this._drawPattern(t, s);

        // ===== DRAW HEAD FEATURES =====
        this._drawHeadFeature(t, s);

        // ===== DRAW EYES =====
        this._drawEyes(t, s);

        // ===== DRAW MOUTH =====
        this._drawMouth(t, s);

        // ===== DRAW LIMBS =====
        this._drawLimbs(t, s);

        ctx.globalAlpha = 1;
        ctx.restore();
      }

      _drawBody(t, s) {
        ctx.beginPath();
        if (this.bodyShape === 'ghost') {
          // Ghost: round top, wavy bottom
          ctx.moveTo(-s, 0);
          ctx.arc(0, -s * 0.3, s, Math.PI, 0);
          for (let i = 0; i <= 5; i++) {
            const gx = s - (i / 5) * s * 2;
            const gy = s * 0.5 + Math.sin(t * 0.005 + i + this.id) * s * 0.2;
            ctx.lineTo(gx, gy);
          }
          ctx.closePath();
        } else if (this.bodyShape === 'spiky') {
          // Spiky: star-like body
          for (let i = 0; i < 10; i++) {
            const a = (i / 10) * Math.PI * 2;
            const r = i % 2 === 0 ? s * 1.3 : s * 0.7;
            const wobble = Math.sin(t * 0.004 + a * 2 + this.id) * 2;
            ctx.lineTo(Math.cos(a) * (r + wobble), Math.sin(a) * (r + wobble));
          }
          ctx.closePath();
        } else if (this.bodyShape === 'slug') {
          // Slug: elongated horizontal blob
          ctx.ellipse(0, 0, s * 1.5, s * 0.7, 0, 0, Math.PI * 2);
        } else if (this.bodyShape === 'squid') {
          // Squid: dome top, narrow bottom
          ctx.arc(0, -s * 0.2, s * 0.9, Math.PI, 0);
          ctx.lineTo(s * 0.3, s * 0.6);
          ctx.lineTo(0, s * 0.5);
          ctx.lineTo(-s * 0.3, s * 0.6);
          ctx.closePath();
        } else {
          // Default blob with unique deformations
          for (let i = 0; i < 12; i++) {
            const a = (i / 12) * Math.PI * 2;
            const wobble = Math.sin(t * 0.003 + a * 3 + this.id) * this.wobbleAmp + this.blobSeed[i];
            const r = s + wobble;
            ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
          }
          ctx.closePath();
        }
        const grad = ctx.createRadialGradient(0, -s * 0.2, 0, 0, 0, s * 1.3);
        grad.addColorStop(0, this.accent);
        grad.addColorStop(0.6, this.color);
        grad.addColorStop(1, '#000000');
        ctx.fillStyle = grad;
        ctx.fill();
      }

      _drawPattern(t, s) {
        if (this.pattern === 'spots') {
          ctx.fillStyle = this.accent + '66';
          for (let i = 0; i < 5; i++) {
            const sx = Math.cos(this.id * 100 + i * 2.3) * s * 0.5;
            const sy = Math.sin(this.id * 100 + i * 3.1) * s * 0.5;
            ctx.beginPath();
            ctx.arc(sx, sy, s * 0.1, 0, Math.PI * 2);
            ctx.fill();
          }
        } else if (this.pattern === 'stripes') {
          ctx.strokeStyle = this.accent + '44';
          ctx.lineWidth = 2;
          for (let i = -2; i <= 2; i++) {
            ctx.beginPath();
            ctx.moveTo(-s, i * s * 0.25);
            ctx.lineTo(s, i * s * 0.25);
            ctx.stroke();
          }
        } else if (this.pattern === 'cracks') {
          ctx.strokeStyle = this.eyeColor + '33';
          ctx.lineWidth = 1;
          for (let i = 0; i < 4; i++) {
            ctx.beginPath();
            let cx = (Math.random() - 0.5) * s;
            let cy = (Math.random() - 0.5) * s;
            ctx.moveTo(cx, cy);
            for (let j = 0; j < 3; j++) {
              cx += (Math.random() - 0.5) * s * 0.4;
              cy += (Math.random() - 0.5) * s * 0.4;
              ctx.lineTo(cx, cy);
            }
            ctx.stroke();
          }
        } else if (this.pattern === 'glow_veins') {
          ctx.strokeStyle = this.eyeColor + '44';
          ctx.lineWidth = 1.5;
          ctx.shadowColor = this.eyeColor;
          ctx.shadowBlur = 6;
          for (let i = 0; i < 3; i++) {
            ctx.beginPath();
            ctx.moveTo(0, 0);
            const a = (this.id * 100 + i * 2) % (Math.PI * 2);
            const ex = Math.cos(a) * s * 0.8;
            const ey = Math.sin(a) * s * 0.8;
            const mx = ex * 0.5 + Math.sin(t * 0.003 + i) * 5;
            const my = ey * 0.5 + Math.cos(t * 0.003 + i) * 5;
            ctx.quadraticCurveTo(mx, my, ex, ey);
            ctx.stroke();
          }
          ctx.shadowBlur = 0;
        }
      }

      _drawHeadFeature(t, s) {
        const f = this.headFeature;
        ctx.fillStyle = '#1a1a1a';

        if (f === 'horns') {
          [-0.5, 0.5].forEach(side => {
            ctx.beginPath();
            ctx.moveTo(side * s * 0.5, -s * 0.6 * this.scaleY);
            ctx.lineTo(side * s * 0.2, -s * this.scaleY - this.hornSize);
            ctx.lineTo(side * s * 0.7, -s * 0.4 * this.scaleY);
            ctx.closePath();
            ctx.fill();
          });
        } else if (f === 'antennae') {
          ctx.strokeStyle = this.accent;
          ctx.lineWidth = 2;
          [-0.3, 0.3].forEach(side => {
            const bx = side * s * 0.4;
            const by = -s * 0.7 * this.scaleY;
            ctx.beginPath();
            ctx.moveTo(bx, by);
            const tipX = bx + side * 15;
            const tipY = by - 20 + Math.sin(t * 0.006 + side * 5) * 5;
            ctx.quadraticCurveTo(bx + side * 5, by - 15, tipX, tipY);
            ctx.stroke();
            // Bulb at tip
            ctx.beginPath();
            ctx.arc(tipX, tipY, 3, 0, Math.PI * 2);
            ctx.fillStyle = this.eyeColor;
            ctx.shadowColor = this.eyeColor;
            ctx.shadowBlur = 8;
            ctx.fill();
            ctx.shadowBlur = 0;
          });
        } else if (f === 'crown') {
          ctx.fillStyle = this.accent;
          const crownY = -s * 0.7 * this.scaleY;
          for (let i = -2; i <= 2; i++) {
            ctx.beginPath();
            ctx.moveTo(i * s * 0.2 - 4, crownY + 5);
            ctx.lineTo(i * s * 0.2, crownY - 10 - Math.abs(i) * 3);
            ctx.lineTo(i * s * 0.2 + 4, crownY + 5);
            ctx.closePath();
            ctx.fill();
          }
        } else if (f === 'spikes') {
          ctx.fillStyle = this.accent;
          for (let i = 0; i < 5; i++) {
            const a = -Math.PI * 0.8 + (i / 4) * Math.PI * 0.6;
            const bx = Math.cos(a) * s * 0.6;
            const by = Math.sin(a) * s * 0.6 * this.scaleY;
            ctx.beginPath();
            ctx.moveTo(bx - 3, by);
            ctx.lineTo(bx + Math.cos(a) * 12, by + Math.sin(a) * 12);
            ctx.lineTo(bx + 3, by);
            ctx.closePath();
            ctx.fill();
          }
        } else if (f === 'ears') {
          ctx.fillStyle = this.color;
          [-1, 1].forEach(side => {
            ctx.beginPath();
            const ex = side * s * 0.7;
            const ey = -s * 0.4 * this.scaleY;
            ctx.ellipse(ex, ey, s * 0.2, s * 0.35, side * 0.3, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = this.accent;
            ctx.lineWidth = 2;
            ctx.stroke();
          });
        } else if (f === 'single_horn') {
          ctx.fillStyle = '#2a2a2a';
          ctx.beginPath();
          ctx.moveTo(-s * 0.1, -s * 0.6 * this.scaleY);
          ctx.lineTo(0, -s * this.scaleY - this.hornSize * 1.5);
          ctx.lineTo(s * 0.1, -s * 0.6 * this.scaleY);
          ctx.closePath();
          ctx.fill();
          // Glow tip
          ctx.beginPath();
          ctx.arc(0, -s * this.scaleY - this.hornSize * 1.5, 3, 0, Math.PI * 2);
          ctx.fillStyle = this.eyeColor;
          ctx.shadowColor = this.eyeColor;
          ctx.shadowBlur = 10;
          ctx.fill();
          ctx.shadowBlur = 0;
        } else if (f === 'mushroom') {
          ctx.fillStyle = this.accent;
          ctx.beginPath();
          ctx.arc(0, -s * 0.6 * this.scaleY, s * 0.7, Math.PI, 0);
          ctx.closePath();
          ctx.fill();
          // Spots on mushroom
          ctx.fillStyle = this.eyeColor + '44';
          [-0.3, 0.1, 0.35].forEach(ox => {
            ctx.beginPath();
            ctx.arc(ox * s, -s * 0.75 * this.scaleY, 4, 0, Math.PI * 2);
            ctx.fill();
          });
        }
      }

      _drawEyes(t, s) {
        const lookX = (centerX - this.x) * 0.001;
        const lookY = ((centerY + 20) - this.y) * 0.001;

        if (this.eyeStyle === 'one_big' || this.bodyShape === 'cyclops') {
          // Single large eye
          const ey = -s * 0.1;
          ctx.shadowColor = this.eyeColor;
          ctx.shadowBlur = 15;
          ctx.beginPath();
          ctx.arc(0, ey, s * 0.3, 0, Math.PI * 2);
          ctx.fillStyle = '#fff';
          ctx.fill();
          ctx.beginPath();
          ctx.arc(0, ey, s * 0.25, 0, Math.PI * 2);
          ctx.fillStyle = this.eyeColor;
          ctx.fill();
          ctx.shadowBlur = 0;
          ctx.beginPath();
          ctx.arc(lookX * 4, ey + lookY * 4, s * 0.12, 0, Math.PI * 2);
          ctx.fillStyle = '#000';
          ctx.fill();
          // Highlight
          ctx.beginPath();
          ctx.arc(-s * 0.08, ey - s * 0.08, s * 0.05, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(255,255,255,0.7)';
          ctx.fill();
        } else if (this.eyeStyle === 'stalks') {
          [-1, 1].forEach(side => {
            const stalkAngle = side * 0.4 + Math.sin(t * 0.003 + side) * 0.1;
            const stalkLen = s * 0.6;
            const sx = Math.sin(stalkAngle) * stalkLen * side;
            const sy = -s * 0.3 - Math.cos(stalkAngle) * stalkLen;
            ctx.strokeStyle = this.color;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(side * s * 0.15, -s * 0.3);
            ctx.lineTo(sx, sy);
            ctx.stroke();
            ctx.shadowColor = this.eyeColor;
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.arc(sx, sy, s * 0.12, 0, Math.PI * 2);
            ctx.fillStyle = this.eyeColor;
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.arc(sx + lookX * 2, sy + lookY * 2, s * 0.05, 0, Math.PI * 2);
            ctx.fillStyle = '#000';
            ctx.fill();
          });
        } else if (this.eyeStyle === 'three') {
          [-1, 0, 1].forEach(pos => {
            const ex = pos * s * 0.25;
            const ey = -s * 0.15 + (pos === 0 ? -s * 0.1 : 0);
            const er = pos === 0 ? s * 0.14 : s * 0.12;
            ctx.shadowColor = this.eyeColor;
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.arc(ex, ey, er, 0, Math.PI * 2);
            ctx.fillStyle = this.eyeColor;
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.arc(ex + lookX * 2, ey + lookY * 2, er * 0.45, 0, Math.PI * 2);
            ctx.fillStyle = '#000';
            ctx.fill();
          });
        } else {
          // Two eyes with style variations
          [-1, 1].forEach(side => {
            const ex = side * s * 0.3;
            const ey = -s * 0.15;
            const er = this.eyeStyle === 'big' ? s * 0.22 : this.eyeStyle === 'tiny' ? s * 0.1 : s * 0.16;

            ctx.shadowColor = this.eyeColor;
            ctx.shadowBlur = 12;

            if (this.eyeStyle === 'angry') {
              // Angry slanted eye
              ctx.beginPath();
              ctx.ellipse(ex, ey, er, er * 0.7, side * 0.3, 0, Math.PI * 2);
              ctx.fillStyle = this.eyeColor;
              ctx.fill();
              // Angry brow
              ctx.shadowBlur = 0;
              ctx.strokeStyle = '#000';
              ctx.lineWidth = 3;
              ctx.beginPath();
              ctx.moveTo(ex - side * er, ey - er * 0.8);
              ctx.lineTo(ex + side * er * 0.5, ey - er * 1.2);
              ctx.stroke();
            } else if (this.eyeStyle === 'vertical') {
              ctx.beginPath();
              ctx.ellipse(ex, ey, er * 0.7, er, 0, 0, Math.PI * 2);
              ctx.fillStyle = this.eyeColor;
              ctx.fill();
            } else {
              ctx.beginPath();
              ctx.arc(ex, ey, er, 0, Math.PI * 2);
              ctx.fillStyle = this.eyeColor;
              ctx.fill();
            }

            // Pupil
            ctx.shadowBlur = 0;
            ctx.beginPath();
            const pr = this.eyeStyle === 'vertical' ? er * 0.3 : er * 0.45;
            ctx.arc(ex + lookX * 3, ey + lookY * 3, pr, 0, Math.PI * 2);
            ctx.fillStyle = '#000';
            ctx.fill();

            // Highlight
            if (this.eyeStyle === 'big') {
              ctx.beginPath();
              ctx.arc(ex - er * 0.25, ey - er * 0.25, er * 0.15, 0, Math.PI * 2);
              ctx.fillStyle = 'rgba(255,255,255,0.6)';
              ctx.fill();
            }
          });
        }
      }

      _drawMouth(t, s) {
        const mouthOpen = Math.abs(Math.sin(t * 0.004 + this.mouthPhase)) * s * 0.2;
        const m = this.mouthStyle;

        if (m === 'none') return;

        const my = s * 0.25;

        if (m === 'wide_grin') {
          ctx.beginPath();
          ctx.arc(0, my - s * 0.05, s * 0.35, 0.1, Math.PI - 0.1);
          ctx.fillStyle = '#000';
          ctx.fill();
          // Teeth along the grin
          ctx.fillStyle = '#ddd';
          for (let ti = -3; ti <= 3; ti++) {
            ctx.beginPath();
            const tx = ti * s * 0.08;
            ctx.moveTo(tx - 2, my - s * 0.05);
            ctx.lineTo(tx, my + 5);
            ctx.lineTo(tx + 2, my - s * 0.05);
            ctx.closePath();
            ctx.fill();
          }
        } else if (m === 'fangs') {
          ctx.beginPath();
          ctx.ellipse(0, my, s * 0.2, mouthOpen + 2, 0, 0, Math.PI * 2);
          ctx.fillStyle = '#200000';
          ctx.fill();
          // Two big fangs
          ctx.fillStyle = '#eee';
          [-1, 1].forEach(side => {
            ctx.beginPath();
            ctx.moveTo(side * s * 0.12 - 3, my - mouthOpen);
            ctx.lineTo(side * s * 0.12, my + mouthOpen + 6);
            ctx.lineTo(side * s * 0.12 + 3, my - mouthOpen);
            ctx.closePath();
            ctx.fill();
          });
        } else if (m === 'beak') {
          ctx.fillStyle = '#2a2000';
          ctx.beginPath();
          ctx.moveTo(-s * 0.15, my - 3);
          ctx.lineTo(0, my + s * 0.2);
          ctx.lineTo(s * 0.15, my - 3);
          ctx.closePath();
          ctx.fill();
          ctx.strokeStyle = '#3a3010';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(-s * 0.15, my - 1);
          ctx.lineTo(s * 0.15, my - 1);
          ctx.stroke();
        } else if (m === 'tentacle_mouth') {
          for (let i = 0; i < 4; i++) {
            const ta = -0.5 + (i / 3);
            const wave = Math.sin(t * 0.006 + i * 1.5 + this.id) * 8;
            ctx.beginPath();
            ctx.moveTo(ta * s * 0.3, my);
            ctx.quadraticCurveTo(ta * s * 0.4 + wave, my + s * 0.3, ta * s * 0.2 + wave * 0.5, my + s * 0.5);
            ctx.strokeStyle = this.accent;
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.stroke();
          }
        } else if (m === 'drool') {
          ctx.beginPath();
          ctx.ellipse(0, my, s * 0.2, mouthOpen + 2, 0, 0, Math.PI * 2);
          ctx.fillStyle = '#000';
          ctx.fill();
          // Drool drops
          ctx.fillStyle = '#44aa44';
          const drip = (t * 0.002 + this.id * 10) % 1;
          ctx.beginPath();
          ctx.ellipse(s * 0.05, my + mouthOpen + drip * s * 0.4, 3, 4 + drip * 3, 0, 0, Math.PI * 2);
          ctx.fill();
        } else if (m === 'zigzag') {
          ctx.beginPath();
          ctx.moveTo(-s * 0.3, my);
          for (let i = 0; i <= 6; i++) {
            ctx.lineTo(-s * 0.3 + i * s * 0.1, my + (i % 2 === 0 ? -3 : 5));
          }
          ctx.strokeStyle = '#000';
          ctx.lineWidth = 2;
          ctx.stroke();
        } else {
          // Default teeth
          ctx.beginPath();
          ctx.ellipse(0, my, s * 0.22, mouthOpen + 1, 0, 0, Math.PI * 2);
          ctx.fillStyle = '#000';
          ctx.fill();
          if (mouthOpen > 3) {
            ctx.fillStyle = '#ddd';
            for (let ti = 0; ti < this.teethCount; ti++) {
              const tx = -s * 0.15 + (ti / (this.teethCount - 1)) * s * 0.3;
              ctx.beginPath();
              ctx.moveTo(tx - 2, my - mouthOpen + 2);
              ctx.lineTo(tx, my - mouthOpen + 7);
              ctx.lineTo(tx + 2, my - mouthOpen + 2);
              ctx.closePath();
              ctx.fill();
            }
          }
        }
      }

      _drawLimbs(t, s) {
        const l = this.limbStyle;

        if (l === 'none') return;

        if (l === 'wings') {
          [-1, 1].forEach(side => {
            ctx.fillStyle = this.color + 'aa';
            ctx.beginPath();
            const wx = side * s * 0.5;
            const flapAmt = Math.sin(t * 0.008 + this.id) * 0.3;
            ctx.moveTo(wx, -s * 0.1);
            ctx.quadraticCurveTo(wx + side * s * 1.2, -s * 0.5 + flapAmt * s, wx + side * s * 1.0, s * 0.1);
            ctx.quadraticCurveTo(wx + side * s * 0.6, s * 0.2, wx, s * 0.2);
            ctx.closePath();
            ctx.fill();
            // Wing bone
            ctx.strokeStyle = this.accent;
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(wx, 0);
            ctx.lineTo(wx + side * s * 0.9, -s * 0.3 + flapAmt * s * 0.5);
            ctx.stroke();
          });
        } else if (l === 'spider_legs') {
          for (let i = 0; i < 6; i++) {
            const side = i < 3 ? -1 : 1;
            const idx = i % 3;
            const baseY = -s * 0.2 + idx * s * 0.25;
            const wave = Math.sin(t * 0.005 + i * 1.2 + this.id) * 8;
            const kneeX = side * (s * 0.8 + wave * 0.5);
            const kneeY = baseY - 10;
            const footX = side * (s * 1.2 + wave);
            const footY = baseY + s * 0.4;
            ctx.strokeStyle = this.accent;
            ctx.lineWidth = 2.5;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(side * s * 0.3, baseY);
            ctx.lineTo(kneeX, kneeY);
            ctx.lineTo(footX, footY);
            ctx.stroke();
          }
        } else if (l === 'claws') {
          [-1, 1].forEach(side => {
            const ax = side * s * 0.6;
            const ay = s * 0.1;
            const wave = Math.sin(t * 0.004 + side * 3 + this.id) * 10;
            ctx.strokeStyle = this.accent;
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(side * s * 0.4, ay);
            ctx.quadraticCurveTo(ax + wave, ay + s * 0.2, ax + side * 8 + wave, ay + s * 0.5);
            ctx.stroke();
            // Claw tips
            for (let c = 0; c < 3; c++) {
              const ca = -0.3 + c * 0.3;
              ctx.beginPath();
              ctx.moveTo(ax + side * 8 + wave, ay + s * 0.5);
              ctx.lineTo(ax + side * 8 + wave + Math.cos(ca) * 8 * side, ay + s * 0.5 + Math.sin(ca) * 8 + 5);
              ctx.strokeStyle = '#1a1a1a';
              ctx.lineWidth = 2;
              ctx.stroke();
            }
          });
        } else if (l === 'stubs') {
          [-1, 1].forEach(side => {
            ctx.fillStyle = this.color;
            ctx.beginPath();
            const sx = side * s * 0.45;
            const sy = s * 0.3;
            ctx.ellipse(sx, sy, s * 0.15, s * 0.25, side * 0.2, 0, Math.PI * 2);
            ctx.fill();
          });
        } else if (l === 'ghost_trail') {
          ctx.fillStyle = this.color + '44';
          for (let i = 1; i <= 4; i++) {
            ctx.beginPath();
            ctx.ellipse(0, s * 0.3 + i * 8, s * (1 - i * 0.15), s * 0.15, 0, 0, Math.PI * 2);
            ctx.fill();
          }
        } else if (l === 'long_arms') {
          [-1, 1].forEach(side => {
            const wave = Math.sin(t * 0.003 + side * 4 + this.id) * 15;
            ctx.strokeStyle = this.accent;
            ctx.lineWidth = 5;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(side * s * 0.4, 0);
            ctx.quadraticCurveTo(side * s * 1.0 + wave, s * 0.1, side * s * 0.8 + wave * 1.5, s * 0.8);
            ctx.stroke();
            // Hand with fingers
            const hx = side * s * 0.8 + wave * 1.5;
            const hy = s * 0.8;
            for (let f = 0; f < 3; f++) {
              const fa = -0.4 + f * 0.4;
              ctx.beginPath();
              ctx.moveTo(hx, hy);
              ctx.lineTo(hx + Math.cos(fa + Math.PI / 2) * 8 * side, hy + Math.sin(fa + Math.PI / 2) * 8);
              ctx.lineWidth = 2;
              ctx.stroke();
            }
          });
        } else {
          // Default tentacles
          for (let i = 0; i < this.tentacles; i++) {
            const ta = (i / this.tentacles) * Math.PI + Math.PI / 2;
            const tx = Math.cos(ta) * s;
            const ty = Math.sin(ta) * s * 0.3 + s * 0.4;
            const wave = Math.sin(t * 0.005 + i * 2 + this.id) * 15;
            ctx.beginPath();
            ctx.moveTo(tx * 0.5, ty);
            ctx.quadraticCurveTo(tx + wave, ty + s * 0.3, tx * 0.8 + wave * 1.5, ty + s * 0.6);
            ctx.strokeStyle = this.accent;
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.stroke();
          }
        }
      }
    }

    // ===== PROJECTILES =====
    const projectiles = [];

    class Projectile {
      constructor(x, y, tx, ty, element) {
        this.x = x; this.y = y;
        this.element = element;
        const angle = Math.atan2(ty - y, tx - x);
        this.angle = angle;
        const speed = element === 'fire' ? 7 + Math.random() * 3 : 6 + Math.random() * 4;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.life = 1;
        this.size = element === 'fire' ? 10 : element === 'venom' ? 9 : element === 'ice' ? 8 : 7;
        this.trail = [];
        this.t = Math.random() * 100;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.life -= 0.018;
        this.t++;
        this.trail.push({ x: this.x, y: this.y, life: 1 });
        if (this.trail.length > 8) this.trail.shift();
        this.trail.forEach(t => t.life -= 0.13);
      }

      draw() {
        if (this.life <= 0) return;
        ctx.save();
        const s = this.size;
        const ang = Math.atan2(this.vy, this.vx);

        if (this.element === 'fire') {
          // === FIREBALL with inner flames ===
          // Fiery trail
          this.trail.forEach((t, i) => {
            if (t.life <= 0) return;
            const tr = s * t.life * 0.6;
            ctx.beginPath();
            ctx.arc(t.x, t.y, tr, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, ${Math.floor(100 + t.life * 100)}, 0, ${t.life * 0.5})`;
            ctx.fill();
          });
          // Main fireball
          const fbGrd = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, s * 1.5);
          fbGrd.addColorStop(0, '#ffffcc');
          fbGrd.addColorStop(0.2, '#ffcc00');
          fbGrd.addColorStop(0.5, '#ff6600');
          fbGrd.addColorStop(0.8, '#ff2200');
          fbGrd.addColorStop(1, 'rgba(200, 0, 0, 0)');
          ctx.beginPath();
          ctx.arc(this.x, this.y, s * 1.5, 0, Math.PI * 2);
          ctx.fillStyle = fbGrd;
          ctx.fill();
          // Inner flame tendrils
          for (let f = 0; f < 3; f++) {
            const fa = ang + Math.PI + (f - 1) * 0.5 + Math.sin(this.t * 0.2 + f) * 0.3;
            const fl = s * (0.8 + Math.sin(this.t * 0.15 + f * 2) * 0.5);
            ctx.beginPath();
            ctx.moveTo(this.x, this.y);
            ctx.lineTo(this.x + Math.cos(fa) * fl, this.y + Math.sin(fa) * fl);
            ctx.strokeStyle = `rgba(255, ${180 + f * 30}, 0, 0.5)`;
            ctx.lineWidth = 2;
            ctx.stroke();
          }
          // White hot core
          ctx.beginPath();
          ctx.arc(this.x, this.y, s * 0.4, 0, Math.PI * 2);
          ctx.fillStyle = '#ffffff';
          ctx.fill();

        } else if (this.element === 'ice') {
          // === ICE SPIKE - crystalline and sharp ===
          // Icy shimmer trail
          this.trail.forEach((t, i) => {
            if (t.life <= 0) return;
            ctx.beginPath();
            ctx.arc(t.x + (Math.random() - 0.5) * 3, t.y + (Math.random() - 0.5) * 3, 2 * t.life, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(180, 240, 255, ${t.life * 0.5})`;
            ctx.fill();
          });
          ctx.save();
          ctx.translate(this.x, this.y);
          ctx.rotate(ang);
          // Main spike
          ctx.beginPath();
          ctx.moveTo(s * 2.5, 0);
          ctx.lineTo(s * 0.3, -s * 0.6);
          ctx.lineTo(-s * 1.2, -s * 0.35);
          ctx.lineTo(-s * 0.8, 0);
          ctx.lineTo(-s * 1.2, s * 0.35);
          ctx.lineTo(s * 0.3, s * 0.6);
          ctx.closePath();
          const iceGrd = ctx.createLinearGradient(-s, 0, s * 2.5, 0);
          iceGrd.addColorStop(0, '#aaeeff');
          iceGrd.addColorStop(0.5, '#00ddff');
          iceGrd.addColorStop(1, '#ffffff');
          ctx.fillStyle = iceGrd;
          ctx.fill();
          ctx.strokeStyle = 'rgba(255, 255, 255, 0.7)';
          ctx.lineWidth = 1;
          ctx.stroke();
          // Crystal facets
          ctx.beginPath();
          ctx.moveTo(s * 2.5, 0);
          ctx.lineTo(s * 0.3, -s * 0.2);
          ctx.lineTo(-s * 0.5, 0);
          ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
          ctx.lineWidth = 0.8;
          ctx.stroke();
          // Side shards
          ctx.beginPath();
          ctx.moveTo(s * 0.5, -s * 0.5);
          ctx.lineTo(s * 0.8, -s * 1.1);
          ctx.lineTo(s * 1.2, -s * 0.3);
          ctx.closePath();
          ctx.fillStyle = 'rgba(200, 240, 255, 0.5)';
          ctx.fill();
          ctx.beginPath();
          ctx.moveTo(s * 0.3, s * 0.5);
          ctx.lineTo(s * 0.5, s * 1.0);
          ctx.lineTo(s * 1.0, s * 0.3);
          ctx.closePath();
          ctx.fillStyle = 'rgba(200, 240, 255, 0.4)';
          ctx.fill();
          ctx.restore();

        } else if (this.element === 'venom') {
          // === POISONED ICE SPIKE - large icy spike dripping toxic venom ===
          // Toxic smoke trail
          this.trail.forEach((t, i) => {
            if (t.life <= 0) return;
            // Green toxic cloud puffs
            const puffSize = (4 + i * 0.5) * t.life;
            ctx.beginPath();
            ctx.arc(t.x + Math.sin(this.t * 0.08 + i * 0.7) * 4, t.y + Math.cos(this.t * 0.06 + i) * 3, puffSize, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(0, 255, 60, ${t.life * 0.35})`;
            ctx.fill();
            // Icy sparkle in trail
            ctx.beginPath();
            ctx.arc(t.x + (Math.random() - 0.5) * 5, t.y + (Math.random() - 0.5) * 5, 1.5 * t.life, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(180, 240, 255, ${t.life * 0.4})`;
            ctx.fill();
          });
          ctx.save();
          ctx.translate(this.x, this.y);
          ctx.rotate(ang);
          // Toxic aura glow around spike
          const auraGrd = ctx.createRadialGradient(0, 0, s * 0.5, 0, 0, s * 2.5);
          auraGrd.addColorStop(0, 'rgba(0, 255, 80, 0.15)');
          auraGrd.addColorStop(1, 'rgba(0, 255, 80, 0)');
          ctx.beginPath();
          ctx.arc(0, 0, s * 2.5, 0, Math.PI * 2);
          ctx.fillStyle = auraGrd;
          ctx.fill();
          // Main spike shape - bigger and more menacing
          ctx.beginPath();
          ctx.moveTo(s * 3, 0);
          ctx.lineTo(s * 0.5, -s * 0.7);
          ctx.lineTo(-s * 1.2, -s * 0.4);
          ctx.lineTo(-s * 0.8, 0);
          ctx.lineTo(-s * 1.2, s * 0.4);
          ctx.lineTo(s * 0.5, s * 0.7);
          ctx.closePath();
          const venomGrd = ctx.createLinearGradient(-s, 0, s * 3, 0);
          venomGrd.addColorStop(0, '#aaeeff');
          venomGrd.addColorStop(0.3, '#66ddcc');
          venomGrd.addColorStop(0.6, '#33cc77');
          venomGrd.addColorStop(1, '#00ff44');
          ctx.fillStyle = venomGrd;
          ctx.fill();
          ctx.strokeStyle = 'rgba(200, 255, 220, 0.5)';
          ctx.lineWidth = 1;
          ctx.stroke();
          // Crystal facet line
          ctx.beginPath();
          ctx.moveTo(s * 3, 0);
          ctx.lineTo(s * 0.5, -s * 0.25);
          ctx.lineTo(-s * 0.5, 0);
          ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
          ctx.lineWidth = 0.8;
          ctx.stroke();
          // Venom veins running through spike
          ctx.strokeStyle = 'rgba(0, 255, 80, 0.8)';
          ctx.lineWidth = 1.8;
          ctx.beginPath();
          ctx.moveTo(-s * 0.5, 0);
          ctx.bezierCurveTo(s * 0.5, -s * 0.15, s * 1.5, s * 0.1, s * 2.8, 0);
          ctx.stroke();
          // Second vein
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(-s * 0.3, s * 0.15);
          ctx.bezierCurveTo(s * 0.4, s * 0.25, s * 1.2, s * 0.05, s * 2.2, s * 0.1);
          ctx.stroke();
          // Dripping venom drops falling from spike
          for (let d = 0; d < 5; d++) {
            const dx = s * (-0.2 + d * 0.6);
            const dropY = s * 0.5 + Math.sin(this.t * 0.12 + d * 1.3) * s * 0.4;
            const dropSize = 2 + Math.sin(this.t * 0.1 + d) * 1;
            // Drop
            ctx.beginPath();
            ctx.arc(dx, dropY, dropSize, 0, Math.PI * 2);
            ctx.fillStyle = '#00ff44';
            ctx.fill();
            // Drip line connecting to spike
            ctx.beginPath();
            ctx.moveTo(dx, s * 0.3);
            ctx.lineTo(dx, dropY - dropSize);
            ctx.strokeStyle = 'rgba(0, 255, 80, 0.4)';
            ctx.lineWidth = 1;
            ctx.stroke();
          }
          // Poison barb at the tip
          ctx.beginPath();
          ctx.moveTo(s * 3, 0);
          ctx.lineTo(s * 2.5, -s * 0.15);
          ctx.lineTo(s * 2.5, s * 0.15);
          ctx.closePath();
          ctx.fillStyle = '#00ff44';
          ctx.fill();
          ctx.restore();

        } else if (this.element === 'electric') {
          // === ELECTRIC BOLT - jagged lightning ball ===
          this.trail.forEach((t, i) => {
            if (t.life <= 0) return;
            ctx.beginPath();
            ctx.arc(t.x, t.y, 3 * t.life, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 255, 100, ${t.life * 0.4})`;
            ctx.fill();
          });
          // Electric core
          const elGrd = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, s);
          elGrd.addColorStop(0, '#ffffff');
          elGrd.addColorStop(0.3, '#ffff88');
          elGrd.addColorStop(0.7, '#ffcc00');
          elGrd.addColorStop(1, 'rgba(255, 200, 0, 0)');
          ctx.beginPath();
          ctx.arc(this.x, this.y, s, 0, Math.PI * 2);
          ctx.fillStyle = elGrd;
