    window.triggerPokemon = function() {
      if (pokemonActive) return;
      pokemonActive = true; pokemonTimer = 0;
      pokemonObjs.forEach(p => scene.remove(p)); pokemonObjs = [];
      pokemonAttacks.forEach(a => scene.remove(a)); pokemonAttacks = [];

      // Pick 3 random
      const picks = [...PKM_DEFS].sort(() => Math.random()-0.5).slice(0, 3);
      picks.forEach((def, idx) => {
        const g = buildPokemonModel(def);

        // Start position
        let sx, sy, sz;
        if (def.from === 'sky') { sx = (idx-1)*6; sy = 20; sz = -5; }
        else if (def.from === 'left') { sx = -25; sy = 3; sz = (idx-1)*4; }
        else { sx = 25; sy = 3; sz = (idx-1)*4; }
        g.position.set(sx, sy, sz);

        const targetX = (idx - 1) * 5;
        const targetZ = -8 - idx * 2;
        g.userData = {
          def, state: 'arriving', targetX, targetZ, targetY: 3 + Math.random() * 2,
          atkTimer: 0, bobPhase: Math.random() * Math.PI * 2
        };
        scene.add(g);
        pokemonObjs.push(g);
      });
    };

    function updatePokemon(t) {
      if (!pokemonActive) return;
      pokemonTimer++;

      for (const p of pokemonObjs) {
        const ud = p.userData;
        ud.bobPhase += 0.03;

        if (ud.state === 'arriving') {
          p.position.lerp(new THREE.Vector3(ud.targetX, ud.targetY, ud.targetZ), 0.04);
          if (p.position.distanceTo(new THREE.Vector3(ud.targetX, ud.targetY, ud.targetZ)) < 0.5) ud.state = 'active';
        }

        if (ud.state === 'active') {
          p.position.y = ud.targetY + Math.sin(ud.bobPhase) * 0.3;

          // Chase nearest monster
          let closest = null, cDist = Infinity;
          for (const m of monsters) {
            if (m.userData.state !== 'approaching') continue;
            const d = p.position.distanceTo(m.position);
            if (d < cDist) { cDist = d; closest = m; }
          }
          if (closest && cDist > 3) {
            const dir = closest.position.clone().sub(p.position).normalize();
            p.position.add(dir.multiplyScalar(0.06));
            p.lookAt(closest.position);
          }

          // Fire projectile
          ud.atkTimer++;
          if (ud.atkTimer > 35 && closest) {
            ud.atkTimer = 0;
            const dir = closest.position.clone().sub(p.position).normalize();
            const proj = new THREE.Mesh(
              new THREE.SphereGeometry(0.15, 6, 6),
              new THREE.MeshBasicMaterial({ color: ud.def.atk })
            );
            proj.position.copy(p.position);
            proj.userData = { vel: dir.multiplyScalar(0.5), life: 60 };
            scene.add(proj);
            pokemonAttacks.push(proj);
          }

          if (pokemonTimer > 420) ud.state = 'leaving';
        }

        if (ud.state === 'leaving') {
          if (ud.def.from === 'sky') p.position.y += 0.15;
          else if (ud.def.from === 'left') p.position.x -= 0.2;
          else p.position.x += 0.2;
          p.scale.multiplyScalar(0.995);
        }
      }

      // Update pokemon projectiles
      for (let i = pokemonAttacks.length - 1; i >= 0; i--) {
        const a = pokemonAttacks[i];
        a.position.add(a.userData.vel);
        a.userData.life--;
        for (const m of monsters) {
          if (m.userData.state !== 'approaching') continue;
          if (a.position.distanceTo(m.position) < m.userData.size + 0.3) {
            killMonster(m, clock.getElapsedTime());
            a.userData.life = 0; break;
          }
        }
        if (a.userData.life <= 0 || a.position.length() > 40) {
          scene.remove(a); pokemonAttacks.splice(i, 1);
        }
      }

      if (pokemonTimer > 540) {
        pokemonActive = false;
        pokemonObjs.forEach(p => scene.remove(p)); pokemonObjs = [];
        pokemonAttacks.forEach(a => scene.remove(a)); pokemonAttacks = [];
      }
    }

    // ===== METAL WAVE + CHINESE DRAGON =====
    let metalWaveActive = false, metalWaveTimer = 0;
    let dragonSegments = [];
    const DRAGON_SEGS = 25;

    window.triggerMetalWave = function() {
      if (metalWaveActive) return;
      metalWaveActive = true; metalWaveTimer = 0;
      dragonSegments.forEach(s => scene.remove(s));
      dragonSegments = [];
      for (let i = 0; i < DRAGON_SEGS; i++) {
        const p = i / DRAGON_SEGS;
        const r = 0.4 - p * 0.012;
        const seg = new THREE.Mesh(
          new THREE.SphereGeometry(Math.max(0.1, r), 8, 6),
          new THREE.MeshStandardMaterial({
            color: i % 3 === 0 ? 0xffcc00 : 0xcc2222,
            roughness: 0.3, metalness: 0.5
          })
        );
        seg.castShadow = true;
        scene.add(seg);
        dragonSegments.push(seg);
      }
      // Dragon head decorations
      if (dragonSegments.length > 0) {
        dragonSegments[0].scale.set(1.8, 1.5, 1.5);
        // Antlers
        [-1,1].forEach(side => {
          const antler = new THREE.Mesh(
            new THREE.ConeGeometry(0.05, 0.5, 4),
            new THREE.MeshStandardMaterial({ color: 0xffcc00, metalness: 0.6 })
          );
          antler.position.set(side * 0.2, 0.3, 0.1);
          antler.rotation.z = side * 0.4;
          dragonSegments[0].add(antler);
        });
        // Eyes
        [-1,1].forEach(side => {
          const eye = new THREE.Mesh(new THREE.SphereGeometry(0.08, 6, 6), new THREE.MeshBasicMaterial({color:0xffff00}));
          eye.position.set(side * 0.15, 0.08, 0.3);
          dragonSegments[0].add(eye);
        });
      }
    };

    function updateMetalWave(t) {
      if (!metalWaveActive) return;
      metalWaveTimer++;

      const orbitR = 11;
      const orbitSpeed = t * 0.6;
      // Head position
      const hx = Math.cos(orbitSpeed) * orbitR;
      const hz = Math.sin(orbitSpeed) * orbitR;
      const hy = 4 + Math.sin(t * 2) * 1.5;

      if (dragonSegments.length > 0) {
        dragonSegments[0].position.set(hx, hy, hz);
        dragonSegments[0].lookAt(0, hy, 0);
        for (let i = 1; i < dragonSegments.length; i++) {
          const prev = dragonSegments[i-1].position;
          dragonSegments[i].position.lerp(prev, 0.12);
          dragonSegments[i].position.y = hy - Math.sin(t * 3 + i * 0.4) * 0.8;
        }
      }

      // Catch and fling monsters
      for (const m of monsters) {
        if (m.userData.state !== 'approaching') continue;
        if (dragonSegments.length && dragonSegments[0].position.distanceTo(m.position) < 2) {
          killMonster(m, t);
          // Extra upward launch
          m.userData.flyVel.y = 0.4;
        }
      }

      // Launch phase — dragon flies upward
      if (metalWaveTimer > 400) {
        dragonSegments.forEach(s => { s.position.y += 0.1; });
      }

      if (metalWaveTimer > 540) {
        metalWaveActive = false;
        dragonSegments.forEach(s => scene.remove(s)); dragonSegments = [];
      }
    }

    // ===== ULTRA BOOST =====
    window.triggerUltraBoost = function() {
      if (!barrierActive) return;
      superBoostActive = true;
      if (!cobraActive) window.triggerCobra();
      if (!lightningActive) setTimeout(() => window.triggerLightning(), 500);
      if (!metalWaveActive) setTimeout(() => window.triggerMetalWave(), 1000);
      if (!tornadoActive) setTimeout(() => window.triggerTornado(), 1500);
      if (!pokemonActive) setTimeout(() => window.triggerPokemon(), 800);
      // Spawn extra monsters
      for (let i = 0; i < 15; i++) createMonster();
      setTimeout(() => { superBoostActive = false; }, 10000);
    };

    // Initial hide
    allBtns.forEach(id => document.getElementById(id).style.display = 'none');

    // ===== ANIMATION LOOP =====
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      try {
      const t = clock.getElapsedTime();
      const dt = clock.getDelta();

      // Update sky
      updateSky();

      // Window glow at night
      const nightGlow = Math.max(0, 1 - daylight * 2);
      windows.forEach(w => {
        w.material.emissiveIntensity = nightGlow * 0.4;
      });
      porchLight.intensity = 0.2 + nightGlow * 0.8;

      // Barrier animation
      if (barrierActive && barrierProgress < 1) barrierProgress = Math.min(1, barrierProgress + 0.02);
      if (!barrierActive && barrierProgress > 0) barrierProgress = Math.max(0, barrierProgress - 0.02);
      barrierMat.uniforms.uTime.value = t;
      barrierMat.uniforms.uProgress.value = barrierProgress;
      barrierMat.uniforms.uCamPos.value.copy(camera.position);
      barrierLight.intensity = barrierProgress * 2;

      // Barrier hit pulse (scale to 1.05 then back)
      if (barrierHitPulse > 0) {
        barrierHitPulse -= 0.04;
        if (barrierHitPulse < 0) barrierHitPulse = 0;
        const pulseScale = 1.0 + barrierHitPulse * 0.05;
        barrier.scale.set(pulseScale, 0.7 * pulseScale, pulseScale);
      } else {
        barrier.scale.set(1, 0.7, 1);
      }

      // Animate inner energy rings
      for (const ering of energyRings) {
        ering.rotation.x += ering.userData.rotSpeedX * 0.01;
        ering.rotation.y += ering.userData.rotSpeedY * 0.01;
        ering.material.opacity = barrierProgress * (0.3 + Math.sin(t * 2) * 0.1);
      }

      // Update death lights (fade out)
      for (let di = deathLights.length - 1; di >= 0; di--) {
        const dl = deathLights[di];
        dl.userData.life -= 0.02;
        dl.intensity = dl.userData.life * 3;
        if (dl.userData.life <= 0) {
          scene.remove(dl);
          deathLights.splice(di, 1);
        }
      }

      // Barrier particles
      particlesMat.opacity = barrierProgress * 0.7;
      const posArr = particlesGeo.attributes.position.array;
      for (let i = 0; i < particleCount; i++) {
        const angle = Math.atan2(posArr[i*3+2], posArr[i*3]);
        const newAngle = angle + particleSpeeds[i] * 0.01;
        const r = 9 + Math.sin(t * 2 + i) * 0.3;
        posArr[i*3] = Math.cos(newAngle) * r;
        posArr[i*3+2] = Math.sin(newAngle) * r;
        posArr[i*3+1] += Math.sin(t * 3 + i * 0.5) * 0.01;
        if (posArr[i*3+1] > 6) posArr[i*3+1] = 1;
        if (posArr[i*3+1] < 0.5) posArr[i*3+1] = 5;
      }
      particlesGeo.attributes.position.needsUpdate = true;

      // Barrier color pulse with super boost
      if (superBoostActive) {
        const hue = (t * 2) % 1;
        barrierMat.uniforms.uColor.value.setHSL(hue, 1, 0.6);
      } else {
        barrierMat.uniforms.uColor.value.setHex(0x00ff88);
      }

      // Spawn monsters
      if (barrierActive && t - lastSpawnTime > (superBoostActive ? 0.5 : 2.5)) {
        createMonster();
        lastSpawnTime = t;
      }

      // Update monsters
      for (let i = monsters.length - 1; i >= 0; i--) {
        const m = monsters[i];
        const ud = m.userData;
        ud.wobblePhase += 0.03;

        if (ud.state === 'approaching') {
          // Smooth lerped direction instead of instant direction change
          const targetDir = new THREE.Vector3(-m.position.x, 0, -m.position.z).normalize();
          if (ud.currentDir.lengthSq() < 0.01) ud.currentDir.copy(targetDir);
          ud.currentDir.lerp(targetDir, 0.05);
          ud.currentDir.normalize();
          m.position.add(ud.currentDir.clone().multiplyScalar(ud.speed * (superBoostActive ? 0.5 : 1)));
          m.position.y = Math.max(ud.size + 0.2, 1.5 + Math.sin(ud.wobblePhase) * 0.5);
          m.rotation.y = Math.atan2(-m.position.x, -m.position.z);

          // Pulsing/breathing animation
          if (ud.bodyMesh) {
            ud.breathPhase += 0.04;
            const breathScale = 1 + Math.sin(ud.breathPhase) * 0.06;
            ud.bodyMesh.scale.setScalar(breathScale);
            ud.bodyMesh.material.emissiveIntensity = ud.baseEmissive + Math.sin(ud.breathPhase * 1.5) * 0.2;
          }
          // Animate spikes slightly
          if (ud.spikes) {
            ud.spikes.forEach((sp, si) => {
              sp.scale.y = 1 + Math.sin(ud.wobblePhase * 2 + si) * 0.15;
            });
          }

          // Check barrier collision (horizontal distance)
          const dist = Math.sqrt(m.position.x**2 + m.position.z**2);
          if (dist < 9.5 && barrierActive) {
            ud.state = 'hit';
            ud.hitTime = t;
            const pushDir = m.position.clone().normalize();
            ud.flyVel.copy(pushDir.multiplyScalar(0.3));
            ud.flyVel.y = 0.2 + Math.random() * 0.15;
            monstersDefeated++;
            document.getElementById('monsterCount').textContent = monstersDefeated;
            barrierHitPulse = 1.0; // trigger barrier pulse
            // Spawn death light at hit position
            const dl = new THREE.PointLight(new THREE.Color().setHSL(Math.random(), 1, 0.5), 3, 8);
            dl.position.copy(m.position);
            dl.userData = { life: 1.0 };
            scene.add(dl);
            deathLights.push(dl);
          }
          // Stop at barrier if inactive
          if (dist < 9.5 && !barrierActive) {
            const pushDir2 = m.position.clone().normalize();
            m.position.copy(pushDir2.multiplyScalar(9.6));
          }
        }

        if (ud.state === 'hit') {
          m.position.add(ud.flyVel);
          ud.flyVel.y -= 0.002; // slight gravity then fly up
          if (t - ud.hitTime > 0.5) ud.flyVel.y += 0.01; // accelerate upward
          m.rotation.x += 0.1;
          m.rotation.z += 0.05;
          m.scale.multiplyScalar(0.995);

          if (m.position.y > 30 || m.position.length() > 50) {
            scene.remove(m);
            monsters.splice(i, 1);
          }
        }
      }

      // Fire projectiles
      const fireRate = superBoostActive ? 0.1 : 0.4;
      if (barrierActive && t - lastFireTime > fireRate) {
        fireProjectile();
        lastFireTime = t;
      }

      // Update projectiles
      for (let i = projectiles.length - 1; i >= 0; i--) {
        const p = projectiles[i];
        // Electric zigzag path
        if (p.userData.element === 'electric') {
          p.userData.trailTimer++;
          if (p.userData.trailTimer % 4 === 0) {
            const perp = new THREE.Vector3(-p.userData.vel.z, 0, p.userData.vel.x).normalize();
            p.position.add(perp.multiplyScalar((Math.random() - 0.5) * 0.6));
          }
        }
        p.position.add(p.userData.vel);
        p.userData.life--;

        // Spawn trail particles behind each projectile
        p.userData.trailTimer = (p.userData.trailTimer || 0) + 1;
        if (p.userData.trailTimer % 3 === 0) {
          const trailGeo = new THREE.SphereGeometry(0.06, 4, 4);
          const trailMat = new THREE.MeshBasicMaterial({
            color: p.material.color.clone(), transparent: true, opacity: 0.6
          });
          const trail = new THREE.Mesh(trailGeo, trailMat);
          trail.position.copy(p.position);
          trail.userData = { life: 20 };
          scene.add(trail);
          trailParticles.push(trail);
        }

        // Check collision with monsters
        for (let j = monsters.length - 1; j >= 0; j--) {
          const m = monsters[j];
          if (m.userData.state !== 'approaching') continue;
          if (p.position.distanceTo(m.position) < m.userData.size + 0.3) {
            m.userData.state = 'hit';
            m.userData.hitTime = t;
            const pushDir = m.position.clone().normalize();
            m.userData.flyVel.copy(pushDir.multiplyScalar(0.25));
            m.userData.flyVel.y = 0.15 + Math.random() * 0.1;
            monstersDefeated++;
            document.getElementById('monsterCount').textContent = monstersDefeated;
            // Death light at projectile kill
            const dl2 = new THREE.PointLight(p.material.color.clone(), 3, 6);
            dl2.position.copy(m.position);
            dl2.userData = { life: 0.8 };
            scene.add(dl2);
            deathLights.push(dl2);
            p.userData.life = 0;
            break;
          }
        }

        if (p.userData.life <= 0 || p.position.length() > 35) {
          scene.remove(p);
          projectiles.splice(i, 1);
        }
      }

      // Update trail particles (fade and remove)
      for (let ti = trailParticles.length - 1; ti >= 0; ti--) {
        const tp = trailParticles[ti];
        tp.userData.life--;
        tp.material.opacity = tp.userData.life / 20;
        tp.scale.multiplyScalar(0.93);
        if (tp.userData.life <= 0) {
          scene.remove(tp);
          trailParticles.splice(ti, 1);
        }
      }

      // Update all attack systems
      updateCobra(t);
      updateLightning(t);
      updateFishWave(t);
      updateSharkWave(t);
      updateTornado(t);
      updatePokemon(t);
      updateMetalWave(t);

      // OrbitControls damping update
      controls.update();

      renderer.render(scene, camera);
      } catch(e) { console.error('animate error:', e); }
    }

    animate();

    // ===== WEATHER =====
    async function fetchWeather() {
      try {
        const resp = await fetch('https://api.open-meteo.com/v1/forecast?latitude=45.5017&longitude=-73.5673&current=weather_code,cloud_cover');
        const data = await resp.json();
        if (data?.current) {
          weather.cloudCover = data.current.cloud_cover || 0;
          weather.weatherCode = data.current.weather_code || 0;
          updateWeatherBadge();
        }
      } catch(e) {}
    }
    function updateWeatherBadge() {
      const el = document.getElementById('weatherBadge');
      if (!el) return;
      const code = weather.weatherCode;
      const d = daylight > 0.5;
      let emoji = d ? '☀️' : '🌙';
      let desc = 'Ciel degage';
      if (code <= 3 && code > 0) { emoji = d ? '⛅' : '🌤️'; desc = 'Partiellement nuageux'; }
      if (code === 45 || code === 48) { emoji = '🌫️'; desc = 'Brouillard'; }
      if (code >= 51 && code <= 67) { emoji = '🌧️'; desc = 'Pluie'; }
      if (code >= 71 && code <= 86) { emoji = '❄️'; desc = 'Neige'; }
      if (code >= 95) { emoji = '⚡'; desc = 'Orage'; }
      el.textContent = `${emoji} ${desc} • Nuages ${Math.round(weather.cloudCover)}%`;
    }
    fetchWeather();
    setInterval(fetchWeather, 600000);

    // ===== RESIZE =====
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

  </script>
</body>
