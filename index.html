<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barriere Magnetique Elementaire - Protection Maison</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;600&display=swap');

    body {
      overflow: hidden;
      background: #000;
      font-family: 'Exo 2', sans-serif;
      user-select: none;
      -webkit-user-select: none;
    }

    canvas {
      display: block;
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
    }

    #ui-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      pointer-events: none;
      z-index: 10;
    }

    .top-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px 30px;
      gap: 18px;
    }

    .shield-status {
      font-family: 'Orbitron', monospace;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 8px 22px;
      border-radius: 30px;
      border: 2px solid;
      transition: all 0.5s ease;
      text-align: center;
    }

    .shield-status.active {
      color: #00ff88;
      border-color: #00ff8855;
      background: #00ff8815;
      box-shadow: 0 0 20px #00ff8833, inset 0 0 20px #00ff8811;
      animation: statusPulse 2s ease-in-out infinite;
    }

    .shield-status.inactive {
      color: #ff4444;
      border-color: #ff444455;
      background: #ff444415;
      box-shadow: 0 0 20px #ff444433;
    }

    @keyframes statusPulse {
      0%, 100% { box-shadow: 0 0 20px #00ff8833, inset 0 0 20px #00ff8811; }
      50% { box-shadow: 0 0 40px #00ff8855, inset 0 0 30px #00ff8822; }
    }

    .title-area {
      text-align: center;
      padding-top: 8px;
    }

    .title-area h1 {
      font-family: 'Orbitron', monospace;
      font-size: clamp(14px, 3vw, 24px);
      font-weight: 900;
      background: linear-gradient(90deg, #00c6ff, #ff00e5, #ffaa00, #00ff88);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 4s ease infinite;
      text-shadow: none;
      letter-spacing: 2px;
    }

    .title-area p {
      font-size: clamp(10px, 1.8vw, 13px);
      color: #8899bb;
      margin-top: 4px;
      letter-spacing: 1px;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .controls {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 20px;
      pointer-events: all;
      z-index: 20;
    }

    .btn {
      font-family: 'Orbitron', monospace;
      font-size: clamp(11px, 2vw, 15px);
      font-weight: 700;
      letter-spacing: 2px;
      padding: 14px 36px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: -2px; left: -2px;
      right: -2px; bottom: -2px;
      border-radius: 52px;
      z-index: -1;
    }

    .btn-activate {
      background: linear-gradient(135deg, #00ff88, #00c6ff);
      color: #001a0e;
      box-shadow: 0 0 30px #00ff8844, 0 4px 15px rgba(0,0,0,0.3);
    }
    .btn-activate:hover {
      transform: scale(1.08);
      box-shadow: 0 0 50px #00ff8866, 0 6px 25px rgba(0,0,0,0.4);
    }
    .btn-activate:active { transform: scale(0.98); }

    .btn-superboost {
      background: linear-gradient(135deg, #ff0066, #ff8800, #ffee00, #00ff88, #00ccff, #aa00ff);
      background-size: 300% 300%;
      color: #fff;
      font-size: clamp(12px, 2.2vw, 16px);
      text-shadow: 0 0 10px rgba(0,0,0,0.5);
      box-shadow: 0 0 30px #ff006644, 0 0 60px #aa00ff33, 0 4px 15px rgba(0,0,0,0.4);
      animation: boostGradient 2s ease infinite;
      display: none;
    }
    .btn-superboost:hover {
      transform: scale(1.12);
      box-shadow: 0 0 50px #ff006688, 0 0 80px #aa00ff55, 0 6px 25px rgba(0,0,0,0.5);
    }
    .btn-superboost:active { transform: scale(0.95); }
    .btn-superboost.boosting {
      animation: boostGradient 0.3s ease infinite, boostPulse 0.15s ease infinite;
    }

    @keyframes boostGradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    @keyframes boostPulse {
      0%, 100% { transform: scale(1.05); }
      50% { transform: scale(1.15); }
    }

    /* Left action buttons */
    .action-buttons {
      position: fixed;
      left: 16px;
      bottom: 50%;
      transform: translateY(50%);
      margin-top: 80px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 30;
    }

    .action-btn {
      width: 64px; height: 64px;
      border-radius: 16px;
      border: 3px solid rgba(100, 150, 255, 0.3);
      cursor: pointer;
      transition: all 0.25s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      background: rgba(5, 5, 30, 0.85);
      backdrop-filter: blur(8px);
      -webkit-tap-highlight-color: transparent;
      opacity: 0.5;
    }
    .action-btn .action-label {
      font-family: 'Orbitron', monospace;
      font-size: 6px;
      letter-spacing: 1px;
      margin-top: 2px;
      color: #6688cc;
      text-transform: uppercase;
    }
    .action-btn:hover {
      transform: scale(1.12);
      opacity: 0.9;
      border-color: rgba(100, 180, 255, 0.6);
      box-shadow: 0 0 20px rgba(50, 100, 255, 0.4);
    }
    .action-btn:active { transform: scale(0.95) !important; }
    .action-btn.ready {
      opacity: 1;
      border-color: rgba(100, 180, 255, 0.6);
      box-shadow: 0 0 15px rgba(50, 100, 255, 0.3);
      animation: spaceGlow 2.5s ease infinite;
    }
    .action-btn.ready .action-label { color: #88bbff; }
    @keyframes spaceGlow {
      0%, 100% { box-shadow: 0 0 15px rgba(50, 100, 255, 0.3); }
      50% { box-shadow: 0 0 30px rgba(80, 150, 255, 0.6); }
    }

    .btn-deactivate {
      background: linear-gradient(135deg, #ff4444, #ff8800);
      color: #1a0000;
      box-shadow: 0 0 30px #ff444444, 0 4px 15px rgba(0,0,0,0.3);
    }
    .btn-deactivate:hover {
      transform: scale(1.08);
      box-shadow: 0 0 50px #ff444466, 0 6px 25px rgba(0,0,0,0.4);
    }
    .btn-deactivate:active { transform: scale(0.98); }

    /* Super boost screen flash overlay */
    .boost-flash {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      pointer-events: none;
      z-index: 25;
      opacity: 0;
      transition: opacity 0.1s ease;
    }
    .boost-flash.active {
      opacity: 1;
      background: radial-gradient(circle at center, rgba(255,255,255,0.4), rgba(255,100,0,0.2), transparent 70%);
      animation: flashPulse 0.15s ease;
    }
    @keyframes flashPulse {
      0% { opacity: 1; }
      100% { opacity: 0; }
    }

    .element-selector {
      position: fixed;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 30;
    }

    .element-btn {
      width: 64px; height: 64px;
      border-radius: 16px;
      border: 3px solid;
      cursor: pointer;
      transition: all 0.25s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(8px);
      position: relative;
      -webkit-tap-highlight-color: transparent;
    }

    .element-btn .el-label {
      font-family: 'Orbitron', monospace;
      font-size: 7px;
      letter-spacing: 1px;
      margin-top: 2px;
      text-transform: uppercase;
      transition: color 0.25s ease;
    }

    .element-btn .el-status {
      position: absolute;
      top: -4px; right: -4px;
      width: 14px; height: 14px;
      border-radius: 50%;
      border: 2px solid #000;
      transition: all 0.25s ease;
      font-size: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Inactive state (OFF) - clearly dimmed */
    .element-btn {
      opacity: 0.35;
      border-color: #333;
      box-shadow: none;
      filter: grayscale(80%);
    }
    .element-btn .el-label { color: #555; }
    .element-btn .el-status { background: #aa0000; }
    .element-btn .el-status::after { content: ''; }

    /* Active state (ON) - vibrant glow */
    .element-btn.active {
      opacity: 1;
      filter: grayscale(0%);
      transform: scale(1.05);
    }
    .element-btn.active .el-status { background: #00dd44; }
    .element-btn.active .el-status::after { content: ''; }

    .element-btn:hover {
      transform: scale(1.12);
      opacity: 0.85;
    }
    .element-btn.active:hover {
      transform: scale(1.15);
      opacity: 1;
    }
    .element-btn:active { transform: scale(0.95) !important; }

    .element-btn.fire.active { border-color: #ff4400; box-shadow: 0 0 20px #ff4400aa, inset 0 0 12px #ff440033; }
    .element-btn.fire.active .el-label { color: #ff6622; }
    .element-btn.ice.active { border-color: #00ccff; box-shadow: 0 0 20px #00ccffaa, inset 0 0 12px #00ccff33; }
    .element-btn.ice.active .el-label { color: #00ccff; }
    .element-btn.electric.active { border-color: #ffee00; box-shadow: 0 0 20px #ffee00aa, inset 0 0 12px #ffee0033; }
    .element-btn.electric.active .el-label { color: #ffee00; }
    .element-btn.water.active { border-color: #0066ff; box-shadow: 0 0 20px #0066ffaa, inset 0 0 12px #0066ff33; }
    .element-btn.water.active .el-label { color: #4488ff; }
    .element-btn.venom.active { border-color: #aa00ff; box-shadow: 0 0 20px #aa00ffaa, inset 0 0 12px #aa00ff33; }
    .element-btn.venom.active .el-label { color: #cc44ff; }

    .monster-counter {
      position: fixed;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      pointer-events: none;
    }

    .counter-label {
      font-family: 'Orbitron', monospace;
      font-size: 10px;
      color: #ff4444;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .counter-value {
      font-family: 'Orbitron', monospace;
      font-size: 36px;
      font-weight: 900;
      color: #ff6644;
      text-shadow: 0 0 20px #ff664488;
    }

    .counter-sub {
      font-family: 'Orbitron', monospace;
      font-size: 10px;
      color: #00ff88;
      letter-spacing: 2px;
    }

    .address-badge {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Orbitron', monospace;
      font-size: 10px;
      color: #556688;
      letter-spacing: 2px;
      pointer-events: none;
      text-align: center;
    }

    /* Space view popup */
    .space-view {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      width: min(420px, 85vw);
      height: min(320px, 60vh);
      border-radius: 20px;
      border: 2px solid rgba(100, 150, 255, 0.4);
      background: radial-gradient(ellipse at center, #05051a 0%, #000008 100%);
      box-shadow: 0 0 60px rgba(50, 100, 255, 0.3), inset 0 0 40px rgba(0, 20, 80, 0.5);
      z-index: 50;
      overflow: hidden;
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s ease;
      opacity: 0;
      pointer-events: none;
    }
    .space-view.visible {
      transform: translate(-50%, -50%) scale(1);
      opacity: 1;
    }
    .space-view.closeup {
      width: min(600px, 92vw);
      height: min(450px, 75vh);
    }
    .space-view-label {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Orbitron', monospace;
      font-size: 11px;
      font-weight: 700;
      color: #ff4444;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-shadow: 0 0 10px #ff000066;
      z-index: 2;
      white-space: nowrap;
    }
    .space-view canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    @media (max-width: 600px) {
      .element-selector { right: 6px; gap: 6px; }
      .element-btn { width: 52px; height: 52px; font-size: 18px; border-radius: 12px; }
      .element-btn .el-label { font-size: 6px; }
      .controls { bottom: 20px; gap: 12px; }
      .btn { padding: 12px 24px; font-size: 10px; }
      .monster-counter { left: 8px; }
      .space-view { width: 90vw; height: 50vh; }
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <div id="ui-overlay">
    <div class="top-bar">
      <div class="shield-status inactive" id="shieldStatus">Bouclier Inactif</div>
    </div>
    <div class="title-area">
      <h1>Barriere Magnetique Elementaire</h1>
      <p>Systeme de Protection Avance - Maison Argyle</p>
    </div>

    <div class="monster-counter">
      <div class="counter-label">Monstres</div>
      <div class="counter-label">Repousses</div>
      <div class="counter-value" id="monsterCount">0</div>
      <div class="counter-sub">vers l'espace</div>
    </div>

    <div class="address-badge">
      455 Avenue Argyle, Westmount, QC &bull; Protection Active 24/7
    </div>
  </div>

  <div class="action-buttons">
    <div class="action-btn" id="btnSpaceView" onclick="forceSpaceView()">
      <span>&#128640;</span>
      <span class="action-label">Espace</span>
    </div>
  </div>

  <div class="element-selector">
    <div class="element-btn fire active" data-element="fire">
      <span>&#128293;</span>
      <span class="el-label">Feu</span>
      <span class="el-status"></span>
    </div>
    <div class="element-btn ice active" data-element="ice">
      <span>&#10052;&#65039;</span>
      <span class="el-label">Glace</span>
      <span class="el-status"></span>
    </div>
    <div class="element-btn electric active" data-element="electric">
      <span>&#9889;</span>
      <span class="el-label">Eclair</span>
      <span class="el-status"></span>
    </div>
    <div class="element-btn water active" data-element="water">
      <span>&#128167;</span>
      <span class="el-label">Eau</span>
      <span class="el-status"></span>
    </div>
    <div class="element-btn venom active" data-element="venom">
      <span>&#9760;&#65039;</span>
      <span class="el-label">Venin</span>
      <span class="el-status"></span>
    </div>
  </div>

  <div class="controls">
    <button class="btn btn-activate" id="btnActivate" onclick="activateBarrier()">
      Activer Bouclier
    </button>
    <button class="btn btn-superboost" id="btnSuperBoost" onclick="triggerSuperBoost()">
      SUPER BOOST
    </button>
    <button class="btn btn-deactivate" id="btnDeactivate" onclick="deactivateBarrier()">
      Desactiver
    </button>
  </div>

  <div class="boost-flash" id="boostFlash"></div>

  <div class="space-view" id="spaceView">
    <div class="space-view-label">VUE SATELLITE - ESPACE</div>
    <canvas id="spaceCanvas"></canvas>
  </div>

  <script>
    // ===== CANVAS SETUP =====
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let W, H, centerX, centerY;
    let barrierActive = false;
    let monstersDefeated = 0;
    let activationProgress = 0;
    let shakeAmount = 0;
    let superBoostActive = false;
    let superBoostTimer = 0;

    const activeElements = { fire: true, ice: true, electric: true, water: true, venom: true };

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
      centerX = W / 2;
      centerY = H / 2;
    }
    window.addEventListener('resize', resize);
    resize();

    // ===== STARS =====
    class Star {
      constructor() { this.reset(); }
      reset() {
        this.x = Math.random() * W;
        this.y = Math.random() * H;
        this.size = Math.random() * 2 + 0.5;
        this.twinkleSpeed = Math.random() * 0.03 + 0.01;
        this.twinklePhase = Math.random() * Math.PI * 2;
        this.brightness = Math.random() * 0.5 + 0.5;
      }
      draw(t) {
        const alpha = this.brightness * (0.5 + 0.5 * Math.sin(t * this.twinkleSpeed + this.twinklePhase));
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(200, 220, 255, ${alpha})`;
        ctx.fill();
      }
    }

    const stars = Array.from({ length: 200 }, () => new Star());

    // ===== HOUSE DRAWING =====
    const houseW = Math.min(280, W * 0.35);
    const houseH = houseW * 0.85;

    function drawHouse() {
      const hx = centerX;
      const hy = centerY + 20;
      const hw = houseW;
      const hh = houseH;

      ctx.save();

      // Main house body - stone facade
      const bodyGrad = ctx.createLinearGradient(hx - hw/2, hy - hh/3, hx + hw/2, hy + hh/2);
      bodyGrad.addColorStop(0, '#5a4e42');
      bodyGrad.addColorStop(0.5, '#4a3f35');
      bodyGrad.addColorStop(1, '#3d3328');
      ctx.fillStyle = bodyGrad;
      ctx.beginPath();
      ctx.rect(hx - hw/2, hy - hh/3, hw, hh * 0.7);
      ctx.fill();

      // Roof
      const roofGrad = ctx.createLinearGradient(hx, hy - hh/1.2, hx, hy - hh/3);
      roofGrad.addColorStop(0, '#2a2a35');
      roofGrad.addColorStop(1, '#1a1a25');
      ctx.fillStyle = roofGrad;
      ctx.beginPath();
      ctx.moveTo(hx - hw/2 - 20, hy - hh/3);
      ctx.lineTo(hx, hy - hh/1.2);
      ctx.lineTo(hx + hw/2 + 20, hy - hh/3);
      ctx.closePath();
      ctx.fill();

      // Roof edge highlight
      ctx.strokeStyle = '#3a3a4a';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(hx - hw/2 - 20, hy - hh/3);
      ctx.lineTo(hx, hy - hh/1.2);
      ctx.lineTo(hx + hw/2 + 20, hy - hh/3);
      ctx.stroke();

      // Windows - two rows
      const winColor = barrierActive ? 'rgba(255, 220, 140, 0.9)' : 'rgba(255, 200, 100, 0.35)';
      const winGlow = barrierActive ? 'rgba(255, 200, 80, 0.4)' : 'rgba(255, 200, 80, 0.1)';
      const winW = hw * 0.16;
      const winH = hh * 0.16;

      // Top windows
      [- 0.25, 0, 0.25].forEach(offset => {
        const wx = hx + hw * offset - winW / 2;
        const wy = hy - hh * 0.18;
        ctx.shadowColor = winGlow;
        ctx.shadowBlur = barrierActive ? 20 : 5;
        ctx.fillStyle = winColor;
        ctx.fillRect(wx, wy, winW, winH);
        ctx.shadowBlur = 0;
        // Window frame
        ctx.strokeStyle = '#2a2520';
        ctx.lineWidth = 2;
        ctx.strokeRect(wx, wy, winW, winH);
        ctx.beginPath();
        ctx.moveTo(wx + winW/2, wy);
        ctx.lineTo(wx + winW/2, wy + winH);
        ctx.moveTo(wx, wy + winH/2);
        ctx.lineTo(wx + winW/2, wy + winH/2);
        ctx.stroke();
      });

      // Bottom windows
      [-0.28, 0.28].forEach(offset => {
        const wx = hx + hw * offset - winW * 0.7;
        const wy = hy + hh * 0.05;
        const bwW = winW * 1.4;
        const bwH = winH * 1.2;
        ctx.shadowColor = winGlow;
        ctx.shadowBlur = barrierActive ? 25 : 5;
        ctx.fillStyle = winColor;
        ctx.fillRect(wx, wy, bwW, bwH);
        ctx.shadowBlur = 0;
        ctx.strokeStyle = '#2a2520';
        ctx.lineWidth = 2;
        ctx.strokeRect(wx, wy, bwW, bwH);
        ctx.beginPath();
        ctx.moveTo(wx + bwW/3, wy);
        ctx.lineTo(wx + bwW/3, wy + bwH);
        ctx.moveTo(wx + bwW*2/3, wy);
        ctx.lineTo(wx + bwW*2/3, wy + bwH);
        ctx.stroke();
      });

      // Front door
      const doorW = hw * 0.14;
      const doorH = hh * 0.28;
      const doorX = hx - doorW / 2;
      const doorY = hy + hh * 0.7 - doorH;
      const doorGrad = ctx.createLinearGradient(doorX, doorY, doorX + doorW, doorY + doorH);
      doorGrad.addColorStop(0, '#3a2618');
      doorGrad.addColorStop(1, '#2a1a10');
      ctx.fillStyle = doorGrad;
      ctx.beginPath();
      ctx.moveTo(doorX, doorY + doorH);
      ctx.lineTo(doorX, doorY + doorW * 0.3);
      ctx.arcTo(doorX, doorY, doorX + doorW / 2, doorY, doorW * 0.5);
      ctx.arcTo(doorX + doorW, doorY, doorX + doorW, doorY + doorW * 0.3, doorW * 0.5);
      ctx.lineTo(doorX + doorW, doorY + doorH);
      ctx.closePath();
      ctx.fill();

      // Door handle
      ctx.beginPath();
      ctx.arc(doorX + doorW * 0.75, doorY + doorH * 0.55, 3, 0, Math.PI * 2);
      ctx.fillStyle = '#c4a53a';
      ctx.fill();

      // Door light
      if (barrierActive) {
        ctx.shadowColor = 'rgba(255, 200, 80, 0.6)';
        ctx.shadowBlur = 30;
        ctx.beginPath();
        ctx.arc(hx, doorY + doorH * 0.15 - 15, 5, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255, 220, 140, 0.9)';
        ctx.fill();
        ctx.shadowBlur = 0;
      }

      // Ground / lawn
      const groundGrad = ctx.createLinearGradient(0, hy + hh * 0.37, 0, H);
      groundGrad.addColorStop(0, '#1a2810');
      groundGrad.addColorStop(0.3, '#0f1a08');
      groundGrad.addColorStop(1, '#050a03');
      ctx.fillStyle = groundGrad;
      ctx.fillRect(0, hy + hh * 0.37, W, H - hy);

      // Path to door
      ctx.fillStyle = '#2a2520';
      ctx.beginPath();
      ctx.moveTo(doorX - 5, doorY + doorH);
      ctx.lineTo(doorX - 30, hy + hh * 0.37 + 40);
      ctx.lineTo(doorX + doorW + 30, hy + hh * 0.37 + 40);
      ctx.lineTo(doorX + doorW + 5, doorY + doorH);
      ctx.closePath();
      ctx.fill();

      // Bushes
      [[-0.38, 0.34], [0.38, 0.34], [-0.2, 0.36], [0.2, 0.36]].forEach(([ox, oy]) => {
        ctx.beginPath();
        ctx.arc(hx + hw * ox, hy + hh * oy, hw * 0.08, 0, Math.PI * 2);
        ctx.fillStyle = `rgb(${20 + Math.random() * 15}, ${50 + Math.random() * 20}, ${15 + Math.random() * 10})`;
        ctx.fill();
      });

      // Address label
      ctx.font = '10px Orbitron, monospace';
      ctx.fillStyle = 'rgba(200, 190, 170, 0.5)';
      ctx.textAlign = 'center';
      ctx.fillText('455', hx, doorY + doorH - 8);

      ctx.restore();
    }

    // ===== BARRIER =====
    const barrierRadius = Math.min(houseW * 1.1, W * 0.35);
    let barrierParticles = [];

    class BarrierParticle {
      constructor() { this.reset(); }
      reset() {
        this.angle = Math.random() * Math.PI * 2;
        this.radius = barrierRadius + (Math.random() - 0.5) * 20;
        this.speed = (Math.random() * 0.5 + 0.3) * (Math.random() > 0.5 ? 1 : -1);
        this.size = Math.random() * 3 + 1;
        this.life = 1;
        this.decay = Math.random() * 0.005 + 0.002;
        const elements = Object.keys(activeElements).filter(e => activeElements[e]);
        this.element = elements[Math.floor(Math.random() * elements.length)] || 'electric';
      }
      update() {
        this.angle += this.speed * 0.015;
        this.life -= this.decay;
        if (this.life <= 0) this.reset();
      }
      draw() {
        const x = centerX + Math.cos(this.angle) * this.radius;
        const y = (centerY + 20) + Math.sin(this.angle) * this.radius * 0.55;
        const colors = {
          fire: [`rgba(255, 100, 0, ${this.life})`, `rgba(255, 200, 0, ${this.life * 0.5})`],
          ice: [`rgba(0, 200, 255, ${this.life})`, `rgba(200, 240, 255, ${this.life * 0.5})`],
          electric: [`rgba(255, 255, 0, ${this.life})`, `rgba(200, 200, 255, ${this.life * 0.5})`],
          water: [`rgba(0, 100, 255, ${this.life})`, `rgba(100, 180, 255, ${this.life * 0.5})`],
          venom: [`rgba(170, 0, 255, ${this.life})`, `rgba(0, 255, 100, ${this.life * 0.5})`]
        };
        const [c1, c2] = colors[this.element] || colors.electric;
        ctx.beginPath();
        ctx.arc(x, y, this.size * this.life, 0, Math.PI * 2);
        ctx.fillStyle = c1;
        ctx.shadowColor = c2;
        ctx.shadowBlur = 10;
        ctx.fill();
        ctx.shadowBlur = 0;
      }
    }

    for (let i = 0; i < 150; i++) barrierParticles.push(new BarrierParticle());

    function drawBarrier(t) {
      if (activationProgress <= 0) return;
      const alpha = activationProgress;
      const boostMult = superBoostActive ? 2.5 : 1;

      ctx.save();

      // Super Boost: extra radial shockwave rings
      if (superBoostActive) {
        const boostPhase = (t % 800) / 800;
        for (let w = 0; w < 3; w++) {
          const wave = (boostPhase + w * 0.33) % 1;
          const waveR = barrierRadius * (1 + wave * 0.5);
          ctx.beginPath();
          ctx.ellipse(centerX, centerY + 20, waveR, waveR * 0.55, 0, 0, Math.PI * 2);
          ctx.strokeStyle = `rgba(255, 200, 0, ${(1 - wave) * 0.4})`;
          ctx.lineWidth = 3 * (1 - wave);
          ctx.stroke();
        }
      }

      // Main barrier ellipse glow
      for (let i = 3; i >= 0; i--) {
        const r = barrierRadius + i * 8 * boostMult;
        ctx.beginPath();
        ctx.ellipse(centerX, centerY + 20, r, r * 0.55, 0, 0, Math.PI * 2);
        const glowColor = superBoostActive
          ? `rgba(255, ${150 + Math.sin(t * 0.01) * 100}, 0, ${alpha * 0.15 * (4 - i)})`
          : `rgba(0, 200, 255, ${alpha * 0.08 * (4 - i)})`;
        ctx.strokeStyle = glowColor;
        ctx.lineWidth = (3 + i * 2) * boostMult;
        ctx.stroke();
      }

      // Rotating energy rings
      for (let ring = 0; ring < 3; ring++) {
        const ringOffset = t * 0.001 * (ring + 1) * (ring % 2 === 0 ? 1 : -1);
        ctx.beginPath();
        ctx.ellipse(centerX, centerY + 20, barrierRadius + ring * 5, (barrierRadius + ring * 5) * 0.55, ringOffset, 0, Math.PI * 2);
        const colors = ['rgba(0, 255, 136, ', 'rgba(0, 200, 255, ', 'rgba(255, 100, 0, '];
        ctx.strokeStyle = colors[ring] + (alpha * 0.15) + ')';
        ctx.lineWidth = 1.5;
        ctx.setLineDash([10, 20 + ring * 10]);
        ctx.lineDashOffset = t * 0.05 * (ring % 2 === 0 ? 1 : -1);
        ctx.stroke();
        ctx.setLineDash([]);
      }

      // Hexagonal grid overlay
      const hexSize = 25;
      for (let a = 0; a < Math.PI * 2; a += 0.15) {
        const r = barrierRadius;
        const x = centerX + Math.cos(a) * r;
        const y = (centerY + 20) + Math.sin(a) * r * 0.55;
        const pulse = Math.sin(t * 0.003 + a * 5) * 0.5 + 0.5;
        ctx.beginPath();
        for (let s = 0; s < 6; s++) {
          const hx = x + Math.cos(Math.PI / 3 * s) * hexSize * 0.3;
          const hy = y + Math.sin(Math.PI / 3 * s) * hexSize * 0.3;
          s === 0 ? ctx.moveTo(hx, hy) : ctx.lineTo(hx, hy);
        }
        ctx.closePath();
        ctx.strokeStyle = `rgba(0, 200, 255, ${alpha * pulse * 0.2})`;
        ctx.lineWidth = 1;
        ctx.stroke();
      }

      // Barrier particles
      barrierParticles.forEach(p => {
        p.update();
        p.draw();
      });

      // Electric arcs
      if (activeElements.electric && Math.random() < 0.15) {
        const a1 = Math.random() * Math.PI * 2;
        const a2 = a1 + (Math.random() - 0.5) * 0.8;
        ctx.beginPath();
        const x1 = centerX + Math.cos(a1) * barrierRadius;
        const y1 = (centerY + 20) + Math.sin(a1) * barrierRadius * 0.55;
        const x2 = centerX + Math.cos(a2) * barrierRadius;
        const y2 = (centerY + 20) + Math.sin(a2) * barrierRadius * 0.55;
        ctx.moveTo(x1, y1);
        const midX = (x1 + x2) / 2 + (Math.random() - 0.5) * 30;
        const midY = (y1 + y2) / 2 + (Math.random() - 0.5) * 30;
        ctx.quadraticCurveTo(midX, midY, x2, y2);
        ctx.strokeStyle = `rgba(180, 200, 255, ${alpha * 0.8})`;
        ctx.lineWidth = 1.5;
        ctx.shadowColor = 'rgba(150, 180, 255, 0.8)';
        ctx.shadowBlur = 15;
        ctx.stroke();
        ctx.shadowBlur = 0;
      }

      ctx.restore();
    }

    // ===== MONSTERS =====
    const monsters = [];
    // ===== MONSTER VARIETY SYSTEM =====
    // Body shapes: blob, tall, wide, spiky, ghost, spider, cyclops, bat, slug, squid
    const bodyShapes = ['blob', 'tall', 'wide', 'spiky', 'ghost', 'spider', 'cyclops', 'bat', 'slug', 'squid'];
    const headFeatures = ['horns', 'antennae', 'crown', 'spikes', 'ears', 'none', 'single_horn', 'mushroom'];
    const eyeStyles = ['round', 'angry', 'tiny', 'big', 'vertical', 'three', 'one_big', 'stalks'];
    const mouthStyles = ['teeth', 'fangs', 'wide_grin', 'beak', 'tentacle_mouth', 'drool', 'none', 'zigzag'];
    const limbStyles = ['tentacles', 'claws', 'stubs', 'wings', 'spider_legs', 'ghost_trail', 'none', 'long_arms'];
    const patterns = ['solid', 'spots', 'stripes', 'gradient', 'cracks', 'glow_veins'];

    const colorPalettes = [
      { body: '#8B0000', accent: '#cc2200', eye: '#ffff00', glow: '#ff440088' },
      { body: '#4B0082', accent: '#7722cc', eye: '#ff0000', glow: '#aa00ff88' },
      { body: '#2F4F2F', accent: '#447744', eye: '#00ff00', glow: '#22aa2288' },
      { body: '#3B0B0B', accent: '#661111', eye: '#ff8800', glow: '#ff440088' },
      { body: '#1a1a3a', accent: '#3333aa', eye: '#cc00ff', glow: '#6600cc88' },
      { body: '#2a0a2a', accent: '#880066', eye: '#ff00aa', glow: '#ff00aa88' },
      { body: '#0a2a2a', accent: '#006666', eye: '#00ffcc', glow: '#00ffcc88' },
      { body: '#3a2a0a', accent: '#886600', eye: '#ffcc00', glow: '#ffcc0088' },
      { body: '#1a0a0a', accent: '#440000', eye: '#ff2200', glow: '#ff000088' },
      { body: '#0a0a2a', accent: '#0022aa', eye: '#4488ff', glow: '#0044ff88' },
      { body: '#2a0a1a', accent: '#770033', eye: '#ff4488', glow: '#ff448888' },
      { body: '#1a2a0a', accent: '#446600', eye: '#aaff00', glow: '#88cc0088' },
    ];

    function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    class Monster {
      constructor() {
        this.id = Math.random();
        this.palette = pick(colorPalettes);
        this.color = this.palette.body;
        this.accent = this.palette.accent;
        this.eyeColor = this.palette.eye;
        this.glowColor = this.palette.glow;

        // Randomized traits
        this.bodyShape = pick(bodyShapes);
        this.headFeature = pick(headFeatures);
        this.eyeStyle = pick(eyeStyles);
        this.mouthStyle = pick(mouthStyles);
        this.limbStyle = pick(limbStyles);
        this.pattern = pick(patterns);

        // Size depends on body shape
        const baseSizes = { blob: 32, tall: 28, wide: 35, spiky: 30, ghost: 34, spider: 26, cyclops: 38, bat: 25, slug: 30, squid: 32 };
        this.size = (baseSizes[this.bodyShape] || 32) + Math.random() * 12 - 6;

        this.eyeCount = this.eyeStyle === 'three' ? 3 : (this.eyeStyle === 'one_big' || this.bodyShape === 'cyclops') ? 1 : 2;
        this.tentacles = this.limbStyle === 'tentacles' ? Math.floor(Math.random() * 3) + 3 :
                         this.limbStyle === 'spider_legs' ? 6 :
                         this.limbStyle === 'long_arms' ? 2 : Math.floor(Math.random() * 3) + 2;
        this.hornSize = Math.random() * 15 + 5;
        this.teethCount = Math.floor(Math.random() * 4) + 3;

        // Unique variation seeds
        this.blobSeed = Array.from({length: 12}, () => Math.random() * 6 - 3);
        this.wobbleAmp = Math.random() * 3 + 1;
        this.pulseSpeed = Math.random() * 0.003 + 0.002;
        this.scaleY = this.bodyShape === 'tall' ? 1.4 : this.bodyShape === 'wide' ? 0.7 : 1;
        this.scaleX = this.bodyShape === 'wide' ? 1.4 : this.bodyShape === 'tall' ? 0.75 : 1;

        // Spawn from edges
        const side = Math.floor(Math.random() * 4);
        if (side === 0) { this.x = -50; this.y = Math.random() * H; }
        else if (side === 1) { this.x = W + 50; this.y = Math.random() * H; }
        else if (side === 2) { this.x = Math.random() * W; this.y = -50; }
        else { this.x = Math.random() * W; this.y = H + 50; }

        this.speed = Math.random() * 0.5 + 0.3;
        if (this.bodyShape === 'slug') this.speed *= 0.6;
        if (this.bodyShape === 'bat') this.speed *= 1.4;
        this.wobble = Math.random() * Math.PI * 2;
        this.wobbleSpeed = Math.random() * 0.02 + 0.01;
        this.state = 'approaching';
        this.hitTime = 0;
        this.flyVx = 0;
        this.flyVy = 0;
        this.flyRotation = 0;
        this.flyRotSpeed = 0;
        this.opacity = 1;
        this.mouthPhase = Math.random() * Math.PI;
      }

      update(t) {
        if (this.state === 'approaching') {
          const dx = centerX - this.x;
          const dy = (centerY + 20) - this.y;
          const dist = Math.sqrt(dx * dx + dy * dy);

          this.wobble += this.wobbleSpeed;
          const wobbleX = Math.sin(this.wobble) * this.wobbleAmp;
          const wobbleY = Math.cos(this.wobble * 1.3) * this.wobbleAmp;

          this.x += (dx / dist) * this.speed + wobbleX * 0.3;
          this.y += (dy / dist) * this.speed + wobbleY * 0.3;

          const bx = this.x - centerX;
          const by = (this.y - (centerY + 20)) / 0.55;
          const barrierDist = Math.sqrt(bx * bx + by * by);

          if (barrierActive && barrierDist < barrierRadius + 15) {
            this.state = 'hit';
            this.hitTime = t;
            const angle = Math.atan2(this.y - (centerY + 20), this.x - centerX);
            this.flyVx = Math.cos(angle) * (8 + Math.random() * 5);
            this.flyVy = Math.sin(angle) * (8 + Math.random() * 5) - 6;
            this.flyRotSpeed = (Math.random() - 0.5) * 0.3;
            monstersDefeated++;
            document.getElementById('monsterCount').textContent = monstersDefeated;
            shakeAmount = 8;
            spawnProjectiles(this.x, this.y, angle);
          }
        } else if (this.state === 'hit') {
          const elapsed = (t - this.hitTime) / 1000;
          if (elapsed < 0.5) {
            this.opacity = 1 - elapsed;
          } else {
            this.state = 'flying';
          }
        } else if (this.state === 'flying') {
          this.x += this.flyVx;
          this.y += this.flyVy;
          this.flyVy -= 0.15;
          this.flyRotation += this.flyRotSpeed;
          this.opacity -= 0.008;
          this.size *= 0.998;
        }
      }

      draw(t) {
        if (this.opacity <= 0) return;
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.flyRotation);
        ctx.globalAlpha = this.opacity;

        const pulse = 1 + Math.sin(t * this.pulseSpeed + this.id * 10) * 0.05;
        const s = this.size * pulse;

        // Shadow/glow
        ctx.shadowColor = this.state === 'hit' ? 'rgba(255,255,255,0.8)' : this.glowColor;
        ctx.shadowBlur = this.state === 'hit' ? 30 : 15;

        // ===== DRAW BODY =====
        ctx.save();
        ctx.scale(this.scaleX, this.scaleY);
        this._drawBody(t, s);
        ctx.restore();

        ctx.shadowBlur = 0;

        // ===== DRAW PATTERN =====
        this._drawPattern(t, s);

        // ===== DRAW HEAD FEATURES =====
        this._drawHeadFeature(t, s);

        // ===== DRAW EYES =====
        this._drawEyes(t, s);

        // ===== DRAW MOUTH =====
        this._drawMouth(t, s);

        // ===== DRAW LIMBS =====
        this._drawLimbs(t, s);

        ctx.globalAlpha = 1;
        ctx.restore();
      }

      _drawBody(t, s) {
        ctx.beginPath();
        if (this.bodyShape === 'ghost') {
          // Ghost: round top, wavy bottom
          ctx.moveTo(-s, 0);
          ctx.arc(0, -s * 0.3, s, Math.PI, 0);
          for (let i = 0; i <= 5; i++) {
            const gx = s - (i / 5) * s * 2;
            const gy = s * 0.5 + Math.sin(t * 0.005 + i + this.id) * s * 0.2;
            ctx.lineTo(gx, gy);
          }
          ctx.closePath();
        } else if (this.bodyShape === 'spiky') {
          // Spiky: star-like body
          for (let i = 0; i < 10; i++) {
            const a = (i / 10) * Math.PI * 2;
            const r = i % 2 === 0 ? s * 1.3 : s * 0.7;
            const wobble = Math.sin(t * 0.004 + a * 2 + this.id) * 2;
            ctx.lineTo(Math.cos(a) * (r + wobble), Math.sin(a) * (r + wobble));
          }
          ctx.closePath();
        } else if (this.bodyShape === 'slug') {
          // Slug: elongated horizontal blob
          ctx.ellipse(0, 0, s * 1.5, s * 0.7, 0, 0, Math.PI * 2);
        } else if (this.bodyShape === 'squid') {
          // Squid: dome top, narrow bottom
          ctx.arc(0, -s * 0.2, s * 0.9, Math.PI, 0);
          ctx.lineTo(s * 0.3, s * 0.6);
          ctx.lineTo(0, s * 0.5);
          ctx.lineTo(-s * 0.3, s * 0.6);
          ctx.closePath();
        } else {
          // Default blob with unique deformations
          for (let i = 0; i < 12; i++) {
            const a = (i / 12) * Math.PI * 2;
            const wobble = Math.sin(t * 0.003 + a * 3 + this.id) * this.wobbleAmp + this.blobSeed[i];
            const r = s + wobble;
            ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
          }
          ctx.closePath();
        }
        const grad = ctx.createRadialGradient(0, -s * 0.2, 0, 0, 0, s * 1.3);
        grad.addColorStop(0, this.accent);
        grad.addColorStop(0.6, this.color);
        grad.addColorStop(1, '#000000');
        ctx.fillStyle = grad;
        ctx.fill();
      }

      _drawPattern(t, s) {
        if (this.pattern === 'spots') {
          ctx.fillStyle = this.accent + '66';
          for (let i = 0; i < 5; i++) {
            const sx = Math.cos(this.id * 100 + i * 2.3) * s * 0.5;
            const sy = Math.sin(this.id * 100 + i * 3.1) * s * 0.5;
            ctx.beginPath();
            ctx.arc(sx, sy, s * 0.1, 0, Math.PI * 2);
            ctx.fill();
          }
        } else if (this.pattern === 'stripes') {
          ctx.strokeStyle = this.accent + '44';
          ctx.lineWidth = 2;
          for (let i = -2; i <= 2; i++) {
            ctx.beginPath();
            ctx.moveTo(-s, i * s * 0.25);
            ctx.lineTo(s, i * s * 0.25);
            ctx.stroke();
          }
        } else if (this.pattern === 'cracks') {
          ctx.strokeStyle = this.eyeColor + '33';
          ctx.lineWidth = 1;
          for (let i = 0; i < 4; i++) {
            ctx.beginPath();
            let cx = (Math.random() - 0.5) * s;
            let cy = (Math.random() - 0.5) * s;
            ctx.moveTo(cx, cy);
            for (let j = 0; j < 3; j++) {
              cx += (Math.random() - 0.5) * s * 0.4;
              cy += (Math.random() - 0.5) * s * 0.4;
              ctx.lineTo(cx, cy);
            }
            ctx.stroke();
          }
        } else if (this.pattern === 'glow_veins') {
          ctx.strokeStyle = this.eyeColor + '44';
          ctx.lineWidth = 1.5;
          ctx.shadowColor = this.eyeColor;
          ctx.shadowBlur = 6;
          for (let i = 0; i < 3; i++) {
            ctx.beginPath();
            ctx.moveTo(0, 0);
            const a = (this.id * 100 + i * 2) % (Math.PI * 2);
            const ex = Math.cos(a) * s * 0.8;
            const ey = Math.sin(a) * s * 0.8;
            const mx = ex * 0.5 + Math.sin(t * 0.003 + i) * 5;
            const my = ey * 0.5 + Math.cos(t * 0.003 + i) * 5;
            ctx.quadraticCurveTo(mx, my, ex, ey);
            ctx.stroke();
          }
          ctx.shadowBlur = 0;
        }
      }

      _drawHeadFeature(t, s) {
        const f = this.headFeature;
        ctx.fillStyle = '#1a1a1a';

        if (f === 'horns') {
          [-0.5, 0.5].forEach(side => {
            ctx.beginPath();
            ctx.moveTo(side * s * 0.5, -s * 0.6 * this.scaleY);
            ctx.lineTo(side * s * 0.2, -s * this.scaleY - this.hornSize);
            ctx.lineTo(side * s * 0.7, -s * 0.4 * this.scaleY);
            ctx.closePath();
            ctx.fill();
          });
        } else if (f === 'antennae') {
          ctx.strokeStyle = this.accent;
          ctx.lineWidth = 2;
          [-0.3, 0.3].forEach(side => {
            const bx = side * s * 0.4;
            const by = -s * 0.7 * this.scaleY;
            ctx.beginPath();
            ctx.moveTo(bx, by);
            const tipX = bx + side * 15;
            const tipY = by - 20 + Math.sin(t * 0.006 + side * 5) * 5;
            ctx.quadraticCurveTo(bx + side * 5, by - 15, tipX, tipY);
            ctx.stroke();
            // Bulb at tip
            ctx.beginPath();
            ctx.arc(tipX, tipY, 3, 0, Math.PI * 2);
            ctx.fillStyle = this.eyeColor;
            ctx.shadowColor = this.eyeColor;
            ctx.shadowBlur = 8;
            ctx.fill();
            ctx.shadowBlur = 0;
          });
        } else if (f === 'crown') {
          ctx.fillStyle = this.accent;
          const crownY = -s * 0.7 * this.scaleY;
          for (let i = -2; i <= 2; i++) {
            ctx.beginPath();
            ctx.moveTo(i * s * 0.2 - 4, crownY + 5);
            ctx.lineTo(i * s * 0.2, crownY - 10 - Math.abs(i) * 3);
            ctx.lineTo(i * s * 0.2 + 4, crownY + 5);
            ctx.closePath();
            ctx.fill();
          }
        } else if (f === 'spikes') {
          ctx.fillStyle = this.accent;
          for (let i = 0; i < 5; i++) {
            const a = -Math.PI * 0.8 + (i / 4) * Math.PI * 0.6;
            const bx = Math.cos(a) * s * 0.6;
            const by = Math.sin(a) * s * 0.6 * this.scaleY;
            ctx.beginPath();
            ctx.moveTo(bx - 3, by);
            ctx.lineTo(bx + Math.cos(a) * 12, by + Math.sin(a) * 12);
            ctx.lineTo(bx + 3, by);
            ctx.closePath();
            ctx.fill();
          }
        } else if (f === 'ears') {
          ctx.fillStyle = this.color;
          [-1, 1].forEach(side => {
            ctx.beginPath();
            const ex = side * s * 0.7;
            const ey = -s * 0.4 * this.scaleY;
            ctx.ellipse(ex, ey, s * 0.2, s * 0.35, side * 0.3, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = this.accent;
            ctx.lineWidth = 2;
            ctx.stroke();
          });
        } else if (f === 'single_horn') {
          ctx.fillStyle = '#2a2a2a';
          ctx.beginPath();
          ctx.moveTo(-s * 0.1, -s * 0.6 * this.scaleY);
          ctx.lineTo(0, -s * this.scaleY - this.hornSize * 1.5);
          ctx.lineTo(s * 0.1, -s * 0.6 * this.scaleY);
          ctx.closePath();
          ctx.fill();
          // Glow tip
          ctx.beginPath();
          ctx.arc(0, -s * this.scaleY - this.hornSize * 1.5, 3, 0, Math.PI * 2);
          ctx.fillStyle = this.eyeColor;
          ctx.shadowColor = this.eyeColor;
          ctx.shadowBlur = 10;
          ctx.fill();
          ctx.shadowBlur = 0;
        } else if (f === 'mushroom') {
          ctx.fillStyle = this.accent;
          ctx.beginPath();
          ctx.arc(0, -s * 0.6 * this.scaleY, s * 0.7, Math.PI, 0);
          ctx.closePath();
          ctx.fill();
          // Spots on mushroom
          ctx.fillStyle = this.eyeColor + '44';
          [-0.3, 0.1, 0.35].forEach(ox => {
            ctx.beginPath();
            ctx.arc(ox * s, -s * 0.75 * this.scaleY, 4, 0, Math.PI * 2);
            ctx.fill();
          });
        }
      }

      _drawEyes(t, s) {
        const lookX = (centerX - this.x) * 0.001;
        const lookY = ((centerY + 20) - this.y) * 0.001;

        if (this.eyeStyle === 'one_big' || this.bodyShape === 'cyclops') {
          // Single large eye
          const ey = -s * 0.1;
          ctx.shadowColor = this.eyeColor;
          ctx.shadowBlur = 15;
          ctx.beginPath();
          ctx.arc(0, ey, s * 0.3, 0, Math.PI * 2);
          ctx.fillStyle = '#fff';
          ctx.fill();
          ctx.beginPath();
          ctx.arc(0, ey, s * 0.25, 0, Math.PI * 2);
          ctx.fillStyle = this.eyeColor;
          ctx.fill();
          ctx.shadowBlur = 0;
          ctx.beginPath();
          ctx.arc(lookX * 4, ey + lookY * 4, s * 0.12, 0, Math.PI * 2);
          ctx.fillStyle = '#000';
          ctx.fill();
          // Highlight
          ctx.beginPath();
          ctx.arc(-s * 0.08, ey - s * 0.08, s * 0.05, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(255,255,255,0.7)';
          ctx.fill();
        } else if (this.eyeStyle === 'stalks') {
          [-1, 1].forEach(side => {
            const stalkAngle = side * 0.4 + Math.sin(t * 0.003 + side) * 0.1;
            const stalkLen = s * 0.6;
            const sx = Math.sin(stalkAngle) * stalkLen * side;
            const sy = -s * 0.3 - Math.cos(stalkAngle) * stalkLen;
            ctx.strokeStyle = this.color;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(side * s * 0.15, -s * 0.3);
            ctx.lineTo(sx, sy);
            ctx.stroke();
            ctx.shadowColor = this.eyeColor;
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.arc(sx, sy, s * 0.12, 0, Math.PI * 2);
            ctx.fillStyle = this.eyeColor;
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.arc(sx + lookX * 2, sy + lookY * 2, s * 0.05, 0, Math.PI * 2);
            ctx.fillStyle = '#000';
            ctx.fill();
          });
        } else if (this.eyeStyle === 'three') {
          [-1, 0, 1].forEach(pos => {
            const ex = pos * s * 0.25;
            const ey = -s * 0.15 + (pos === 0 ? -s * 0.1 : 0);
            const er = pos === 0 ? s * 0.14 : s * 0.12;
            ctx.shadowColor = this.eyeColor;
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.arc(ex, ey, er, 0, Math.PI * 2);
            ctx.fillStyle = this.eyeColor;
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.arc(ex + lookX * 2, ey + lookY * 2, er * 0.45, 0, Math.PI * 2);
            ctx.fillStyle = '#000';
            ctx.fill();
          });
        } else {
          // Two eyes with style variations
          [-1, 1].forEach(side => {
            const ex = side * s * 0.3;
            const ey = -s * 0.15;
            const er = this.eyeStyle === 'big' ? s * 0.22 : this.eyeStyle === 'tiny' ? s * 0.1 : s * 0.16;

            ctx.shadowColor = this.eyeColor;
            ctx.shadowBlur = 12;

            if (this.eyeStyle === 'angry') {
              // Angry slanted eye
              ctx.beginPath();
              ctx.ellipse(ex, ey, er, er * 0.7, side * 0.3, 0, Math.PI * 2);
              ctx.fillStyle = this.eyeColor;
              ctx.fill();
              // Angry brow
              ctx.shadowBlur = 0;
              ctx.strokeStyle = '#000';
              ctx.lineWidth = 3;
              ctx.beginPath();
              ctx.moveTo(ex - side * er, ey - er * 0.8);
              ctx.lineTo(ex + side * er * 0.5, ey - er * 1.2);
              ctx.stroke();
            } else if (this.eyeStyle === 'vertical') {
              ctx.beginPath();
              ctx.ellipse(ex, ey, er * 0.7, er, 0, 0, Math.PI * 2);
              ctx.fillStyle = this.eyeColor;
              ctx.fill();
            } else {
              ctx.beginPath();
              ctx.arc(ex, ey, er, 0, Math.PI * 2);
              ctx.fillStyle = this.eyeColor;
              ctx.fill();
            }

            // Pupil
            ctx.shadowBlur = 0;
            ctx.beginPath();
            const pr = this.eyeStyle === 'vertical' ? er * 0.3 : er * 0.45;
            ctx.arc(ex + lookX * 3, ey + lookY * 3, pr, 0, Math.PI * 2);
            ctx.fillStyle = '#000';
            ctx.fill();

            // Highlight
            if (this.eyeStyle === 'big') {
              ctx.beginPath();
              ctx.arc(ex - er * 0.25, ey - er * 0.25, er * 0.15, 0, Math.PI * 2);
              ctx.fillStyle = 'rgba(255,255,255,0.6)';
              ctx.fill();
            }
          });
        }
      }

      _drawMouth(t, s) {
        const mouthOpen = Math.abs(Math.sin(t * 0.004 + this.mouthPhase)) * s * 0.2;
        const m = this.mouthStyle;

        if (m === 'none') return;

        const my = s * 0.25;

        if (m === 'wide_grin') {
          ctx.beginPath();
          ctx.arc(0, my - s * 0.05, s * 0.35, 0.1, Math.PI - 0.1);
          ctx.fillStyle = '#000';
          ctx.fill();
          // Teeth along the grin
          ctx.fillStyle = '#ddd';
          for (let ti = -3; ti <= 3; ti++) {
            ctx.beginPath();
            const tx = ti * s * 0.08;
            ctx.moveTo(tx - 2, my - s * 0.05);
            ctx.lineTo(tx, my + 5);
            ctx.lineTo(tx + 2, my - s * 0.05);
            ctx.closePath();
            ctx.fill();
          }
        } else if (m === 'fangs') {
          ctx.beginPath();
          ctx.ellipse(0, my, s * 0.2, mouthOpen + 2, 0, 0, Math.PI * 2);
          ctx.fillStyle = '#200000';
          ctx.fill();
          // Two big fangs
          ctx.fillStyle = '#eee';
          [-1, 1].forEach(side => {
            ctx.beginPath();
            ctx.moveTo(side * s * 0.12 - 3, my - mouthOpen);
            ctx.lineTo(side * s * 0.12, my + mouthOpen + 6);
            ctx.lineTo(side * s * 0.12 + 3, my - mouthOpen);
            ctx.closePath();
            ctx.fill();
          });
        } else if (m === 'beak') {
          ctx.fillStyle = '#2a2000';
          ctx.beginPath();
          ctx.moveTo(-s * 0.15, my - 3);
          ctx.lineTo(0, my + s * 0.2);
          ctx.lineTo(s * 0.15, my - 3);
          ctx.closePath();
          ctx.fill();
          ctx.strokeStyle = '#3a3010';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(-s * 0.15, my - 1);
          ctx.lineTo(s * 0.15, my - 1);
          ctx.stroke();
        } else if (m === 'tentacle_mouth') {
          for (let i = 0; i < 4; i++) {
            const ta = -0.5 + (i / 3);
            const wave = Math.sin(t * 0.006 + i * 1.5 + this.id) * 8;
            ctx.beginPath();
            ctx.moveTo(ta * s * 0.3, my);
            ctx.quadraticCurveTo(ta * s * 0.4 + wave, my + s * 0.3, ta * s * 0.2 + wave * 0.5, my + s * 0.5);
            ctx.strokeStyle = this.accent;
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.stroke();
          }
        } else if (m === 'drool') {
          ctx.beginPath();
          ctx.ellipse(0, my, s * 0.2, mouthOpen + 2, 0, 0, Math.PI * 2);
          ctx.fillStyle = '#000';
          ctx.fill();
          // Drool drops
          ctx.fillStyle = '#44aa44';
          const drip = (t * 0.002 + this.id * 10) % 1;
          ctx.beginPath();
          ctx.ellipse(s * 0.05, my + mouthOpen + drip * s * 0.4, 3, 4 + drip * 3, 0, 0, Math.PI * 2);
          ctx.fill();
        } else if (m === 'zigzag') {
          ctx.beginPath();
          ctx.moveTo(-s * 0.3, my);
          for (let i = 0; i <= 6; i++) {
            ctx.lineTo(-s * 0.3 + i * s * 0.1, my + (i % 2 === 0 ? -3 : 5));
          }
          ctx.strokeStyle = '#000';
          ctx.lineWidth = 2;
          ctx.stroke();
        } else {
          // Default teeth
          ctx.beginPath();
          ctx.ellipse(0, my, s * 0.22, mouthOpen + 1, 0, 0, Math.PI * 2);
          ctx.fillStyle = '#000';
          ctx.fill();
          if (mouthOpen > 3) {
            ctx.fillStyle = '#ddd';
            for (let ti = 0; ti < this.teethCount; ti++) {
              const tx = -s * 0.15 + (ti / (this.teethCount - 1)) * s * 0.3;
              ctx.beginPath();
              ctx.moveTo(tx - 2, my - mouthOpen + 2);
              ctx.lineTo(tx, my - mouthOpen + 7);
              ctx.lineTo(tx + 2, my - mouthOpen + 2);
              ctx.closePath();
              ctx.fill();
            }
          }
        }
      }

      _drawLimbs(t, s) {
        const l = this.limbStyle;

        if (l === 'none') return;

        if (l === 'wings') {
          [-1, 1].forEach(side => {
            ctx.fillStyle = this.color + 'aa';
            ctx.beginPath();
            const wx = side * s * 0.5;
            const flapAmt = Math.sin(t * 0.008 + this.id) * 0.3;
            ctx.moveTo(wx, -s * 0.1);
            ctx.quadraticCurveTo(wx + side * s * 1.2, -s * 0.5 + flapAmt * s, wx + side * s * 1.0, s * 0.1);
            ctx.quadraticCurveTo(wx + side * s * 0.6, s * 0.2, wx, s * 0.2);
            ctx.closePath();
            ctx.fill();
            // Wing bone
            ctx.strokeStyle = this.accent;
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(wx, 0);
            ctx.lineTo(wx + side * s * 0.9, -s * 0.3 + flapAmt * s * 0.5);
            ctx.stroke();
          });
        } else if (l === 'spider_legs') {
          for (let i = 0; i < 6; i++) {
            const side = i < 3 ? -1 : 1;
            const idx = i % 3;
            const baseY = -s * 0.2 + idx * s * 0.25;
            const wave = Math.sin(t * 0.005 + i * 1.2 + this.id) * 8;
            const kneeX = side * (s * 0.8 + wave * 0.5);
            const kneeY = baseY - 10;
            const footX = side * (s * 1.2 + wave);
            const footY = baseY + s * 0.4;
            ctx.strokeStyle = this.accent;
            ctx.lineWidth = 2.5;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(side * s * 0.3, baseY);
            ctx.lineTo(kneeX, kneeY);
            ctx.lineTo(footX, footY);
            ctx.stroke();
          }
        } else if (l === 'claws') {
          [-1, 1].forEach(side => {
            const ax = side * s * 0.6;
            const ay = s * 0.1;
            const wave = Math.sin(t * 0.004 + side * 3 + this.id) * 10;
            ctx.strokeStyle = this.accent;
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(side * s * 0.4, ay);
            ctx.quadraticCurveTo(ax + wave, ay + s * 0.2, ax + side * 8 + wave, ay + s * 0.5);
            ctx.stroke();
            // Claw tips
            for (let c = 0; c < 3; c++) {
              const ca = -0.3 + c * 0.3;
              ctx.beginPath();
              ctx.moveTo(ax + side * 8 + wave, ay + s * 0.5);
              ctx.lineTo(ax + side * 8 + wave + Math.cos(ca) * 8 * side, ay + s * 0.5 + Math.sin(ca) * 8 + 5);
              ctx.strokeStyle = '#1a1a1a';
              ctx.lineWidth = 2;
              ctx.stroke();
            }
          });
        } else if (l === 'stubs') {
          [-1, 1].forEach(side => {
            ctx.fillStyle = this.color;
            ctx.beginPath();
            const sx = side * s * 0.45;
            const sy = s * 0.3;
            ctx.ellipse(sx, sy, s * 0.15, s * 0.25, side * 0.2, 0, Math.PI * 2);
            ctx.fill();
          });
        } else if (l === 'ghost_trail') {
          ctx.fillStyle = this.color + '44';
          for (let i = 1; i <= 4; i++) {
            ctx.beginPath();
            ctx.ellipse(0, s * 0.3 + i * 8, s * (1 - i * 0.15), s * 0.15, 0, 0, Math.PI * 2);
            ctx.fill();
          }
        } else if (l === 'long_arms') {
          [-1, 1].forEach(side => {
            const wave = Math.sin(t * 0.003 + side * 4 + this.id) * 15;
            ctx.strokeStyle = this.accent;
            ctx.lineWidth = 5;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(side * s * 0.4, 0);
            ctx.quadraticCurveTo(side * s * 1.0 + wave, s * 0.1, side * s * 0.8 + wave * 1.5, s * 0.8);
            ctx.stroke();
            // Hand with fingers
            const hx = side * s * 0.8 + wave * 1.5;
            const hy = s * 0.8;
            for (let f = 0; f < 3; f++) {
              const fa = -0.4 + f * 0.4;
              ctx.beginPath();
              ctx.moveTo(hx, hy);
              ctx.lineTo(hx + Math.cos(fa + Math.PI / 2) * 8 * side, hy + Math.sin(fa + Math.PI / 2) * 8);
              ctx.lineWidth = 2;
              ctx.stroke();
            }
          });
        } else {
          // Default tentacles
          for (let i = 0; i < this.tentacles; i++) {
            const ta = (i / this.tentacles) * Math.PI + Math.PI / 2;
            const tx = Math.cos(ta) * s;
            const ty = Math.sin(ta) * s * 0.3 + s * 0.4;
            const wave = Math.sin(t * 0.005 + i * 2 + this.id) * 15;
            ctx.beginPath();
            ctx.moveTo(tx * 0.5, ty);
            ctx.quadraticCurveTo(tx + wave, ty + s * 0.3, tx * 0.8 + wave * 1.5, ty + s * 0.6);
            ctx.strokeStyle = this.accent;
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.stroke();
          }
        }
      }
    }

    // ===== PROJECTILES =====
    const projectiles = [];

    class Projectile {
      constructor(x, y, tx, ty, element) {
        this.x = x; this.y = y;
        this.element = element;
        const angle = Math.atan2(ty - y, tx - x);
        this.angle = angle;
        const speed = element === 'fire' ? 7 + Math.random() * 3 : 6 + Math.random() * 4;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.life = 1;
        this.size = element === 'fire' ? 10 : element === 'venom' ? 9 : element === 'ice' ? 8 : 7;
        this.trail = [];
        this.t = Math.random() * 100; // animation offset
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.life -= 0.015;
        this.t++;
        this.trail.push({ x: this.x, y: this.y, life: 1, element: this.element });
        if (this.trail.length > 15) this.trail.shift();
        this.trail.forEach(t => t.life -= 0.08);
      }

      draw() {
        if (this.life <= 0) return;
        ctx.save();
        const s = this.size;
        const ang = Math.atan2(this.vy, this.vx);

        if (this.element === 'fire') {
          // === FIREBALL with inner flames ===
          // Fiery trail
          this.trail.forEach((t, i) => {
            if (t.life <= 0) return;
            const tr = s * t.life * 0.7;
            const flicker = Math.sin(this.t * 0.3 + i) * 2;
            const grd = ctx.createRadialGradient(t.x, t.y, 0, t.x, t.y, tr + flicker);
            grd.addColorStop(0, `rgba(255, 255, 100, ${t.life * 0.6})`);
            grd.addColorStop(0.4, `rgba(255, 120, 0, ${t.life * 0.4})`);
            grd.addColorStop(1, `rgba(255, 0, 0, 0)`);
            ctx.beginPath();
            ctx.arc(t.x + (Math.random() - 0.5) * 2, t.y + (Math.random() - 0.5) * 2, tr + flicker, 0, Math.PI * 2);
            ctx.fillStyle = grd;
            ctx.fill();
          });
          // Outer glow
          ctx.shadowColor = '#ff6600';
          ctx.shadowBlur = 30;
          // Main fireball
          const fbGrd = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, s * 1.5);
          fbGrd.addColorStop(0, '#ffffcc');
          fbGrd.addColorStop(0.2, '#ffcc00');
          fbGrd.addColorStop(0.5, '#ff6600');
          fbGrd.addColorStop(0.8, '#ff2200');
          fbGrd.addColorStop(1, 'rgba(200, 0, 0, 0)');
          ctx.beginPath();
          ctx.arc(this.x, this.y, s * 1.5, 0, Math.PI * 2);
          ctx.fillStyle = fbGrd;
          ctx.fill();
          // Inner flame tendrils
          for (let f = 0; f < 5; f++) {
            const fa = ang + Math.PI + (Math.random() - 0.5) * 1.5;
            const fl = s * (0.8 + Math.random() * 1.2);
            ctx.beginPath();
            ctx.moveTo(this.x, this.y);
            ctx.quadraticCurveTo(
              this.x + Math.cos(fa) * fl * 0.5 + (Math.random() - 0.5) * 4,
              this.y + Math.sin(fa) * fl * 0.5 + (Math.random() - 0.5) * 4,
              this.x + Math.cos(fa) * fl,
              this.y + Math.sin(fa) * fl
            );
            ctx.strokeStyle = `rgba(255, ${150 + Math.random() * 105}, 0, ${0.3 + Math.random() * 0.4})`;
            ctx.lineWidth = 1 + Math.random() * 2;
            ctx.stroke();
          }
          // White hot core
          ctx.beginPath();
          ctx.arc(this.x, this.y, s * 0.4, 0, Math.PI * 2);
          ctx.fillStyle = '#ffffff';
          ctx.fill();

        } else if (this.element === 'ice') {
          // === ICE SPIKE - crystalline and sharp ===
          // Icy shimmer trail
          this.trail.forEach((t, i) => {
            if (t.life <= 0) return;
            ctx.beginPath();
            ctx.arc(t.x + (Math.random() - 0.5) * 3, t.y + (Math.random() - 0.5) * 3, 2 * t.life, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(180, 240, 255, ${t.life * 0.5})`;
            ctx.fill();
          });
          ctx.save();
          ctx.translate(this.x, this.y);
          ctx.rotate(ang);
          // Glow
          ctx.shadowColor = '#00ccff';
          ctx.shadowBlur = 20;
          // Main spike
          ctx.beginPath();
          ctx.moveTo(s * 2.5, 0);
          ctx.lineTo(s * 0.3, -s * 0.6);
          ctx.lineTo(-s * 1.2, -s * 0.35);
          ctx.lineTo(-s * 0.8, 0);
          ctx.lineTo(-s * 1.2, s * 0.35);
          ctx.lineTo(s * 0.3, s * 0.6);
          ctx.closePath();
          const iceGrd = ctx.createLinearGradient(-s, 0, s * 2.5, 0);
          iceGrd.addColorStop(0, '#aaeeff');
          iceGrd.addColorStop(0.5, '#00ddff');
          iceGrd.addColorStop(1, '#ffffff');
          ctx.fillStyle = iceGrd;
          ctx.fill();
          ctx.strokeStyle = 'rgba(255, 255, 255, 0.7)';
          ctx.lineWidth = 1;
          ctx.stroke();
          // Crystal facets
          ctx.beginPath();
          ctx.moveTo(s * 2.5, 0);
          ctx.lineTo(s * 0.3, -s * 0.2);
          ctx.lineTo(-s * 0.5, 0);
          ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
          ctx.lineWidth = 0.8;
          ctx.stroke();
          // Side shards
          ctx.beginPath();
          ctx.moveTo(s * 0.5, -s * 0.5);
          ctx.lineTo(s * 0.8, -s * 1.1);
          ctx.lineTo(s * 1.2, -s * 0.3);
          ctx.closePath();
          ctx.fillStyle = 'rgba(200, 240, 255, 0.5)';
          ctx.fill();
          ctx.beginPath();
          ctx.moveTo(s * 0.3, s * 0.5);
          ctx.lineTo(s * 0.5, s * 1.0);
          ctx.lineTo(s * 1.0, s * 0.3);
          ctx.closePath();
          ctx.fillStyle = 'rgba(200, 240, 255, 0.4)';
          ctx.fill();
          ctx.restore();

        } else if (this.element === 'venom') {
          // === VENOM ICE SPIKE - icy with toxic green ===
          this.trail.forEach((t, i) => {
            if (t.life <= 0) return;
            // Green toxic drips in trail
            ctx.beginPath();
            ctx.arc(t.x, t.y + Math.sin(this.t * 0.1 + i) * 3, 3 * t.life, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(0, 255, 80, ${t.life * 0.5})`;
            ctx.fill();
            ctx.beginPath();
            ctx.arc(t.x, t.y, 2 * t.life, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(150, 220, 255, ${t.life * 0.3})`;
            ctx.fill();
          });
          ctx.save();
          ctx.translate(this.x, this.y);
          ctx.rotate(ang);
          ctx.shadowColor = '#00ff44';
          ctx.shadowBlur = 25;
          // Main spike shape
          ctx.beginPath();
          ctx.moveTo(s * 2.5, 0);
          ctx.lineTo(-s, -s * 0.6);
          ctx.lineTo(-s * 0.5, 0);
          ctx.lineTo(-s, s * 0.6);
          ctx.closePath();
          const venomGrd = ctx.createLinearGradient(-s, 0, s * 2.5, 0);
          venomGrd.addColorStop(0, '#88eeff');
          venomGrd.addColorStop(0.6, '#44ddaa');
          venomGrd.addColorStop(1, '#00ff66');
          ctx.fillStyle = venomGrd;
          ctx.fill();
          // Venom veins running through spike
          ctx.strokeStyle = 'rgba(0, 255, 80, 0.7)';
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.moveTo(-s * 0.3, 0);
          ctx.bezierCurveTo(s * 0.3, -s * 0.2, s * 1.0, s * 0.1, s * 2.2, 0);
          ctx.stroke();
          // Dripping venom drops
          for (let d = 0; d < 3; d++) {
            const dx = s * (0.3 + d * 0.5);
            const dy = s * 0.4 + Math.sin(this.t * 0.15 + d) * s * 0.3;
            ctx.beginPath();
            ctx.arc(dx, dy, 2.5, 0, Math.PI * 2);
            ctx.fillStyle = '#00ff44';
            ctx.fill();
          }
          ctx.restore();

        } else if (this.element === 'electric') {
          // === ELECTRIC BOLT - jagged lightning ball ===
          this.trail.forEach((t, i) => {
            if (t.life <= 0) return;
            ctx.beginPath();
            ctx.arc(t.x, t.y, 3 * t.life, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 255, 100, ${t.life * 0.4})`;
            ctx.fill();
          });
          ctx.shadowColor = '#ffff00';
          ctx.shadowBlur = 25;
          // Electric core
          const elGrd = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, s);
          elGrd.addColorStop(0, '#ffffff');
          elGrd.addColorStop(0.3, '#ffff88');
          elGrd.addColorStop(0.7, '#ffcc00');
          elGrd.addColorStop(1, 'rgba(255, 200, 0, 0)');
          ctx.beginPath();
          ctx.arc(this.x, this.y, s, 0, Math.PI * 2);
          ctx.fillStyle = elGrd;
          ctx.fill();
          // Lightning arcs
          for (let l = 0; l < 4; l++) {
            const la = (l / 4) * Math.PI * 2 + this.t * 0.1;
            ctx.beginPath();
            ctx.moveTo(this.x, this.y);
            let lx = this.x, ly = this.y;
            for (let seg = 0; seg < 4; seg++) {
              lx += Math.cos(la + (Math.random() - 0.5) * 1.5) * (s * 0.6);
              ly += Math.sin(la + (Math.random() - 0.5) * 1.5) * (s * 0.6);
              ctx.lineTo(lx, ly);
            }
            ctx.strokeStyle = `rgba(255, 255, ${150 + Math.random() * 105}, 0.8)`;
            ctx.lineWidth = 1 + Math.random();
            ctx.stroke();
          }

        } else if (this.element === 'water') {
          // === WATER BLAST - swirling water orb ===
          this.trail.forEach((t, i) => {
            if (t.life <= 0) return;
            ctx.beginPath();
            ctx.arc(t.x + (Math.random() - 0.5) * 4, t.y + (Math.random() - 0.5) * 4, 3 * t.life, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(0, 150, 255, ${t.life * 0.3})`;
            ctx.fill();
          });
          ctx.shadowColor = '#0088ff';
          ctx.shadowBlur = 20;
          // Water sphere
          const wGrd = ctx.createRadialGradient(this.x - s * 0.3, this.y - s * 0.3, 0, this.x, this.y, s * 1.2);
          wGrd.addColorStop(0, 'rgba(200, 240, 255, 0.9)');
          wGrd.addColorStop(0.4, 'rgba(0, 150, 255, 0.8)');
          wGrd.addColorStop(1, 'rgba(0, 50, 200, 0)');
          ctx.beginPath();
          ctx.arc(this.x, this.y, s * 1.2, 0, Math.PI * 2);
          ctx.fillStyle = wGrd;
          ctx.fill();
          // Swirl lines
          for (let w = 0; w < 3; w++) {
            const wa = this.t * 0.08 + (w / 3) * Math.PI * 2;
            ctx.beginPath();
            ctx.arc(this.x, this.y, s * (0.4 + w * 0.2), wa, wa + Math.PI * 0.8);
            ctx.strokeStyle = `rgba(200, 240, 255, ${0.3 + w * 0.1})`;
            ctx.lineWidth = 1.5;
            ctx.stroke();
          }
          // Highlight
          ctx.beginPath();
          ctx.arc(this.x - s * 0.3, this.y - s * 0.3, s * 0.25, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
          ctx.fill();
        }

        ctx.shadowBlur = 0;
        ctx.restore();
      }
    }

    function spawnProjectiles(tx, ty, angle) {
      const elements = Object.keys(activeElements).filter(e => activeElements[e]);
      const bx = centerX + Math.cos(angle) * barrierRadius * 0.9;
      const by = (centerY + 20) + Math.sin(angle) * barrierRadius * 0.55 * 0.9;

      for (let i = 0; i < 5; i++) {
        const el = elements[Math.floor(Math.random() * elements.length)];
        const spread = (Math.random() - 0.5) * 0.5;
        const pa = angle + spread;
        const px = bx + Math.cos(pa) * 10;
        const py = by + Math.sin(pa) * 10;
        setTimeout(() => {
          projectiles.push(new Projectile(px, py, tx + (Math.random() - 0.5) * 40, ty + (Math.random() - 0.5) * 40, el));
        }, i * 50);
      }

    // ===== IMPACT PARTICLES =====
    const impactParticles = [];

    class ImpactParticle {
      constructor(x, y, color) {
        this.x = x; this.y = y;
        this.vx = (Math.random() - 0.5) * 8;
        this.vy = (Math.random() - 0.5) * 8;
        this.life = 1;
        this.color = color;
        this.size = Math.random() * 4 + 2;
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vx *= 0.96;
        this.vy *= 0.96;
        this.life -= 0.025;
      }
      draw() {
        if (this.life <= 0) return;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
        ctx.fillStyle = this.color.replace('1)', `${this.life})`);
        ctx.fill();
      }
    }

    // ===== WATER WAVES =====
    const waterWaves = [];
    let lastWaveTime = 0;

    class WaterWave {
      constructor(angle) {
        // Wave originates from the barrier and pushes outward
        this.angle = angle;
        this.cx = centerX;
        this.cy = centerY + 20;
        this.radius = barrierRadius * 0.9;
        this.spread = 0; // how far the wave has traveled outward
        this.height = 40 + Math.random() * 30; // wave height
        this.width = 0.8 + Math.random() * 0.4; // angular width
        this.life = 1;
        this.speed = 4 + Math.random() * 2;
        this.wavePhase = Math.random() * Math.PI * 2;
      }

      update() {
        this.spread += this.speed;
        this.life -= 0.012;
        this.wavePhase += 0.1;
        // Check if wave hits any monster
        for (let i = monsters.length - 1; i >= 0; i--) {
          if (monsters[i].state !== 'approaching') continue;
          const mAngle = Math.atan2(monsters[i].y - this.cy, monsters[i].x - this.cx);
          let angleDiff = Math.abs(mAngle - this.angle);
          if (angleDiff > Math.PI) angleDiff = Math.PI * 2 - angleDiff;
          if (angleDiff > this.width * 0.5) continue;
          const mDist = Math.sqrt(Math.pow(monsters[i].x - this.cx, 2) + Math.pow((monsters[i].y - this.cy) / 0.55, 2));
          const waveDist = this.radius + this.spread;
          if (Math.abs(mDist - waveDist) < 40) {
            // Wave hits monster - fling it to space!
            monsters[i].state = 'hit';
            monsters[i].hitTime = performance.now();
            const pushAngle = Math.atan2(monsters[i].y - this.cy, monsters[i].x - this.cx);
            monsters[i].flyVx = Math.cos(pushAngle) * 12;
            monsters[i].flyVy = Math.sin(pushAngle) * 12 - 10;
            monsters[i].flyRotSpeed = (Math.random() - 0.5) * 0.4;
            monstersDefeated++;
            document.getElementById('monsterCount').textContent = monstersDefeated;
            shakeAmount = 10;
            // Water splash particles
            for (let p = 0; p < 15; p++) {
              impactParticles.push(new ImpactParticle(
                monsters[i].x + (Math.random() - 0.5) * 30,
                monsters[i].y + (Math.random() - 0.5) * 30,
                ['rgba(0,150,255,1)', 'rgba(100,200,255,1)', 'rgba(200,240,255,1)'][Math.floor(Math.random() * 3)]
              ));
            }
            spaceTexts.push(new SpaceText(monsters[i].x, monsters[i].y - 30));
          }
        }
      }

      draw() {
        if (this.life <= 0) return;
        ctx.save();
        const waveDist = this.radius + this.spread;

        // Draw the wave arc
        const startAngle = this.angle - this.width * 0.5;
        const endAngle = this.angle + this.width * 0.5;
        const segments = 20;

        ctx.shadowColor = 'rgba(0, 150, 255, 0.5)';
        ctx.shadowBlur = 15;

        // Wave body (tall arc of water)
        for (let layer = 0; layer < 3; layer++) {
          const layerOffset = layer * 8;
          const h = this.height * (1 - layer * 0.25) * this.life;
          ctx.beginPath();
          for (let i = 0; i <= segments; i++) {
            const a = startAngle + (endAngle - startAngle) * (i / segments);
            const waveH = h * Math.sin((i / segments) * Math.PI) * (1 + Math.sin(this.wavePhase + i * 0.5) * 0.2);
            const bx = this.cx + Math.cos(a) * (waveDist + layerOffset);
            const by = this.cy + Math.sin(a) * (waveDist + layerOffset) * 0.55;
            if (i === 0) ctx.moveTo(bx, by - waveH);
            else ctx.lineTo(bx, by - waveH);
          }
          // Close with base
          for (let i = segments; i >= 0; i--) {
            const a = startAngle + (endAngle - startAngle) * (i / segments);
            const bx = this.cx + Math.cos(a) * (waveDist + layerOffset);
            const by = this.cy + Math.sin(a) * (waveDist + layerOffset) * 0.55;
            ctx.lineTo(bx, by);
          }
          ctx.closePath();
          const alpha = this.life * (0.5 - layer * 0.12);
          const colors = [
            `rgba(0, 120, 255, ${alpha})`,
            `rgba(50, 180, 255, ${alpha})`,
            `rgba(150, 220, 255, ${alpha})`
          ];
          ctx.fillStyle = colors[layer];
          ctx.fill();
        }

        // White foam crest on top
        ctx.beginPath();
        for (let i = 0; i <= segments; i++) {
          const a = startAngle + (endAngle - startAngle) * (i / segments);
          const waveH = this.height * this.life * Math.sin((i / segments) * Math.PI) * (1 + Math.sin(this.wavePhase + i * 0.5) * 0.2);
          const bx = this.cx + Math.cos(a) * waveDist;
          const by = this.cy + Math.sin(a) * waveDist * 0.55;
          if (i === 0) ctx.moveTo(bx, by - waveH);
          else ctx.lineTo(bx, by - waveH);
        }
        ctx.strokeStyle = `rgba(255, 255, 255, ${this.life * 0.7})`;
        ctx.lineWidth = 3;
        ctx.stroke();

        // Splash droplets at crest
        if (this.life > 0.3) {
          for (let d = 0; d < 5; d++) {
            const da = startAngle + Math.random() * (endAngle - startAngle);
            const bx = this.cx + Math.cos(da) * waveDist;
            const by = this.cy + Math.sin(da) * waveDist * 0.55;
            const dh = this.height * this.life * 0.5;
            ctx.beginPath();
            ctx.arc(bx + (Math.random() - 0.5) * 15, by - dh - Math.random() * 20, 2 + Math.random() * 3, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(200, 240, 255, ${this.life * 0.5})`;
            ctx.fill();
          }
        }

        ctx.shadowBlur = 0;
        ctx.restore();
      }
    }

    // Spawn water waves periodically when water element is active
    function trySpawnWaterWave(t) {
      if (!barrierActive || !activeElements.water) return;
      if (t - lastWaveTime > 4000 + Math.random() * 3000) {
        // Aim at a random approaching monster, or random direction
        let angle = Math.random() * Math.PI * 2;
        for (const m of monsters) {
          if (m.state === 'approaching') {
            angle = Math.atan2(m.y - (centerY + 20), m.x - centerX);
            break;
          }
        }
        waterWaves.push(new WaterWave(angle));
        lastWaveTime = t;
        // Play a water sound
        try {
          const actx = new (window.AudioContext || window.webkitAudioContext)();
          const dur = 0.5;
          const noise = actx.createBufferSource();
          const buf = actx.createBuffer(1, actx.sampleRate * dur, actx.sampleRate);
          const d = buf.getChannelData(0);
          for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (actx.sampleRate * 0.2));
          noise.buffer = buf;
          const filter = actx.createBiquadFilter();
          filter.type = 'lowpass';
          filter.frequency.value = 400;
          const gain = actx.createGain();
          gain.gain.setValueAtTime(0.15, actx.currentTime);
          gain.gain.exponentialDecayTo && gain.gain.exponentialDecayTo(0.01, actx.currentTime + dur);
          gain.gain.linearRampToValueAtTime(0.01, actx.currentTime + dur);
          noise.connect(filter);
          filter.connect(gain);
          gain.connect(actx.destination);
          noise.start();
          setTimeout(() => actx.close(), 600);
        } catch(e) {}
      }
    }

    // ===== ELEMENT HIT EFFECTS =====

      const particleColors = {
        fire: ['rgba(255,200,0,1)', 'rgba(255,100,0,1)', 'rgba(255,50,0,1)', 'rgba(255,255,100,1)'],
        ice: ['rgba(150,230,255,1)', 'rgba(200,240,255,1)', 'rgba(100,200,255,1)', 'rgba(255,255,255,1)'],
        electric: ['rgba(255,255,0,1)', 'rgba(255,255,150,1)', 'rgba(255,200,0,1)', 'rgba(255,255,255,1)'],
        water: ['rgba(0,150,255,1)', 'rgba(100,200,255,1)', 'rgba(200,240,255,1)', 'rgba(0,100,200,1)'],
        venom: ['rgba(0,255,80,1)', 'rgba(100,255,150,1)', 'rgba(150,100,255,1)', 'rgba(200,255,200,1)']
      };

      const colors = particleColors[element] || particleColors.fire;

      // Spawn impact particles
      for (let i = 0; i < 12; i++) {

          y + (Math.random() - 0.5) * 20,
          colors[Math.floor(Math.random() * colors.length)]
        ));

      // Fire: spawn burn marks (extra flame particles that linger)
      if (element === 'fire') {
        for (let i = 0; i < 8; i++) {
          const p = new ImpactParticle(
            monster.x + (Math.random() - 0.5) * monster.size,
            monster.y + (Math.random() - 0.5) * monster.size,
            colors[Math.floor(Math.random() * colors.length)]
          );
          p.vy = -2 - Math.random() * 3; // flames go up
          p.vx = (Math.random() - 0.5) * 2;
          p.size = 4 + Math.random() * 4;
          p.life = 1.5;
          impactParticles.push(p);
        }
      }

      // Ice: spawn crystal shatter
      if (element === 'ice') {
        for (let i = 0; i < 6; i++) {
          const p = new ImpactParticle(x + (Math.random() - 0.5) * 15, y + (Math.random() - 0.5) * 15, 'rgba(200,240,255,1)');
          p.size = 3 + Math.random() * 5;
          p.vx = (Math.random() - 0.5) * 10;
          p.vy = (Math.random() - 0.5) * 10;
          impactParticles.push(p);
        }
      }

      // Small screen shake
      shakeAmount = Math.max(shakeAmount, 3);
    }

    // ===== FLYING TO SPACE TEXT =====

    // ===== MONSTER SPAWNER =====
    let lastSpawn = 0;

    function spawnMonster(t) {

    // ===== ACTIVATION / DEACTIVATION =====

      document.getElementById('shieldStatus').textContent = 'Bouclier Actif';

    function deactivateBarrier() {
      barrierActive = false;
      superBoostActive = false;
      activationProgress = 0;
