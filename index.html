            d[i] = (Math.random() * 2 - 1) * env * 0.2;
            d[i] += Math.sin(t * 15 + Math.sin(t * 3) * 6) * env * 0.12;
            d[i] += Math.sin(t * 8 + Math.sin(t * 2) * 8) * env * 0.08;
          }
          const src = audioCtx.createBufferSource();
          src.buffer = buf;
          const lp = audioCtx.createBiquadFilter();
          lp.type = 'lowpass';
          lp.frequency.value = 300;
          const g = audioCtx.createGain();
          g.gain.value = 0.4;
          src.connect(lp); lp.connect(g); g.connect(audioCtx.destination);
          src.start();
        }
      } catch(e) {}
    }

    function updateSharkWave(t) {
      if (!sharkWaveActive) return;
      sharkWaveTimer++;

      // Phase 1 (0-100): water rises with big waves
      if (sharkWaveTimer < 100) {
        sharkWaterLevel = Math.min(1, sharkWaveTimer / 90);
        if (sharkWaterLevel > 0.3) {
          for (const m of monsters) {
            if (m.state !== 'approaching' && m.state !== 'idle') continue;
            if (sharkFloatingMonsters.some(f => f.monster === m)) continue;
            const bx = m.x - centerX;
            const by = (m.y - (centerY + 20)) / 0.55;
            const bDist = Math.sqrt(bx * bx + by * by);
            if (bDist > barrierRadius - 10) {
              m.state = 'floating';
              sharkFloatingMonsters.push({
                monster: m,
                bobPhase: Math.random() * Math.PI * 2,
                bobAmp: 4 + Math.random() * 5,
                baseY: m.y,
                timer: 0,
                eaten: false
              });
            }
          }
        }
      }

      // Update surf waves
      for (const sw of sharkSurfWaves) {
        sw.x += sw.speed;
        if (sw.x > W + 200) {
          sw.x = -200 - Math.random() * 200;
          sw.height = 30 + Math.random() * 25;
          sw.speed = 2 + Math.random() * 1.5;
        }
      }

      // Phase 2 (80-480): sharks hunt floating monsters
      if (sharkWaveTimer >= 80 && sharkWaveTimer < 480) {
        for (const shark of sharkWaveSharks) {
          shark.wobble += 0.06;
          shark.finPhase += 0.04;

          if (!shark.hunting || !shark.target || shark.target.eaten) {
            shark.hunting = false;
            shark.target = null;
            let closest = null;
            let closestDist = Infinity;
            for (const fm of sharkFloatingMonsters) {
              if (fm.eaten) continue;
              if (!monsters.includes(fm.monster)) continue;
              const dx = fm.monster.x - shark.x;
              const dy = fm.monster.y - shark.y;
              const d = Math.sqrt(dx * dx + dy * dy);
              const taken = sharkWaveSharks.some(f => f !== shark && f.target === fm);
              if (d < closestDist && !taken) {
                closestDist = d;
                closest = fm;
              }
            }
            if (closest) {
              shark.hunting = true;
              shark.target = closest;
            }
          }

          if (shark.hunting && shark.target && monsters.includes(shark.target.monster)) {
            const m = shark.target.monster;
            const dx = m.x - shark.x;
            const dy = m.y - shark.y;
            const d = Math.sqrt(dx * dx + dy * dy);
            shark.angle = Math.atan2(dy, dx);
            shark.x += Math.cos(shark.angle) * shark.speed * 1.8;
            shark.y += Math.sin(shark.angle) * shark.speed * 1.8;

            // Bite!
            if (d < 30) {
              shark.biteTimer = 25;
              shark.target.eaten = true;
              m.state = 'hit';
              m.hitTime = performance.now();
              m.flyVx = (Math.random() - 0.5) * 5;
              m.flyVy = 4 + Math.random() * 3;
              m.flyRotSpeed = (Math.random() - 0.5) * 0.4;
              monstersDefeated++;
              document.getElementById('monsterCount').textContent = monstersDefeated;
              shakeAmount = 8;

              // Big water splash
              for (let p = 0; p < 30; p++) {
                impactParticles.push(new ImpactParticle(
                  m.x + (Math.random() - 0.5) * 30,
                  m.y + (Math.random() - 0.5) * 30,
                  `rgba(${30 + Math.random() * 80}, ${120 + Math.random() * 135}, 255, 1)`
                ));
              }

              // Crunch sound
              try {
                if (audioCtx) {
                  const bufSize = audioCtx.sampleRate * 0.4;
                  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
                  const dd = buf.getChannelData(0);
                  for (let i = 0; i < bufSize; i++) {
                    const tt = i / audioCtx.sampleRate;
                    dd[i] = (Math.random() * 2 - 1) * Math.exp(-tt * 6) * 0.3;
                    dd[i] += Math.sin(tt * 80) * Math.exp(-tt * 8) * 0.15;
                  }
                  const src = audioCtx.createBufferSource();
                  src.buffer = buf;
                  const lp = audioCtx.createBiquadFilter();
                  lp.type = 'lowpass';
                  lp.frequency.value = 500;
                  const g = audioCtx.createGain();
                  g.gain.value = 0.25;
                  src.connect(lp); lp.connect(g); g.connect(audioCtx.destination);
                  src.start();
                }
              } catch(e) {}

              shark.hunting = false;
              shark.target = null;
            }
          } else {
            shark.x += Math.cos(shark.angle) * shark.speed;
            shark.y += Math.sin(shark.wobble) * 1.2;
            const fx = shark.x - centerX;
            const fy = (shark.y - (centerY + 20)) / 0.55;
            const fDist = Math.sqrt(fx * fx + fy * fy);
            if (fDist < barrierRadius + 15 || fDist > barrierRadius + 160) {
              shark.angle += 0.08;
            }
          }

          if (shark.biteTimer > 0) shark.biteTimer--;
        }
      }

      // Update floating monsters (bigger bob for rough seas)
      for (let i = sharkFloatingMonsters.length - 1; i >= 0; i--) {
        const fm = sharkFloatingMonsters[i];
        if (!monsters.includes(fm.monster)) {
          sharkFloatingMonsters.splice(i, 1);
          continue;
        }
        fm.timer++;
        if (!fm.eaten) {
          fm.monster.x += Math.sin(fm.timer * 0.04) * 1.0;
          fm.monster.y = fm.baseY + Math.sin(fm.bobPhase + fm.timer * 0.07) * fm.bobAmp;
        }
      }

      // Phase 3 (460+): water recedes
      if (sharkWaveTimer >= 460) {
        sharkWaterLevel = Math.max(0, 1 - (sharkWaveTimer - 460) / 120);
      }

      // End
      if (sharkWaveTimer >= SHARKWAVE_DURATION) {
        sharkWaveActive = false;
        sharkWaveSharks = [];
        sharkWaterLevel = 0;
        sharkSurfWaves = [];
        for (const fm of sharkFloatingMonsters) {
          if (monsters.includes(fm.monster) && fm.monster.state === 'floating') {
            fm.monster.state = 'approaching';
          }
        }
        sharkFloatingMonsters = [];
        document.getElementById('btnSharkWave').classList.remove('sharkwave-active');
      }
    }

    // Offscreen canvas for shark wave
    let _sharkOsc = null;

    function drawSharkWave(t) {
      if (!sharkWaveActive && sharkWaterLevel <= 0) return;

      ctx.save();

      if (sharkWaterLevel > 0) {
        const bCx = centerX;
        const bCy = centerY + 20;
        const bRx = barrierRadius;
        const bRy = barrierRadius * 0.55;
        const wl = sharkWaterLevel;
        const isDay = daylight > 0.5;

        // Create/resize offscreen canvas
        if (!_sharkOsc || _sharkOsc.width !== W || _sharkOsc.height !== H) {
          _sharkOsc = document.createElement('canvas');
          _sharkOsc.width = W;
          _sharkOsc.height = H;
        }
        const ox = _sharkOsc.getContext('2d');
        ox.clearRect(0, 0, W, H);

        // Deep dark ocean water
        ox.fillStyle = isDay ? 'rgba(5, 40, 90, 0.7)' : 'rgba(2, 12, 35, 0.75)';
        ox.fillRect(0, 0, W, H);

        // Turbulent wave lines (bigger, more dramatic)
        const waveSpeed = t * 0.002;
        for (let wy = 5; wy < H; wy += 10) {
          ox.beginPath();
          for (let x = 0; x <= W; x += 4) {
            const yOff = Math.sin(x * 0.015 + waveSpeed + wy * 0.01) * 8 +
              Math.sin(x * 0.008 + waveSpeed * 1.5 + wy * 0.005) * 6 +
              Math.sin(x * 0.025 + waveSpeed * 0.7 + wy * 0.015) * 4;
            if (x === 0) ox.moveTo(x, wy + yOff);
            else ox.lineTo(x, wy + yOff);
          }
          ox.strokeStyle = isDay
            ? `rgba(60, 140, 200, ${0.35 + Math.sin(wy * 0.04 + waveSpeed) * 0.15})`
            : `rgba(30, 70, 130, ${0.3 + Math.sin(wy * 0.04 + waveSpeed) * 0.12})`;
          ox.lineWidth = 2.5;
          ox.stroke();
        }

        // BIG SURF WAVES - the key visual difference
        for (const sw of sharkSurfWaves) {
          const waveX = sw.x;
          const waveH = sw.height * wl;
          const waveW = sw.width;

          // Wave body
          ox.save();
          ox.beginPath();
          ox.moveTo(waveX - waveW * 0.6, H);
          // Back slope
          ox.quadraticCurveTo(
            waveX - waveW * 0.3, H - waveH * 0.3,
            waveX, H - waveH
          );
          // Curl top
          ox.quadraticCurveTo(
            waveX + waveW * 0.15, H - waveH * 1.15,
            waveX + waveW * 0.3, H - waveH * 0.9
          );
          // Curl front (the breaking part)
          ox.quadraticCurveTo(
            waveX + waveW * 0.35, H - waveH * 0.5,
            waveX + waveW * 0.5, H
          );
          ox.closePath();

          const waveGrad = ox.createLinearGradient(waveX, H - waveH, waveX, H);
          if (isDay) {
            waveGrad.addColorStop(0, 'rgba(20, 100, 180, 0.9)');
            waveGrad.addColorStop(0.3, 'rgba(10, 70, 140, 0.85)');
            waveGrad.addColorStop(1, 'rgba(5, 40, 90, 0.6)');
          } else {
            waveGrad.addColorStop(0, 'rgba(10, 50, 100, 0.9)');
            waveGrad.addColorStop(0.3, 'rgba(5, 30, 70, 0.85)');
            waveGrad.addColorStop(1, 'rgba(2, 15, 40, 0.6)');
          }
          ox.fillStyle = waveGrad;
          ox.fill();

          // White foam crest
          ox.beginPath();
          ox.moveTo(waveX - waveW * 0.05, H - waveH * 0.95);
          ox.quadraticCurveTo(
            waveX + waveW * 0.15, H - waveH * 1.2,
            waveX + waveW * 0.32, H - waveH * 0.85
          );
          // Foam drips
          for (let f = 0; f < 5; f++) {
            const fx = waveX + waveW * (0.2 + f * 0.03);
            const fy = H - waveH * (0.85 - f * 0.08) + Math.sin(t * 0.008 + f * 2 + sw.phase) * 4;
            ox.lineTo(fx, fy);
            ox.lineTo(fx + waveW * 0.02, fy + 3);
          }
          ox.strokeStyle = isDay ? `rgba(255, 255, 255, ${sw.foam})` : `rgba(180, 210, 240, ${sw.foam * 0.7})`;
          ox.lineWidth = 3;
          ox.stroke();

          // Spray dots at the crest
          for (let s = 0; s < 8; s++) {
            const sx = waveX + waveW * (0.1 + Math.random() * 0.25);
            const sy = H - waveH * (0.9 + Math.random() * 0.3);
            const sr = Math.max(1, 1 + Math.random() * 3);
            ox.beginPath();
            ox.arc(sx, sy, sr, 0, Math.PI * 2);
            ox.fillStyle = isDay ? `rgba(255, 255, 255, ${0.3 + Math.random() * 0.4})` : `rgba(150, 190, 220, ${0.2 + Math.random() * 0.3})`;
            ox.fill();
          }
          ox.restore();
        }

        // Additional horizontal surf waves traveling across
        for (let w = 0; w < 3; w++) {
          const wy = H * (0.3 + w * 0.25);
          const wOff = (t * 0.003 + w * 2) % 1;
          ox.beginPath();
          for (let x = 0; x <= W; x += 3) {
            const yOff = Math.sin(x * 0.02 + t * 0.003 + w * 3) * (12 + w * 5) +
              Math.sin(x * 0.01 + t * 0.005 + w) * 8;
            if (x === 0) ox.moveTo(x, wy + yOff);
            else ox.lineTo(x, wy + yOff);
          }
          ox.strokeStyle = isDay
            ? `rgba(150, 220, 255, ${0.25 + Math.sin(t * 0.002 + w) * 0.1})`
            : `rgba(60, 120, 180, ${0.2 + Math.sin(t * 0.002 + w) * 0.08})`;
          ox.lineWidth = 3;
          ox.stroke();

          // Foam line on top of wave
          ox.beginPath();
          for (let x = 0; x <= W; x += 3) {
            const yOff = Math.sin(x * 0.02 + t * 0.003 + w * 3) * (12 + w * 5) +
              Math.sin(x * 0.01 + t * 0.005 + w) * 8 - 2;
            if (x === 0) ox.moveTo(x, wy + yOff);
            else ox.lineTo(x, wy + yOff);
          }
          ox.strokeStyle = isDay
            ? `rgba(255, 255, 255, ${0.15 + Math.sin(t * 0.003 + w * 1.5) * 0.08})`
            : `rgba(140, 180, 220, ${0.1 + Math.sin(t * 0.003 + w * 1.5) * 0.06})`;
          ox.lineWidth = 2;
          ox.stroke();
        }

        // Erase barrier ellipse
        ox.save();
        ox.globalCompositeOperation = 'destination-out';
        ox.beginPath();
        ox.ellipse(bCx, bCy, bRx + 5, bRy + 5, 0, 0, Math.PI * 2);
        ox.fill();
        ox.restore();

        // Composite onto main canvas
        ctx.globalAlpha = wl;
        ctx.drawImage(_sharkOsc, 0, 0);
        ctx.globalAlpha = 1;

        // Spray particles on water
        ctx.save();
        ctx.globalAlpha = wl;
        for (let i = 0; i < 40; i++) {
          const sx = (i * 97.3 + t * 0.03 + Math.sin(i * 3.1) * 60) % (W + 40) - 20;
          const sy = (i * 53.7 + t * 0.012 + Math.cos(i * 2.3) * 40) % (H + 40) - 20;
          const sdx = (sx - bCx) / (bRx + 10);
          const sdy = (sy - bCy) / (bRy + 10);
          if (sdx * sdx + sdy * sdy < 1) continue;
          const sparkle = Math.max(1, 2.5 + Math.sin(t * 0.005 + i * 2.1) * 2);
          if (sparkle > 1.5) {
            ctx.beginPath();
            ctx.arc(sx, sy, sparkle, 0, Math.PI * 2);
            ctx.fillStyle = isDay ? `rgba(255, 255, 255, ${0.4 + Math.sin(t * 0.006 + i) * 0.25})` : `rgba(120, 170, 220, ${0.25 + Math.sin(t * 0.006 + i) * 0.15})`;
            ctx.fill();
          }
        }
        ctx.restore();

        // Crashing waves against barrier
        ctx.save();
        ctx.globalAlpha = 0.9 * wl;
        // Barrier glow (stronger, more turbulent)
        ctx.strokeStyle = isDay ? 'rgba(180, 240, 255, 0.9)' : 'rgba(80, 150, 200, 0.8)';
        ctx.lineWidth = 5;
        ctx.shadowColor = isDay ? 'rgba(100, 200, 255, 0.9)' : 'rgba(40, 100, 180, 0.7)';
        ctx.shadowBlur = 30;
        ctx.beginPath();
        ctx.ellipse(bCx, bCy, bRx + 6, bRy + 6, 0, 0, Math.PI * 2);
        ctx.stroke();
        ctx.shadowBlur = 0;

        // Big foam splashes against barrier
        for (let a = 0; a < Math.PI * 2; a += 0.06) {
          const foamR = Math.max(1, 4 + Math.sin(a * 8 + t * 0.006) * 3 + Math.sin(a * 13 + t * 0.004) * 2);
          const splash = Math.max(0, Math.sin(a * 3 + t * 0.003)) * 8;
          const foamDist = bRx + 7 + foamR + splash + Math.sin(a * 5 + t * 0.005) * 4;
          const fx = bCx + Math.cos(a) * foamDist;
          const fy = bCy + Math.sin(a) * (foamDist * bRy / bRx);
          ctx.beginPath();
          ctx.arc(fx, fy, foamR, 0, Math.PI * 2);
          const foamAlpha = 0.5 + Math.sin(a * 7 + t * 0.005) * 0.25;
          ctx.fillStyle = isDay ? `rgba(240, 250, 255, ${foamAlpha})` : `rgba(100, 140, 180, ${foamAlpha * 0.7})`;
          ctx.fill();
        }
        ctx.restore();

        // Ripple rings around floating monsters (bigger, rougher)
        for (const fm of sharkFloatingMonsters) {
          if (!fm.eaten && monsters.includes(fm.monster)) {
            const m = fm.monster;
            ctx.save();
            ctx.globalAlpha = 0.6 * wl;
            ctx.strokeStyle = isDay ? 'rgba(200, 240, 255, 0.7)' : 'rgba(80, 120, 180, 0.6)';
            ctx.lineWidth = 2;
            for (let r = 0; r < 4; r++) {
              const rippleR = 15 + r * 16 + Math.sin(fm.timer * 0.06 + r) * 6;
              ctx.beginPath();
              ctx.ellipse(m.x, m.y + m.size * 0.3, rippleR, rippleR * 0.4, 0, 0, Math.PI * 2);
              ctx.stroke();
            }
            ctx.restore();
          }
        }
      }

      // Draw sharks - ferocious great whites
      for (const shark of sharkWaveSharks) {
        ctx.save();
        ctx.translate(shark.x, shark.y);
        ctx.rotate(shark.angle);

        const s = shark.size;
        const biting = shark.biteTimer > 0;
        const mouthOpen = biting ? 0.35 : 0.08; // jaw always slightly open

        // --- BODY: massive, muscular, flat snout ---
        ctx.beginPath();
        // Top profile: flat head then curves up to dorsal area
        ctx.moveTo(s * 1.2, -s * 0.05);
        ctx.lineTo(s * 0.85, -s * 0.18);
        ctx.quadraticCurveTo(s * 0.5, -s * 0.38, s * 0.1, -s * 0.4);
        ctx.quadraticCurveTo(-s * 0.3, -s * 0.38, -s * 0.7, -s * 0.2);
        ctx.lineTo(-s * 0.85, -s * 0.08);
        // Bottom profile: wide belly
        ctx.lineTo(-s * 0.85, s * 0.1);
        ctx.quadraticCurveTo(-s * 0.3, s * 0.42, s * 0.1, s * 0.45);
        ctx.quadraticCurveTo(s * 0.5, s * 0.42, s * 0.85, s * 0.22);
        ctx.lineTo(s * 1.2, s * 0.08);
        ctx.closePath();

        // Gradient from dark top to lighter underside
        const bodyGrad = ctx.createLinearGradient(0, -s * 0.4, 0, s * 0.45);
        bodyGrad.addColorStop(0, shark.color);
        bodyGrad.addColorStop(0.55, shark.color);
        bodyGrad.addColorStop(0.6, '#8a9aaa');
        bodyGrad.addColorStop(1, '#c8d4dd');
        ctx.fillStyle = bodyGrad;
        ctx.fill();
        ctx.strokeStyle = 'rgba(0,0,0,0.5)';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Scars / battle marks
        ctx.strokeStyle = 'rgba(180,190,200,0.3)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(s * 0.2, -s * 0.15);
        ctx.lineTo(s * 0.35, -s * 0.08);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(-s * 0.1, -s * 0.2);
        ctx.lineTo(s * 0.05, -s * 0.12);
        ctx.stroke();

        // --- DORSAL FIN: huge, jagged, iconic ---
        ctx.beginPath();
        ctx.moveTo(s * 0.15, -s * 0.38);
        ctx.lineTo(s * 0.08, -s * 1.0);
        ctx.quadraticCurveTo(s * 0.0, -s * 0.95, -s * 0.08, -s * 0.85);
        ctx.lineTo(-s * 0.2, -s * 0.36);
        ctx.closePath();
        ctx.fillStyle = shark.color;
        ctx.fill();
        ctx.strokeStyle = 'rgba(0,0,0,0.4)';
        ctx.lineWidth = 1.5;
        ctx.stroke();
        // Fin notch (battle damage)
        ctx.beginPath();
        ctx.moveTo(-s * 0.02, -s * 0.75);
        ctx.lineTo(s * 0.02, -s * 0.68);
        ctx.lineTo(-s * 0.06, -s * 0.7);
        ctx.fillStyle = daylight > 0.5 ? 'rgba(100,170,220,0.5)' : 'rgba(20,50,80,0.5)';
        ctx.fill();

        // --- TAIL: powerful crescent ---
        ctx.beginPath();
        ctx.moveTo(-s * 0.8, 0);
        ctx.quadraticCurveTo(-s * 1.1, -s * 0.2, -s * 1.5, -s * 0.6);
        ctx.quadraticCurveTo(-s * 1.15, -s * 0.12, -s * 0.95, 0);
        ctx.quadraticCurveTo(-s * 1.15, s * 0.18, -s * 1.4, s * 0.55);
        ctx.quadraticCurveTo(-s * 1.05, s * 0.15, -s * 0.8, 0);
        ctx.fillStyle = shark.color;
        ctx.fill();
        ctx.strokeStyle = 'rgba(0,0,0,0.3)';
        ctx.lineWidth = 1;
        ctx.stroke();

        // --- PECTORAL FINS: big, swept back ---
        ctx.beginPath();
        ctx.moveTo(s * 0.35, s * 0.25);
        ctx.quadraticCurveTo(s * 0.2, s * 0.65, -s * 0.05, s * 0.7);
        ctx.quadraticCurveTo(s * 0.0, s * 0.45, -s * 0.1, s * 0.28);
        ctx.closePath();
        ctx.fillStyle = shark.color;
        ctx.globalAlpha = 0.85;
        ctx.fill();
        ctx.globalAlpha = 1;

        // Second pectoral (other side, slightly visible)
        ctx.beginPath();
        ctx.moveTo(s * 0.35, -s * 0.22);
        ctx.quadraticCurveTo(s * 0.15, -s * 0.5, -s * 0.05, -s * 0.48);
        ctx.quadraticCurveTo(s * 0.0, -s * 0.35, -s * 0.1, -s * 0.25);
        ctx.closePath();
        ctx.fillStyle = shark.color;
        ctx.globalAlpha = 0.4;
        ctx.fill();
        ctx.globalAlpha = 1;

        // --- GILLS: deep slashes ---
        ctx.strokeStyle = 'rgba(0,0,0,0.35)';
        ctx.lineWidth = 1.5;
        for (let g = 0; g < 4; g++) {
          ctx.beginPath();
          const gx = s * (0.42 + g * 0.07);
          ctx.moveTo(gx, -s * 0.18);
          ctx.lineTo(gx + s * 0.02, s * 0.12);
          ctx.stroke();
        }

        // --- SNOUT: flat, blunt, menacing ---
        ctx.beginPath();
        ctx.moveTo(s * 1.2, -s * 0.05);
        ctx.quadraticCurveTo(s * 1.3, 0, s * 1.2, s * 0.08);
        ctx.strokeStyle = 'rgba(0,0,0,0.3)';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Nostrils
        ctx.fillStyle = 'rgba(0,0,0,0.4)';
        ctx.beginPath();
        ctx.ellipse(s * 1.05, -s * 0.08, s * 0.03, s * 0.015, -0.3, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(s * 1.05, s * 0.1, s * 0.03, s * 0.015, 0.3, 0, Math.PI * 2);
        ctx.fill();

        // --- EYE: small, black, dead-looking ---
        ctx.beginPath();
        ctx.ellipse(s * 0.72, -s * 0.14, s * 0.07, s * 0.05, 0, 0, Math.PI * 2);
        ctx.fillStyle = '#000';
        ctx.fill();
        // Tiny menacing glint
        ctx.beginPath();
        ctx.arc(s * 0.74, -s * 0.16, s * 0.02, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.fill();

        // --- MOUTH: always open, teeth visible, TERRIFYING ---
        // Upper jaw
        ctx.beginPath();
        ctx.moveTo(s * 1.2, -s * 0.05);
        ctx.lineTo(s * 0.7, -s * 0.02);
        ctx.lineTo(s * 0.7, -s * 0.05 - s * mouthOpen * 0.2);
        ctx.quadraticCurveTo(s * 0.95, -s * 0.05 - s * mouthOpen * 0.15, s * 1.2, -s * 0.05);
        ctx.fillStyle = '#660022';
        ctx.fill();

        // Lower jaw (drops down when biting)
        ctx.beginPath();
        ctx.moveTo(s * 1.2, s * 0.08);
        ctx.lineTo(s * 0.7, s * 0.06);
        ctx.lineTo(s * 0.7, s * 0.08 + s * mouthOpen);
        ctx.quadraticCurveTo(s * 0.95, s * 0.1 + s * mouthOpen * 0.8, s * 1.2, s * 0.08);
        ctx.fillStyle = '#880033';
        ctx.fill();

        // Gum line
        ctx.beginPath();
        ctx.moveTo(s * 1.18, s * 0.08);
        ctx.quadraticCurveTo(s * 0.95, s * 0.09 + s * mouthOpen * 0.6, s * 0.72, s * 0.07 + s * mouthOpen * 0.7);
        ctx.strokeStyle = '#cc3355';
        ctx.lineWidth = 1;
        ctx.stroke();

        // TEETH - always visible, triangular, serrated
        ctx.fillStyle = '#f0f0ee';
        ctx.strokeStyle = 'rgba(0,0,0,0.2)';
        ctx.lineWidth = 0.5;
        const teethCount = 7;
        for (let tt = 0; tt < teethCount; tt++) {
          const tp = tt / (teethCount - 1);
          const tx = s * (0.75 + tp * 0.42);
          const jawCurveTop = -s * 0.04 - s * mouthOpen * 0.15 * (1 - tp * 0.5);
          const jawCurveBot = s * 0.07 + s * mouthOpen * (0.6 + tp * 0.3);
          const toothH = s * (0.04 + mouthOpen * 0.3) * (1 - tp * 0.3);

          // Upper teeth (pointing down)
          ctx.beginPath();
          ctx.moveTo(tx - s * 0.02, jawCurveTop);
          ctx.lineTo(tx, jawCurveTop + toothH);
          ctx.lineTo(tx + s * 0.02, jawCurveTop);
          ctx.fill();
          ctx.stroke();

          // Lower teeth (pointing up)
          ctx.beginPath();
          ctx.moveTo(tx - s * 0.018, jawCurveBot);
          ctx.lineTo(tx, jawCurveBot - toothH * 0.8);
          ctx.lineTo(tx + s * 0.018, jawCurveBot);
          ctx.fill();
          ctx.stroke();
        }

        // Blood drip when biting
        if (biting) {
          ctx.fillStyle = 'rgba(180, 0, 20, 0.6)';
          for (let b = 0; b < 3; b++) {
            const bx = s * (0.85 + Math.random() * 0.3);
            const by = s * (0.15 + mouthOpen * 0.5 + Math.random() * 0.1);
            ctx.beginPath();
            ctx.ellipse(bx, by, 1.5, 2.5, 0, 0, Math.PI * 2);
            ctx.fill();
          }
        }

        // --- WAKE: turbulent water behind ---
        ctx.restore();
        ctx.save();
        if (Math.random() < 0.5) {
          ctx.globalAlpha = 0.4;
          for (let b = 0; b < 5; b++) {
            ctx.beginPath();
            const bx = shark.x - Math.cos(shark.angle) * (s * 1.8 + b * 10) + (Math.random() - 0.5) * 16;
            const by = shark.y - Math.sin(shark.angle) * (s * 1.8 + b * 10) + (Math.random() - 0.5) * 16;
            ctx.arc(bx, by, Math.max(1, 2 + Math.random() * 4), 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(200, 230, 255, 0.5)';
            ctx.fill();
          }
        }

        // Dorsal fin cutting through water + V-wake
        ctx.globalAlpha = 0.7 * sharkWaterLevel;
        const finTipX = shark.x + Math.cos(shark.angle - 0.05) * s * 0.08;
        const finTipY = shark.y - s * 0.5;
        // V-wake from dorsal fin
        ctx.beginPath();
        ctx.moveTo(finTipX, finTipY);
        ctx.lineTo(finTipX - Math.cos(shark.angle) * 30 - 12, finTipY + 8);
        ctx.moveTo(finTipX, finTipY);
        ctx.lineTo(finTipX - Math.cos(shark.angle) * 30 + 12, finTipY + 8);
        ctx.strokeStyle = 'rgba(255,255,255,0.35)';
        ctx.lineWidth = 2;
        ctx.stroke();
        // Splash at fin tip
        ctx.beginPath();
        ctx.arc(finTipX, finTipY, 3, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.fill();

        ctx.restore();
      }

      ctx.restore();
    }

    // ===== ULTRA BOOST =====
    function triggerUltraBoost() {
      if (!barrierActive || ultraBoostActive) return;
      ultraBoostActive = true;
      shakeAmount = 30;

      // Force all elements ON
      Object.keys(activeElements).forEach(el => { activeElements[el] = true; });
      document.querySelectorAll('.element-btn').forEach(btn => btn.classList.add('active'));

      // Visual feedback
      document.getElementById('btnUltraBoost').classList.add('ultra-active');
      document.getElementById('shieldStatus').textContent = '⚡ ULTRA BOOST ⚡';
      document.getElementById('shieldStatus').style.color = '#ff3300';
      document.getElementById('shieldStatus').style.borderColor = '#ff330088';
      document.getElementById('shieldStatus').style.boxShadow = '0 0 60px #ff330088, 0 0 120px #ffaa0044';

      // Screen flash
      const flash = document.getElementById('boostFlash');
      flash.classList.add('active');
      setTimeout(() => flash.classList.remove('active'), 300);

      // Activate super boost too
      superBoostActive = true;
      superBoostTimer = 600; // 10 seconds
      document.getElementById('btnSuperBoost').classList.add('boosting');

      // Spawn a big wave of monsters
      for (let i = 0; i < 20; i++) {
        const m = new Monster();
        const angle = (i / 20) * Math.PI * 2;
        const dist = barrierRadius + 60 + Math.random() * 100;
        m.x = centerX + Math.cos(angle) * dist;
        m.y = (centerY + 20) + Math.sin(angle) * dist * 0.55;
        monsters.push(m);
      }

      // Launch dragon immediately
      if (!metalWaveActive) {
        triggerMetalWave();
      }
      // Launch cobra
      if (!cobraActive) {
        setTimeout(() => { if (!cobraActive) triggerCobra(); }, 1500);
      }
      // Launch lightning storm
      if (!lightningActive) {
        setTimeout(() => { if (!lightningActive) triggerLightningStorm(); }, 800);
      }

      // Rapid water waves
      let ultraWaveCount = 0;
      const ultraWaveInterval = setInterval(() => {
        if (!ultraBoostActive || ultraWaveCount >= 12) {
          clearInterval(ultraWaveInterval);
          return;
        }
        // Spawn water waves in all directions
        for (let w = 0; w < 3; w++) {
          const wAngle = Math.random() * Math.PI * 2;
          waterWaves.push(new WaterWave(wAngle));
        }
        ultraWaveCount++;
      }, 400);

      // Rapid fire barrage from all barrier points
      let ultraFireCount = 0;
      const ultraFireInterval = setInterval(() => {
        if (!ultraBoostActive || ultraFireCount >= 30) {
          clearInterval(ultraFireInterval);
          return;
        }
        const targets = monsters.filter(m => m.state === 'approaching');
        if (targets.length > 0 && projectiles.length < 60) {
          // Fire ALL element types simultaneously at random targets
          const elements = ['fire', 'ice', 'electric', 'water', 'venom'];
          for (let e = 0; e < elements.length; e++) {
            const target = targets[Math.floor(Math.random() * targets.length)];
            const angle = Math.atan2(target.y - (centerY + 20), target.x - centerX);
            const bx = centerX + Math.cos(angle) * barrierRadius * 0.9;
            const by = (centerY + 20) + Math.sin(angle) * barrierRadius * 0.55 * 0.9;
            projectiles.push(new Projectile(bx, by, target.x + (Math.random() - 0.5) * 30, target.y + (Math.random() - 0.5) * 30, elements[e]));
          }
        }
        ultraFireCount++;
      }, 250);

      // Destroy nearby monsters with massive explosions over time
      let ultraDestroyCount = 0;
      const ultraDestroyInterval = setInterval(() => {
        if (!ultraBoostActive || ultraDestroyCount >= 15) {
          clearInterval(ultraDestroyInterval);
          return;
        }
        // Hit closest approaching monster
        const approaching = monsters.filter(m => m.state === 'approaching');
        if (approaching.length > 0) {
          const m = approaching[0];
          m.state = 'hit';
          m.hitTime = performance.now();
          const angle = Math.atan2(m.y - (centerY + 20), m.x - centerX);
          m.flyVx = Math.cos(angle) * (18 + Math.random() * 12);
          m.flyVy = Math.sin(angle) * (18 + Math.random() * 12) - 15;
          m.flyRotSpeed = (Math.random() - 0.5) * 0.6;
          monstersDefeated++;
          document.getElementById('monsterCount').textContent = monstersDefeated;
          shakeAmount = Math.max(shakeAmount, 15);

          // Massive multi-element explosion
          for (let j = 0; j < 40; j++) {
            impactParticles.push(new ImpactParticle(
              m.x + (Math.random() - 0.5) * 40,
              m.y + (Math.random() - 0.5) * 40,
              ['rgba(255,0,0,1)', 'rgba(255,150,0,1)', 'rgba(255,255,0,1)', 'rgba(0,255,136,1)', 'rgba(0,200,255,1)', 'rgba(170,0,255,1)', 'rgba(255,200,0,1)'][Math.floor(Math.random() * 7)]
            ));
          }
          spaceTexts.push(new SpaceText(m.x, m.y - 30));
        }
        ultraDestroyCount++;
      }, 350);

      // Spawn more monsters mid-fight for dramatic effect
      setTimeout(() => {
        if (!ultraBoostActive) return;
        for (let i = 0; i < 10; i++) {
          const m = new Monster();
          const angle = Math.random() * Math.PI * 2;
          const dist = barrierRadius + 80 + Math.random() * 120;
          m.x = centerX + Math.cos(angle) * dist;
          m.y = (centerY + 20) + Math.sin(angle) * dist * 0.55;
          monsters.push(m);
        }
      }, 3000);

      // Second dragon wave if first has finished
      setTimeout(() => {
        if (ultraBoostActive && !metalWaveActive) {
          triggerMetalWave();
        }
      }, 5000);

      // Ultra boost duration: 10 seconds
      setTimeout(() => {
        ultraBoostActive = false;
        superBoostActive = false;
        document.getElementById('btnUltraBoost').classList.remove('ultra-active');
        document.getElementById('btnSuperBoost').classList.remove('boosting');
        document.getElementById('shieldStatus').textContent = 'Bouclier Actif';
        document.getElementById('shieldStatus').style.color = '';
        document.getElementById('shieldStatus').style.borderColor = '';
        document.getElementById('shieldStatus').style.boxShadow = '';
      }, 10000);

      // Sound: epic layered sound
      try {
        const actx = new (window.AudioContext || window.webkitAudioContext)();
        // Deep bass rumble
        const bass = actx.createOscillator();
        bass.type = 'sawtooth';
        bass.frequency.setValueAtTime(30, actx.currentTime);
        bass.frequency.linearRampToValueAtTime(60, actx.currentTime + 2);
        bass.frequency.linearRampToValueAtTime(100, actx.currentTime + 5);
        const bg = actx.createGain();
        bg.gain.setValueAtTime(0.25, actx.currentTime);
        bg.gain.linearRampToValueAtTime(0.15, actx.currentTime + 8);
        bg.gain.linearRampToValueAtTime(0, actx.currentTime + 10);
        bass.connect(bg);
        bg.connect(actx.destination);
        bass.start();
        bass.stop(actx.currentTime + 10);
        // High energy whine
        const whine = actx.createOscillator();
        whine.type = 'sine';
        whine.frequency.setValueAtTime(400, actx.currentTime);
        whine.frequency.linearRampToValueAtTime(1200, actx.currentTime + 3);
        whine.frequency.linearRampToValueAtTime(600, actx.currentTime + 8);
        const wg = actx.createGain();
        wg.gain.setValueAtTime(0.08, actx.currentTime);
        wg.gain.linearRampToValueAtTime(0.12, actx.currentTime + 3);
        wg.gain.linearRampToValueAtTime(0, actx.currentTime + 10);
        whine.connect(wg);
        wg.connect(actx.destination);
        whine.start();
        whine.stop(actx.currentTime + 10);
        setTimeout(() => actx.close(), 11000);
      } catch(e) {}
    }

    // Initial button state
    document.getElementById('btnDeactivate').style.display = 'none';
    document.getElementById('btnSuperBoost').style.display = 'none';
    document.getElementById('btnMetalWave').style.display = 'none';
    document.getElementById('btnUltraBoost').style.display = 'none';
    document.getElementById('btnLightning').style.display = 'none';
    document.getElementById('btnFishWave').style.display = 'none';
    document.getElementById('btnSharkWave').style.display = 'none';

    // Element selector - click handler with sound feedback
    function playToggleSound(on) {
      initAudio();
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'sine';
      if (on) {
        osc.frequency.setValueAtTime(400, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.1);
      } else {
        osc.frequency.setValueAtTime(600, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.1);
      }
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.15);
    }

    document.querySelectorAll('.element-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const el = btn.dataset.element;
        activeElements[el] = !activeElements[el];
        btn.classList.toggle('active');
        playToggleSound(activeElements[el]);
      });
    });

    // ===== MOON & SUN =====
    function drawMoon(t) {
      const { hour, month } = getMontrealTime();
      const sunTimes = [
        [7.5, 16.5], [7.0, 17.3], [6.3, 18.0], [6.2, 19.5],
        [5.5, 20.3], [5.2, 20.8], [5.3, 20.7], [5.8, 20.0],
        [6.5, 19.0], [7.1, 18.0], [6.7, 16.5], [7.3, 16.2]
      ];
      const [sunrise, sunset] = sunTimes[month];
      const dayLen = sunset - sunrise;

      // Sun travels along an arc from east (left) to west (right)
      const sunProgress = Math.max(0, Math.min(1, (hour - sunrise) / dayLen)); // 0=sunrise, 1=sunset
      // Arc: x goes from 15% to 85% of width, y follows inverted parabola (highest at noon)
      const sx = W * (0.15 + sunProgress * 0.7);
      const sy = H * (0.55 - 0.45 * Math.sin(sunProgress * Math.PI)); // parabolic arc, peaks at 10% height

      // Sun color shifts: whiter at noon, more orange near horizon
      const horizonProximity = Math.min(sunProgress, 1 - sunProgress) * 2; // 0=horizon, 1=noon
      const sunR = 40;

      if (daylight >= 0.15) {
        // Draw sun — dimmed by cloud cover
        const ccNow = weatherSmooth.cloudCover / 100;
        const sunAlpha = Math.min(1, daylight * 2.5) * (1 - ccNow * 0.85); // nearly invisible at 100% clouds
        if (sunAlpha > 0.02) {
        ctx.save();
        ctx.globalAlpha = sunAlpha;

        // Outer glow — larger and more orange near horizon
        const glowSize = sunR * (3 + (1 - horizonProximity) * 2);
        const glowR = Math.round(255);
        const glowG = Math.round(200 + horizonProximity * 30);
        const glowB = Math.round(50 + horizonProximity * 50);
        const sunOuter = ctx.createRadialGradient(sx, sy, sunR * 0.5, sx, sy, glowSize);
        sunOuter.addColorStop(0, `rgba(${glowR}, ${glowG}, ${glowB}, 0.35)`);
        sunOuter.addColorStop(0.5, `rgba(${glowR}, ${glowG}, ${glowB}, 0.1)`);
        sunOuter.addColorStop(1, `rgba(${glowR}, ${glowG}, ${glowB}, 0)`);
        ctx.beginPath();
        ctx.arc(sx, sy, glowSize, 0, Math.PI * 2);
        ctx.fillStyle = sunOuter;
        ctx.fill();

        // Sun body — yellower at zenith, orangish at horizon
        const bodyR = 255;
        const bodyG = Math.round(220 + horizonProximity * 35);
        const bodyB = Math.round(50 + horizonProximity * 100);
        const sunGrad = ctx.createRadialGradient(sx - 5, sy - 5, 0, sx, sy, sunR);
        sunGrad.addColorStop(0, `rgb(255, ${bodyG + 20}, ${bodyB + 80})`);
        sunGrad.addColorStop(0.4, `rgb(${bodyR}, ${bodyG}, ${bodyB})`);
        sunGrad.addColorStop(0.8, `rgb(${bodyR}, ${Math.max(bodyG - 30, 150)}, ${Math.max(bodyB - 40, 0)})`);
        sunGrad.addColorStop(1, `rgb(${bodyR}, ${Math.max(bodyG - 60, 120)}, 0)`);
        ctx.beginPath();
        ctx.arc(sx, sy, sunR, 0, Math.PI * 2);
        ctx.fillStyle = sunGrad;
        ctx.fill();

        // Sun rays — more visible at low sun
        const rayAlpha = 0.2 + (1 - horizonProximity) * 0.2;
        ctx.strokeStyle = `rgba(255, 220, 50, ${rayAlpha})`;
        ctx.lineWidth = 2;
        for (let i = 0; i < 12; i++) {
          const a = (i / 12) * Math.PI * 2 + t * 0.0005;
          const r1 = sunR + 8;
          const r2 = sunR + 18 + Math.sin(t * 0.003 + i) * 5;
          ctx.beginPath();
          ctx.moveTo(sx + Math.cos(a) * r1, sy + Math.sin(a) * r1);
          ctx.lineTo(sx + Math.cos(a) * r2, sy + Math.sin(a) * r2);
          ctx.stroke();
        }
        ctx.restore();
        } // end sunAlpha > 0.02
      }

      // Moon — visible when daylight < 0.5, hidden by clouds
      if (daylight < 0.5) {
        const ccNow = weatherSmooth.cloudCover / 100;
        const moonAlpha = Math.min(1, (0.5 - daylight) * 3) * (1 - ccNow * 0.95); // nearly invisible when overcast
        const mx = W * 0.82;
        const my = H * 0.12;
        const mr = 35;
        ctx.save();
        ctx.globalAlpha = moonAlpha;
        ctx.shadowColor = 'rgba(200, 220, 255, 0.5)';
        ctx.shadowBlur = 40;
        const moonGrad = ctx.createRadialGradient(mx - 5, my - 5, 0, mx, my, mr);
        moonGrad.addColorStop(0, '#ffffee');
        moonGrad.addColorStop(0.7, '#dde0cc');
        moonGrad.addColorStop(1, '#bbbbaa');
        ctx.beginPath();
        ctx.arc(mx, my, mr, 0, Math.PI * 2);
        ctx.fillStyle = moonGrad;
        ctx.fill();
        // Craters
        ctx.fillStyle = 'rgba(150, 150, 130, 0.3)';
        [[5, -8, 6], [-10, 5, 4], [8, 10, 3], [-5, -12, 5]].forEach(([ox, oy, r]) => {
          ctx.beginPath();
          ctx.arc(mx + ox, my + oy, r, 0, Math.PI * 2);
          ctx.fill();
        });
        ctx.shadowBlur = 0;
        ctx.restore();
      }
    }

    // ===== MAIN LOOP =====
    function gameLoop(t) {
      try {
      // Smoothly interpolate weather values (avoid sudden changes)
      const wLerp = 0.02; // slow interpolation
      weatherSmooth.cloudCover += (weather.cloudCover - weatherSmooth.cloudCover) * wLerp;
      weatherSmooth.precipitation += (weather.precipitation - weatherSmooth.precipitation) * wLerp;
      weatherSmooth.visibility += (weather.visibility - weatherSmooth.visibility) * wLerp;
      weatherSmooth.weatherCode = weather.weatherCode; // codes don't interpolate
      const cc = weatherSmooth.cloudCover / 100; // 0-1 cloud cover fraction

      // Screen shake
      ctx.save();
      if (shakeAmount > 0) {
        ctx.translate(
          (Math.random() - 0.5) * shakeAmount,
          (Math.random() - 0.5) * shakeAmount
        );
        shakeAmount *= 0.9;
        if (shakeAmount < 0.5) shakeAmount = 0;
      }

      // Background gradient - dynamic sky based on Montreal time with detailed phases
      const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
      const sp = skyPhase;

      // Sky color palettes for each phase
      const skyPalettes = {
        night:        { top: [2, 0, 16],    mid: [10, 0, 32],   low: [15, 10, 37],  bot: [5, 5, 16] },
        blueHour:     { top: [15, 10, 50],  mid: [25, 20, 65],  low: [40, 30, 70],  bot: [20, 15, 45] },
        dawn:         { top: [40, 25, 75],  mid: [90, 50, 80],  low: [180, 100, 60], bot: [140, 70, 50] },
        goldenHour:   { top: [80, 120, 180],mid: [130, 160, 200],low: [200, 160, 100],bot: [170, 130, 80] },
        day:          { top: [100, 160, 220],mid: [140, 195, 240],low: [180, 210, 235],bot: [120, 160, 200] },
        goldenHourPM: { top: [90, 130, 190],mid: [140, 140, 170],low: [210, 140, 80], bot: [180, 110, 60] },
        dusk:         { top: [50, 30, 80],  mid: [100, 50, 75],  low: [180, 90, 55],  bot: [130, 60, 45] },
        blueHourPM:   { top: [20, 12, 55],  mid: [30, 22, 68],   low: [50, 35, 70],   bot: [25, 18, 48] }
      };

      // Determine which two palettes to blend between
      const phaseOrder = ['night', 'blueHour', 'dawn', 'goldenHour', 'day', 'goldenHourPM', 'dusk', 'blueHourPM', 'night'];
      const phaseIdx = phaseOrder.indexOf(sp.phase);
      const fromPalette = skyPalettes[sp.phase] || skyPalettes.night;
      const nextPhase = phaseOrder[phaseIdx + 1] || 'night';
      const toPalette = skyPalettes[nextPhase] || skyPalettes.night;
      const p = sp.progress;

      // Apply weather: blend sky toward overcast gray based on cloud cover
      const overcastDay = [140, 145, 150];   // gray overcast during day
      const overcastNight = [20, 20, 28];    // dark overcast at night
      const overcast = lerpColor(overcastNight, overcastDay, daylight);
      const cloudGray = cc * 0.7; // how much to gray-out (max 70% at 100% clouds)

      let skyTop = lerpColor(fromPalette.top, toPalette.top, p);
      let skyMid = lerpColor(fromPalette.mid, toPalette.mid, p);
      let skyLow = lerpColor(fromPalette.low, toPalette.low, p);
      let skyBot = lerpColor(fromPalette.bot, toPalette.bot, p);
      skyTop = lerpColor(skyTop, overcast, cloudGray);
      skyMid = lerpColor(skyMid, overcast, cloudGray);
      skyLow = lerpColor(skyLow, overcast, cloudGray * 0.8);
      skyBot = lerpColor(skyBot, overcast, cloudGray * 0.6);
      bgGrad.addColorStop(0, `rgb(${skyTop})`);
      bgGrad.addColorStop(0.4, `rgb(${skyMid})`);
      bgGrad.addColorStop(0.7, `rgb(${skyLow})`);
      bgGrad.addColorStop(1, `rgb(${skyBot})`);

      ctx.fillStyle = bgGrad;
      ctx.fillRect(0, 0, W, H);

      // Horizon glow during golden hours and dawn/dusk (suppressed by clouds)
      const glowPhases = ['dawn', 'goldenHour', 'goldenHourPM', 'dusk'];
      if (glowPhases.includes(sp.phase) && cc < 0.8) {
        const glowIntensity = sp.phase === 'dawn' || sp.phase === 'dusk' ? 0.25 : 0.15;
        const glowAlpha = glowIntensity * (sp.phase === 'goldenHour' ? (1 - p) : sp.phase === 'goldenHourPM' ? p : 1) * (1 - cc);
        const glowColor = sp.phase === 'dawn' || sp.phase === 'goldenHour'
          ? `rgba(255, 180, 80, ${glowAlpha})`
          : `rgba(255, 120, 60, ${glowAlpha})`;
        const glowGrad = ctx.createRadialGradient(W * 0.5, H * 0.75, 0, W * 0.5, H * 0.75, W * 0.7);
        glowGrad.addColorStop(0, glowColor);
        glowGrad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = glowGrad;
        ctx.fillRect(0, 0, W, H);
      }

      // Fog overlay
      if (isFoggy(weatherSmooth.weatherCode) || weatherSmooth.visibility < 5000) {
        const fogDensity = isFoggy(weatherSmooth.weatherCode) ? 0.4 : Math.max(0, 0.3 * (1 - weatherSmooth.visibility / 5000));
        const fogColor = daylight > 0.5 ? `rgba(180, 185, 190, ${fogDensity})` : `rgba(60, 65, 75, ${fogDensity})`;
        ctx.fillStyle = fogColor;
        ctx.fillRect(0, 0, W, H);
      }

      // Aurora effect when barrier active
      if (activationProgress > 0) {
        for (let i = 0; i < 3; i++) {
          const ay = H * 0.1 + i * 30;
          ctx.beginPath();
          ctx.moveTo(0, ay);
          for (let x = 0; x < W; x += 20) {
            ctx.lineTo(x, ay + Math.sin(x * 0.005 + t * 0.001 + i) * 30);
          }
          ctx.lineTo(W, ay + 60);
          ctx.lineTo(0, ay + 60);
          ctx.closePath();
          const auroraColors = ['rgba(0, 255, 136, ', 'rgba(0, 150, 255, ', 'rgba(150, 0, 255, '];
          ctx.fillStyle = auroraColors[i] + (activationProgress * 0.03 * (1 - daylight * 0.7)) + ')';
          ctx.fill();
        }
      }

      // Stars — hidden by cloud cover
      if (cc < 0.9) {
        ctx.save();
        ctx.globalAlpha = 1 - cc; // fade stars with cloud cover
        stars.forEach(s => s.draw(t));
        ctx.restore();
      }

      // Clouds — driven by real weather cloud cover
      // At cc=0 show 1-2 wisps, at cc=0.5 show 5-6, at cc=1.0 show dense overcast (12+)
      const numClouds = Math.max(1, Math.floor(cc * 14) + 1);
      if (numClouds > 0) {
        // Cloud tint: white during day, gray when overcast, pink/orange at dawn/dusk, dark at night
        const isGolden = sp.phase === 'dawn' || sp.phase === 'goldenHour' || sp.phase === 'goldenHourPM' || sp.phase === 'dusk';
        const isNightPhase = sp.phase === 'night' || sp.phase === 'blueHour' || sp.phase === 'blueHourPM';

        let cloudBaseColor;
        if (isNightPhase) {
          cloudBaseColor = lerpColor([40, 40, 55], [25, 25, 35], cc); // dark clouds at night
        } else if (isGolden) {
          const goldenTint = sp.phase === 'dawn' || sp.phase === 'dusk' ? [255, 160, 120] : [255, 200, 170];
          cloudBaseColor = lerpColor(goldenTint, [170, 165, 160], cc); // golden → gray when overcast
        } else {
          cloudBaseColor = lerpColor([240, 240, 245], [160, 160, 165], cc); // white → gray
        }
        const [clR, clG, clB] = cloudBaseColor;

        // Cloud opacity: wispy when few, thick when overcast
        const cloudOpacity = isNightPhase
          ? Math.min(0.6, 0.15 + cc * 0.5)
          : Math.min(0.85, 0.2 + cc * 0.65);

        // Generate deterministic clouds based on index
        for (let i = 0; i < numClouds; i++) {
          const seed = i * 137.508; // golden angle for spread
          const baseX = (seed % 1.2);
          const baseY = 0.04 + (seed * 7.3 % 0.22);
          const cw = 60 + (seed * 3.7 % 50) + cc * 30; // wider when overcast
          const ch = 18 + (seed * 2.3 % 16) + cc * 10;
          const speed = 0.005 + (seed * 1.1 % 0.008);

          const cx = ((baseX + t * speed * 0.001) % 1.4 - 0.2) * W;
          const cy = baseY * H;
          ctx.save();
          ctx.globalAlpha = cloudOpacity;
          const cGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, cw * 0.6);
          cGrad.addColorStop(0, `rgba(${clR}, ${clG}, ${clB}, 0.9)`);
          cGrad.addColorStop(0.6, `rgba(${clR}, ${clG}, ${clB}, 0.5)`);
          cGrad.addColorStop(1, `rgba(${clR}, ${clG}, ${clB}, 0)`);
          ctx.fillStyle = cGrad;
          ctx.beginPath();
          ctx.ellipse(cx, cy, cw * 0.6, ch * 0.5, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.ellipse(cx - cw * 0.3, cy + 3, cw * 0.4, ch * 0.45, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.ellipse(cx + cw * 0.35, cy + 2, cw * 0.45, ch * 0.4, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
      }

      // Moon & Sun
      drawMoon(t);

      // ===== PRECIPITATION (rain/snow) =====
      const wCode = weatherSmooth.weatherCode;
      const precipActive = isRaining(wCode) || isSnowing(wCode) || isThunderstorm(wCode);
      if (precipActive) {
        const isSnow = isSnowing(wCode);
        const intensity = weatherSmooth.precipitation > 5 ? 1 : weatherSmooth.precipitation > 1 ? 0.6 : 0.3;
        const targetCount = Math.floor(MAX_PRECIP * intensity);

        // Spawn particles
        while (precipParticles.length < targetCount) {
          precipParticles.push({
            x: Math.random() * W * 1.2 - W * 0.1,
            y: -Math.random() * H * 0.3,
            speed: isSnow ? 1 + Math.random() * 2 : 6 + Math.random() * 8,
            size: isSnow ? 2 + Math.random() * 3 : 1 + Math.random(),
            drift: isSnow ? (Math.random() - 0.5) * 1.5 : (Math.random() - 0.5) * 2,
            wobble: Math.random() * Math.PI * 2
          });
        }

        // Update & draw
        for (let i = precipParticles.length - 1; i >= 0; i--) {
          const pp = precipParticles[i];
          pp.y += pp.speed;
          pp.x += pp.drift;
          if (isSnow) pp.x += Math.sin(pp.wobble + t * 0.003) * 0.3;

          if (pp.y > H || pp.x < -20 || pp.x > W + 20) {
            precipParticles.splice(i, 1);
            continue;
          }

          ctx.save();
          if (isSnow) {
            ctx.globalAlpha = 0.8;
            ctx.fillStyle = '#e8eef5';
            ctx.beginPath();
            ctx.arc(pp.x, pp.y, pp.size, 0, Math.PI * 2);
            ctx.fill();
          } else {
            // Rain streak
            ctx.globalAlpha = 0.4;
            ctx.strokeStyle = daylight > 0.5 ? '#8899bb' : '#5566aa';
            ctx.lineWidth = pp.size;
            ctx.beginPath();
            ctx.moveTo(pp.x, pp.y);
            ctx.lineTo(pp.x + pp.drift * 2, pp.y + pp.speed * 2.5);
            ctx.stroke();
          }
          ctx.restore();
        }
      } else {
        precipParticles.length = 0; // clear when no precipitation
      }

      // Lightning flash during thunderstorms
      if (isThunderstorm(wCode) && Math.random() < 0.003) {
        ctx.save();
        ctx.fillStyle = 'rgba(255, 255, 240, 0.25)';
        ctx.fillRect(0, 0, W, H);
        ctx.restore();
      }

      // House
      drawHouse();

      // Barrier activation animation
      if (barrierActive && activationProgress < 1) {
        activationProgress += 0.02;
      }

      // Barrier
      drawBarrier(t);

      // Metal wave (drawn behind monsters, on top of barrier)
      updateMetalWave(t);
      drawMetalWave(t);

      // Cobra venimeux
      updateCobra(t);
      drawCobra(t);

      // Lightning storm (update here, draw after monsters so bolts are on top)
      updateLightningStorm();

      // Fish wave
      updateFishWave(t);
      // Shark wave
      updateSharkWave(t);

      // Spawn monsters, fire projectiles, and water waves
      spawnMonster(t);
      barrierAutoFire(t);
      trySpawnWaterWave(t);

      // Update and draw monsters
      for (let i = monsters.length - 1; i >= 0; i--) {
        monsters[i].update(t);
        // Skip drawing caught/venom monsters - their systems handle rendering
        if (monsters[i].state !== 'caught' && monsters[i].state !== 'venom' && monsters[i].state !== 'venomDead') {
          monsters[i].draw(t);
        }

        // Spawn space text on hit
        if (monsters[i].state === 'hit' && t - monsters[i].hitTime < 20) {
          spaceTexts.push(new SpaceText(monsters[i].x, monsters[i].y - 30));
          // Impact particles
          for (let j = 0; j < 20; j++) {
            impactParticles.push(new ImpactParticle(
              monsters[i].x,
              monsters[i].y,
              ['rgba(255,100,0,1)', 'rgba(0,200,255,1)', 'rgba(255,255,0,1)', 'rgba(170,0,255,1)'][Math.floor(Math.random() * 4)]
            ));
          }
        }

        // Don't remove caught/venom monsters - their systems handle lifecycle
        if (monsters[i].state === 'caught' || monsters[i].state === 'venom' || monsters[i].state === 'venomDead' || monsters[i].state === 'floating') continue;
        if (monsters[i].opacity <= 0 || monsters[i].y < -200 || monsters[i].x < -200 || monsters[i].x > W + 200) {
          monsters.splice(i, 1);
        }
      }

      // Update and draw projectiles + check collision with monsters
      for (let i = projectiles.length - 1; i >= 0; i--) {
        projectiles[i].update();
        projectiles[i].draw();
        // Check collision with approaching monsters
        for (let j = monsters.length - 1; j >= 0; j--) {
          if (monsters[j].state !== 'approaching') continue;
          const dx = projectiles[i].x - monsters[j].x;
          const dy = projectiles[i].y - monsters[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < monsters[j].size + projectiles[i].size) {
            // Element-specific hit effects
            spawnElementHitEffect(projectiles[i].x, projectiles[i].y, projectiles[i].element, monsters[j]);
            projectiles[i].life = 0;
            break;
          }
        }
        if (projectiles[i].life <= 0) projectiles.splice(i, 1);
      }

      // Update and draw water waves
      for (let i = waterWaves.length - 1; i >= 0; i--) {
        waterWaves[i].update();
        waterWaves[i].draw();
        if (waterWaves[i].life <= 0) waterWaves.splice(i, 1);
      }

      // Fish wave flood (drawn over everything, clipped outside barrier)
      drawFishWave(t);
      // Shark wave (drawn over everything, with surf waves)
      drawSharkWave(t);

      // Lightning storm (drawn on top of everything)
      drawLightningStorm(t);

      // Impact particles
      for (let i = impactParticles.length - 1; i >= 0; i--) {
        impactParticles[i].update();
        impactParticles[i].draw();
        if (impactParticles[i].life <= 0) impactParticles.splice(i, 1);
      }

      // Space texts
      for (let i = spaceTexts.length - 1; i >= 0; i--) {
        spaceTexts[i].update();
        spaceTexts[i].draw();
        if (spaceTexts[i].life <= 0) spaceTexts.splice(i, 1);
      }

      ctx.restore();
      } catch(e) { console.error('gameLoop error:', e); }
      requestAnimationFrame(gameLoop);
    }

    requestAnimationFrame(gameLoop);

    // Handle window resize for stars
    window.addEventListener('resize', () => {
      stars.forEach(s => { s.x = Math.random() * W; s.y = Math.random() * H; });
    });

    // ===== SOUND EFFECTS (Web Audio API) =====
    let audioCtx = null;

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
    }

    function playActivationSound() {
      initAudio();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(200, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.5);
      osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.8);
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 1);

      // Second harmonic
      const osc2 = audioCtx.createOscillator();
      const gain2 = audioCtx.createGain();
      osc2.connect(gain2);
      gain2.connect(audioCtx.destination);
      osc2.type = 'triangle';
      osc2.frequency.setValueAtTime(400, audioCtx.currentTime);
      osc2.frequency.exponentialRampToValueAtTime(1600, audioCtx.currentTime + 0.6);
      gain2.gain.setValueAtTime(0.08, audioCtx.currentTime);
      gain2.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.8);
      osc2.start(audioCtx.currentTime);
      osc2.stop(audioCtx.currentTime + 0.8);
    }

    function playDeactivationSound() {
      initAudio();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(800, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.6);
      gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.7);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.7);
    }

    function playImpactSound() {
      initAudio();
      // Zap sound
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(600 + Math.random() * 400, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.15);
      gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.2);

      // Noise burst
      const bufferSize = audioCtx.sampleRate * 0.1;
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 3);
      }
      const noise = audioCtx.createBufferSource();
      noise.buffer = buffer;
      const noiseGain = audioCtx.createGain();
      noise.connect(noiseGain);
      noiseGain.connect(audioCtx.destination);
      noiseGain.gain.setValueAtTime(0.06, audioCtx.currentTime);
      noiseGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
      noise.start(audioCtx.currentTime);
    }

    // Add sound to barrier hum
    let humOsc = null;
    let humGain = null;

    function startBarrierHum() {
      initAudio();
      if (humOsc) return;
      humOsc = audioCtx.createOscillator();
      humGain = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = 200;
      humOsc.connect(filter);
      filter.connect(humGain);
      humGain.connect(audioCtx.destination);
      humOsc.type = 'sine';
      humOsc.frequency.value = 60;
      humGain.gain.setValueAtTime(0, audioCtx.currentTime);
      humGain.gain.linearRampToValueAtTime(0.04, audioCtx.currentTime + 1);
      humOsc.start();
    }

    function stopBarrierHum() {
      if (humOsc && humGain) {
        humGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
        setTimeout(() => {
          try { humOsc.stop(); } catch(e) {}
          humOsc = null;
          humGain = null;
        }, 600);
      }
    }

    // Patch activation functions with sound
    const origActivate = activateBarrier;
    activateBarrier = function() {
      origActivate();
      playActivationSound();
      startBarrierHum();
    };

    const origDeactivate = deactivateBarrier;
    deactivateBarrier = function() {
      origDeactivate();
      playDeactivationSound();
      stopBarrierHum();
    };

    // Patch impact with sound
    const origSpawnProjectiles = spawnProjectiles;
    spawnProjectiles = function(tx, ty, angle) {
      origSpawnProjectiles(tx, ty, angle);
      playImpactSound();
    };

    // Super boost sound
    function playSuperBoostSound() {
      initAudio();
      if (!audioCtx) return;
      // Rising power chord
      [200, 300, 400, 500, 700, 900, 1200].forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = i < 3 ? 'sawtooth' : 'sine';
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime + i * 0.08);
        osc.frequency.exponentialRampToValueAtTime(freq * 2, audioCtx.currentTime + i * 0.08 + 0.3);
        gain.gain.setValueAtTime(0, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.06, audioCtx.currentTime + i * 0.08);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.08 + 0.5);
        osc.start(audioCtx.currentTime + i * 0.08);
        osc.stop(audioCtx.currentTime + i * 0.08 + 0.5);
      });
      // Big boom
      const bufferSize = audioCtx.sampleRate * 0.5;
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 2) * 0.5;
      }
      const noise = audioCtx.createBufferSource();
      noise.buffer = buffer;
      const nGain = audioCtx.createGain();
      const nFilter = audioCtx.createBiquadFilter();
      nFilter.type = 'lowpass';
      nFilter.frequency.value = 300;
      noise.connect(nFilter);
      nFilter.connect(nGain);
      nGain.connect(audioCtx.destination);
      nGain.gain.setValueAtTime(0, audioCtx.currentTime);
      nGain.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + 0.3);
      nGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.5);
      noise.start(audioCtx.currentTime + 0.3);
    }

    // Patch super boost with sound
    const origTriggerSuperBoost = triggerSuperBoost;
    triggerSuperBoost = function() {
      origTriggerSuperBoost();
      playSuperBoostSound();
    };

    // First click to enable audio context
    document.addEventListener('click', initAudio, { once: true });

  </script>
</body>
</html>
