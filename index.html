<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barriere Magnetique Elementaire 3D - Protection Maison</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;600&display=swap');
    body { overflow: hidden; background: #000; font-family: 'Exo 2', sans-serif; }
    canvas { display: block; }

    #overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 10;
    }

    .shield-status {
      position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
      font-family: 'Orbitron', monospace; font-size: clamp(10px, 1.8vw, 14px);
      font-weight: 700; letter-spacing: 3px; padding: 8px 24px;
      border-radius: 30px; z-index: 20; pointer-events: none;
    }
    .shield-status.inactive { background: rgba(255,30,30,0.15); color: #ff4444; border: 1px solid #ff444444; }
    .shield-status.active { background: rgba(0,255,136,0.15); color: #00ff88; border: 1px solid #00ff8844; }

    .title-area {
      position: fixed; top: 40px; left: 50%; transform: translateX(-50%);
      text-align: center; pointer-events: none; z-index: 20;
    }
    .title-area h1 {
      font-family: 'Orbitron', monospace; font-size: clamp(14px, 3vw, 22px);
      font-weight: 900;
      background: linear-gradient(90deg, #00c6ff, #ff00e5, #ffaa00, #00ff88);
      background-size: 300% 300%; -webkit-background-clip: text;
      -webkit-text-fill-color: transparent; background-clip: text;
      animation: gradientShift 4s ease infinite; letter-spacing: 2px;
    }
    .title-area p { font-size: 11px; color: #8899bb; margin-top: 4px; letter-spacing: 1px; }
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .info-panel {
      position: fixed; left: 15px; top: 50%; transform: translateY(-50%);
      z-index: 20; pointer-events: none;
    }
    .info-panel .label { font-family: 'Orbitron', monospace; font-size: 10px; color: #00ff88; letter-spacing: 2px; }
    .info-panel .count { font-family: 'Orbitron', monospace; font-size: 32px; color: #ff6600; }
    .info-panel .sub { font-size: 10px; color: #00ff88; letter-spacing: 1px; }

    .controls {
      position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
      display: flex; flex-wrap: wrap; justify-content: center; gap: 8px;
      pointer-events: all; z-index: 20; max-width: 95vw; padding: 0 10px;
    }
    .btn {
      font-family: 'Orbitron', monospace; font-size: clamp(8px, 1.4vw, 11px);
      font-weight: 700; letter-spacing: 1px; padding: 10px 18px; border: none;
      border-radius: 30px; cursor: pointer; transition: all 0.3s ease;
      text-transform: uppercase; white-space: nowrap;
    }
    .btn:hover { transform: scale(1.08); }
    .btn:active { transform: scale(0.95); }
    .btn-activate {
      background: linear-gradient(135deg, #00ff88, #00c6ff); color: #001a0e;
      box-shadow: 0 0 30px #00ff8844;
    }
    .btn-deactivate {
      background: linear-gradient(135deg, #ff4444, #cc0000); color: #fff;
      box-shadow: 0 0 20px #ff444444; display: none;
    }
    .btn-superboost {
      background: linear-gradient(135deg, #ff0066, #ff8800, #ffee00, #00ff88, #00ccff, #aa00ff);
      background-size: 300% 300%; color: #fff; animation: gradientShift 2s ease infinite; display: none;
    }
    .btn-cobra { background: linear-gradient(135deg, #00aa22, #44ff44, #008800); background-size: 400% 400%;
      color: #001a00; animation: gradientShift 3s ease infinite; display: none; }
    .btn-lightning { background: linear-gradient(135deg, #0044ff, #00ccff, #fff, #00ccff);
      background-size: 600% 600%; color: #000022; animation: gradientShift 2s ease infinite; display: none;
      border: 1px solid rgba(100,200,255,0.5); }
    .btn-fishwave { background: linear-gradient(135deg, #0055aa, #00aadd, #44ddff);
      background-size: 500% 500%; color: #001833; animation: gradientShift 3s ease infinite; display: none; }
    .btn-sharkwave { background: linear-gradient(135deg, #003355, #005577, #0088aa);
      background-size: 500% 500%; color: #aaeeff; animation: gradientShift 3s ease infinite; display: none; }
    .btn-pokemon { background: linear-gradient(135deg, #ff4444, #ff8800, #ffdd00, #44cc44, #4488ff, #aa44ff);
      background-size: 700% 700%; color: #fff; animation: gradientShift 3s ease infinite; display: none;
      border: 1px solid rgba(255,200,0,0.5); }
    .btn-tornado { background: linear-gradient(135deg, #555, #888, #abc, #678);
      background-size: 500% 500%; color: #111; animation: gradientShift 2s linear infinite; display: none; }
    .btn-metalwave { background: linear-gradient(135deg, #888, #c0c0c0, #ffaa00, #00ccff);
      background-size: 400% 400%; color: #1a1a2e; animation: gradientShift 3s ease infinite; display: none; }
    .btn-ultraboost { background: linear-gradient(135deg, #ff0000, #ff6600, #ffcc00, #ff0000);
      background-size: 500% 500%; color: #fff; font-weight: 900;
      text-shadow: 0 0 10px rgba(255,0,0,0.8); animation: gradientShift 1.5s ease infinite; display: none;
      border: 2px solid rgba(255,200,0,0.5); }

    .address-bar {
      position: fixed; bottom: 55px; left: 50%; transform: translateX(-50%);
      font-size: 10px; color: #667788; letter-spacing: 1px; z-index: 20;
      pointer-events: none; font-family: 'Orbitron', monospace;
    }
    .weather-badge {
      position: fixed; bottom: 4px; left: 12px; font-size: 10px;
      color: #8899aa; z-index: 20; pointer-events: none;
      font-family: 'Exo 2', sans-serif;
    }
  </style>
</head>
<body>
  <div id="overlay">
    <div class="shield-status inactive" id="shieldStatus">BOUCLIER INACTIF</div>
    <div class="title-area">
      <h1>Barriere Magnetique Elementaire</h1>
      <p>Systeme de Protection Avance - Maison Argyle</p>
    </div>
    <div class="info-panel">
      <div class="label">MONSTRES</div>
      <div class="label">REPOUSSES</div>
      <div class="count" id="monsterCount">0</div>
      <div class="sub">vers l'espace</div>
    </div>
    <div class="address-bar">455 Avenue Argyle, Westmount, QC &bull; Protection Active 24/7</div>
    <div class="weather-badge" id="weatherBadge"></div>
  </div>

  <div class="controls">
    <button class="btn btn-activate" id="btnActivate" onclick="activateBarrier()">Activer Bouclier</button>
    <button class="btn btn-superboost" id="btnSuperBoost" onclick="triggerSuperBoost()">SUPER BOOST</button>
    <button class="btn btn-cobra" id="btnCobra" onclick="triggerCobra()">COBRA</button>
    <button class="btn btn-lightning" id="btnLightning" onclick="triggerLightning()">⚡ ECLAIRS</button>
    <button class="btn btn-fishwave" id="btnFishWave" onclick="triggerFishWave()">🐟 POISSONS</button>
    <button class="btn btn-sharkwave" id="btnSharkWave" onclick="triggerSharkWave()">🦈 REQUINS</button>
    <button class="btn btn-pokemon" id="btnPokemon" onclick="triggerPokemon()">POKEMON</button>
    <button class="btn btn-tornado" id="btnTornado" onclick="triggerTornado()">🌪️ TORNADE</button>
    <button class="btn btn-metalwave" id="btnMetalWave" onclick="triggerMetalWave()">DRAGON METAL</button>
    <button class="btn btn-ultraboost" id="btnUltraBoost" onclick="triggerUltraBoost()">ULTRA BOOST</button>
    <button class="btn btn-deactivate" id="btnDeactivate" onclick="deactivateBarrier()">Desactiver</button>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ===== SCENE SETUP =====
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 10, 24);
    camera.lookAt(0, 3, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    document.body.insertBefore(renderer.domElement, document.getElementById('overlay'));

    // ===== ORBIT CONTROLS — navigate around the scene =====
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 3, 0);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.minDistance = 10;
    controls.maxDistance = 50;
    controls.minPolarAngle = 0.2;
    controls.maxPolarAngle = Math.PI / 2.1; // don't go below ground
    controls.enablePan = true;
    controls.panSpeed = 0.5;
    controls.rotateSpeed = 0.6;
    controls.update();

    // ===== MONTREAL TIME =====
    function getMontrealTime() {
      const now = new Date();
      const mtl = new Date(now.toLocaleString('en-US', { timeZone: 'America/Montreal' }));
      return { hour: mtl.getHours() + mtl.getMinutes() / 60, month: mtl.getMonth() };
    }
    function getMontrealDaylight() {
      const { hour, month } = getMontrealTime();
      const sunTimes = [
        [7.5,16.5],[7.0,17.3],[6.3,18.0],[6.2,19.5],
        [5.5,20.3],[5.2,20.8],[5.3,20.7],[5.8,20.0],
        [6.5,19.0],[7.1,18.0],[6.7,16.5],[7.3,16.2]
      ];
      const [sunrise, sunset] = sunTimes[month];
      const tw = 1.5;
      const dawnStart = sunrise - tw, duskEnd = sunset + tw;
      if (hour < dawnStart) return 0;
      if (hour < sunrise) { const t = (hour - dawnStart) / tw; return t * t * 0.4; }
      if (hour < sunrise + 0.75) { return 0.4 + ((hour - sunrise) / 0.75) * 0.6; }
      if (hour < sunset - 0.75) return 1;
      if (hour < sunset) { return 0.4 + ((sunset - hour) / 0.75) * 0.6; }
      if (hour < duskEnd) { const t = (duskEnd - hour) / tw; return t * t * 0.4; }
      return 0;
    }
    let daylight = getMontrealDaylight();
    setInterval(() => { daylight = getMontrealDaylight(); }, 15000);

    // ===== LIGHTING (dynamic day/night) =====
    const ambientLight = new THREE.AmbientLight(0x334466, 0.3);
    scene.add(ambientLight);

    const sunLight = new THREE.DirectionalLight(0xffeedd, 1.0);
    sunLight.position.set(10, 20, 8);
    sunLight.castShadow = true;
    sunLight.shadow.mapSize.width = 2048;
    sunLight.shadow.mapSize.height = 2048;
    sunLight.shadow.camera.near = 0.5;
    sunLight.shadow.camera.far = 60;
    sunLight.shadow.camera.left = -15;
    sunLight.shadow.camera.right = 15;
    sunLight.shadow.camera.top = 15;
    sunLight.shadow.camera.bottom = -15;
    scene.add(sunLight);

    const moonLight = new THREE.DirectionalLight(0x8899cc, 0.15);
    moonLight.position.set(-8, 15, -5);
    scene.add(moonLight);

    // Hemisphere light for natural ambient
    const hemiLight = new THREE.HemisphereLight(0x8899cc, 0x445522, 0.3);
    scene.add(hemiLight);

    // Barrier glow light
    const barrierLight = new THREE.PointLight(0x00ff88, 0, 20);
    barrierLight.position.set(0, 4, 0);
    scene.add(barrierLight);

    // Death lights array (colored point lights at monster death positions)
    const deathLights = [];

    // Weather data (must be declared before updateSky which uses it)
    let weather = { cloudCover: 0, weatherCode: 0 };

    // ===== SKY SYSTEM =====
    scene.background = null;

    // --- Sky Dome ---
    const skyDomeGeo = new THREE.SphereGeometry(200, 32, 32);
    const skyDomeMat = new THREE.ShaderMaterial({
      uniforms: {
        uDaylight: { value: 0 }
      },
      vertexShader: `
        varying vec3 vWorldPos;
        void main() {
          vWorldPos = (modelMatrix * vec4(position, 1.0)).xyz;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        uniform float uDaylight;
        varying vec3 vWorldPos;
        void main() {
          float h = normalize(vWorldPos).y;
          float elevation = max(h, 0.0);
          float d = uDaylight;
          // Night colors
          vec3 nightHorizon = vec3(0.03, 0.03, 0.08);
          vec3 nightZenith = vec3(0.01, 0.01, 0.06);
          vec3 nightMid = vec3(0.04, 0.02, 0.08);
          vec3 nightCol = mix(nightHorizon, mix(nightMid, nightZenith, elevation), elevation);
          // Day colors
          vec3 dayHorizon = vec3(0.55, 0.75, 0.92);
          vec3 dayZenith = vec3(0.15, 0.35, 0.75);
          vec3 dayCol = mix(dayHorizon, dayZenith, elevation);
          // Dawn/dusk colors
          vec3 dawnHorizon = vec3(0.9, 0.45, 0.2);
          vec3 dawnMid = vec3(0.6, 0.3, 0.5);
          vec3 dawnZenith = vec3(0.25, 0.2, 0.5);
          vec3 dawnCol = mix(dawnHorizon, mix(dawnMid, dawnZenith, elevation), elevation);
          // Blend based on daylight
          vec3 col;
          if (d < 0.3) {
            col = mix(nightCol, dawnCol, d / 0.3);
          } else if (d < 0.6) {
            col = mix(dawnCol, dayCol, (d - 0.3) / 0.3);
          } else {
            col = dayCol;
          }
          // Below horizon: darker ground color
          if (h < 0.0) {
            col = mix(col, vec3(0.02, 0.04, 0.02), min(1.0, -h * 5.0));
          }
          gl_FragColor = vec4(col, 1.0);
        }
      `,
      side: THREE.BackSide,
      depthWrite: false
    });
    const skyDome = new THREE.Mesh(skyDomeGeo, skyDomeMat);
    scene.add(skyDome);

    // --- Stars ---
    const starCount = 300;
    const starGeo = new THREE.BufferGeometry();
    const starPos = new Float32Array(starCount * 3);
    const starSizes = new Float32Array(starCount);
    const starPhases = new Float32Array(starCount);
    for (let i = 0; i < starCount; i++) {
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(Math.random() * 0.8 + 0.2); // upper hemisphere mostly
      const r = 180;
      starPos[i * 3] = r * Math.sin(phi) * Math.cos(theta);
      starPos[i * 3 + 1] = r * Math.cos(phi);
      starPos[i * 3 + 2] = r * Math.sin(phi) * Math.sin(theta);
      starSizes[i] = 0.5 + Math.random() * 1.5;
      starPhases[i] = Math.random() * Math.PI * 2;
    }
    starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
    starGeo.setAttribute('size', new THREE.BufferAttribute(starSizes, 1));
    const starMat = new THREE.PointsMaterial({
      color: 0xffffff, size: 1.0, transparent: true, opacity: 0,
      blending: THREE.AdditiveBlending, depthWrite: false, sizeAttenuation: true
    });
    const stars = new THREE.Points(starGeo, starMat);
    scene.add(stars);

    // --- Sun mesh ---
    const sunGeo = new THREE.SphereGeometry(2, 16, 16);
    const sunMeshMat = new THREE.MeshBasicMaterial({ color: 0xffffcc });
    const sunMesh = new THREE.Mesh(sunGeo, sunMeshMat);
    sunMesh.visible = false;
    scene.add(sunMesh);
    // Sun glow sprite
    const sunGlowCanvas = document.createElement('canvas');
    sunGlowCanvas.width = 128; sunGlowCanvas.height = 128;
    const sgCtx = sunGlowCanvas.getContext('2d');
    const sgGrad = sgCtx.createRadialGradient(64, 64, 0, 64, 64, 64);
    sgGrad.addColorStop(0, 'rgba(255,255,200,0.8)');
    sgGrad.addColorStop(0.3, 'rgba(255,220,100,0.3)');
    sgGrad.addColorStop(1, 'rgba(255,200,50,0)');
    sgCtx.fillStyle = sgGrad;
    sgCtx.fillRect(0, 0, 128, 128);
    const sunGlowTex = new THREE.CanvasTexture(sunGlowCanvas);
    const sunGlowMat = new THREE.SpriteMaterial({ map: sunGlowTex, blending: THREE.AdditiveBlending, transparent: true, opacity: 0 });
    const sunGlow = new THREE.Sprite(sunGlowMat);
    sunGlow.scale.set(18, 18, 1);
    scene.add(sunGlow);

    // --- Moon mesh with craters ---
    const moonCanvas = document.createElement('canvas');
    moonCanvas.width = 128; moonCanvas.height = 128;
    const mCtx = moonCanvas.getContext('2d');
    mCtx.fillStyle = '#dde4ee';
    mCtx.fillRect(0, 0, 128, 128);
    // Draw craters
    const craterData = [[30,40,12],[75,25,8],[55,70,10],[90,55,7],[20,85,6],[60,30,5],[40,60,9]];
    craterData.forEach(([cx2,cy2,cr]) => {
      mCtx.beginPath();
      mCtx.arc(cx2, cy2, cr, 0, Math.PI * 2);
      mCtx.fillStyle = 'rgba(160,170,185,0.6)';
      mCtx.fill();
      mCtx.beginPath();
      mCtx.arc(cx2 - cr * 0.2, cy2 - cr * 0.2, cr * 0.6, 0, Math.PI * 2);
      mCtx.fillStyle = 'rgba(140,150,165,0.4)';
      mCtx.fill();
    });
    const moonTex = new THREE.CanvasTexture(moonCanvas);
    const moonMeshGeo = new THREE.SphereGeometry(1.2, 16, 16);
    const moonMeshMat = new THREE.MeshBasicMaterial({ map: moonTex });
    const moonMesh = new THREE.Mesh(moonMeshGeo, moonMeshMat);
    moonMesh.visible = false;
    scene.add(moonMesh);
    // Moon glow
    const moonGlowCanvas = document.createElement('canvas');
    moonGlowCanvas.width = 128; moonGlowCanvas.height = 128;
    const mgCtx = moonGlowCanvas.getContext('2d');
    const mgGrad = mgCtx.createRadialGradient(64, 64, 0, 64, 64, 64);
    mgGrad.addColorStop(0, 'rgba(200,210,240,0.5)');
    mgGrad.addColorStop(0.4, 'rgba(180,190,220,0.15)');
    mgGrad.addColorStop(1, 'rgba(150,160,200,0)');
    mgCtx.fillStyle = mgGrad;
    mgCtx.fillRect(0, 0, 128, 128);
    const moonGlowTex = new THREE.CanvasTexture(moonGlowCanvas);
    const moonGlowMat = new THREE.SpriteMaterial({ map: moonGlowTex, blending: THREE.AdditiveBlending, transparent: true, opacity: 0 });
    const moonGlowSprite = new THREE.Sprite(moonGlowMat);
    moonGlowSprite.scale.set(8, 8, 1);
    scene.add(moonGlowSprite);

    // --- Clouds ---
    const cloudMeshes = [];
    for (let ci = 0; ci < 18; ci++) {
      const cGroup = new THREE.Group();
      const puffCount = 4 + Math.floor(Math.random() * 4);
      const cloudWhiteMat = new THREE.MeshStandardMaterial({
        color: 0xffffff, roughness: 1.0, metalness: 0, transparent: true, opacity: 0.85
      });
      for (let pi = 0; pi < puffCount; pi++) {
        const pr = 0.8 + Math.random() * 1.2;
        const puff = new THREE.Mesh(new THREE.SphereGeometry(pr, 8, 6), cloudWhiteMat.clone());
        puff.position.set((pi - puffCount / 2) * pr * 0.7, (Math.random() - 0.3) * 0.5, (Math.random() - 0.5) * pr * 0.5);
        puff.scale.y = 0.5 + Math.random() * 0.3;
        cGroup.add(puff);
      }
      const angle = (ci / 18) * Math.PI * 2 + Math.random() * 0.5;
      const dist = 30 + Math.random() * 60;
      cGroup.position.set(Math.cos(angle) * dist, 25 + Math.random() * 10, Math.sin(angle) * dist);
      cGroup.userData = { driftSpeed: 0.005 + Math.random() * 0.01, baseAngle: angle, baseDist: dist };
      cGroup.visible = false;
      scene.add(cGroup);
      cloudMeshes.push(cGroup);
    }

    // --- Weather particles (rain / snow) ---
    const weatherPartCount = 600;
    const weatherPartGeo = new THREE.BufferGeometry();
    const weatherPartPos = new Float32Array(weatherPartCount * 3);
    for (let wi = 0; wi < weatherPartCount; wi++) {
      weatherPartPos[wi * 3] = (Math.random() - 0.5) * 60;
      weatherPartPos[wi * 3 + 1] = Math.random() * 30;
      weatherPartPos[wi * 3 + 2] = (Math.random() - 0.5) * 60;
    }
    weatherPartGeo.setAttribute('position', new THREE.BufferAttribute(weatherPartPos, 3));
    const weatherPartMat = new THREE.PointsMaterial({
      color: 0xaabbcc, size: 0.12, transparent: true, opacity: 0, depthWrite: false
    });
    const weatherParticles = new THREE.Points(weatherPartGeo, weatherPartMat);
    weatherParticles.visible = false;
    scene.add(weatherParticles);

    // Sky update function
    function updateSky() {
      const d = daylight;
      const t = clock.getElapsedTime();

      // Sky dome
      skyDomeMat.uniforms.uDaylight.value = d;

      // Fog
      const fr = 0.01 + d * 0.35, fg = 0.01 + d * 0.55, fb = 0.06 + d * 0.75;
      const fogColor = new THREE.Color(fr, fg, fb);
      const wCode = weather.weatherCode;
      const isFog = (wCode === 45 || wCode === 48);
      const fogNear = isFog ? 5 : 40;
      const fogFar = isFog ? 30 : 80;
      scene.fog = new THREE.Fog(fogColor, fogNear, fogFar);

      // Lighting
      sunLight.intensity = d * 1.2;
      sunLight.color.setHSL(0.1, 0.6, 0.5 + d * 0.5);
      const sunAngle = (daylight - 0.5) * Math.PI;
      sunLight.position.set(Math.cos(sunAngle) * 20, Math.sin(sunAngle) * 20 + 5, 8);
      moonLight.intensity = (1 - d) * 0.2;
      ambientLight.intensity = 0.15 + d * 0.4;
      ambientLight.color.setHSL(0.6, 0.3, 0.3 + d * 0.4);
      renderer.toneMappingExposure = 0.5 + d * 0.8;
      hemiLight.intensity = 0.15 + d * 0.3;

      // Stars
      const starOpacity = d < 0.3 ? 1.0 - d / 0.3 : d < 0.5 ? (0.5 - d) / 0.2 * 0.3 : 0;
      starMat.opacity = starOpacity * 0.8;
      // Twinkle
      const sizes = starGeo.attributes.size.array;
      for (let si = 0; si < starCount; si++) {
        sizes[si] = starSizes[si] * (0.6 + 0.4 * Math.sin(t * (1.5 + si * 0.01) + starPhases[si]));
      }
      starGeo.attributes.size.needsUpdate = true;

      // Sun mesh
      sunMesh.visible = d > 0.3;
      sunGlow.visible = d > 0.3;
      if (d > 0.3) {
        const sp = sunLight.position;
        sunMesh.position.set(sp.x * 4, sp.y * 4, sp.z * 4);
        sunGlow.position.copy(sunMesh.position);
        const sunOp = Math.min(1, (d - 0.3) / 0.3);
        sunGlowMat.opacity = sunOp * 0.6;
      }

      // Moon mesh
      moonMesh.visible = d < 0.5;
      moonGlowSprite.visible = d < 0.5;
      if (d < 0.5) {
        const mp = moonLight.position;
        moonMesh.position.set(mp.x * 4, mp.y * 4, mp.z * 4);
        moonGlowSprite.position.copy(moonMesh.position);
        const moonOp = d < 0.3 ? 1.0 : 1.0 - (d - 0.3) / 0.2;
        moonGlowMat.opacity = moonOp * 0.4;
        moonMesh.rotation.y = t * 0.01;
      }

      // Clouds
      const cc = weather.cloudCover;
      const visibleClouds = Math.round((cc / 100) * cloudMeshes.length);
      cloudMeshes.forEach((cg, idx) => {
        cg.visible = idx < visibleClouds;
        if (!cg.visible) return;
        // Drift
        const ud2 = cg.userData;
        ud2.baseAngle += ud2.driftSpeed * 0.01;
        const cx = Math.cos(ud2.baseAngle) * ud2.baseDist;
        const cz = Math.sin(ud2.baseAngle) * ud2.baseDist;
        cg.position.x = cx;
        cg.position.z = cz;
        // Color: white day, dark night, orange dawn
        cg.children.forEach(puff => {
          if (d > 0.6) {
            const gray = cc > 70 ? 0.6 : 0.9;
            puff.material.color.setRGB(gray, gray, gray);
          } else if (d > 0.2) {
            const blend = (d - 0.2) / 0.4;
            puff.material.color.setRGB(0.9 * blend + 0.3 * (1 - blend), 0.6 * blend + 0.15 * (1 - blend), 0.4 * blend + 0.15 * (1 - blend));
          } else {
            puff.material.color.setRGB(0.15, 0.15, 0.18);
          }
          puff.material.opacity = cc > 70 ? 0.95 : 0.8;
        });
      });

      // Weather particles (rain / snow)
      const isRain = (wCode >= 51 && wCode <= 67) || (wCode >= 80 && wCode <= 82);
      const isSnow = (wCode >= 71 && wCode <= 86);
      weatherParticles.visible = isRain || isSnow;
      if (isRain || isSnow) {
        const wArr = weatherPartGeo.attributes.position.array;
        const dropSpeed = isRain ? 0.5 : 0.08;
        const drift = isSnow ? 0.02 : 0;
        weatherPartMat.opacity = isRain ? 0.4 : 0.6;
        weatherPartMat.size = isRain ? 0.1 : 0.2;
        weatherPartMat.color.set(isRain ? 0x8899aa : 0xffffff);
        for (let wi = 0; wi < weatherPartCount; wi++) {
          wArr[wi * 3 + 1] -= dropSpeed;
          if (isSnow) wArr[wi * 3] += Math.sin(t + wi) * drift;
          if (wArr[wi * 3 + 1] < 0) {
            wArr[wi * 3] = (Math.random() - 0.5) * 60;
            wArr[wi * 3 + 1] = 25 + Math.random() * 10;
            wArr[wi * 3 + 2] = (Math.random() - 0.5) * 60;
          }
        }
        weatherPartGeo.attributes.position.needsUpdate = true;
      }

      // Rain/snow tint on ambient
      if (isRain) {
        ambientLight.color.setHSL(0.6, 0.2, 0.25 + d * 0.2);
        renderer.toneMappingExposure = Math.max(0.4, renderer.toneMappingExposure - 0.15);
      }
    }

    // ===== GROUND =====
    const groundGeo = new THREE.PlaneGeometry(60, 60);

    // ===== HOUSE (Montreal red brick, flat roof) =====
    const houseGroup = new THREE.Group();

    // Main body
    const brickTex = (() => {
      const c = document.createElement('canvas');
      c.width = 256; c.height = 256;
      const cx = c.getContext('2d');
      cx.fillStyle = '#a04030';
      cx.fillRect(0, 0, 256, 256);
      const bw = 32, bh = 16, mw = 2;
      cx.fillStyle = '#b8a898';
      for (let row = 0; row < 16; row++) {
        const y = row * (bh + mw);
        cx.fillRect(0, y + bh, 256, mw);
        const off = (row % 2) * (bw / 2);
        for (let col = 0; col < 9; col++) {
          const x = col * (bw + mw) + off;
          cx.fillRect(x, y, mw, bh);
        }
        // Brick color variation
        for (let col = 0; col < 9; col++) {
          const x = col * (bw + mw) + off + mw;
          const v = Math.random();
          if (v < 0.2) { cx.fillStyle = 'rgba(0,0,0,0.08)'; cx.fillRect(x, y, bw, bh); }
          else if (v < 0.35) { cx.fillStyle = 'rgba(80,20,10,0.12)'; cx.fillRect(x, y, bw, bh); }
          cx.fillStyle = '#b8a898';
        }
      }
      const tex = new THREE.CanvasTexture(c);
      tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping;
      tex.repeat.set(2, 2);
      return tex;
    })();

    const bodyGeo = new THREE.BoxGeometry(8, 6, 6);
    const bodyMat = new THREE.MeshStandardMaterial({ map: brickTex, roughness: 0.85, metalness: 0.05 });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.y = 3;
    body.castShadow = true;
    body.receiveShadow = true;
    houseGroup.add(body);

    // Flat roof with parapet
    const roofGeo = new THREE.BoxGeometry(8.6, 0.3, 6.6);
    const roofMat = new THREE.MeshStandardMaterial({ color: 0x3a3a3a, roughness: 0.9 });
    const roof = new THREE.Mesh(roofGeo, roofMat);
    roof.position.y = 6.15;
    roof.castShadow = true;
    houseGroup.add(roof);

    // Parapet walls
    const parapetMat = new THREE.MeshStandardMaterial({ map: brickTex, roughness: 0.85 });
    [[0, 6.55, -3.2, 8.6, 0.5, 0.2], [0, 6.55, 3.2, 8.6, 0.5, 0.2],
     [-4.2, 6.55, 0, 0.2, 0.5, 6.4], [4.2, 6.55, 0, 0.2, 0.5, 6.4]].forEach(([x,y,z,w,h,d]) => {
      const g = new THREE.BoxGeometry(w, h, d);
      const m = new THREE.Mesh(g, parapetMat);
      m.position.set(x, y, z);
      m.castShadow = true;
      houseGroup.add(m);
    });

    // Cornice
    const corniceGeo = new THREE.BoxGeometry(8.8, 0.15, 6.8);
    const corniceMat = new THREE.MeshStandardMaterial({ color: 0x666666, roughness: 0.7, metalness: 0.2 });
    const cornice = new THREE.Mesh(corniceGeo, corniceMat);
    cornice.position.y = 6.0;
    houseGroup.add(cornice);

    // Red front door
    const doorGeo = new THREE.BoxGeometry(1.2, 2.4, 0.1);
    const doorMat = new THREE.MeshStandardMaterial({ color: 0xcc2222, roughness: 0.5, metalness: 0.1 });
    const door = new THREE.Mesh(doorGeo, doorMat);

    // Door frame
    const frameMat = new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 0.6 });
    [[0, 2.45, 3.07, 1.4, 0.1, 0.12], [-0.65, 1.2, 3.07, 0.1, 2.5, 0.12], [0.65, 1.2, 3.07, 0.1, 2.5, 0.12]].forEach(([x,y,z,w,h,d]) => {

    // Door handle

    const handle = new THREE.Mesh(handleGeo, handleMat);

    // Porch light (wrought iron lantern)
    const lanternGroup = new THREE.Group();
    const lanternBracket = new THREE.Mesh(

    lanternBracket.position.set(0, 2.9, 3.08);

    const lanternCage = new THREE.Mesh(

    const lanternBulb = new THREE.Mesh(

    const porchLight = new THREE.PointLight(0xffe080, 0.5, 5);
    porchLight.position.set(0, 2.55, 3.3);

    houseGroup.add(lanternGroup);

    // Windows (3 per floor, front face)
    const windowMat = new THREE.MeshStandardMaterial({

    });
    const windowFrameMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.5 });

    const windowPositions = [
      // Upper floor
      [-2.5, 4.5, 3.06], [0, 4.5, 3.06], [2.5, 4.5, 3.06],

      [-2.5, 2.0, 3.06], [2.5, 2.0, 3.06]
    ];
    const windows = [];
    windowPositions.forEach(([x, y, z]) => {

      const w = new THREE.Mesh(wGeo, windowMat.clone());
      w.position.set(x, y, z);

      // Frame

      const f = new THREE.Mesh(fGeo, windowFrameMat);

      houseGroup.add(f);
      // Cross dividers

      hDiv.position.set(x, y, z + 0.01);
      houseGroup.add(hDiv);
      const vDiv = new THREE.Mesh(new THREE.BoxGeometry(0.04, 1.4, 0.02), windowFrameMat);
      vDiv.position.set(x, y, z + 0.01);

    // Address "455"
    // (would need font loader — skip for now, we have it in HTML overlay)

    // Bushes
    const bushMat = new THREE.MeshStandardMaterial({ color: 0x1a4a10, roughness: 0.9 });
    [[-2.5, 0.4, 3.8], [-1.2, 0.35, 3.6], [1.2, 0.35, 3.6], [2.5, 0.4, 3.8]].forEach(([x,y,z]) => {
      const b = new THREE.Mesh(new THREE.SphereGeometry(0.5 + Math.random()*0.2, 8, 6), bushMat);
      b.position.set(x, y, z);
      b.scale.y = 0.7;
      b.castShadow = true;

    scene.add(houseGroup);

    // ===== BARRIER =====
    let barrierActive = false;
    let barrierProgress = 0; // 0-1 activation animation
    let monstersDefeated = 0;
    let superBoostActive = false;

    const barrierGeo = new THREE.SphereGeometry(9, 64, 48);
    const barrierMat = new THREE.ShaderMaterial({
      uniforms: {
        uTime: { value: 0 },
        uProgress: { value: 0 },
        uColor: { value: new THREE.Color(0x00ff88) },
        uCamPos: { value: camera.position }
      },
      vertexShader: `
        varying vec3 vNormal;
        varying vec3 vWorldPos;
        varying vec2 vUv;
        void main() {
          vNormal = normalize(normalMatrix * normal);
          vWorldPos = (modelMatrix * vec4(position, 1.0)).xyz;
          vUv = uv;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        uniform float uTime;
        uniform float uProgress;
        uniform vec3 uColor;
        uniform vec3 uCamPos;
        varying vec3 vNormal;
        varying vec3 vWorldPos;
        varying vec2 vUv;
        void main() {
          vec3 viewDir = normalize(uCamPos - vWorldPos);
          float fresnel = pow(1.0 - max(dot(viewDir, vNormal), 0.0), 3.0);

          // Hexagonal energy pattern
          float hex = sin(vUv.x * 40.0 + uTime) * sin(vUv.y * 30.0 + uTime * 0.7);
          hex = smoothstep(0.3, 0.8, hex);

          // Energy waves traveling up
          float wave = sin(vWorldPos.y * 3.0 - uTime * 2.0) * 0.5 + 0.5;

          // Particle sparkles
          float sparkle = sin(vUv.x * 100.0 + uTime * 3.0) * sin(vUv.y * 80.0 - uTime * 2.0);
          sparkle = pow(max(sparkle, 0.0), 8.0);

          float alpha = (fresnel * 0.6 + hex * 0.15 + wave * 0.1 + sparkle * 0.3) * uProgress;
          vec3 col = uColor * (1.0 + fresnel * 0.5 + sparkle * 2.0);

          gl_FragColor = vec4(col, alpha * 0.7);
        }
      `,
      transparent: true,
      side: THREE.DoubleSide,
      depthWrite: false
    });
    const barrier = new THREE.Mesh(barrierGeo, barrierMat);
    barrier.position.set(0, 3, 0);
    barrier.scale.set(1, 0.7, 1);
    scene.add(barrier);

    // Inner energy rings (3 TorusGeometry with different rotation speeds)
    const energyRings = [];
    const ringColors = [0x00ff88, 0x00ccff, 0xaa44ff];
    for (let ri = 0; ri < 3; ri++) {
      const ringGeo = new THREE.TorusGeometry(7 + ri * 0.8, 0.04, 8, 64);
      const ringMat = new THREE.MeshBasicMaterial({
        color: ringColors[ri], transparent: true, opacity: 0
      });
      const ering = new THREE.Mesh(ringGeo, ringMat);
      ering.position.set(0, 2 + ri * 1.5, 0);
      ering.userData.rotSpeedX = 0.3 + ri * 0.2;
      ering.userData.rotSpeedY = 0.5 + ri * 0.15;
      scene.add(ering);
      energyRings.push(ering);
    }

    // Barrier hit pulse state
    let barrierHitPulse = 0; // 0 = no pulse, >0 = pulsing

    // Barrier particle ring
    const particleCount = 500;
    const particlesGeo = new THREE.BufferGeometry();
    const particlePositions = new Float32Array(particleCount * 3);
    const particleColors = new Float32Array(particleCount * 3);
    const particleSpeeds = new Float32Array(particleCount);
    for (let i = 0; i < particleCount; i++) {
      const angle = Math.random() * Math.PI * 2;
      const r = 9 + (Math.random() - 0.5) * 0.5;
      particlePositions[i*3] = Math.cos(angle) * r;
      particlePositions[i*3+1] = Math.random() * 5 + 1;
      particlePositions[i*3+2] = Math.sin(angle) * r;
      // Multi-element colors
      const colors = [[0,1,0.5],[1,0.5,0],[0,0.7,1],[1,1,0],[0.7,0,1]];
      const c = colors[Math.floor(Math.random()*5)];
      particleColors[i*3]=c[0]; particleColors[i*3+1]=c[1]; particleColors[i*3+2]=c[2];
      particleSpeeds[i] = (Math.random() * 0.5 + 0.3) * (Math.random()>0.5?1:-1);
    }
    particlesGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
    particlesGeo.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));
    const particlesMat = new THREE.PointsMaterial({
      size: 0.12, vertexColors: true, transparent: true, opacity: 0,
      blending: THREE.AdditiveBlending, depthWrite: false
    });
    const particles = new THREE.Points(particlesGeo, particlesMat);
    particles.position.set(0, 0, 0);
    scene.add(particles);

    // ===== MONSTERS =====
    const monsters = [];
    let lastSpawnTime = 0;

    // Monsters Inc palette
    const MONSTER_COLORS = [
      0x44cc55, 0x8844dd, 0x2299ee, 0xff7722, 0x22bbaa,
      0xee4488, 0x88cc22, 0x6644ff, 0xffaa00, 0x44ddcc,
      0xdd5577, 0x55aaff, 0xaadd44, 0xff6688, 0x33ccaa
    ];

    function createMonsterSpotTexture(baseColor) {
      const c = document.createElement('canvas');
      c.width = 128; c.height = 128;
      const ctx = c.getContext('2d');
      const bc = new THREE.Color(baseColor);
      ctx.fillStyle = `rgb(${Math.round(bc.r*255)},${Math.round(bc.g*255)},${Math.round(bc.b*255)})`;
      ctx.fillRect(0, 0, 128, 128);
      const pattern = Math.random();
      if (pattern < 0.4) {
        // Spots
        const spotCount = 5 + Math.floor(Math.random() * 8);
        const spotColor = bc.clone().offsetHSL(0.05, -0.1, -0.15);
        ctx.fillStyle = `rgb(${Math.round(spotColor.r*255)},${Math.round(spotColor.g*255)},${Math.round(spotColor.b*255)})`;
        for (let s2 = 0; s2 < spotCount; s2++) {
          ctx.beginPath();
          ctx.arc(Math.random() * 128, Math.random() * 128, 5 + Math.random() * 12, 0, Math.PI * 2);
          ctx.fill();
        }
      } else if (pattern < 0.65) {
        // Stripes
        const stripeColor = bc.clone().offsetHSL(0.1, 0, -0.1);
        ctx.fillStyle = `rgb(${Math.round(stripeColor.r*255)},${Math.round(stripeColor.g*255)},${Math.round(stripeColor.b*255)})`;
        const stripeW = 8 + Math.random() * 10;
        for (let sx = 0; sx < 128; sx += stripeW * 2) {
          ctx.fillRect(sx, 0, stripeW, 128);
        }
      }
      // else plain
      const tex = new THREE.CanvasTexture(c);
      tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping;
      return tex;
    }

    function createMonster() {
      const group = new THREE.Group();
      const size = 0.6 + Math.random() * 0.5;
      const bodyColor = MONSTER_COLORS[Math.floor(Math.random() * MONSTER_COLORS.length)];

      // Body shape variety
      const shapeType = Math.floor(Math.random() * 4);
      let bodyGeo2;
      if (shapeType === 0) {
        // Round
        bodyGeo2 = new THREE.SphereGeometry(size, 12, 10);
      } else if (shapeType === 1) {
        // Tall thin
        bodyGeo2 = new THREE.CapsuleGeometry(size * 0.6, size * 1.2, 8, 12);
      } else if (shapeType === 2) {
        // Wide squat
        bodyGeo2 = new THREE.SphereGeometry(size, 12, 10);
        bodyGeo2.scale(1.3, 0.7, 1.0);
      } else {
        // Pear-shaped (deformed sphere)
        bodyGeo2 = new THREE.SphereGeometry(size, 12, 10);
        const bpos = bodyGeo2.attributes.position;
        for (let bv = 0; bv < bpos.count; bv++) {
          const by = bpos.getY(bv);
          const widen = 1.0 + Math.max(0, -by / size) * 0.4;
          bpos.setX(bv, bpos.getX(bv) * widen);
          bpos.setZ(bv, bpos.getZ(bv) * widen);
        }
        bodyGeo2.computeVertexNormals();
      }

      // Fuzzy/rough material with optional pattern texture
      const hasPattern = Math.random() > 0.4;
      const bodyMat2 = new THREE.MeshStandardMaterial({
        color: bodyColor,
        roughness: 0.85,
        metalness: 0.05,
        ...(hasPattern ? { map: createMonsterSpotTexture(bodyColor) } : {})
      });
      const monsterBody = new THREE.Mesh(bodyGeo2, bodyMat2);
      monsterBody.castShadow = true;
      group.add(monsterBody);

      // --- BIG EXPRESSIVE EYES ---
      const eyeCount = 1 + Math.floor(Math.random() * 3); // 1, 2, or 3
      const eyeSize = size * (0.2 + Math.random() * 0.15); // comically large
      const irisHues = [0x3366cc, 0x44aa44, 0x996633, 0x663399, 0xcc6633, 0x339999];
      const irisColor = irisHues[Math.floor(Math.random() * irisHues.length)];
      const eyeObjs = [];

      for (let e = 0; e < eyeCount; e++) {
        const eyeGroup = new THREE.Group();
        // White sclera
        const sclera = new THREE.Mesh(
          new THREE.SphereGeometry(eyeSize, 10, 8),
          new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.3 })
        );
        eyeGroup.add(sclera);
        // Colored iris
        const iris = new THREE.Mesh(
          new THREE.CircleGeometry(eyeSize * 0.55, 12),
          new THREE.MeshBasicMaterial({ color: irisColor })
        );
        iris.position.z = eyeSize * 0.95;
        eyeGroup.add(iris);
        // Black pupil
        const pupil = new THREE.Mesh(
          new THREE.CircleGeometry(eyeSize * 0.28, 10),
          new THREE.MeshBasicMaterial({ color: 0x000000 })
        );
        pupil.position.z = eyeSize * 0.96;
        eyeGroup.add(pupil);
        // Pupil highlight
        const highlight = new THREE.Mesh(
          new THREE.CircleGeometry(eyeSize * 0.1, 6),
          new THREE.MeshBasicMaterial({ color: 0xffffff })
        );
        highlight.position.set(eyeSize * 0.12, eyeSize * 0.12, eyeSize * 0.97);
        eyeGroup.add(highlight);
        // Eyelid (half-sphere on top)
        const lidGeo = new THREE.SphereGeometry(eyeSize * 1.05, 10, 6, 0, Math.PI * 2, 0, Math.PI * 0.35);
        const lid = new THREE.Mesh(lidGeo, new THREE.MeshStandardMaterial({ color: bodyColor, roughness: 0.8 }));
        lid.rotation.x = -0.1;
        eyeGroup.add(lid);

        // Position eyes on face
        let ex, ey;
        if (eyeCount === 1) {
          ex = 0; ey = size * 0.3;
        } else if (eyeCount === 2) {
          ex = (e === 0 ? -1 : 1) * size * 0.35;
          ey = size * 0.3;
        } else {
          if (e < 2) { ex = (e === 0 ? -1 : 1) * size * 0.35; ey = size * 0.35; }
          else { ex = 0; ey = size * 0.6; }
        }
        eyeGroup.position.set(ex, ey, size * 0.75);
        group.add(eyeGroup);
        eyeObjs.push(eyeGroup);
      }

      // --- MOUTH (wide goofy grin) ---
      const mouthGroup = new THREE.Group();
      const mouthStyle = Math.floor(Math.random() * 3); // 0=wide grin, 1=toothy, 2=open roar
      const mouthW = size * 0.6;
      const mouthH = size * 0.2;
      // Dark mouth interior
      const mouthShape = new THREE.Shape();
      mouthShape.moveTo(-mouthW, 0);
      mouthShape.quadraticCurveTo(0, mouthStyle === 2 ? -mouthH * 2.5 : -mouthH * 1.5, mouthW, 0);
      if (mouthStyle === 2) {
        mouthShape.quadraticCurveTo(0, mouthH * 0.5, -mouthW, 0);
      } else {
        mouthShape.lineTo(-mouthW, 0);
      }
      const mouthMesh = new THREE.Mesh(
        new THREE.ShapeGeometry(mouthShape),
        new THREE.MeshBasicMaterial({ color: 0x330011, side: THREE.DoubleSide })
      );
      mouthGroup.add(mouthMesh);

      // Teeth
      const toothMat = new THREE.MeshStandardMaterial({ color: 0xf0f0e0, roughness: 0.4 });
      const teethCount = 3 + Math.floor(Math.random() * 4);
      const hasUnderbite = Math.random() > 0.6;
      const hasFangs = Math.random() > 0.5;
      for (let ti = 0; ti < teethCount; ti++) {
        const tx = -mouthW + (ti + 0.5) * (mouthW * 2 / teethCount);
        const th = size * (0.06 + Math.random() * 0.06);
        const tw = mouthW * 2 / teethCount * 0.7;
        const isFang = hasFangs && (ti === 0 || ti === teethCount - 1);
        if (isFang) {
          const fang = new THREE.Mesh(new THREE.ConeGeometry(tw * 0.5, th * 2.5, 4), toothMat);
          fang.position.set(tx, hasUnderbite ? -mouthH * 0.3 : 0.01, 0.01);
          fang.rotation.z = Math.PI;
          if (hasUnderbite) fang.rotation.z = 0;
          mouthGroup.add(fang);
        } else {
          const tooth = new THREE.Mesh(new THREE.BoxGeometry(tw, th, 0.02), toothMat);
          tooth.position.set(tx, hasUnderbite ? -mouthH * 0.8 : 0.01, 0.01);
          mouthGroup.add(tooth);
        }
      }
      mouthGroup.position.set(0, -size * 0.15, size * 0.85);
      group.add(mouthGroup);

      // --- HORNS ---
      const hornStyle = Math.floor(Math.random() * 4); // 0=none, 1=small rounded, 2=tall curved, 3=antenna
      const hornColor = new THREE.Color(bodyColor).offsetHSL(0.1, -0.1, 0.1);
      const hornMat = new THREE.MeshStandardMaterial({ color: hornColor, roughness: 0.5 });
      const horns = [];
      if (hornStyle === 1) {
        [-1, 1].forEach(side => {
          const horn = new THREE.Mesh(new THREE.CapsuleGeometry(size * 0.06, size * 0.2, 4, 6), hornMat);
          horn.position.set(side * size * 0.35, size * 0.8, size * 0.1);
          horn.rotation.z = side * 0.4;
          group.add(horn);
          horns.push(horn);
        });
      } else if (hornStyle === 2) {
        [-1, 1].forEach(side => {
          const horn = new THREE.Mesh(new THREE.ConeGeometry(size * 0.08, size * 0.5, 6), hornMat);
          horn.position.set(side * size * 0.3, size * 0.9, 0);
          horn.rotation.z = side * 0.3;
          group.add(horn);
          horns.push(horn);
        });
      } else if (hornStyle === 3) {
        // Antenna style
        [-1, 1].forEach(side => {
          const stalk = new THREE.Mesh(new THREE.CylinderGeometry(size * 0.02, size * 0.02, size * 0.5, 6), hornMat);
          stalk.position.set(side * size * 0.2, size * 1.0, size * 0.2);
          stalk.rotation.z = side * 0.2;
          group.add(stalk);
          const tip = new THREE.Mesh(new THREE.SphereGeometry(size * 0.06, 6, 6),
            new THREE.MeshBasicMaterial({ color: new THREE.Color(bodyColor).offsetHSL(0, 0.2, 0.2) }));
          tip.position.set(side * size * 0.28, size * 1.25, size * 0.2);
          group.add(tip);
          horns.push(stalk);
        });
      }

      // --- STUBBY ARMS ---
      if (Math.random() > 0.3) {
        const armMat = new THREE.MeshStandardMaterial({ color: bodyColor, roughness: 0.85 });
        [-1, 1].forEach(side => {
          const arm = new THREE.Mesh(new THREE.CapsuleGeometry(size * 0.08, size * 0.25, 4, 6), armMat);
          arm.position.set(side * size * 0.85, -size * 0.1, size * 0.15);
          arm.rotation.z = side * 0.8;
          group.add(arm);
        });
      }

      // --- STUBBY LEGS ---
      if (Math.random() > 0.25) {
        const legMat = new THREE.MeshStandardMaterial({ color: bodyColor, roughness: 0.85 });
        [-1, 1].forEach(side => {
          const leg = new THREE.Mesh(new THREE.CapsuleGeometry(size * 0.1, size * 0.2, 4, 6), legMat);
          leg.position.set(side * size * 0.3, -size * 0.85, 0);
          group.add(leg);
        });
      }

      // Spawn position (random point far away)
      const spawnAngle = Math.random() * Math.PI * 2;
      const spawnDist = 30 + Math.random() * 10;
      group.position.set(
        Math.cos(spawnAngle) * spawnDist,
        1 + Math.random() * 2,
        Math.sin(spawnAngle) * spawnDist
      );

      group.userData = {
        state: 'approaching',
        speed: 0.015 + Math.random() * 0.01,
        size,
        wobblePhase: Math.random() * Math.PI * 2,
        flyVel: new THREE.Vector3(),
        hitTime: 0,
        currentDir: new THREE.Vector3(),
        breathPhase: Math.random() * Math.PI * 2,
        bodyMesh: monsterBody,
        spikes: horns,
        baseEmissive: 0.0,
        eyeObjs
      };

      scene.add(group);
      monsters.push(group);
    }

    // ===== PROJECTILES =====
    const projectiles = [];

    // Trail particles pool
    const trailParticles = [];

    function fireProjectile() {
      if (!barrierActive) return;

      // Find nearest approaching monster
      let closest = null, closestDist = Infinity;
      for (const m of monsters) {
        if (m.userData.state !== 'approaching') continue;
        const d = m.position.length();
        if (d < closestDist) { closestDist = d; closest = m; }
      }
      if (!closest || closestDist > 25) return;

      const elements = ['fire','ice','electric','water','venom'];
      const el = elements[Math.floor(Math.random()*5)];
      const colors = { fire: 0xff4400, ice: 0x44ccff, electric: 0xffee00, water: 0x2288ff, venom: 0xaa00ff };

      const dir = closest.position.clone().normalize();
      const startPos = dir.clone().multiplyScalar(9.2);
      startPos.y = 3 + (Math.random()-0.5)*3;

      // Element-specific shapes
      let geo;
      if (el === 'fire') {
        // Spiky shape for fire
        geo = new THREE.IcosahedronGeometry(0.15, 0);
        const fpos = geo.attributes.position;
        for (let fv = 0; fv < fpos.count; fv++) {
          const fx = fpos.getX(fv), fy = fpos.getY(fv), fz = fpos.getZ(fv);
          const flen = Math.sqrt(fx*fx+fy*fy+fz*fz);
          const spike = 1 + Math.random() * 0.6;
          fpos.setXYZ(fv, fx/flen*0.15*spike, fy/flen*0.15*spike, fz/flen*0.15*spike);
        }
        geo.computeVertexNormals();
      } else if (el === 'ice') {
        // Crystal octahedron for ice
        geo = new THREE.OctahedronGeometry(0.15, 0);
      } else {
        geo = new THREE.SphereGeometry(0.15, 6, 6);
      }
      const mat = new THREE.MeshBasicMaterial({ color: colors[el] });
      const proj = new THREE.Mesh(geo, mat);
      proj.position.copy(startPos);

      // Glow
      const glowMat = new THREE.PointsMaterial({
        color: colors[el], size: 0.5, transparent: true, opacity: 0.6,
        blending: THREE.AdditiveBlending
      });
      const glowGeo = new THREE.BufferGeometry();
      glowGeo.setAttribute('position', new THREE.Float32BufferAttribute([0,0,0], 3));
      const glow = new THREE.Points(glowGeo, glowMat);
      proj.add(glow);

      proj.userData = {
        vel: dir.clone().multiplyScalar(0.4),
        life: 120,
        element: el,
        trailTimer: 0,
        baseDir: dir.clone() // for electric zigzag
      };

      scene.add(proj);
      projectiles.push(proj);
    }

    // ===== GAME STATE =====

    // Helper: kill a monster
    function killMonster(m, t) {
      if (m.userData.state !== 'approaching') return;
      m.userData.state = 'hit';
      m.userData.hitTime = t;
      const pushDir = m.position.clone().normalize();
      m.userData.flyVel.copy(pushDir.multiplyScalar(0.3));

      // Spawn colored death light at kill position

    // ===== COBRA VENIMEUX =====
    let cobraActive = false, cobraTimer = 0;
    let cobraSegments = []; // 3D segments
    const COBRA_SEGS = 20;

    window.triggerCobra = function() {
      if (cobraActive) return;
      cobraActive = true; cobraTimer = 0;
      // Create cobra body segments
      cobraSegments.forEach(s => scene.remove(s));
      cobraSegments = [];
      const cobraMat = new THREE.MeshStandardMaterial({ color: 0x22aa22, roughness: 0.4, metalness: 0.3 });
      for (let i = 0; i < COBRA_SEGS; i++) {
        const r = 0.3 - i * 0.01;
        const seg = new THREE.Mesh(new THREE.SphereGeometry(Math.max(0.1, r), 8, 6), cobraMat);
        seg.castShadow = true;
        scene.add(seg);
        cobraSegments.push(seg);
      }
      // Head is segment 0 — make it bigger with eyes
      cobraSegments[0].scale.set(1.5, 1.2, 1.3);
      const eyeMat2 = new THREE.MeshBasicMaterial({ color: 0xffff00 });
      [-1,1].forEach(side => {
        const eye = new THREE.Mesh(new THREE.SphereGeometry(0.08, 6, 6), eyeMat2);
        eye.position.set(side * 0.15, 0.12, 0.2);
        cobraSegments[0].add(eye);
      });
    };

    let cobraHeadAngle = 0;
    let cobraStriking = false;
    let cobraStrikeTarget = null;

    function updateCobra(t) {
      if (!cobraActive) return;
      cobraTimer++;
      if (cobraSegments.length === 0) return;
      const head = cobraSegments[0];
      const orbitR = 10.5;
      const hy = 1.5 + Math.sin(t * 1.5) * 0.4;

      // Hunt: find nearest approaching monster
      let closest = null, closestDist = Infinity;
      for (const m of monsters) {
        if (m.userData.state !== 'approaching') continue;
        const d = head.position.distanceTo(m.position);
        if (d < closestDist) { closestDist = d; closest = m; }
      }

      // Validate strike target
      if (cobraStriking && cobraStrikeTarget) {
        if (!monsters.includes(cobraStrikeTarget) || cobraStrikeTarget.userData.state !== 'approaching') {
          cobraStriking = false; cobraStrikeTarget = null;
        }
      }

      if (!cobraStriking && closest && closestDist < 8) {
        // Start strike — lunge toward monster
        cobraStriking = true;
        cobraStrikeTarget = closest;
      }

      if (cobraStriking && cobraStrikeTarget) {
        // Smooth turn + lunge toward target
        const toTarget = cobraStrikeTarget.position.clone().sub(head.position);
        toTarget.y = 0;
        const targetAngle = Math.atan2(toTarget.x, toTarget.z);
        let angleDiff = targetAngle - cobraHeadAngle;
        while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
        while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
        cobraHeadAngle += angleDiff * 0.15; // smooth turn

        const speed = closestDist > 2 ? 0.2 : 0.05;
        head.position.x += Math.sin(cobraHeadAngle) * speed;
        head.position.z += Math.cos(cobraHeadAngle) * speed;
        head.position.y = hy;

        // Bite!
        if (head.position.distanceTo(cobraStrikeTarget.position) < 1.5) {
          killMonster(cobraStrikeTarget, t);
          cobraStriking = false;
          cobraStrikeTarget = null;
        }
      } else {
        // Smooth orbital patrol — like 2D version
        const orbitAngle = Math.atan2(head.position.x, head.position.z);
        const currentR = Math.sqrt(head.position.x**2 + head.position.z**2);
        // Tangent direction + distance correction
        const tangent = orbitAngle + Math.PI * 0.5;
        const distError = currentR - orbitR;
        const desiredAngle = tangent + distError * 0.05 + Math.sin(t * 0.8) * 0.1;
        // Smooth turn
        let angleDiff = desiredAngle - cobraHeadAngle;
        while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
        while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
        cobraHeadAngle += angleDiff * 0.04;

        head.position.x += Math.sin(cobraHeadAngle) * 0.1;
        head.position.z += Math.cos(cobraHeadAngle) * 0.1;
        head.position.y = hy;
        cobraStriking = false;
      }

      // Head looks in movement direction
      head.lookAt(head.position.x + Math.sin(cobraHeadAngle), hy, head.position.z + Math.cos(cobraHeadAngle));

      // Body follows head with smooth delay (serpentine)
      for (let i = 1; i < cobraSegments.length; i++) {
        const prev = cobraSegments[i-1].position;
        const curr = cobraSegments[i].position;
        const dir = prev.clone().sub(curr);
        const dist = dir.length();
        if (dist > 0.4) { // maintain spacing
          dir.normalize();
          curr.add(dir.multiplyScalar((dist - 0.35) * 0.3));
        }
        curr.y = hy - i * 0.04 + Math.sin(t * 2.5 + i * 0.6) * 0.12;
        // Segments look at their predecessor
        cobraSegments[i].lookAt(prev);
      }

      if (cobraTimer > 480) {
        cobraActive = false;
        cobraSegments.forEach(s => scene.remove(s));
        cobraSegments = [];
      }
    }

    // ===== LIGHTNING STORM =====
    let lightningActive = false, lightningTimer = 0;
    let lightningBolts = [];

    window.triggerLightning = function() {
      if (lightningActive) return;
      lightningActive = true; lightningTimer = 0;
      lightningBolts.forEach(b => scene.remove(b));
      lightningBolts = [];
    };

    function createBolt(target) {
      const points = [];
      const startY = 25;
      const segs = 10;
      for (let i = 0; i <= segs; i++) {
        const p = i / segs;
        points.push(new THREE.Vector3(
          target.x + (1-p) * (Math.random()-0.5) * 6,
          startY * (1-p) + target.y * p,
          target.z + (1-p) * (Math.random()-0.5) * 6
        ));
      }
      const geo = new THREE.BufferGeometry().setFromPoints(points);
      const mat = new THREE.LineBasicMaterial({ color: 0xaaddff, linewidth: 2, transparent: true, opacity: 1 });
      const bolt = new THREE.Line(geo, mat);
      bolt.userData = { life: 15 };
      scene.add(bolt);
      lightningBolts.push(bolt);

      // Glow bolt
      const mat2 = new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 1, transparent: true, opacity: 0.8 });
      const bolt2 = new THREE.Line(geo.clone(), mat2);
      bolt2.userData = { life: 12 };
      scene.add(bolt2);
      lightningBolts.push(bolt2);
    }

    function updateLightning(t) {
      if (!lightningActive) return;
      lightningTimer++;

      // Strike a monster every ~20 frames
      if (lightningTimer % 20 === 0 && lightningTimer < 350) {
        const targets = monsters.filter(m => m.userData.state === 'approaching');
        if (targets.length) {
          const target = targets[Math.floor(Math.random() * targets.length)];
          createBolt(target.position);
          killMonster(target, t);
        }
      }

      // Update bolt lifetimes
      for (let i = lightningBolts.length - 1; i >= 0; i--) {
        lightningBolts[i].userData.life--;
        lightningBolts[i].material.opacity = lightningBolts[i].userData.life / 15;
        if (lightningBolts[i].userData.life <= 0) {
          scene.remove(lightningBolts[i]);
          lightningBolts.splice(i, 1);
        }
      }

      if (lightningTimer > 420 && lightningBolts.length === 0) {
        lightningActive = false;
      }
    }

    // ===== FISH WAVE =====

    let fishObjs = [], waterPlane = null;

      if (fishWaveActive) return;
      fishWaveActive = true; fishWaveTimer = 0;
      // Create water plane

      const wMat = new THREE.MeshStandardMaterial({

      });

    function updateFishWave(t) {
      if (!fishWaveActive) return;
      fishWaveTimer++;

      // Water rises
      if (waterPlane) {
        const wl = Math.min(1, fishWaveTimer / 80);
        waterPlane.material.opacity = wl * 0.4;
        waterPlane.position.y = 0.05 + wl * 0.2;
        if (fishWaveTimer > 400) {
          waterPlane.material.opacity = Math.max(0, waterPlane.material.opacity - 0.005);
        }
      }

      // Fish hunt monsters
      for (const fish of fishObjs) {
        const fd = fish.userData;
        // Find target
        if (!fd.target || fd.target.userData?.state !== 'approaching') {
          fd.target = null;
          let closest = null, closestDist = Infinity;
          for (const m of monsters) {
            if (m.userData.state !== 'approaching') continue;
            const d = fish.position.distanceTo(m.position);
            if (d < closestDist) { closestDist = d; closest = m; }
          }
          fd.target = closest;
        }

        if (fd.target) {
          const dir = fd.target.position.clone().sub(fish.position).normalize();
          fish.position.add(dir.multiplyScalar(fd.speed * 1.5));
          fish.lookAt(fd.target.position);
          if (fish.position.distanceTo(fd.target.position) < 1) {
            killMonster(fd.target, t);
            fd.target = null;
          }
        } else {
          fd.angle += 0.02;
          fish.position.x += Math.cos(fd.angle) * fd.speed;
          fish.position.z += Math.sin(fd.angle) * fd.speed;
        }
        fish.position.y = 0.3 + Math.sin(t * 3 + fishObjs.indexOf(fish)) * 0.15;
      }

      if (fishWaveTimer > 540) {
        fishWaveActive = false;
        fishObjs.forEach(f => scene.remove(f)); fishObjs = [];
        if (waterPlane) { scene.remove(waterPlane); waterPlane = null; }
      }
    }

    // ===== SHARK WAVE =====
    let sharkWaveActive = false, sharkWaveTimer = 0;

      // Dark ocean water
      const wGeo = new THREE.CircleGeometry(25, 64);
      const wMat = new THREE.MeshStandardMaterial({

      sharkWaterPlane.rotation.x = -Math.PI / 2;
      sharkWaterPlane.position.y = 0.06;

      // Spawn sharks
      sharkObjs.forEach(s => scene.remove(s));
      sharkObjs = [];
      for (let i = 0; i < 4; i++) {
        const sGroup = new THREE.Group();
        const bodyGeo3 = new THREE.ConeGeometry(0.4, 2, 8);
        bodyGeo3.rotateZ(-Math.PI / 2);
        const sharkMat = new THREE.MeshStandardMaterial({ color: 0x4a5a6a, roughness: 0.5 });
        const sharkBody = new THREE.Mesh(bodyGeo3, sharkMat);
        sGroup.add(sharkBody);
        // Dorsal fin
        const fin = new THREE.Mesh(
          new THREE.ConeGeometry(0.15, 0.6, 4),

        );
        fin.position.set(0, 0.5, 0);
        sGroup.add(fin);
        // Tail
        const tailFin = new THREE.Mesh(

        );
        tailFin.position.set(-1.2, 0.2, 0);
        tailFin.rotation.z = 0.5;
        sGroup.add(tailFin);

        const belly = new THREE.Mesh(

    function updateSharkWave(t) {
      if (!sharkWaveActive) return;
      sharkWaveTimer++;

      if (sharkWaterPlane) {
        const wl = Math.min(1, sharkWaveTimer / 90);
        sharkWaterPlane.material.opacity = wl * 0.5;
        sharkWaterPlane.position.y = 0.06 + wl * 0.3 + Math.sin(t * 1.5) * 0.1;
        if (sharkWaveTimer > 460) sharkWaterPlane.material.opacity = Math.max(0, sharkWaterPlane.material.opacity - 0.005);
      }

      for (const shark of sharkObjs) {
        const sd = shark.userData;
        if (sd.biteTimer > 0) { sd.biteTimer--; continue; }

        // Initialize heading if needed
        if (sd.heading === undefined) sd.heading = sd.angle;

        // Hunt monsters — smooth turn toward target
        if (!sd.target || sd.target.userData?.state !== 'approaching') {
          sd.target = null;
          let closest = null, cDist = Infinity;
          for (const m of monsters) {
            if (m.userData.state !== 'approaching') continue;
            const d = shark.position.distanceTo(m.position);
            if (d < cDist) { cDist = d; closest = m; }
          }
          sd.target = closest;
        }

        if (sd.target) {
          // Smooth turn towards prey (like 2D version)
          const dx = sd.target.position.x - shark.position.x;
          const dz = sd.target.position.z - shark.position.z;
          const targetAngle = Math.atan2(dx, dz);
          let angleDiff = targetAngle - sd.heading;
          while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
          while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
          const dist = Math.sqrt(dx*dx + dz*dz);
          const turnRate = dist < 4 ? 0.12 : 0.06;
          sd.heading += angleDiff * turnRate;
          const huntSpeed = dist < 3 ? sd.speed * 2.5 : sd.speed * 1.8;
          shark.position.x += Math.sin(sd.heading) * huntSpeed;
          shark.position.z += Math.cos(sd.heading) * huntSpeed;

          if (dist < 2) {
            killMonster(sd.target, t);
            sd.target = null;
            sd.biteTimer = 40;
          }
        } else {
          // Smooth orbital patrol (like 2D version)
          const orbitR = 12;
          const sx = shark.position.x, sz = shark.position.z;
          const currentR = Math.sqrt(sx*sx + sz*sz);
          const orbitAngle = Math.atan2(sx, sz);
          const tangent = orbitAngle + Math.PI * 0.5;
          const distError = currentR - orbitR;
          const desiredAngle = tangent + distError * 0.008 + Math.sin(t * 0.5 + sharkObjs.indexOf(shark)) * 0.1;
          let angleDiff = desiredAngle - sd.heading;
          while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
          while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
          sd.heading += angleDiff * 0.04;
          const swimSpeed = sd.speed * (0.9 + Math.sin(t * 0.7 + sharkObjs.indexOf(shark)) * 0.15);
          shark.position.x += Math.sin(sd.heading) * swimSpeed;
          shark.position.z += Math.cos(sd.heading) * swimSpeed;
        }

        shark.position.y = 0.3 + Math.sin(t * 1.8 + sharkObjs.indexOf(shark) * 1.5) * 0.2;
        // Smooth lookAt using heading
        const lookTarget = new THREE.Vector3(
          shark.position.x + Math.sin(sd.heading) * 2,
          shark.position.y,
          shark.position.z + Math.cos(sd.heading) * 2
        );
        shark.lookAt(lookTarget);
      }

      if (sharkWaveTimer > 600) {
        sharkWaveActive = false;
        sharkObjs.forEach(s => scene.remove(s)); sharkObjs = [];
        if (sharkWaterPlane) { scene.remove(sharkWaterPlane); sharkWaterPlane = null; }
      }

    // ===== TORNADO =====
    let tornadoActive = false, tornadoTimer = 0;
    let tornadoObj = null, tornadoCaught = [];

    window.triggerTornado = function() {
      if (tornadoActive) return;
      tornadoActive = true; tornadoTimer = 0; tornadoCaught = [];
      // Build particle-based tornado funnel
      tornadoObj = new THREE.Group();

      // Main spiral particles (250 particles spiraling upward)
      const tPartCount = 250;
      const tPartGeo = new THREE.BufferGeometry();
      const tPartPos = new Float32Array(tPartCount * 3);
      const tPartCol = new Float32Array(tPartCount * 3);
      const tPartData = []; // store angle and height for animation
      for (let i = 0; i < tPartCount; i++) {
        const h = Math.random() * 15;
        const p = h / 15; // 0=bottom, 1=top
        const radius = 2.5 * (1 - p * 0.8) + 0.2; // wide at bottom, narrow at top
        const angle = Math.random() * Math.PI * 2;
        tPartPos[i*3] = Math.cos(angle) * radius;
        tPartPos[i*3+1] = h;
        tPartPos[i*3+2] = Math.sin(angle) * radius;
        const gray = 0.35 + p * 0.35 + Math.random() * 0.1;
        tPartCol[i*3] = gray; tPartCol[i*3+1] = gray * 0.95; tPartCol[i*3+2] = gray * 0.9;
        tPartData.push({ angle, height: h, speed: 1.5 + Math.random() * 2 });
      }
      tPartGeo.setAttribute('position', new THREE.BufferAttribute(tPartPos, 3));
      tPartGeo.setAttribute('color', new THREE.BufferAttribute(tPartCol, 3));
      const tPartMat = new THREE.PointsMaterial({
        size: 0.25, vertexColors: true, transparent: true, opacity: 0.7,
        blending: THREE.NormalBlending, depthWrite: false
      });
      const tParticles = new THREE.Points(tPartGeo, tPartMat);
      tornadoObj.add(tParticles);
      tornadoObj.userData.tPartData = tPartData;
      tornadoObj.userData.tPartGeo = tPartGeo;

      // Debris particles (small boxes/spheres spinning around)
      const debrisCount = 30;
      const debrisMeshes = [];
      for (let d = 0; d < debrisCount; d++) {
        const isBox = Math.random() > 0.5;
        const debrisGeo = isBox
          ? new THREE.BoxGeometry(0.15, 0.15, 0.15)
          : new THREE.SphereGeometry(0.1, 4, 4);
        const debrisMat = new THREE.MeshStandardMaterial({
          color: new THREE.Color().setHSL(0.08 + Math.random() * 0.05, 0.3, 0.25 + Math.random() * 0.2),
          roughness: 0.9
        });
        const debris = new THREE.Mesh(debrisGeo, debrisMat);
        debris.userData.dAngle = Math.random() * Math.PI * 2;
        debris.userData.dHeight = Math.random() * 12;
        debris.userData.dSpeed = 1.5 + Math.random() * 2.5;
        debris.userData.dRadOff = Math.random() * 0.5;
        debris.castShadow = true;
        tornadoObj.add(debris);
        debrisMeshes.push(debris);
      }
      tornadoObj.userData.debrisMeshes = debrisMeshes;

      // Dust cloud at the base (semi-transparent disc)
      const dustGeo = new THREE.CircleGeometry(3.5, 24);
      const dustMat = new THREE.MeshBasicMaterial({
        color: 0x8a7a6a, transparent: true, opacity: 0.3, side: THREE.DoubleSide
      });
      const dustCloud = new THREE.Mesh(dustGeo, dustMat);
      dustCloud.rotation.x = -Math.PI / 2;
      dustCloud.position.y = 0.1;
      tornadoObj.add(dustCloud);
      tornadoObj.userData.dustCloud = dustCloud;

      tornadoObj.position.set(20, 0, 0);
      scene.add(tornadoObj);
    };

    function updateTornado(t) {
      if (!tornadoActive || !tornadoObj) return;
      tornadoTimer++;

      // Move tornado
      if (tornadoTimer < 60) {
        tornadoObj.position.lerp(new THREE.Vector3(Math.cos(t * 0.3) * 12, 0, Math.sin(t * 0.3) * 12), 0.03);
      } else if (tornadoTimer < 360) {
        const a = t * 0.5;
        tornadoObj.position.set(Math.cos(a) * 12, 0, Math.sin(a) * 12);
      } else {
        tornadoObj.position.y += 0.15;
      }

      // Animate tornado particles spiraling upward
      const tpd = tornadoObj.userData.tPartData;
      const tpg = tornadoObj.userData.tPartGeo;
      if (tpd && tpg) {
        const tpos = tpg.attributes.position.array;
        for (let i = 0; i < tpd.length; i++) {
          tpd[i].angle += tpd[i].speed * 0.02;
          tpd[i].height += 0.04 + Math.random() * 0.02;
          if (tpd[i].height > 15) tpd[i].height = 0;
          const p = tpd[i].height / 15;
          const radius = 2.5 * (1 - p * 0.8) + 0.2 + Math.sin(t * 2 + i) * 0.2;
          tpos[i*3] = Math.cos(tpd[i].angle) * radius;
          tpos[i*3+1] = tpd[i].height;
          tpos[i*3+2] = Math.sin(tpd[i].angle) * radius;
        }
        tpg.attributes.position.needsUpdate = true;
      }
      // Animate debris spinning
      const debrisMeshes = tornadoObj.userData.debrisMeshes;
      if (debrisMeshes) {
        for (const d of debrisMeshes) {
          d.userData.dAngle += d.userData.dSpeed * 0.02;
          d.userData.dHeight += 0.03;
          if (d.userData.dHeight > 12) d.userData.dHeight = 0;
          const dp = d.userData.dHeight / 12;
          const dr = 2.2 * (1 - dp * 0.7) + d.userData.dRadOff;
          d.position.set(Math.cos(d.userData.dAngle) * dr, d.userData.dHeight, Math.sin(d.userData.dAngle) * dr);
          d.rotation.x = t * 3; d.rotation.z = t * 2;
        }
      }
      // Rotate dust cloud
      const dustCloud = tornadoObj.userData.dustCloud;
      if (dustCloud) {
        dustCloud.rotation.z = t * 0.5;
        dustCloud.material.opacity = 0.2 + Math.sin(t * 2) * 0.08;
      }

      // Catch monsters
      if (tornadoTimer >= 60 && tornadoTimer < 360) {
        for (const m of monsters) {
          if (m.userData.state !== 'approaching') continue;
          if (tornadoCaught.includes(m)) continue;
          const d = new THREE.Vector2(m.position.x - tornadoObj.position.x, m.position.z - tornadoObj.position.z).length();
          if (d < 4) {
            m.userData.state = 'caught';
            tornadoCaught.push(m);
          }
        }
      }

      // Spin caught monsters
      for (let i = tornadoCaught.length - 1; i >= 0; i--) {
        const m = tornadoCaught[i];
        if (!monsters.includes(m)) { tornadoCaught.splice(i, 1); continue; }
        const a = t * 3 + i * 1.5;
        const r = 2 + Math.sin(t + i) * 0.5;
        m.position.x = tornadoObj.position.x + Math.cos(a) * r;
        m.position.z = tornadoObj.position.z + Math.sin(a) * r;
        m.position.y = tornadoObj.position.y + 3 + i * 1.5 + tornadoTimer * 0.005;
        m.rotation.x = t * 2; m.rotation.z = t * 3;

        // Eject after spinning
        if (m.position.y > 15) {
          m.userData.state = 'hit'; m.userData.hitTime = t;
          m.userData.flyVel.set((Math.random()-0.5)*0.3, 0.3, (Math.random()-0.5)*0.3);
          monstersDefeated++;
          document.getElementById('monsterCount').textContent = monstersDefeated;
          tornadoCaught.splice(i, 1);
        }
      }

      if (tornadoTimer > 480 && tornadoCaught.length === 0) {
        tornadoActive = false;
        scene.remove(tornadoObj); tornadoObj = null;
      }
    }
