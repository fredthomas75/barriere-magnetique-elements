<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barriere Magnetique Elementaire - Protection Maison</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;600&display=swap');

    body {
      overflow: hidden;
      background: #000;
      font-family: 'Exo 2', sans-serif;
      user-select: none;
      -webkit-user-select: none;
    }

    canvas {
      display: block;
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
    }

    #ui-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      pointer-events: none;
      z-index: 10;
    }

    .top-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px 30px;
      gap: 18px;
    }

    .shield-status {
      font-family: 'Orbitron', monospace;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 8px 22px;
      border-radius: 30px;
      border: 2px solid;
      transition: all 0.5s ease;
      text-align: center;
    }

    .shield-status.active {
      color: #00ff88;
      border-color: #00ff8855;
      background: #00ff8815;
      box-shadow: 0 0 20px #00ff8833, inset 0 0 20px #00ff8811;
      animation: statusPulse 2s ease-in-out infinite;
    }

    .shield-status.inactive {
      color: #ff4444;
      border-color: #ff444455;
      background: #ff444415;
      box-shadow: 0 0 20px #ff444433;
    }

    @keyframes statusPulse {
      0%, 100% { box-shadow: 0 0 20px #00ff8833, inset 0 0 20px #00ff8811; }
      50% { box-shadow: 0 0 40px #00ff8855, inset 0 0 30px #00ff8822; }
    }

    .title-area {
      text-align: center;
      padding-top: 8px;
    }

    .title-area h1 {
      font-family: 'Orbitron', monospace;
      font-size: clamp(14px, 3vw, 24px);
      font-weight: 900;
      background: linear-gradient(90deg, #00c6ff, #ff00e5, #ffaa00, #00ff88);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 4s ease infinite;
      text-shadow: none;
      letter-spacing: 2px;
    }

    .title-area p {
      font-size: clamp(10px, 1.8vw, 13px);
      color: #8899bb;
      margin-top: 4px;
      letter-spacing: 1px;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .controls {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 20px;
      pointer-events: all;
      z-index: 20;
    }

    .btn {
      font-family: 'Orbitron', monospace;
      font-size: clamp(11px, 2vw, 15px);
      font-weight: 700;
      letter-spacing: 2px;
      padding: 14px 36px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: -2px; left: -2px;
      right: -2px; bottom: -2px;
      border-radius: 52px;
      z-index: -1;
    }

    .btn-activate {
      background: linear-gradient(135deg, #00ff88, #00c6ff);
      color: #001a0e;
      box-shadow: 0 0 30px #00ff8844, 0 4px 15px rgba(0,0,0,0.3);
    }
    .btn-activate:hover {
      transform: scale(1.08);
      box-shadow: 0 0 50px #00ff8866, 0 6px 25px rgba(0,0,0,0.4);
    }
    .btn-activate:active { transform: scale(0.98); }

    .btn-deactivate {
      background: linear-gradient(135deg, #ff4444, #ff8800);
      color: #1a0000;
      box-shadow: 0 0 30px #ff444444, 0 4px 15px rgba(0,0,0,0.3);
    }
    .btn-deactivate:hover {
      transform: scale(1.08);
      box-shadow: 0 0 50px #ff444466, 0 6px 25px rgba(0,0,0,0.4);
    }
    .btn-deactivate:active { transform: scale(0.98); }

    .element-selector {
      position: fixed;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 12px;
      pointer-events: all;
      z-index: 20;
    }

    .element-btn {
      width: 50px; height: 50px;
      border-radius: 50%;
      border: 2px solid;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(5px);
    }

    .element-btn:hover { transform: scale(1.2); }
    .element-btn.active { transform: scale(1.15); }

    .element-btn.fire { border-color: #ff4400; box-shadow: 0 0 15px #ff440066; }
    .element-btn.fire.active { box-shadow: 0 0 25px #ff4400aa, inset 0 0 15px #ff440044; }
    .element-btn.ice { border-color: #00ccff; box-shadow: 0 0 15px #00ccff66; }
    .element-btn.ice.active { box-shadow: 0 0 25px #00ccffaa, inset 0 0 15px #00ccff44; }
    .element-btn.electric { border-color: #ffee00; box-shadow: 0 0 15px #ffee0066; }
    .element-btn.electric.active { box-shadow: 0 0 25px #ffee00aa, inset 0 0 15px #ffee0044; }
    .element-btn.water { border-color: #0066ff; box-shadow: 0 0 15px #0066ff66; }
    .element-btn.water.active { box-shadow: 0 0 25px #0066ffaa, inset 0 0 15px #0066ff44; }
    .element-btn.venom { border-color: #aa00ff; box-shadow: 0 0 15px #aa00ff66; }
    .element-btn.venom.active { box-shadow: 0 0 25px #aa00ffaa, inset 0 0 15px #aa00ff44; }

    .monster-counter {
      position: fixed;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      pointer-events: none;
    }

    .counter-label {
      font-family: 'Orbitron', monospace;
      font-size: 10px;
      color: #ff4444;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .counter-value {
      font-family: 'Orbitron', monospace;
      font-size: 36px;
      font-weight: 900;
      color: #ff6644;
      text-shadow: 0 0 20px #ff664488;
    }

    .counter-sub {
      font-family: 'Orbitron', monospace;
      font-size: 10px;
      color: #00ff88;
      letter-spacing: 2px;
    }

    .address-badge {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Orbitron', monospace;
      font-size: 10px;
      color: #556688;
      letter-spacing: 2px;
      pointer-events: none;
      text-align: center;
    }

    @media (max-width: 600px) {
      .element-selector { right: 8px; gap: 8px; }
      .element-btn { width: 40px; height: 40px; font-size: 18px; }
      .controls { bottom: 20px; gap: 12px; }
      .btn { padding: 12px 24px; font-size: 10px; }
      .monster-counter { left: 8px; }
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <div id="ui-overlay">
    <div class="top-bar">
      <div class="shield-status inactive" id="shieldStatus">Bouclier Inactif</div>
    </div>
    <div class="title-area">
      <h1>Barriere Magnetique Elementaire</h1>
      <p>Systeme de Protection Avance - Maison Argyle</p>
    </div>

    <div class="monster-counter">
      <div class="counter-label">Monstres</div>
      <div class="counter-label">Repousses</div>
      <div class="counter-value" id="monsterCount">0</div>
      <div class="counter-sub">vers l'espace</div>
    </div>

    <div class="element-selector">
      <div class="element-btn fire active" data-element="fire" title="Feu">&#128293;</div>
      <div class="element-btn ice active" data-element="ice" title="Glace">&#10052;&#65039;</div>
      <div class="element-btn electric active" data-element="electric" title="Electricite">&#9889;</div>
      <div class="element-btn water active" data-element="water" title="Eau">&#128167;</div>
      <div class="element-btn venom active" data-element="venom" title="Pics de Glace Venimeux">&#9760;&#65039;</div>
    </div>

    <div class="address-badge">
      455 Avenue Argyle, Westmount, QC &bull; Protection Active 24/7
    </div>
  </div>

  <div class="controls">
    <button class="btn btn-activate" id="btnActivate" onclick="activateBarrier()">
      Activer Bouclier
    </button>
    <button class="btn btn-deactivate" id="btnDeactivate" onclick="deactivateBarrier()">
      Desactiver
    </button>
  </div>

  <script>
    // ===== CANVAS SETUP =====
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let W, H, centerX, centerY;
    let barrierActive = false;
    let monstersDefeated = 0;
    let activationProgress = 0;
    let shakeAmount = 0;

    const activeElements = { fire: true, ice: true, electric: true, water: true, venom: true };

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
      centerX = W / 2;
      centerY = H / 2;
    }
    window.addEventListener('resize', resize);
    resize();

    // ===== STARS =====
    class Star {
      constructor() { this.reset(); }
      reset() {
        this.x = Math.random() * W;
        this.y = Math.random() * H;
        this.size = Math.random() * 2 + 0.5;
        this.twinkleSpeed = Math.random() * 0.03 + 0.01;
        this.twinklePhase = Math.random() * Math.PI * 2;
        this.brightness = Math.random() * 0.5 + 0.5;
      }
      draw(t) {
        const alpha = this.brightness * (0.5 + 0.5 * Math.sin(t * this.twinkleSpeed + this.twinklePhase));
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(200, 220, 255, ${alpha})`;
        ctx.fill();
      }
    }

    const stars = Array.from({ length: 200 }, () => new Star());

    // ===== HOUSE DRAWING =====
    const houseW = Math.min(280, W * 0.35);
    const houseH = houseW * 0.85;

    function drawHouse() {
      const hx = centerX;
      const hy = centerY + 20;
      const hw = houseW;
      const hh = houseH;

      ctx.save();

      // Main house body - stone facade
      const bodyGrad = ctx.createLinearGradient(hx - hw/2, hy - hh/3, hx + hw/2, hy + hh/2);
      bodyGrad.addColorStop(0, '#5a4e42');
      bodyGrad.addColorStop(0.5, '#4a3f35');
      bodyGrad.addColorStop(1, '#3d3328');
      ctx.fillStyle = bodyGrad;
      ctx.beginPath();
      ctx.rect(hx - hw/2, hy - hh/3, hw, hh * 0.7);
      ctx.fill();

      // Roof
      const roofGrad = ctx.createLinearGradient(hx, hy - hh/1.2, hx, hy - hh/3);
      roofGrad.addColorStop(0, '#2a2a35');
      roofGrad.addColorStop(1, '#1a1a25');
      ctx.fillStyle = roofGrad;
      ctx.beginPath();
      ctx.moveTo(hx - hw/2 - 20, hy - hh/3);
      ctx.lineTo(hx, hy - hh/1.2);
      ctx.lineTo(hx + hw/2 + 20, hy - hh/3);
      ctx.closePath();
      ctx.fill();

      // Roof edge highlight
      ctx.strokeStyle = '#3a3a4a';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(hx - hw/2 - 20, hy - hh/3);
      ctx.lineTo(hx, hy - hh/1.2);
      ctx.lineTo(hx + hw/2 + 20, hy - hh/3);
      ctx.stroke();

      // Chimney
      ctx.fillStyle = '#3d3328';
      ctx.fillRect(hx + hw * 0.2, hy - hh/1.05, hw * 0.12, hh * 0.25);
      ctx.fillStyle = '#2a2a35';
      ctx.fillRect(hx + hw * 0.18, hy - hh/1.05, hw * 0.16, hh * 0.04);

      // Windows - two rows
      const winColor = barrierActive ? 'rgba(255, 220, 140, 0.9)' : 'rgba(255, 200, 100, 0.35)';
      const winGlow = barrierActive ? 'rgba(255, 200, 80, 0.4)' : 'rgba(255, 200, 80, 0.1)';
      const winW = hw * 0.16;
      const winH = hh * 0.16;

      // Top windows
      [- 0.25, 0, 0.25].forEach(offset => {
        const wx = hx + hw * offset - winW / 2;
        const wy = hy - hh * 0.18;
        ctx.shadowColor = winGlow;
        ctx.shadowBlur = barrierActive ? 20 : 5;
        ctx.fillStyle = winColor;
        ctx.fillRect(wx, wy, winW, winH);
        ctx.shadowBlur = 0;
        // Window frame
        ctx.strokeStyle = '#2a2520';
        ctx.lineWidth = 2;
        ctx.strokeRect(wx, wy, winW, winH);
        ctx.beginPath();
        ctx.moveTo(wx + winW/2, wy);
        ctx.lineTo(wx + winW/2, wy + winH);
        ctx.moveTo(wx, wy + winH/2);
        ctx.lineTo(wx + winW/2, wy + winH/2);
        ctx.stroke();
      });

      // Bottom windows
      [-0.28, 0.28].forEach(offset => {
        const wx = hx + hw * offset - winW * 0.7;
        const wy = hy + hh * 0.05;
        const bwW = winW * 1.4;
        const bwH = winH * 1.2;
        ctx.shadowColor = winGlow;
        ctx.shadowBlur = barrierActive ? 25 : 5;
        ctx.fillStyle = winColor;
        ctx.fillRect(wx, wy, bwW, bwH);
        ctx.shadowBlur = 0;
        ctx.strokeStyle = '#2a2520';
        ctx.lineWidth = 2;
        ctx.strokeRect(wx, wy, bwW, bwH);
        ctx.beginPath();
        ctx.moveTo(wx + bwW/3, wy);
        ctx.lineTo(wx + bwW/3, wy + bwH);
        ctx.moveTo(wx + bwW*2/3, wy);
        ctx.lineTo(wx + bwW*2/3, wy + bwH);
        ctx.stroke();
      });

      // Front door
      const doorW = hw * 0.14;
      const doorH = hh * 0.28;
      const doorX = hx - doorW / 2;
      const doorY = hy + hh * 0.7 - doorH;
      const doorGrad = ctx.createLinearGradient(doorX, doorY, doorX + doorW, doorY + doorH);
      doorGrad.addColorStop(0, '#3a2618');
      doorGrad.addColorStop(1, '#2a1a10');
      ctx.fillStyle = doorGrad;
      ctx.beginPath();
      ctx.moveTo(doorX, doorY + doorH);
      ctx.lineTo(doorX, doorY + doorW * 0.3);
      ctx.arcTo(doorX, doorY, doorX + doorW / 2, doorY, doorW * 0.5);
      ctx.arcTo(doorX + doorW, doorY, doorX + doorW, doorY + doorW * 0.3, doorW * 0.5);
      ctx.lineTo(doorX + doorW, doorY + doorH);
      ctx.closePath();
      ctx.fill();

      // Door handle
      ctx.beginPath();
      ctx.arc(doorX + doorW * 0.75, doorY + doorH * 0.55, 3, 0, Math.PI * 2);
      ctx.fillStyle = '#c4a53a';
      ctx.fill();

      // Door light
      if (barrierActive) {
        ctx.shadowColor = 'rgba(255, 200, 80, 0.6)';
        ctx.shadowBlur = 30;
        ctx.beginPath();
        ctx.arc(hx, doorY + doorH * 0.15 - 15, 5, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255, 220, 140, 0.9)';
        ctx.fill();
        ctx.shadowBlur = 0;
      }

      // Ground / lawn
      const groundGrad = ctx.createLinearGradient(0, hy + hh * 0.37, 0, H);
      groundGrad.addColorStop(0, '#1a2810');
      groundGrad.addColorStop(0.3, '#0f1a08');
      groundGrad.addColorStop(1, '#050a03');
      ctx.fillStyle = groundGrad;
      ctx.fillRect(0, hy + hh * 0.37, W, H - hy);

      // Path to door
      ctx.fillStyle = '#2a2520';
      ctx.beginPath();
      ctx.moveTo(doorX - 5, doorY + doorH);
      ctx.lineTo(doorX - 30, hy + hh * 0.37 + 40);
      ctx.lineTo(doorX + doorW + 30, hy + hh * 0.37 + 40);
      ctx.lineTo(doorX + doorW + 5, doorY + doorH);
      ctx.closePath();
      ctx.fill();

      // Bushes
      [[-0.38, 0.34], [0.38, 0.34], [-0.2, 0.36], [0.2, 0.36]].forEach(([ox, oy]) => {
        ctx.beginPath();
        ctx.arc(hx + hw * ox, hy + hh * oy, hw * 0.08, 0, Math.PI * 2);
        ctx.fillStyle = `rgb(${20 + Math.random() * 15}, ${50 + Math.random() * 20}, ${15 + Math.random() * 10})`;
        ctx.fill();
      });

      // Address label
      ctx.font = '10px Orbitron, monospace';
      ctx.fillStyle = 'rgba(200, 190, 170, 0.5)';
      ctx.textAlign = 'center';
      ctx.fillText('455', hx, doorY + doorH - 8);

      ctx.restore();
    }

    // ===== BARRIER =====
    const barrierRadius = Math.min(houseW * 1.1, W * 0.35);
    let barrierParticles = [];

    class BarrierParticle {
      constructor() { this.reset(); }
      reset() {
        this.angle = Math.random() * Math.PI * 2;
        this.radius = barrierRadius + (Math.random() - 0.5) * 20;
        this.speed = (Math.random() * 0.5 + 0.3) * (Math.random() > 0.5 ? 1 : -1);
        this.size = Math.random() * 3 + 1;
        this.life = 1;
        this.decay = Math.random() * 0.005 + 0.002;
        const elements = Object.keys(activeElements).filter(e => activeElements[e]);
        this.element = elements[Math.floor(Math.random() * elements.length)] || 'electric';
      }
      update() {
        this.angle += this.speed * 0.015;
        this.life -= this.decay;
        if (this.life <= 0) this.reset();
      }
      draw() {
        const x = centerX + Math.cos(this.angle) * this.radius;
        const y = (centerY + 20) + Math.sin(this.angle) * this.radius * 0.55;
        const colors = {
          fire: [`rgba(255, 100, 0, ${this.life})`, `rgba(255, 200, 0, ${this.life * 0.5})`],
          ice: [`rgba(0, 200, 255, ${this.life})`, `rgba(200, 240, 255, ${this.life * 0.5})`],
          electric: [`rgba(255, 255, 0, ${this.life})`, `rgba(200, 200, 255, ${this.life * 0.5})`],
          water: [`rgba(0, 100, 255, ${this.life})`, `rgba(100, 180, 255, ${this.life * 0.5})`],
          venom: [`rgba(170, 0, 255, ${this.life})`, `rgba(0, 255, 100, ${this.life * 0.5})`]
        };
        const [c1, c2] = colors[this.element] || colors.electric;
        ctx.beginPath();
        ctx.arc(x, y, this.size * this.life, 0, Math.PI * 2);
        ctx.fillStyle = c1;
        ctx.shadowColor = c2;
        ctx.shadowBlur = 10;
        ctx.fill();
        ctx.shadowBlur = 0;
      }
    }

    for (let i = 0; i < 150; i++) barrierParticles.push(new BarrierParticle());

    function drawBarrier(t) {
      if (activationProgress <= 0) return;
      const alpha = activationProgress;

      ctx.save();
      // Main barrier ellipse glow
      for (let i = 3; i >= 0; i--) {
        const r = barrierRadius + i * 8;
        ctx.beginPath();
        ctx.ellipse(centerX, centerY + 20, r, r * 0.55, 0, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(0, 200, 255, ${alpha * 0.08 * (4 - i)})`;
        ctx.lineWidth = 3 + i * 2;
        ctx.stroke();
      }

      // Rotating energy rings
      for (let ring = 0; ring < 3; ring++) {
        const ringOffset = t * 0.001 * (ring + 1) * (ring % 2 === 0 ? 1 : -1);
        ctx.beginPath();
        ctx.ellipse(centerX, centerY + 20, barrierRadius + ring * 5, (barrierRadius + ring * 5) * 0.55, ringOffset, 0, Math.PI * 2);
        const colors = ['rgba(0, 255, 136, ', 'rgba(0, 200, 255, ', 'rgba(255, 100, 0, '];
        ctx.strokeStyle = colors[ring] + (alpha * 0.15) + ')';
        ctx.lineWidth = 1.5;
        ctx.setLineDash([10, 20 + ring * 10]);
        ctx.lineDashOffset = t * 0.05 * (ring % 2 === 0 ? 1 : -1);
        ctx.stroke();
        ctx.setLineDash([]);
      }

      // Hexagonal grid overlay
      const hexSize = 25;
      for (let a = 0; a < Math.PI * 2; a += 0.15) {
        const r = barrierRadius;
        const x = centerX + Math.cos(a) * r;
        const y = (centerY + 20) + Math.sin(a) * r * 0.55;
        const pulse = Math.sin(t * 0.003 + a * 5) * 0.5 + 0.5;
        ctx.beginPath();
        for (let s = 0; s < 6; s++) {
          const hx = x + Math.cos(Math.PI / 3 * s) * hexSize * 0.3;
          const hy = y + Math.sin(Math.PI / 3 * s) * hexSize * 0.3;
          s === 0 ? ctx.moveTo(hx, hy) : ctx.lineTo(hx, hy);
        }
        ctx.closePath();
        ctx.strokeStyle = `rgba(0, 200, 255, ${alpha * pulse * 0.2})`;
        ctx.lineWidth = 1;
        ctx.stroke();
      }

      // Barrier particles
      barrierParticles.forEach(p => {
        p.update();
        p.draw();
      });

      // Electric arcs
      if (activeElements.electric && Math.random() < 0.15) {
        const a1 = Math.random() * Math.PI * 2;
        const a2 = a1 + (Math.random() - 0.5) * 0.8;
        ctx.beginPath();
        const x1 = centerX + Math.cos(a1) * barrierRadius;
        const y1 = (centerY + 20) + Math.sin(a1) * barrierRadius * 0.55;
        const x2 = centerX + Math.cos(a2) * barrierRadius;
        const y2 = (centerY + 20) + Math.sin(a2) * barrierRadius * 0.55;
        ctx.moveTo(x1, y1);
        const midX = (x1 + x2) / 2 + (Math.random() - 0.5) * 30;
        const midY = (y1 + y2) / 2 + (Math.random() - 0.5) * 30;
        ctx.quadraticCurveTo(midX, midY, x2, y2);
        ctx.strokeStyle = `rgba(180, 200, 255, ${alpha * 0.8})`;
        ctx.lineWidth = 1.5;
        ctx.shadowColor = 'rgba(150, 180, 255, 0.8)';
        ctx.shadowBlur = 15;
        ctx.stroke();
        ctx.shadowBlur = 0;
      }

      ctx.restore();
    }

    // ===== MONSTERS =====
    const monsters = [];
    const monsterTypes = [
      { color: '#8B0000', eyeColor: '#ffff00', name: 'Shadow', size: 35 },
      { color: '#4B0082', eyeColor: '#ff0000', name: 'Phantom', size: 40 },
      { color: '#2F4F2F', eyeColor: '#00ff00', name: 'Ghoul', size: 30 },
      { color: '#3B0B0B', eyeColor: '#ff8800', name: 'Demon', size: 45 },
      { color: '#1a1a3a', eyeColor: '#cc00ff', name: 'Wraith', size: 38 }
    ];

    class Monster {
      constructor() {
        const type = monsterTypes[Math.floor(Math.random() * monsterTypes.length)];
        Object.assign(this, type);
        this.id = Math.random();

        // Spawn from edges
        const side = Math.floor(Math.random() * 4);
        if (side === 0) { this.x = -50; this.y = Math.random() * H; }
        else if (side === 1) { this.x = W + 50; this.y = Math.random() * H; }
        else if (side === 2) { this.x = Math.random() * W; this.y = -50; }
        else { this.x = Math.random() * W; this.y = H + 50; }

        this.speed = Math.random() * 0.5 + 0.3;
        this.wobble = Math.random() * Math.PI * 2;
        this.wobbleSpeed = Math.random() * 0.02 + 0.01;
        this.state = 'approaching'; // approaching, hit, flying
        this.hitTime = 0;
        this.flyVx = 0;
        this.flyVy = 0;
        this.flyRotation = 0;
        this.flyRotSpeed = 0;
        this.opacity = 1;
        this.mouthOpen = Math.random() * Math.PI;
        this.tentacles = Math.floor(Math.random() * 4) + 2;
        this.hornSize = Math.random() * 15 + 5;
      }

      update(t) {
        if (this.state === 'approaching') {
          const dx = centerX - this.x;
          const dy = (centerY + 20) - this.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          const adjustedDist = Math.sqrt(dx * dx + (dy / 0.55) * (dy / 0.55));

          this.wobble += this.wobbleSpeed;
          const wobbleX = Math.sin(this.wobble) * 2;
          const wobbleY = Math.cos(this.wobble * 1.3) * 2;

          this.x += (dx / dist) * this.speed + wobbleX * 0.3;
          this.y += (dy / dist) * this.speed + wobbleY * 0.3;

          // Check barrier collision
          const bx = this.x - centerX;
          const by = (this.y - (centerY + 20)) / 0.55;
          const barrierDist = Math.sqrt(bx * bx + by * by);

          if (barrierActive && barrierDist < barrierRadius + 15) {
            this.state = 'hit';
            this.hitTime = t;
            const angle = Math.atan2(this.y - (centerY + 20), this.x - centerX);
            this.flyVx = Math.cos(angle) * (8 + Math.random() * 5);
            this.flyVy = Math.sin(angle) * (8 + Math.random() * 5) - 6;
            this.flyRotSpeed = (Math.random() - 0.5) * 0.3;
            monstersDefeated++;
            document.getElementById('monsterCount').textContent = monstersDefeated;
            shakeAmount = 8;

            // Spawn projectiles toward monster
            spawnProjectiles(this.x, this.y, angle);
          }
        } else if (this.state === 'hit') {
          const elapsed = (t - this.hitTime) / 1000;
          if (elapsed < 0.5) {
            // Brief impact freeze with shake
            this.opacity = 1 - elapsed;
          } else {
            this.state = 'flying';
          }
        } else if (this.state === 'flying') {
          this.x += this.flyVx;
          this.y += this.flyVy;
          this.flyVy -= 0.15; // Fly upward toward space
          this.flyRotation += this.flyRotSpeed;
          this.opacity -= 0.008;
          this.size *= 0.998;
        }
      }

      draw(t) {
        if (this.opacity <= 0) return;
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.flyRotation);
        ctx.globalAlpha = this.opacity;

        // Body
        const bodyPulse = 1 + Math.sin(t * 0.005 + this.id * 10) * 0.05;
        const s = this.size * bodyPulse;

        // Shadow/glow
        ctx.shadowColor = this.state === 'hit' ? 'rgba(255,255,255,0.8)' : `${this.color}88`;
        ctx.shadowBlur = this.state === 'hit' ? 30 : 15;

        // Main body (blobby shape)
        ctx.beginPath();
        for (let i = 0; i < 12; i++) {
          const a = (i / 12) * Math.PI * 2;
          const wobble = Math.sin(t * 0.003 + a * 3 + this.id) * 3;
          const r = s + wobble;
          const px = Math.cos(a) * r;
          const py = Math.sin(a) * r;
          i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
        }
        ctx.closePath();
        const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, s);
        grad.addColorStop(0, this.color);
        grad.addColorStop(1, '#000000');
        ctx.fillStyle = grad;
        ctx.fill();
        ctx.shadowBlur = 0;

        // Horns
        ctx.fillStyle = '#1a1a1a';
        [-0.6, 0.6].forEach(side => {
          ctx.beginPath();
          ctx.moveTo(side * s * 0.5, -s * 0.6);
          ctx.lineTo(side * s * 0.3, -s - this.hornSize);
          ctx.lineTo(side * s * 0.7, -s * 0.4);
          ctx.closePath();
          ctx.fill();
        });

        // Eyes
        const eyeY = -s * 0.15;
        [-1, 1].forEach(side => {
          const eyeX = side * s * 0.3;
          // Eye glow
          ctx.shadowColor = this.eyeColor;
          ctx.shadowBlur = 12;
          ctx.beginPath();
          ctx.arc(eyeX, eyeY, s * 0.18, 0, Math.PI * 2);
          ctx.fillStyle = this.eyeColor;
          ctx.fill();
          // Pupil
          ctx.shadowBlur = 0;
          ctx.beginPath();
          const lookX = (centerX - this.x) * 0.001;
          const lookY = ((centerY + 20) - this.y) * 0.001;
          ctx.arc(eyeX + lookX * 3, eyeY + lookY * 3, s * 0.08, 0, Math.PI * 2);
          ctx.fillStyle = '#000';
          ctx.fill();
        });

        // Mouth
        const mouthOpen = Math.abs(Math.sin(t * 0.004 + this.mouthOpen)) * s * 0.2;
        ctx.beginPath();
        ctx.ellipse(0, s * 0.25, s * 0.25, mouthOpen, 0, 0, Math.PI * 2);
        ctx.fillStyle = '#000';
        ctx.fill();
        // Teeth
        if (mouthOpen > 3) {
          ctx.fillStyle = '#ddd';
          for (let ti = -2; ti <= 2; ti++) {
            ctx.beginPath();
            ctx.moveTo(ti * s * 0.1 - 3, s * 0.25 - mouthOpen + 2);
            ctx.lineTo(ti * s * 0.1, s * 0.25 - mouthOpen + 8);
            ctx.lineTo(ti * s * 0.1 + 3, s * 0.25 - mouthOpen + 2);
            ctx.closePath();
            ctx.fill();
          }
        }

        // Tentacles / arms
        for (let i = 0; i < this.tentacles; i++) {
          const ta = (i / this.tentacles) * Math.PI + Math.PI / 2;
          const tx = Math.cos(ta) * s;
          const ty = Math.sin(ta) * s * 0.3 + s * 0.4;
          const wave = Math.sin(t * 0.005 + i * 2) * 15;
          ctx.beginPath();
          ctx.moveTo(tx * 0.5, ty);
          ctx.quadraticCurveTo(tx + wave, ty + s * 0.3, tx * 0.8 + wave * 1.5, ty + s * 0.6);
          ctx.strokeStyle = this.color;
          ctx.lineWidth = 4;
          ctx.lineCap = 'round';
          ctx.stroke();
        }

        ctx.globalAlpha = 1;
        ctx.restore();
      }
    }

    // ===== PROJECTILES =====
    const projectiles = [];

    class Projectile {
      constructor(x, y, tx, ty, element) {
        this.x = x; this.y = y;
        this.element = element;
        const angle = Math.atan2(ty - y, tx - x);
        const speed = 6 + Math.random() * 4;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.life = 1;
        this.size = element === 'venom' ? 8 : 6;
        this.trail = [];
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.life -= 0.02;
        this.trail.push({ x: this.x, y: this.y, life: 1 });
        if (this.trail.length > 10) this.trail.shift();
        this.trail.forEach(t => t.life -= 0.1);
      }

      draw() {
        if (this.life <= 0) return;
        ctx.save();

        const colors = {
          fire: { main: '#ff4400', glow: '#ff880066', trail: '#ff660044' },
          ice: { main: '#00ddff', glow: '#88eeff66', trail: '#00bbff44' },
          electric: { main: '#ffff00', glow: '#ffff8866', trail: '#ffee0044' },
          water: { main: '#0088ff', glow: '#44aaff66', trail: '#0066ff44' },
          venom: { main: '#aa00ff', glow: '#cc44ff66', trail: '#8800cc44' }
        };
        const c = colors[this.element] || colors.fire;

        // Trail
        this.trail.forEach((t, i) => {
          if (t.life <= 0) return;
          ctx.beginPath();
          ctx.arc(t.x, t.y, this.size * t.life * 0.5, 0, Math.PI * 2);
          ctx.fillStyle = c.trail;
          ctx.fill();
        });

        // Main projectile
        ctx.shadowColor = c.glow;
        ctx.shadowBlur = 20;
        ctx.beginPath();
        if (this.element === 'venom') {
          // Ice spike shape
          ctx.save();
          ctx.translate(this.x, this.y);
          ctx.rotate(Math.atan2(this.vy, this.vx));
          ctx.beginPath();
          ctx.moveTo(this.size * 2, 0);
          ctx.lineTo(-this.size, -this.size * 0.6);
          ctx.lineTo(-this.size * 0.5, 0);
          ctx.lineTo(-this.size, this.size * 0.6);
          ctx.closePath();
          ctx.fillStyle = '#88eeff';
          ctx.fill();
          // Venom drips
          ctx.beginPath();
          ctx.arc(this.size * 0.5, 3, 2, 0, Math.PI * 2);
          ctx.fillStyle = '#00ff44';
          ctx.shadowColor = '#00ff4488';
          ctx.fill();
          ctx.restore();
        } else if (this.element === 'ice') {
          // Ice spike
          ctx.save();
          ctx.translate(this.x, this.y);
          ctx.rotate(Math.atan2(this.vy, this.vx));
          ctx.beginPath();
          ctx.moveTo(this.size * 1.8, 0);
          ctx.lineTo(-this.size, -this.size * 0.5);
          ctx.lineTo(-this.size * 0.3, 0);
          ctx.lineTo(-this.size, this.size * 0.5);
          ctx.closePath();
          ctx.fillStyle = c.main;
          ctx.fill();
          ctx.restore();
        } else {
          ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
          ctx.fillStyle = c.main;
          ctx.fill();
        }

        ctx.shadowBlur = 0;
        ctx.restore();
      }
    }

    function spawnProjectiles(tx, ty, angle) {
      const elements = Object.keys(activeElements).filter(e => activeElements[e]);
      const bx = centerX + Math.cos(angle) * barrierRadius * 0.9;
      const by = (centerY + 20) + Math.sin(angle) * barrierRadius * 0.55 * 0.9;

      for (let i = 0; i < 5; i++) {
        const el = elements[Math.floor(Math.random() * elements.length)];
        const spread = (Math.random() - 0.5) * 0.5;
        const pa = angle + spread;
        const px = bx + Math.cos(pa) * 10;
        const py = by + Math.sin(pa) * 10;
        setTimeout(() => {
          projectiles.push(new Projectile(px, py, tx + (Math.random() - 0.5) * 40, ty + (Math.random() - 0.5) * 40, el));
        }, i * 50);
      }
    }

    // ===== IMPACT PARTICLES =====
    const impactParticles = [];

    class ImpactParticle {
      constructor(x, y, color) {
        this.x = x; this.y = y;
        this.vx = (Math.random() - 0.5) * 8;
        this.vy = (Math.random() - 0.5) * 8;
        this.life = 1;
        this.color = color;
        this.size = Math.random() * 4 + 2;
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vx *= 0.96;
        this.vy *= 0.96;
        this.life -= 0.025;
      }
      draw() {
        if (this.life <= 0) return;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
        ctx.fillStyle = this.color.replace('1)', `${this.life})`);
        ctx.fill();
      }
    }

    // ===== FLYING TO SPACE TEXT =====
    const spaceTexts = [];

    class SpaceText {
      constructor(x, y) {
        this.x = x; this.y = y;
        this.vy = -2;
        this.life = 1;
        this.text = ['VERS L\'ESPACE!', 'BYE BYE!', 'REJETE!', 'DEHORS!', 'AU REVOIR!'][Math.floor(Math.random() * 5)];
      }
      update() {
        this.y += this.vy;
        this.vy -= 0.05;
        this.life -= 0.015;
      }
      draw() {
        if (this.life <= 0) return;
        ctx.save();
        ctx.font = 'bold 16px Orbitron, monospace';
        ctx.textAlign = 'center';
        ctx.fillStyle = `rgba(255, 200, 0, ${this.life})`;
        ctx.shadowColor = 'rgba(255, 150, 0, 0.5)';
        ctx.shadowBlur = 10;
        ctx.fillText(this.text, this.x, this.y);
        ctx.shadowBlur = 0;
        ctx.restore();
      }
    }

    // ===== MONSTER SPAWNER =====
    let lastSpawn = 0;
    const spawnInterval = 3000;

    function spawnMonster(t) {
      if (!barrierActive) return;
      if (t - lastSpawn > spawnInterval) {
        monsters.push(new Monster());
        lastSpawn = t;
      }
    }

    // ===== ACTIVATION / DEACTIVATION =====
    function activateBarrier() {
      if (barrierActive) return;
      barrierActive = true;
      document.getElementById('shieldStatus').className = 'shield-status active';
      document.getElementById('shieldStatus').textContent = 'Bouclier Actif';
      document.getElementById('btnActivate').style.display = 'none';
      document.getElementById('btnDeactivate').style.display = 'block';

      // Activation burst effect
      for (let i = 0; i < 50; i++) {
        const angle = Math.random() * Math.PI * 2;
        const x = centerX + Math.cos(angle) * barrierRadius;
        const y = (centerY + 20) + Math.sin(angle) * barrierRadius * 0.55;
        impactParticles.push(new ImpactParticle(x, y, 'rgba(0, 255, 136, 1)'));
      }
    }

    function deactivateBarrier() {
      barrierActive = false;
      activationProgress = 0;
      document.getElementById('shieldStatus').className = 'shield-status inactive';
      document.getElementById('shieldStatus').textContent = 'Bouclier Inactif';
      document.getElementById('btnActivate').style.display = 'block';
      document.getElementById('btnDeactivate').style.display = 'none';

      // Remove all monsters
      monsters.length = 0;
    }

    // Initial button state
    document.getElementById('btnDeactivate').style.display = 'none';

    // Element selector
    document.querySelectorAll('.element-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const el = btn.dataset.element;
        activeElements[el] = !activeElements[el];
        btn.classList.toggle('active');
      });
    });

    // ===== MOON =====
    function drawMoon(t) {
      const mx = W * 0.85;
      const my = H * 0.12;
      const mr = 35;

      ctx.save();
      ctx.shadowColor = 'rgba(200, 220, 255, 0.5)';
      ctx.shadowBlur = 40;
      const moonGrad = ctx.createRadialGradient(mx - 5, my - 5, 0, mx, my, mr);
      moonGrad.addColorStop(0, '#ffffee');
      moonGrad.addColorStop(0.7, '#dde0cc');
      moonGrad.addColorStop(1, '#bbbbaa');
      ctx.beginPath();
      ctx.arc(mx, my, mr, 0, Math.PI * 2);
      ctx.fillStyle = moonGrad;
      ctx.fill();

      // Craters
      ctx.fillStyle = 'rgba(150, 150, 130, 0.3)';
      [[5, -8, 6], [-10, 5, 4], [8, 10, 3], [-5, -12, 5]].forEach(([ox, oy, r]) => {
        ctx.beginPath();
        ctx.arc(mx + ox, my + oy, r, 0, Math.PI * 2);
        ctx.fill();
      });

      ctx.shadowBlur = 0;
      ctx.restore();
    }

    // ===== MAIN LOOP =====
    function gameLoop(t) {
      // Screen shake
      ctx.save();
      if (shakeAmount > 0) {
        ctx.translate(
          (Math.random() - 0.5) * shakeAmount,
          (Math.random() - 0.5) * shakeAmount
        );
        shakeAmount *= 0.9;
        if (shakeAmount < 0.5) shakeAmount = 0;
      }

      // Background gradient - night sky
      const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
      bgGrad.addColorStop(0, '#020010');
      bgGrad.addColorStop(0.4, '#0a0020');
      bgGrad.addColorStop(0.7, '#0f0a25');
      bgGrad.addColorStop(1, '#050510');
      ctx.fillStyle = bgGrad;
      ctx.fillRect(0, 0, W, H);

      // Aurora effect when barrier active
      if (activationProgress > 0) {
        for (let i = 0; i < 3; i++) {
          const ay = H * 0.1 + i * 30;
          ctx.beginPath();
          ctx.moveTo(0, ay);
          for (let x = 0; x < W; x += 20) {
            ctx.lineTo(x, ay + Math.sin(x * 0.005 + t * 0.001 + i) * 30);
          }
          ctx.lineTo(W, ay + 60);
          ctx.lineTo(0, ay + 60);
          ctx.closePath();
          const auroraColors = ['rgba(0, 255, 136, ', 'rgba(0, 150, 255, ', 'rgba(150, 0, 255, '];
          ctx.fillStyle = auroraColors[i] + (activationProgress * 0.03) + ')';
          ctx.fill();
        }
      }

      // Stars
      stars.forEach(s => s.draw(t));

      // Moon
      drawMoon(t);

      // House
      drawHouse();

      // Barrier activation animation
      if (barrierActive && activationProgress < 1) {
        activationProgress += 0.02;
      }

      // Barrier
      drawBarrier(t);

      // Spawn monsters
      spawnMonster(t);

      // Update and draw monsters
      for (let i = monsters.length - 1; i >= 0; i--) {
        monsters[i].update(t);
        monsters[i].draw(t);

        // Spawn space text on hit
        if (monsters[i].state === 'hit' && t - monsters[i].hitTime < 20) {
          spaceTexts.push(new SpaceText(monsters[i].x, monsters[i].y - 30));
          // Impact particles
          for (let j = 0; j < 20; j++) {
            impactParticles.push(new ImpactParticle(
              monsters[i].x,
              monsters[i].y,
              ['rgba(255,100,0,1)', 'rgba(0,200,255,1)', 'rgba(255,255,0,1)', 'rgba(170,0,255,1)'][Math.floor(Math.random() * 4)]
            ));
          }
        }

        if (monsters[i].opacity <= 0 || monsters[i].y < -200 || monsters[i].x < -200 || monsters[i].x > W + 200) {
          monsters.splice(i, 1);
        }
      }

      // Update and draw projectiles
      for (let i = projectiles.length - 1; i >= 0; i--) {
        projectiles[i].update();
        projectiles[i].draw();
        if (projectiles[i].life <= 0) projectiles.splice(i, 1);
      }

      // Impact particles
      for (let i = impactParticles.length - 1; i >= 0; i--) {
        impactParticles[i].update();
        impactParticles[i].draw();
        if (impactParticles[i].life <= 0) impactParticles.splice(i, 1);
      }

      // Space texts
      for (let i = spaceTexts.length - 1; i >= 0; i--) {
        spaceTexts[i].update();
        spaceTexts[i].draw();
        if (spaceTexts[i].life <= 0) spaceTexts.splice(i, 1);
      }

      ctx.restore();
      requestAnimationFrame(gameLoop);
    }

    requestAnimationFrame(gameLoop);

    // Handle window resize for stars
    window.addEventListener('resize', () => {
      stars.forEach(s => { s.x = Math.random() * W; s.y = Math.random() * H; });
    });

    // ===== SOUND EFFECTS (Web Audio API) =====
    let audioCtx = null;

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
    }

    function playActivationSound() {
      initAudio();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(200, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.5);
      osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.8);
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 1);

      // Second harmonic
      const osc2 = audioCtx.createOscillator();
      const gain2 = audioCtx.createGain();
      osc2.connect(gain2);
      gain2.connect(audioCtx.destination);
      osc2.type = 'triangle';
      osc2.frequency.setValueAtTime(400, audioCtx.currentTime);
      osc2.frequency.exponentialRampToValueAtTime(1600, audioCtx.currentTime + 0.6);
      gain2.gain.setValueAtTime(0.08, audioCtx.currentTime);
      gain2.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.8);
      osc2.start(audioCtx.currentTime);
      osc2.stop(audioCtx.currentTime + 0.8);
    }

    function playDeactivationSound() {
      initAudio();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(800, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.6);
      gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.7);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.7);
    }

    function playImpactSound() {
      initAudio();
      // Zap sound
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(600 + Math.random() * 400, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.15);
      gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.2);

      // Noise burst
      const bufferSize = audioCtx.sampleRate * 0.1;
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 3);
      }
      const noise = audioCtx.createBufferSource();
      noise.buffer = buffer;
      const noiseGain = audioCtx.createGain();
      noise.connect(noiseGain);
      noiseGain.connect(audioCtx.destination);
      noiseGain.gain.setValueAtTime(0.06, audioCtx.currentTime);
      noiseGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
      noise.start(audioCtx.currentTime);
    }

    // Add sound to barrier hum
    let humOsc = null;
    let humGain = null;

    function startBarrierHum() {
      initAudio();
      if (humOsc) return;
      humOsc = audioCtx.createOscillator();
      humGain = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = 200;
      humOsc.connect(filter);
      filter.connect(humGain);
      humGain.connect(audioCtx.destination);
      humOsc.type = 'sine';
      humOsc.frequency.value = 60;
      humGain.gain.setValueAtTime(0, audioCtx.currentTime);
      humGain.gain.linearRampToValueAtTime(0.04, audioCtx.currentTime + 1);
      humOsc.start();
    }

    function stopBarrierHum() {
      if (humOsc && humGain) {
        humGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
        setTimeout(() => {
          try { humOsc.stop(); } catch(e) {}
          humOsc = null;
          humGain = null;
        }, 600);
      }
    }

    // Patch activation functions with sound
    const origActivate = activateBarrier;
    activateBarrier = function() {
      origActivate();
      playActivationSound();
      startBarrierHum();
    };

    const origDeactivate = deactivateBarrier;
    deactivateBarrier = function() {
      origDeactivate();
      playDeactivationSound();
      stopBarrierHum();
    };

    // Patch impact with sound
    const origSpawnProjectiles = spawnProjectiles;
    spawnProjectiles = function(tx, ty, angle) {
      origSpawnProjectiles(tx, ty, angle);
      playImpactSound();
    };

    // First click to enable audio context
    document.addEventListener('click', initAudio, { once: true });
  </script>
</body>
</html>
