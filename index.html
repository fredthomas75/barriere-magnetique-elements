          ctx.fill();
          // Lightning arcs
          for (let l = 0; l < 4; l++) {
            const la = (l / 4) * Math.PI * 2 + this.t * 0.1;
            ctx.beginPath();
            ctx.moveTo(this.x, this.y);
            let lx = this.x, ly = this.y;
            for (let seg = 0; seg < 4; seg++) {
              lx += Math.cos(la + (Math.random() - 0.5) * 1.5) * (s * 0.6);
              ly += Math.sin(la + (Math.random() - 0.5) * 1.5) * (s * 0.6);
              ctx.lineTo(lx, ly);
            }
            ctx.strokeStyle = `rgba(255, 255, ${150 + Math.random() * 105}, 0.8)`;
            ctx.lineWidth = 1 + Math.random();
            ctx.stroke();
          }

        } else if (this.element === 'water') {
          // === WATER BLAST - swirling water orb ===
          this.trail.forEach((t, i) => {
            if (t.life <= 0) return;
            ctx.beginPath();
            ctx.arc(t.x + (Math.random() - 0.5) * 4, t.y + (Math.random() - 0.5) * 4, 3 * t.life, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(0, 150, 255, ${t.life * 0.3})`;
            ctx.fill();
          });
          // Water sphere
          const wGrd = ctx.createRadialGradient(this.x - s * 0.3, this.y - s * 0.3, 0, this.x, this.y, s * 1.2);
          wGrd.addColorStop(0, 'rgba(200, 240, 255, 0.9)');
          wGrd.addColorStop(0.4, 'rgba(0, 150, 255, 0.8)');
          wGrd.addColorStop(1, 'rgba(0, 50, 200, 0)');
          ctx.beginPath();
          ctx.arc(this.x, this.y, s * 1.2, 0, Math.PI * 2);
          ctx.fillStyle = wGrd;
          ctx.fill();
          // Swirl lines
          for (let w = 0; w < 3; w++) {
            const wa = this.t * 0.08 + (w / 3) * Math.PI * 2;
            ctx.beginPath();
            ctx.arc(this.x, this.y, s * (0.4 + w * 0.2), wa, wa + Math.PI * 0.8);
            ctx.strokeStyle = `rgba(200, 240, 255, ${0.3 + w * 0.1})`;
            ctx.lineWidth = 1.5;
            ctx.stroke();
          }
          // Highlight
          ctx.beginPath();
          ctx.arc(this.x - s * 0.3, this.y - s * 0.3, s * 0.25, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
          ctx.fill();
        }

        ctx.shadowBlur = 0;
        ctx.restore();
      }
    }

    function spawnProjectiles(tx, ty, angle) {
      if (projectiles.length >= MAX_PROJECTILES) return;
      const elements = Object.keys(activeElements).filter(e => activeElements[e]);
      if (elements.length === 0) return;
      const bx = centerX + Math.cos(angle) * barrierRadius * 0.9;
      const by = (centerY + 20) + Math.sin(angle) * barrierRadius * 0.55 * 0.9;

      const count = Math.min(4, MAX_PROJECTILES - projectiles.length);
      for (let i = 0; i < count; i++) {
        const el = elements[Math.floor(Math.random() * elements.length)];
        const spread = (Math.random() - 0.5) * 0.5;
        const pa = angle + spread;
        const px = bx + Math.cos(pa) * 10;
        const py = by + Math.sin(pa) * 10;
        projectiles.push(new Projectile(px, py, tx + (Math.random() - 0.5) * 40, ty + (Math.random() - 0.5) * 40, el));
      }
    }

    // ===== IMPACT PARTICLES =====
    const impactParticles = [];

    class ImpactParticle {
      constructor(x, y, color) {
        this.x = x; this.y = y;
        this.vx = (Math.random() - 0.5) * 8;
        this.vy = (Math.random() - 0.5) * 8;
        this.life = 1;
        this.color = color;
        this.size = Math.random() * 4 + 2;
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vx *= 0.96;
        this.vy *= 0.96;
        this.life -= 0.025;
      }
      draw() {
        if (this.life <= 0) return;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
        ctx.fillStyle = this.color.replace('1)', `${this.life})`);
        ctx.fill();
      }
    }

    // ===== WATER WAVES =====
    const waterWaves = [];
    let lastWaveTime = 0;

    class WaterWave {
      constructor(angle) {
        // Wave originates from the barrier and pushes outward
        this.angle = angle;
        this.cx = centerX;
        this.cy = centerY + 20;
        this.radius = barrierRadius * 0.9;
        this.spread = 0; // how far the wave has traveled outward
        this.height = 40 + Math.random() * 30; // wave height
        this.width = 0.8 + Math.random() * 0.4; // angular width
        this.life = 1;
        this.speed = 4 + Math.random() * 2;
        this.wavePhase = Math.random() * Math.PI * 2;
      }

      update() {
        this.spread += this.speed;
        this.life -= 0.012;
        this.wavePhase += 0.1;
        // Check if wave hits any monster
        for (let i = monsters.length - 1; i >= 0; i--) {
          if (monsters[i].state !== 'approaching') continue;
          const mAngle = Math.atan2(monsters[i].y - this.cy, monsters[i].x - this.cx);
          let angleDiff = Math.abs(mAngle - this.angle);
          if (angleDiff > Math.PI) angleDiff = Math.PI * 2 - angleDiff;
          if (angleDiff > this.width * 0.5) continue;
          const mDist = Math.sqrt(Math.pow(monsters[i].x - this.cx, 2) + Math.pow((monsters[i].y - this.cy) / 0.55, 2));
          const waveDist = this.radius + this.spread;
          if (Math.abs(mDist - waveDist) < 40) {
            // Wave hits monster - fling it to space!
            monsters[i].state = 'hit';
            monsters[i].hitTime = performance.now();
            const pushAngle = Math.atan2(monsters[i].y - this.cy, monsters[i].x - this.cx);
            monsters[i].flyVx = Math.cos(pushAngle) * 12;
            monsters[i].flyVy = Math.sin(pushAngle) * 12 - 10;
            monsters[i].flyRotSpeed = (Math.random() - 0.5) * 0.4;
            monstersDefeated++;
            document.getElementById('monsterCount').textContent = monstersDefeated;
            shakeAmount = 10;
            // Water splash particles
            for (let p = 0; p < 15; p++) {
              impactParticles.push(new ImpactParticle(
                monsters[i].x + (Math.random() - 0.5) * 30,
                monsters[i].y + (Math.random() - 0.5) * 30,
                ['rgba(0,150,255,1)', 'rgba(100,200,255,1)', 'rgba(200,240,255,1)'][Math.floor(Math.random() * 3)]
              ));
            }
            spaceTexts.push(new SpaceText(monsters[i].x, monsters[i].y - 30));
          }
        }
      }

      draw() {
        if (this.life <= 0) return;
        ctx.save();
        const waveDist = this.radius + this.spread;

        // Draw the wave arc
        const startAngle = this.angle - this.width * 0.5;
        const endAngle = this.angle + this.width * 0.5;
        const segments = 20;

        ctx.shadowColor = 'rgba(0, 150, 255, 0.5)';
        ctx.shadowBlur = 15;

        // Wave body (tall arc of water)
        for (let layer = 0; layer < 3; layer++) {
          const layerOffset = layer * 8;
          const h = this.height * (1 - layer * 0.25) * this.life;
          ctx.beginPath();
          for (let i = 0; i <= segments; i++) {
            const a = startAngle + (endAngle - startAngle) * (i / segments);
            const waveH = h * Math.sin((i / segments) * Math.PI) * (1 + Math.sin(this.wavePhase + i * 0.5) * 0.2);
            const bx = this.cx + Math.cos(a) * (waveDist + layerOffset);
            const by = this.cy + Math.sin(a) * (waveDist + layerOffset) * 0.55;
            if (i === 0) ctx.moveTo(bx, by - waveH);
            else ctx.lineTo(bx, by - waveH);
          }
          // Close with base
          for (let i = segments; i >= 0; i--) {
            const a = startAngle + (endAngle - startAngle) * (i / segments);
            const bx = this.cx + Math.cos(a) * (waveDist + layerOffset);
            const by = this.cy + Math.sin(a) * (waveDist + layerOffset) * 0.55;
            ctx.lineTo(bx, by);
          }
          ctx.closePath();
          const alpha = this.life * (0.5 - layer * 0.12);
          const colors = [
            `rgba(0, 120, 255, ${alpha})`,
            `rgba(50, 180, 255, ${alpha})`,
            `rgba(150, 220, 255, ${alpha})`
          ];
          ctx.fillStyle = colors[layer];
          ctx.fill();
        }

        // White foam crest on top
        ctx.beginPath();
        for (let i = 0; i <= segments; i++) {
          const a = startAngle + (endAngle - startAngle) * (i / segments);
          const waveH = this.height * this.life * Math.sin((i / segments) * Math.PI) * (1 + Math.sin(this.wavePhase + i * 0.5) * 0.2);
          const bx = this.cx + Math.cos(a) * waveDist;
          const by = this.cy + Math.sin(a) * waveDist * 0.55;
          if (i === 0) ctx.moveTo(bx, by - waveH);
          else ctx.lineTo(bx, by - waveH);
        }
        ctx.strokeStyle = `rgba(255, 255, 255, ${this.life * 0.7})`;
        ctx.lineWidth = 3;
        ctx.stroke();

        // Splash droplets at crest
        if (this.life > 0.3) {
          for (let d = 0; d < 5; d++) {
            const da = startAngle + Math.random() * (endAngle - startAngle);
            const bx = this.cx + Math.cos(da) * waveDist;
            const by = this.cy + Math.sin(da) * waveDist * 0.55;
            const dh = this.height * this.life * 0.5;
            ctx.beginPath();
            ctx.arc(bx + (Math.random() - 0.5) * 15, by - dh - Math.random() * 20, 2 + Math.random() * 3, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(200, 240, 255, ${this.life * 0.5})`;
            ctx.fill();
          }
        }

        ctx.shadowBlur = 0;
        ctx.restore();
      }
    }

    // Spawn water waves periodically when water element is active
    function trySpawnWaterWave(t) {
      if (!barrierActive || !activeElements.water) return;
      if (t - lastWaveTime > 4000 + Math.random() * 3000) {
        // Aim at a random approaching monster, or random direction
        let angle = Math.random() * Math.PI * 2;
        for (const m of monsters) {
          if (m.state === 'approaching') {
            angle = Math.atan2(m.y - (centerY + 20), m.x - centerX);
            break;
          }
        }
        waterWaves.push(new WaterWave(angle));
        lastWaveTime = t;
        // Play a water sound
        try {
          const actx = new (window.AudioContext || window.webkitAudioContext)();
          const dur = 0.5;
          const noise = actx.createBufferSource();
          const buf = actx.createBuffer(1, actx.sampleRate * dur, actx.sampleRate);
          const d = buf.getChannelData(0);
          for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (actx.sampleRate * 0.2));
          noise.buffer = buf;
          const filter = actx.createBiquadFilter();
          filter.type = 'lowpass';
          filter.frequency.value = 400;
          const gain = actx.createGain();
          gain.gain.setValueAtTime(0.15, actx.currentTime);
          gain.gain.exponentialDecayTo && gain.gain.exponentialDecayTo(0.01, actx.currentTime + dur);
          gain.gain.linearRampToValueAtTime(0.01, actx.currentTime + dur);
          noise.connect(filter);
          filter.connect(gain);
          gain.connect(actx.destination);
          noise.start();
          setTimeout(() => actx.close(), 600);
        } catch(e) {}
      }
    }

    // ===== METAL WAVE SYSTEM - CHINESE RED DRAGON =====
    // Phase 1: Dragon appears from outside (0-90)
    // Phase 2: Dragon circles barrier catching monsters from outside (90-300)
    // Phase 3: Dragon spirals to space carrying caught monsters (300-540)
    let metalWaveActive = false;
    let metalWaveTimer = 0;
    let metalWavePhase = 0;
    let metalWaveStage = 'appear'; // appear, circle, launch
    let caughtMonsters = [];
    let dragonPath = []; // {x, y} positions for serpentine body
    let dragonHeadAngle = 0;
    const DRAGON_SEGMENTS = 35;
    const METAL_APPEAR_END = 90;
    const METAL_CIRCLE_END = 300;
    const METAL_LAUNCH_END = 540;

    function triggerMetalWave() {
      if (!barrierActive || metalWaveActive) return;
      metalWaveActive = true;
      metalWaveTimer = 0;
      metalWavePhase = 0;
      metalWaveStage = 'appear';
      caughtMonsters = [];
      dragonPath = [];
      dragonHeadAngle = Math.PI * 0.5; // start from bottom
      document.getElementById('btnMetalWave').classList.add('active-wave');
      shakeAmount = 10;

      // Force spawn some monsters if there are few
      while (monsters.filter(m => m.state === 'approaching').length < 4) {
        monsters.push(new Monster());
      }

      // Sound: deep rumble building to dragon roar
      try {
        const actx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = actx.createOscillator();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(40, actx.currentTime);
        osc.frequency.linearRampToValueAtTime(80, actx.currentTime + 2);
        osc.frequency.linearRampToValueAtTime(200, actx.currentTime + 4);
        const gain = actx.createGain();
        gain.gain.setValueAtTime(0.2, actx.currentTime);
        gain.gain.linearRampToValueAtTime(0.35, actx.currentTime + 2);
        gain.gain.linearRampToValueAtTime(0, actx.currentTime + 7);
        const filter = actx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(100, actx.currentTime);
        filter.frequency.linearRampToValueAtTime(800, actx.currentTime + 4);
        osc.connect(filter);
        filter.connect(gain);
        gain.connect(actx.destination);
        osc.start();
        osc.stop(actx.currentTime + 7);
        // Dragon roar when it starts circling
        setTimeout(() => {
          try {
            const roar = actx.createOscillator();
            roar.type = 'sawtooth';
            roar.frequency.setValueAtTime(150, actx.currentTime);
            roar.frequency.linearRampToValueAtTime(60, actx.currentTime + 0.8);
            const rg = actx.createGain();
            rg.gain.setValueAtTime(0.3, actx.currentTime);
            rg.gain.linearRampToValueAtTime(0, actx.currentTime + 1.2);
            roar.connect(rg);
            rg.connect(actx.destination);
            roar.start();
            roar.stop(actx.currentTime + 1.2);
          } catch(e) {}
        }, 1500);
        setTimeout(() => actx.close(), 8000);
      } catch(e) {}
    }

    function updateMetalWave(t) {
      if (!metalWaveActive) return;
      metalWaveTimer++;
      metalWavePhase += 0.06;

      const cx = centerX;
      const cy = centerY + 20;
      const orbitR = barrierRadius + 55; // outside the barrier
      let headX, headY;

      // === PHASE 1: DRAGON APPEARS FROM OUTSIDE ===
      if (metalWaveTimer < METAL_APPEAR_END) {
        metalWaveStage = 'appear';
        const p = metalWaveTimer / METAL_APPEAR_END;
        const eased = p * p * (3 - 2 * p); // smoothstep
        // Enter from bottom-right, curve to orbit position
        const startX = cx + orbitR * 1.8;
        const startY = cy + H * 0.35;
        const targetA = Math.PI * 0.5;
        const targetX = cx + Math.cos(targetA) * orbitR;
        const targetY = cy + Math.sin(targetA) * orbitR * 0.55;
        headX = startX + (targetX - startX) * eased;
        headY = startY + (targetY - startY) * eased;
        shakeAmount = Math.max(shakeAmount, 3 + p * 5);
      }

      // === PHASE 2: CIRCLE BARRIER & CATCH MONSTERS FROM OUTSIDE ===
      else if (metalWaveTimer < METAL_CIRCLE_END) {
        metalWaveStage = 'circle';
        const circleP = (metalWaveTimer - METAL_APPEAR_END) / (METAL_CIRCLE_END - METAL_APPEAR_END);
        // 2 full orbits (clockwise from bottom)
        dragonHeadAngle = Math.PI * 0.5 - circleP * Math.PI * 4;
        headX = cx + Math.cos(dragonHeadAngle) * orbitR;
        headY = cy + Math.sin(dragonHeadAngle) * orbitR * 0.55;
        shakeAmount = Math.max(shakeAmount, 5);

        // Catch approaching monsters near dragon head (from outside!)
        for (let i = 0; i < monsters.length; i++) {
          if (monsters[i].state !== 'approaching') continue;
          const dx = headX - monsters[i].x;
          const dy = headY - monsters[i].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 70 && !caughtMonsters.includes(monsters[i])) {
            caughtMonsters.push(monsters[i]);
            monsters[i].state = 'caught';
            monsters[i].opacity = 0.85;
          }
        }

        // Position caught monsters along dragon body segments
        caughtMonsters.forEach((m, idx) => {
          const segIdx = Math.min(8 + idx * 4, dragonPath.length - 1);
          if (segIdx >= 0 && segIdx < dragonPath.length) {
            m.x = dragonPath[segIdx].x + Math.sin(metalWavePhase + idx * 2) * 8;
            m.y = dragonPath[segIdx].y + Math.cos(metalWavePhase + idx * 2) * 6;
            m.opacity = 0.8;
            m.flyRotation = (m.flyRotation || 0) + 0.05;
          }
        });

        // Fire particles near dragon head
        if (Math.random() < 0.3) {
          impactParticles.push(new ImpactParticle(
            headX + (Math.random() - 0.5) * 20,
            headY + (Math.random() - 0.5) * 20,
            ['rgba(255,50,0,1)', 'rgba(255,200,0,1)'][Math.floor(Math.random() * 2)]
          ));
        }
      }

      // === PHASE 3: DRAGON SPIRALS TO SPACE WITH MONSTERS ===
      else if (metalWaveTimer < METAL_LAUNCH_END) {
        metalWaveStage = 'launch';
        const lp = (metalWaveTimer - METAL_CIRCLE_END) / (METAL_LAUNCH_END - METAL_CIRCLE_END);

        if (lp < 0.02) {
          shakeAmount = 25;
          // Grab any remaining approaching monsters
          for (let i = 0; i < monsters.length; i++) {
            if (monsters[i].state === 'approaching' && !caughtMonsters.includes(monsters[i])) {
              caughtMonsters.push(monsters[i]);
              monsters[i].state = 'caught';
            }
          }
        }

        // Dragon spirals upward from outside the barrier
        dragonHeadAngle -= 0.12;
        const spiralR = orbitR * Math.max(0.3, 1 - lp * 0.5);
        headX = cx + Math.cos(dragonHeadAngle) * spiralR;
        headY = cy - lp * (H + 300) + Math.sin(dragonHeadAngle) * spiralR * 0.3;

        // Caught monsters follow along dragon body
        caughtMonsters.forEach((m, idx) => {
          const segIdx = Math.min(8 + idx * 4, dragonPath.length - 1);
          if (segIdx >= 0 && segIdx < dragonPath.length) {
            m.x = dragonPath[segIdx].x;
            m.y = dragonPath[segIdx].y;
            m.opacity = Math.max(0, 1 - lp * 1.5);
            m.flyRotation = (m.flyRotation || 0) + 0.15;
          }
        });

        // Fire trail from dragon tail
        if (Math.random() < 0.5) {
          const tailIdx = Math.min(dragonPath.length - 1, DRAGON_SEGMENTS - 1);
          if (tailIdx >= 0 && dragonPath[tailIdx]) {
            impactParticles.push(new ImpactParticle(
              dragonPath[tailIdx].x + (Math.random() - 0.5) * 20,
              dragonPath[tailIdx].y + 15,
              ['rgba(255,50,0,1)', 'rgba(255,200,0,1)', 'rgba(255,100,0,1)'][Math.floor(Math.random() * 3)]
            ));
          }
        }

        // Finalize when off screen
        if (lp > 0.8) {
          caughtMonsters.forEach(m => {
            monstersDefeated++;
            const idx = monsters.indexOf(m);
            if (idx >= 0) monsters.splice(idx, 1);
          });
          document.getElementById('monsterCount').textContent = monstersDefeated;
          if (caughtMonsters.length > 0) {
            spaceTexts.push(new SpaceText(cx, cy - 50));
          }
          caughtMonsters = [];
        }
      }

      // End
      else {
        metalWaveActive = false;
        metalWaveStage = 'appear';
        caughtMonsters.forEach(m => {
          const idx = monsters.indexOf(m);
          if (idx >= 0) monsters.splice(idx, 1);
          monstersDefeated++;
        });
        document.getElementById('monsterCount').textContent = monstersDefeated;
        caughtMonsters = [];
        dragonPath = [];
        document.getElementById('btnMetalWave').classList.remove('active-wave');
        return;
      }

      // Update dragon path (add head position, keep last N segments)
      if (headX !== undefined) {
        dragonPath.unshift({ x: headX, y: headY });
        if (dragonPath.length > DRAGON_SEGMENTS) dragonPath.length = DRAGON_SEGMENTS;
      }
    }

    function drawChineseDragon(t) {
      if (dragonPath.length < 3) return;
      ctx.save();

      // === BODY: Draw segments from tail to head ===
      for (let i = dragonPath.length - 1; i >= 1; i--) {
        const seg = dragonPath[i];
        const next = dragonPath[i - 1];
        const progress = 1 - (i / dragonPath.length); // 0=tail tip, 1=head
        const bodyW = 5 + progress * 13;
        const segAngle = Math.atan2(next.y - seg.y, next.x - seg.x);

        ctx.save();
        ctx.translate(seg.x, seg.y);
        ctx.rotate(segAngle);

        // Main body - rich red
        ctx.beginPath();
        ctx.ellipse(0, 0, bodyW * 1.2, bodyW, 0, 0, Math.PI * 2);
        const r1 = Math.floor(190 + progress * 55);
        ctx.fillStyle = `rgb(${r1}, ${Math.floor(15 + progress * 20)}, ${Math.floor(10 + progress * 10)})`;
        ctx.fill();

        // Gold belly (bottom in local coords)
        ctx.beginPath();
        ctx.ellipse(0, bodyW * 0.25, bodyW * 0.65, bodyW * 0.45, 0, 0, Math.PI);
        ctx.fillStyle = `rgba(255, 210, 0, ${0.25 + progress * 0.2})`;
        ctx.fill();

        // Scale arc highlights
        if (i % 2 === 0) {
          ctx.beginPath();
          ctx.arc(0, -bodyW * 0.3, bodyW * 0.4, Math.PI, 0);
          ctx.strokeStyle = `rgba(255, 80, 20, ${0.25 + progress * 0.15})`;
          ctx.lineWidth = 1;
          ctx.stroke();
        }

        // Short legs at intervals (4 pairs like a Chinese dragon)
        if (i % 8 === 4 && progress > 0.15 && progress < 0.85) {
          ctx.strokeStyle = '#cc2010';
          ctx.lineWidth = 2;
          ctx.lineCap = 'round';
          // Left leg + claws
          ctx.beginPath();
          ctx.moveTo(0, -bodyW);
          ctx.lineTo(-4, -bodyW - 10);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(-4, -bodyW - 10);
          ctx.lineTo(-7, -bodyW - 8);
          ctx.moveTo(-4, -bodyW - 10);
          ctx.lineTo(-2, -bodyW - 13);
          ctx.moveTo(-4, -bodyW - 10);
          ctx.lineTo(-6, -bodyW - 12);
          ctx.strokeStyle = '#ffcc00';
          ctx.lineWidth = 1.5;
          ctx.stroke();
          // Right leg + claws
          ctx.strokeStyle = '#cc2010';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(0, bodyW);
          ctx.lineTo(-4, bodyW + 10);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(-4, bodyW + 10);
          ctx.lineTo(-7, bodyW + 8);
          ctx.moveTo(-4, bodyW + 10);
          ctx.lineTo(-2, bodyW + 13);
          ctx.moveTo(-4, bodyW + 10);
          ctx.lineTo(-6, bodyW + 12);
          ctx.strokeStyle = '#ffcc00';
          ctx.lineWidth = 1.5;
          ctx.stroke();
        }

        ctx.restore();
      }

      // === TAIL TIP: flame tuft ===
      if (dragonPath.length > 2) {
        const tail = dragonPath[dragonPath.length - 1];
        const prev = dragonPath[dragonPath.length - 2];
        const tAngle = Math.atan2(tail.y - prev.y, tail.x - prev.x);
        ctx.save();
        ctx.translate(tail.x, tail.y);
        ctx.rotate(tAngle);
        // Pointed tail
        ctx.beginPath();
        ctx.moveTo(0, -3);
        ctx.lineTo(12, 0);
        ctx.lineTo(0, 3);
        ctx.fillStyle = '#cc2020';
        ctx.fill();
        // Flame tuft
        for (let tf = 0; tf < 4; tf++) {
          const tfw = Math.sin(t * 0.05 + tf * 1.2) * 7;
          ctx.beginPath();
          ctx.moveTo(12, 0);
          ctx.quadraticCurveTo(18 + tf * 3, tfw, 24 + tf * 4, tfw * 1.3);
          ctx.strokeStyle = `rgba(255, ${60 + tf * 40}, 0, 0.6)`;
          ctx.lineWidth = 2.5 - tf * 0.4;
          ctx.stroke();
        }
        ctx.restore();
      }

      // === HEAD: Chinese dragon head ===
      const head = dragonPath[0];
      const neck = dragonPath[Math.min(2, dragonPath.length - 1)];
      const headAngle = Math.atan2(head.y - neck.y, head.x - neck.x);
      const hs = 20;

      ctx.save();
      ctx.translate(head.x, head.y);
      ctx.rotate(headAngle);

      // Flowing mane (behind head)
      for (let m = 0; m < 7; m++) {
        const mAngle = Math.PI + (m - 3) * 0.22;
        const mLen = 16 + Math.sin(t * 0.04 + m * 0.8) * 5;
        const mWave = Math.sin(t * 0.03 + m) * 5;
        ctx.beginPath();
        ctx.moveTo(Math.cos(mAngle) * hs * 0.4, Math.sin(mAngle) * hs * 0.4);
        ctx.quadraticCurveTo(
          Math.cos(mAngle) * mLen * 0.6 + mWave,
          Math.sin(mAngle) * mLen * 0.6,
          Math.cos(mAngle) * mLen + mWave * 0.5,
          Math.sin(mAngle) * mLen
        );
        ctx.strokeStyle = `rgba(255, ${20 + m * 25}, 0, 0.55)`;
        ctx.lineWidth = 3 - m * 0.25;
        ctx.stroke();
      }

      // Head shape - elongated
      ctx.beginPath();
      ctx.ellipse(hs * 0.2, 0, hs * 1.1, hs * 0.75, 0, 0, Math.PI * 2);
      ctx.fillStyle = '#dd2020';
      ctx.fill();

      // Snout (forward)
      ctx.beginPath();
      ctx.ellipse(hs * 1.0, 0, hs * 0.45, hs * 0.35, 0, 0, Math.PI * 2);
      ctx.fillStyle = '#ee3030';
      ctx.fill();

      // Gold ridge on top of head
      ctx.beginPath();
      ctx.moveTo(-hs * 0.3, 0);
      ctx.quadraticCurveTo(hs * 0.3, -hs * 0.55, hs * 0.9, 0);
      ctx.strokeStyle = 'rgba(255, 200, 0, 0.5)';
      ctx.lineWidth = 3;
      ctx.stroke();

      // Nostrils with smoke
      ctx.beginPath();
      ctx.arc(hs * 1.2, -3, 2, 0, Math.PI * 2);
      ctx.arc(hs * 1.2, 3, 2, 0, Math.PI * 2);
      ctx.fillStyle = '#330000';
      ctx.fill();

      // Deer antlers (gold/brown) - branching
      ctx.strokeStyle = '#cc8800';
      ctx.lineWidth = 2.5;
      ctx.lineCap = 'round';
      // Left antler
      ctx.beginPath();
      ctx.moveTo(-3, -hs * 0.55);
      ctx.lineTo(-10, -hs * 1.4);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(-7, -hs * 1.0);
      ctx.lineTo(-16, -hs * 1.1);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(-9, -hs * 1.25);
      ctx.lineTo(-4, -hs * 1.6);
      ctx.stroke();
      // Right antler
      ctx.beginPath();
      ctx.moveTo(-3, hs * 0.55);
      ctx.lineTo(-10, hs * 1.4);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(-7, hs * 1.0);
      ctx.lineTo(-16, hs * 1.1);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(-9, hs * 1.25);
      ctx.lineTo(-4, hs * 1.6);
      ctx.stroke();

      // Eyes - large and fierce
      ctx.beginPath();
      ctx.ellipse(hs * 0.1, -hs * 0.32, 5, 4, -0.2, 0, Math.PI * 2);
      ctx.fillStyle = '#fff';
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(hs * 0.1, hs * 0.32, 5, 4, 0.2, 0, Math.PI * 2);
      ctx.fillStyle = '#fff';
      ctx.fill();
      // Pupils
      ctx.beginPath();
      ctx.arc(hs * 0.15, -hs * 0.32, 2.5, 0, Math.PI * 2);
      ctx.fillStyle = '#110000';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(hs * 0.15, hs * 0.32, 2.5, 0, Math.PI * 2);
      ctx.fillStyle = '#110000';
      ctx.fill();
      // Yellow iris
      ctx.beginPath();
      ctx.arc(hs * 0.15, -hs * 0.32, 1.5, 0, Math.PI * 2);
      ctx.fillStyle = '#ffcc00';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(hs * 0.15, hs * 0.32, 1.5, 0, Math.PI * 2);
      ctx.fillStyle = '#ffcc00';
      ctx.fill();
      // Eyebrow ridges
      ctx.strokeStyle = '#880000';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(hs * 0.1, -hs * 0.32, 7, Math.PI * 1.2, Math.PI * 1.8);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(hs * 0.1, hs * 0.32, 7, Math.PI * 0.2, Math.PI * 0.8);
      ctx.stroke();

      // Whiskers - long and flowing
      const wWave = Math.sin(t * 0.025) * 8;
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.65)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(hs * 0.9, -hs * 0.15);
      ctx.quadraticCurveTo(hs * 1.8, -hs * 0.6 + wWave, hs * 2.5 + wWave, -hs * 1.0);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(hs * 0.9, hs * 0.15);
      ctx.quadraticCurveTo(hs * 1.8, hs * 0.6 - wWave, hs * 2.5 - wWave, hs * 1.0);
      ctx.stroke();
      // Shorter inner whiskers
      ctx.beginPath();
      ctx.moveTo(hs * 0.7, -hs * 0.25);
      ctx.quadraticCurveTo(hs * 1.3, -hs * 0.9 + wWave * 0.5, hs * 1.8 + wWave * 0.5, -hs * 1.3);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(hs * 0.7, hs * 0.25);
      ctx.quadraticCurveTo(hs * 1.3, hs * 0.9 - wWave * 0.5, hs * 1.8 - wWave * 0.5, hs * 1.3);
      ctx.stroke();

      // Gold chin beard
      ctx.beginPath();
      ctx.moveTo(hs * 0.6, hs * 0.3);
      const beardW = Math.sin(t * 0.03) * 4;
      ctx.quadraticCurveTo(hs * 0.5 + beardW, hs * 0.8, hs * 0.3 + beardW, hs * 1.0);
      ctx.strokeStyle = 'rgba(255, 200, 0, 0.5)';
      ctx.lineWidth = 2;
      ctx.stroke();

      // Open mouth with fire breath when catching or launching
      if (metalWaveStage === 'circle' || metalWaveStage === 'launch') {
        ctx.beginPath();
        ctx.moveTo(hs * 0.85, -hs * 0.2);
        ctx.lineTo(hs * 1.4, 0);
        ctx.lineTo(hs * 0.85, hs * 0.2);
        ctx.closePath();
        ctx.fillStyle = '#440000';
        ctx.fill();
        // Teeth
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.moveTo(hs * 0.9, -hs * 0.15);
        ctx.lineTo(hs * 1.05, -hs * 0.05);
        ctx.lineTo(hs * 0.95, -hs * 0.02);
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(hs * 0.9, hs * 0.15);
        ctx.lineTo(hs * 1.05, hs * 0.05);
        ctx.lineTo(hs * 0.95, hs * 0.02);
        ctx.fill();
        // Fire breath
        for (let f = 0; f < 5; f++) {
          const fd = 5 + Math.random() * 20;
          ctx.beginPath();
          ctx.arc(hs * 1.4 + fd, (Math.random() - 0.5) * 12, 2 + Math.random() * 5, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255, ${80 + Math.floor(Math.random() * 175)}, 0, ${0.5 + Math.random() * 0.4})`;
          ctx.fill();
        }
      }

      ctx.restore();

      // Red glow around head
      ctx.beginPath();
      ctx.arc(head.x, head.y, 35, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255, 30, 0, 0.08)';
      ctx.fill();

      ctx.restore();
    }

    function drawMetalWave(t) {
      if (!metalWaveActive) return;

      // Draw the Chinese red dragon
      drawChineseDragon(t);

      // Glowing energy trail along dragon body
      if (dragonPath.length > 1 && (metalWaveStage === 'circle' || metalWaveStage === 'launch')) {
        ctx.save();
        for (let i = 0; i < dragonPath.length - 1; i++) {
          const seg = dragonPath[i];
          const alpha = (1 - i / dragonPath.length) * 0.12;
          ctx.beginPath();
          ctx.arc(seg.x, seg.y, 18 + (1 - i / dragonPath.length) * 10, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255, 40, 0, ${alpha})`;
          ctx.fill();
        }
        ctx.restore();
      }

      // Draw caught monsters riding on dragon body
      ctx.save();
      caughtMonsters.forEach((m, idx) => {
        if (m.opacity > 0) {
          ctx.globalAlpha = m.opacity;
          m.draw(t);
          ctx.globalAlpha = 1;
        }
      });
      ctx.restore();
    }

          p.vy = (Math.random() - 0.5) * 10;
          impactParticles.push(p);

    // ===== AUTONOMOUS BARRIER FIRE =====
    let lastBarrierFire = 0;
    const barrierFireInterval = 1000;
    const MAX_PROJECTILES = 30;

    function barrierAutoFire(t) {
      if (!barrierActive) return;
      const fireRate = ultraBoostActive ? 200 : barrierFireInterval;
      const maxProj = ultraBoostActive ? 60 : MAX_PROJECTILES;
      if (t - lastBarrierFire < fireRate) return;
      if (projectiles.length >= maxProj) return;

      const targets = monsters.filter(m => m.state === 'approaching');
      if (targets.length === 0) return;

      lastBarrierFire = t;

      const target = targets[Math.floor(Math.random() * targets.length)];
      const angle = Math.atan2(target.y - (centerY + 20), target.x - centerX);
      const bx = centerX + Math.cos(angle) * barrierRadius * 0.9;
      const by = (centerY + 20) + Math.sin(angle) * barrierRadius * 0.55 * 0.9;

      const activeEls = Object.keys(activeElements).filter(e => activeElements[e]);
      if (activeEls.length === 0) return;

      const roll = Math.random();

      if (roll < 0.2 && activeEls.includes('fire')) {
        // FIREBALL VOLLEY
        for (let i = 0; i < 2; i++) {
          projectiles.push(new Projectile(
            bx + (Math.random() - 0.5) * 10, by + (Math.random() - 0.5) * 10,
            target.x + (Math.random() - 0.5) * 30, target.y + (Math.random() - 0.5) * 30, 'fire'
          ));
        }
      } else if (roll < 0.4 && activeEls.includes('ice')) {
        // ICE SPIKE BARRAGE
        for (let i = 0; i < 3; i++) {
          const spread = (Math.random() - 0.5) * 0.4;
          const pa = angle + spread;
          projectiles.push(new Projectile(
            bx + Math.cos(pa) * 8, by + Math.sin(pa) * 8,
            target.x + (Math.random() - 0.5) * 20, target.y + (Math.random() - 0.5) * 20, 'ice'
          ));
        }
      } else if (roll < 0.55 && activeEls.includes('venom')) {
        // POISONED ICE SPIKES - 2 venom spikes aimed precisely
        for (let i = 0; i < 2; i++) {
          const spread = (Math.random() - 0.5) * 0.25;
          const pa = angle + spread;
          projectiles.push(new Projectile(
            bx + Math.cos(pa) * 8, by + Math.sin(pa) * 8,
            target.x + (Math.random() - 0.5) * 15, target.y + (Math.random() - 0.5) * 15, 'venom'
          ));
        }
      } else if (roll < 0.7 && activeEls.length >= 2) {
        // ELEMENTAL BALL - all elements at once
        activeEls.forEach((el, i) => {
          const spread = (i - (activeEls.length - 1) / 2) * 0.15;
          const pa = angle + spread;
          projectiles.push(new Projectile(
            bx + Math.cos(pa) * 6, by + Math.sin(pa) * 6,
            target.x + Math.cos(pa) * 15, target.y + Math.sin(pa) * 15, el
          ));
        });
      } else {
        const el = activeEls[Math.floor(Math.random() * activeEls.length)];
        projectiles.push(new Projectile(bx, by, target.x, target.y, el));
      }
    }

    // ===== COBRA VENIMEUX =====
    let cobraActive = false;
    let cobraTimer = 0;
    let cobraPath = [];       // {x, y} segments for serpentine body
    let cobraTarget = null;   // current monster target
    let cobraHeadAngle = 0;
    let cobraBittenMonsters = []; // monsters bitten and being processed
    let cobraStriking = false;
    let cobraStrikeTimer = 0;
    const COBRA_SEGMENTS = 25;
    const COBRA_DURATION = 480; // ~8 seconds at 60fps

    function triggerCobra() {
      if (cobraActive) return;
      cobraActive = true;
      cobraTimer = 0;
      cobraPath = [];
      cobraBittenMonsters = [];
      cobraTarget = null;
      cobraStriking = false;
      document.getElementById('btnCobra').classList.add('cobra-active');

      // Hissing sound
      try {
        const actx = new (window.AudioContext || window.webkitAudioContext)();
        // White noise burst for hiss
        const bufSize = actx.sampleRate * 0.8;
        const buf = actx.createBuffer(1, bufSize, actx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < bufSize; i++) {
          data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufSize * 0.4));
        }
        const src = actx.createBufferSource();
        src.buffer = buf;
        // Bandpass for hiss
        const bp = actx.createBiquadFilter();
        bp.type = 'bandpass';
        bp.frequency.value = 5000;
        bp.Q.value = 2;
        const gain = actx.createGain();
        gain.gain.value = 0.15;
        src.connect(bp); bp.connect(gain); gain.connect(actx.destination);
        src.start();
      } catch(e) {}
    }

    function updateCobra(t) {
      if (!cobraActive) return;
      cobraTimer++;

      // Phase 1: Enter (0-60) - slither from bottom
      // Phase 2: Hunt (60-380) - chase and bite monsters
      // Phase 3: Exit (380-480) - slither away

      const barrierOuterR = barrierRadius + 60;

      if (cobraTimer < 60) {
        // Enter from bottom-right, spiral toward barrier exterior
        const progress = cobraTimer / 60;
        const entryAngle = Math.PI * 0.3; // bottom-right
        const startX = W + 50;
        const startY = H + 50;
        const targetX = centerX + Math.cos(entryAngle) * barrierOuterR;
        const targetY = (centerY + 20) + Math.sin(entryAngle) * barrierOuterR * 0.55;
        const ease = progress * progress * (3 - 2 * progress); // smoothstep
        const headX = startX + (targetX - startX) * ease;
        const headY = startY + (targetY - startY) * ease;
        cobraHeadAngle = Math.atan2(targetY - startY, targetX - startX);
        cobraPath.unshift({ x: headX, y: headY });
        if (cobraPath.length > COBRA_SEGMENTS) cobraPath.pop();
      } else if (cobraTimer < 380) {
        // Hunt phase — circle barrier exterior and strike at monsters
        const huntTime = cobraTimer - 60;
        const orbitAngle = Math.PI * 0.3 + huntTime * 0.015;

        // Default to patrol position
        let headX = centerX + Math.cos(orbitAngle) * barrierOuterR;
        let headY = (centerY + 20) + Math.sin(orbitAngle) * barrierOuterR * 0.55;

        // Validate current strike target still exists
        if (cobraStriking && cobraTarget) {
          if (!monsters.includes(cobraTarget) || (cobraTarget.state !== 'approaching' && cobraTarget.state !== 'idle' && cobraTarget.state !== 'venom')) {
            cobraStriking = false;
            cobraTarget = null;
          }
        }

        // Find closest approaching monster
        if (!cobraStriking) {
          let closest = null;
          let closestDist = Infinity;
          for (const m of monsters) {
            if (m.state !== 'approaching' && m.state !== 'idle') continue;
            if (cobraBittenMonsters.some(b => b.monster === m)) continue;
            const dx = m.x - (cobraPath[0]?.x || centerX);
            const dy = m.y - (cobraPath[0]?.y || centerY);
            const d = Math.sqrt(dx * dx + dy * dy);
            if (d < closestDist) { closestDist = d; closest = m; }
          }

          if (closest && closestDist < 400) {
            cobraStriking = true;
            cobraStrikeTimer = 0;
            cobraTarget = closest;
          }
        }

        if (cobraStriking && cobraTarget) {
          cobraStrikeTimer++;
          const strikeProg = Math.min(1, cobraStrikeTimer / 12);
          const prevHead = cobraPath[0] || { x: headX, y: headY };
          headX = prevHead.x + (cobraTarget.x - prevHead.x) * strikeProg;
          headY = prevHead.y + (cobraTarget.y - prevHead.y) * strikeProg;
          cobraHeadAngle = Math.atan2(cobraTarget.y - prevHead.y, cobraTarget.x - prevHead.x);

          // Check if reached monster — bite!
          const hitDx = headX - cobraTarget.x;
          const hitDy = headY - cobraTarget.y;
          if (Math.sqrt(hitDx * hitDx + hitDy * hitDy) < 25) {
            cobraTarget.state = 'venom';
            cobraTarget.venomTimer = 0;
            cobraBittenMonsters.push({ monster: cobraTarget, timer: 0 });
            cobraStriking = false;
            cobraTarget = null;

            for (let i = 0; i < 15; i++) {
              impactParticles.push(new ImpactParticle(headX, headY, 'rgba(0, 255, 50, 1)'));
            }
            try {
              const actx = new (window.AudioContext || window.webkitAudioContext)();
              const osc = actx.createOscillator();
              osc.frequency.value = 200;
              osc.frequency.linearRampToValueAtTime(80, actx.currentTime + 0.2);
              const g = actx.createGain();
              g.gain.value = 0.2;
              g.gain.linearRampToValueAtTime(0, actx.currentTime + 0.3);
              osc.connect(g); g.connect(actx.destination);
              osc.start(); osc.stop(actx.currentTime + 0.3);
            } catch(e) {}
          }

          // Abort strike if taking too long
          if (cobraStrikeTimer > 30) {
            cobraStriking = false;
            cobraTarget = null;
          }
        } else {
          // If there's a monster far away, slither toward it instead of just orbiting
          let huntTarget = null;
          let huntDist = Infinity;
          for (const m of monsters) {
            if (m.state !== 'approaching' && m.state !== 'idle') continue;
            if (cobraBittenMonsters.some(b => b.monster === m)) continue;
            const dx = m.x - headX;
            const dy = m.y - headY;
            const d = Math.sqrt(dx * dx + dy * dy);
            if (d < huntDist) { huntDist = d; huntTarget = m; }
          }
          if (huntTarget && huntDist > 50) {
            // Slither toward the target
            const prev = cobraPath[0] || { x: headX, y: headY };
            const toAngle = Math.atan2(huntTarget.y - prev.y, huntTarget.x - prev.x);
            headX = prev.x + Math.cos(toAngle) * 5;
            headY = prev.y + Math.sin(toAngle) * 5;
            cobraHeadAngle = toAngle;
          } else {
            // Default patrol orbit
            const prev = cobraPath[0] || { x: headX, y: headY };
            cobraHeadAngle = Math.atan2(headY - prev.y, headX - prev.x);
          }
        }

        cobraPath.unshift({ x: headX, y: headY });
        if (cobraPath.length > COBRA_SEGMENTS) cobraPath.pop();
      } else {
        // Exit phase — slither off screen at constant speed
        if (cobraPath.length > 0) {
          const exitSpeed = 8;
          const exitAngle = Math.PI * 0.25; // toward bottom-right
          const headX = cobraPath[0].x + Math.cos(exitAngle) * exitSpeed;
          const headY = cobraPath[0].y + Math.sin(exitAngle) * exitSpeed;
          cobraPath.unshift({ x: headX, y: headY });
          if (cobraPath.length > COBRA_SEGMENTS) cobraPath.pop();
        }
      }

      // Update bitten monsters: paralyze → fly to space
      for (let i = cobraBittenMonsters.length - 1; i >= 0; i--) {
        const bm = cobraBittenMonsters[i];
        const m = bm.monster;

        // Safety: if monster was removed by another system, clean up
        if (!monsters.includes(m)) {
          cobraBittenMonsters.splice(i, 1);
          continue;
        }

        bm.timer++;

        if (bm.timer < 90) {
          // Paralyzed — shake in place, turn green
          m.x += (Math.random() - 0.5) * 3;
          m.y += (Math.random() - 0.5) * 3;
        } else {
          // Dead — fly upward to space
          m.state = 'venomDead';
          m.y -= 4 + bm.timer * 0.05;
          m.x += Math.sin(bm.timer * 0.1) * 2;
          m.opacity = Math.max(0, 1 - (bm.timer - 90) / 120);

          // Green poison trail
          if (bm.timer % 3 === 0) {
            impactParticles.push(new ImpactParticle(
              m.x + (Math.random() - 0.5) * 20,
              m.y + (Math.random() - 0.5) * 20,
              'rgba(0, 200, 50, 1)'
            ));
          }

          if (m.y < -100 || m.opacity <= 0) {
            const idx = monsters.indexOf(m);
            if (idx >= 0) {
              monsters.splice(idx, 1);
              monstersDefeated++;
              document.getElementById('monsterCount').textContent = monstersDefeated;
              spaceTexts.push(new SpaceText(m.x, Math.max(20, m.y)));
            }
            cobraBittenMonsters.splice(i, 1);
          }
        }
      }

      // End cobra — but wait for all bitten monsters to finish
      if (cobraTimer >= COBRA_DURATION && cobraBittenMonsters.length === 0) {
        cobraActive = false;
        cobraPath = [];
        document.getElementById('btnCobra').classList.remove('cobra-active');
      }
    }

    function drawCobra(t) {
      if (!cobraActive || cobraPath.length < 2) return;

      ctx.save();

      // Draw body from tail to head
      for (let i = cobraPath.length - 1; i >= 0; i--) {
        const seg = cobraPath[i];
        const ratio = i / cobraPath.length; // 0=tail, 1=head
        const bodyWidth = 4 + ratio * 10; // thicker near head

        // Body color: dark green with lighter belly pattern
        const green = Math.round(100 + ratio * 80);
        const r = Math.round(20 + ratio * 30);
        ctx.fillStyle = `rgb(${r}, ${green}, ${Math.round(r * 0.5)})`;
        ctx.beginPath();
        ctx.ellipse(seg.x, seg.y, bodyWidth, bodyWidth * 0.7, 0, 0, Math.PI * 2);
        ctx.fill();

        // Scale pattern - diamond shapes
        if (i % 3 === 0 && i > 2) {
          ctx.fillStyle = `rgba(0, ${green + 40}, 20, 0.4)`;
          ctx.beginPath();
          const a = i > 0 ? Math.atan2(cobraPath[i-1].y - seg.y, cobraPath[i-1].x - seg.x) : 0;
          ctx.save();
          ctx.translate(seg.x, seg.y);
          ctx.rotate(a);
          ctx.fillRect(-bodyWidth * 0.3, -bodyWidth * 0.3, bodyWidth * 0.6, bodyWidth * 0.6);
          ctx.restore();
        }

        // Belly lighter stripe
        if (i > 0 && i < cobraPath.length - 1) {
          ctx.fillStyle = `rgba(120, ${green + 60}, 60, 0.3)`;
          ctx.beginPath();
          ctx.ellipse(seg.x, seg.y + bodyWidth * 0.2, bodyWidth * 0.4, bodyWidth * 0.25, 0, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      // Cobra head with hood
      const head = cobraPath[0];
      const ha = cobraHeadAngle;

      ctx.save();
      ctx.translate(head.x, head.y);
      ctx.rotate(ha);

      // Hood (flared sides) — classic cobra silhouette
      const hoodW = 28;
      const hoodH = 20;
      ctx.fillStyle = '#1a6b1a';
      ctx.beginPath();
      ctx.moveTo(0, -hoodH);
      ctx.bezierCurveTo(hoodW * 0.8, -hoodH * 0.7, hoodW, -hoodH * 0.2, hoodW * 0.6, hoodH * 0.3);
      ctx.lineTo(0, hoodH * 0.5);
      ctx.lineTo(-hoodW * 0.6, hoodH * 0.3);
      ctx.bezierCurveTo(-hoodW, -hoodH * 0.2, -hoodW * 0.8, -hoodH * 0.7, 0, -hoodH);
      ctx.fill();

      // Hood pattern — V markings
      ctx.strokeStyle = 'rgba(200, 255, 100, 0.5)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(-6, -8);
      ctx.lineTo(0, 0);
      ctx.lineTo(6, -8);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(-4, -4);
      ctx.lineTo(0, 2);
      ctx.lineTo(4, -4);
      ctx.stroke();

      // Head — elongated
      ctx.fillStyle = '#228b22';
      ctx.beginPath();
      ctx.ellipse(10, 0, 12, 7, 0, 0, Math.PI * 2);
      ctx.fill();

      // Snout
      ctx.fillStyle = '#1a7a1a';
      ctx.beginPath();
      ctx.ellipse(18, 0, 6, 4, 0, 0, Math.PI * 2);
      ctx.fill();

      // Eyes — menacing slits
      ctx.fillStyle = '#ffff00';
      ctx.beginPath();
      ctx.ellipse(10, -5, 3, 2.5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.ellipse(10, 5, 3, 2.5, 0, 0, Math.PI * 2);
      ctx.fill();
      // Vertical slit pupils
      ctx.fillStyle = '#000';
      ctx.fillRect(9.5, -6.5, 1.2, 5);
      ctx.fillRect(9.5, 3.5, 1.2, 5);

      // Fangs — visible when striking
      if (cobraStriking) {
        ctx.fillStyle = '#ffffffee';
        ctx.beginPath();
        ctx.moveTo(22, -2);
        ctx.lineTo(30, -1);
        ctx.lineTo(23, 0);
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(22, 2);
        ctx.lineTo(30, 1);
        ctx.lineTo(23, 0);
        ctx.fill();

        // Venom drip
        ctx.fillStyle = 'rgba(0, 255, 80, 0.7)';
        ctx.beginPath();
        ctx.arc(30, 2 + Math.sin(t * 0.01) * 2, 2, 0, Math.PI * 2);
        ctx.fill();
      }

      // Tongue flicking
      if (!cobraStriking && cobraTimer % 40 < 20) {
        ctx.strokeStyle = '#ff3333';
        ctx.lineWidth = 1.5;
        const tongueLen = 12 + Math.sin(t * 0.02) * 4;
        ctx.beginPath();
        ctx.moveTo(22, 0);
        ctx.lineTo(22 + tongueLen, 0);
        // Fork
        ctx.moveTo(22 + tongueLen - 3, 0);
        ctx.lineTo(22 + tongueLen, -3);
        ctx.moveTo(22 + tongueLen - 3, 0);
        ctx.lineTo(22 + tongueLen, 3);
        ctx.stroke();
      }

      ctx.restore();

      // Green venom glow around head
      const glowGrad = ctx.createRadialGradient(head.x, head.y, 5, head.x, head.y, 35);
      glowGrad.addColorStop(0, 'rgba(0, 255, 50, 0.15)');
      glowGrad.addColorStop(1, 'rgba(0, 255, 50, 0)');
      ctx.fillStyle = glowGrad;
      ctx.beginPath();
      ctx.arc(head.x, head.y, 35, 0, Math.PI * 2);
      ctx.fill();

      // Draw bitten monsters with green tint
      for (const bm of cobraBittenMonsters) {
        const m = bm.monster;
        if (!m || !monsters.includes(m)) continue;
        if (bm.timer < 90) {
          // Green poison overlay on paralyzed monster
          ctx.save();
          ctx.globalAlpha = 0.4 + Math.sin(bm.timer * 0.3) * 0.2;
          ctx.fillStyle = '#00ff44';
          ctx.beginPath();
          ctx.arc(m.x, m.y, 20, 0, Math.PI * 2);
          ctx.fill();
          // Skull/crossbones icon
          ctx.fillStyle = '#004400';
          ctx.font = '16px serif';
          ctx.textAlign = 'center';
          ctx.fillText('\u2620', m.x, m.y + 5);
          ctx.restore();
        }
      }

      ctx.restore();
    }

    // ===== BOOST ÉLECTRIQUE — LIGHTNING STORM =====
    let lightningActive = false;
    let lightningTimer = 0;
    const LIGHTNING_DURATION = 420; // ~7 seconds at 60fps
    let lightningBolts = []; // active bolt animations
    let lightningFlashAlpha = 0; // screen flash
    let lightningTargetQueue = []; // monsters queued for strikes
    let lightningKills = 0;

    function triggerLightningStorm() {
      if (lightningActive) return;
      lightningActive = true;
      lightningTimer = 0;
      lightningBolts = [];
      lightningKills = 0;
      lightningTargetQueue = [];
      lightningFlashAlpha = 0;
      document.getElementById('btnLightning').classList.add('lightning-active');

      // Thunder sound
      try {
        initAudio();
        if (audioCtx) {
          // Deep rumbling thunder
          const bufSize = audioCtx.sampleRate * 2;
          const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
          const data = buf.getChannelData(0);
          for (let i = 0; i < bufSize; i++) {
            const t = i / audioCtx.sampleRate;
            const env = Math.exp(-t * 1.5) * (0.3 + 0.7 * Math.exp(-t * 0.3));
            data[i] = (Math.random() * 2 - 1) * env * 0.3;
            // Low rumble
            data[i] += Math.sin(t * 40 + Math.sin(t * 7) * 3) * env * 0.15;
          }
          const src = audioCtx.createBufferSource();
          src.buffer = buf;
          const lp = audioCtx.createBiquadFilter();
          lp.type = 'lowpass';
          lp.frequency.value = 200;
          lp.frequency.linearRampToValueAtTime(80, audioCtx.currentTime + 2);
          const g = audioCtx.createGain();
          g.gain.value = 0.4;
          src.connect(lp); lp.connect(g); g.connect(audioCtx.destination);
          src.start();
        }
      } catch(e) {}
    }

    // Generate a jagged lightning bolt path from sky to target
    function generateBoltPath(targetX, targetY) {
      const points = [];
      const startX = targetX + (Math.random() - 0.5) * 150;
      const startY = -20;
      const segments = 12 + Math.floor(Math.random() * 8);
      points.push({ x: startX, y: startY });
      for (let i = 1; i < segments; i++) {
        const t = i / segments;
        const baseX = startX + (targetX - startX) * t;
        const baseY = startY + (targetY - startY) * t;
        const jitter = (1 - t) * 80 + 10; // more jitter at top, less near target
        points.push({
          x: baseX + (Math.random() - 0.5) * jitter,
          y: baseY + (Math.random() - 0.5) * jitter * 0.3
        });
      }
      points.push({ x: targetX, y: targetY });

      // Add 1-2 branches
      const branches = [];
      for (let b = 0; b < 1 + Math.floor(Math.random() * 2); b++) {
        const branchIdx = 2 + Math.floor(Math.random() * (segments - 4));
        const branchStart = points[branchIdx];
        const branchLen = 3 + Math.floor(Math.random() * 4);
        const branchAngle = (Math.random() - 0.5) * 1.2;
        const bpts = [{ x: branchStart.x, y: branchStart.y }];
        for (let j = 1; j <= branchLen; j++) {
          const prev = bpts[j - 1];
          bpts.push({
            x: prev.x + Math.cos(branchAngle + Math.PI * 0.5) * (15 + Math.random() * 20) + (Math.random() - 0.5) * 30,
            y: prev.y + 15 + Math.random() * 20
          });
        }
        branches.push(bpts);
      }

      return { points, branches };
    }

    function updateLightningStorm() {
      if (!lightningActive) return;
      lightningTimer++;

      // Phase 1 (0-350): strike monsters periodically
      if (lightningTimer < 350) {
        // Every 15-25 frames, pick a new target
        if (lightningTimer % (15 + Math.floor(Math.random() * 10)) === 0) {
          // Find an alive approaching monster
          const targets = monsters.filter(m =>
            m.state === 'approaching' || m.state === 'idle'
          );
          if (targets.length > 0) {
            const target = targets[Math.floor(Math.random() * targets.length)];
            const bolt = generateBoltPath(target.x, target.y);
            bolt.life = 18; // frames the bolt stays visible
            bolt.maxLife = 18;
            bolt.target = target;
            bolt.struck = false;
            bolt.thickness = 2.5 + Math.random() * 2;
            lightningBolts.push(bolt);
            lightningFlashAlpha = 0.6 + Math.random() * 0.3; // screen flash

            // Crack/zap sound for each strike
            try {
              if (audioCtx) {
                const osc = audioCtx.createOscillator();
                osc.type = 'sawtooth';
                osc.frequency.value = 800 + Math.random() * 2000;
                osc.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.15);
                const g = audioCtx.createGain();
                g.gain.value = 0.15;
                g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
                osc.connect(g); g.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
                // White noise crack
                const bufSize = audioCtx.sampleRate * 0.1;
                const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
                const d = buf.getChannelData(0);
                for (let i = 0; i < bufSize; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / bufSize * 5);
                const ns = audioCtx.createBufferSource();
                ns.buffer = buf;
                const ng = audioCtx.createGain();
                ng.gain.value = 0.25;
                ns.connect(ng); ng.connect(audioCtx.destination);
                ns.start();
              }
            } catch(e) {}
          }
        }

        // Also spawn random atmospheric bolts in the sky (no target)
        if (lightningTimer % 40 === 0 && Math.random() < 0.5) {
          const skyX = Math.random() * W;
          const skyY = 50 + Math.random() * H * 0.3;
          const bolt = generateBoltPath(skyX, skyY);
          bolt.life = 10;
          bolt.maxLife = 10;
          bolt.target = null;
          bolt.struck = false;
          bolt.thickness = 1.5 + Math.random();
          lightningBolts.push(bolt);
          lightningFlashAlpha = Math.max(lightningFlashAlpha, 0.2);
        }
      }

      // Update bolts
      for (let i = lightningBolts.length - 1; i >= 0; i--) {
        const bolt = lightningBolts[i];
        bolt.life--;

        // Strike the monster on frame 2 of the bolt
        if (!bolt.struck && bolt.life <= bolt.maxLife - 2 && bolt.target) {
          bolt.struck = true;
          const m = bolt.target;
          if (monsters.includes(m) && (m.state === 'approaching' || m.state === 'idle')) {
            // Electrocute!
            m.state = 'hit';
            m.hitTime = performance.now();
            m.flyVx = (Math.random() - 0.5) * 6;
            m.flyVy = -8 - Math.random() * 8;
            m.flyRotSpeed = (Math.random() - 0.5) * 0.5;
            monstersDefeated++;
            document.getElementById('monsterCount').textContent = monstersDefeated;
            lightningKills++;
            shakeAmount = 8;

            // Electric explosion particles
            for (let p = 0; p < 25; p++) {
              const angle = Math.random() * Math.PI * 2;
              const speed = 2 + Math.random() * 6;
              const particle = new ImpactParticle(m.x, m.y, 'rgba(100, 200, 255, 1)');
              particle.vx = Math.cos(angle) * speed;
              particle.vy = Math.sin(angle) * speed;
              impactParticles.push(particle);
            }
            // Yellow sparks
            for (let p = 0; p < 15; p++) {
              impactParticles.push(new ImpactParticle(
                m.x + (Math.random() - 0.5) * 30,
                m.y + (Math.random() - 0.5) * 30,
                'rgba(255, 255, 100, 1)'
              ));
            }
          }
        }

        if (bolt.life <= 0) lightningBolts.splice(i, 1);
      }

      // Fade flash
      lightningFlashAlpha *= 0.85;
      if (lightningFlashAlpha < 0.01) lightningFlashAlpha = 0;

      // End storm
      if (lightningTimer >= LIGHTNING_DURATION && lightningBolts.length === 0) {
        lightningActive = false;
        lightningBolts = [];
        document.getElementById('btnLightning').classList.remove('lightning-active');
      }
    }

    function drawLightningStorm(t) {
      if (!lightningActive && lightningBolts.length === 0 && lightningFlashAlpha <= 0) return;

      ctx.save();

      // Draw each bolt
      for (const bolt of lightningBolts) {
        const alpha = Math.min(1, bolt.life / (bolt.maxLife * 0.3)); // fade out near end
        const glow = bolt.life / bolt.maxLife;

        // Outer glow
        ctx.save();
        ctx.globalAlpha = alpha * 0.4;
        ctx.strokeStyle = `rgba(100, 180, 255, 1)`;
        ctx.lineWidth = bolt.thickness * 4;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.shadowColor = '#00ccff';
        ctx.shadowBlur = 30;
        ctx.beginPath();
        ctx.moveTo(bolt.points[0].x, bolt.points[0].y);
        for (let i = 1; i < bolt.points.length; i++) {
          ctx.lineTo(bolt.points[i].x, bolt.points[i].y);
        }
        ctx.stroke();
        ctx.restore();

        // Mid layer
        ctx.save();
        ctx.globalAlpha = alpha * 0.7;
        ctx.strokeStyle = `rgba(180, 220, 255, 1)`;
        ctx.lineWidth = bolt.thickness * 2;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.beginPath();
        ctx.moveTo(bolt.points[0].x, bolt.points[0].y);
        for (let i = 1; i < bolt.points.length; i++) {
          ctx.lineTo(bolt.points[i].x, bolt.points[i].y);
        }
        ctx.stroke();
        ctx.restore();

        // Core (white-hot)
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = bolt.thickness;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.shadowColor = '#ffffff';
        ctx.shadowBlur = 15;
        ctx.beginPath();
        ctx.moveTo(bolt.points[0].x, bolt.points[0].y);
        for (let i = 1; i < bolt.points.length; i++) {
          ctx.lineTo(bolt.points[i].x, bolt.points[i].y);
        }
        ctx.stroke();
        ctx.restore();

        // Draw branches
        for (const branch of bolt.branches) {
          ctx.save();
          ctx.globalAlpha = alpha * 0.5;
          ctx.strokeStyle = `rgba(150, 200, 255, 1)`;
          ctx.lineWidth = bolt.thickness * 0.6;
          ctx.lineCap = 'round';
          ctx.lineJoin = 'round';
          ctx.shadowColor = '#00aaff';
          ctx.shadowBlur = 10;
          ctx.beginPath();
          ctx.moveTo(branch[0].x, branch[0].y);
          for (let i = 1; i < branch.length; i++) {
            ctx.lineTo(branch[i].x, branch[i].y);
          }
          ctx.stroke();
          ctx.restore();
        }

        // Impact glow at target
        if (bolt.target && glow > 0.3) {
          const tp = bolt.points[bolt.points.length - 1];
          ctx.save();
          ctx.globalAlpha = alpha * 0.8;
          const impGrad = ctx.createRadialGradient(tp.x, tp.y, 0, tp.x, tp.y, 40);
          impGrad.addColorStop(0, 'rgba(255, 255, 255, 0.9)');
          impGrad.addColorStop(0.3, 'rgba(100, 200, 255, 0.6)');
          impGrad.addColorStop(0.6, 'rgba(50, 100, 255, 0.3)');
          impGrad.addColorStop(1, 'rgba(0, 50, 200, 0)');
          ctx.fillStyle = impGrad;
          ctx.fillRect(tp.x - 40, tp.y - 40, 80, 80);

          // Sparks around impact
          for (let s = 0; s < 4; s++) {
            const sa = Math.random() * Math.PI * 2;
            const sr = 5 + Math.random() * 25;
            const sx = tp.x + Math.cos(sa) * sr;
            const sy = tp.y + Math.sin(sa) * sr;
            ctx.beginPath();
            ctx.arc(sx, sy, 1 + Math.random() * 2, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 255, ${150 + Math.random() * 105}, ${alpha})`;
            ctx.fill();
          }
          ctx.restore();
        }
      }

      // Full-screen flash
      if (lightningFlashAlpha > 0) {
        ctx.save();
        ctx.globalAlpha = lightningFlashAlpha * 0.3;
        ctx.fillStyle = 'rgba(200, 220, 255, 1)';
        ctx.fillRect(0, 0, W, H);
        ctx.restore();
      }

      ctx.restore();
    }

    // ===== VAGUE DU POISSON =====
    let fishWaveActive = false;
    let fishWaveTimer = 0;
    const FISHWAVE_DURATION = 540; // ~9 seconds
    let waterLevel = 0; // 0 to 1 — how high the water is
    let fishWaveFish = []; // animated fish
    let floatingMonsters = []; // monsters caught in the flood

    function triggerFishWave() {
      if (fishWaveActive) return;
      fishWaveActive = true;
      fishWaveTimer = 0;
      waterLevel = 0;
      fishWaveFish = [];
      floatingMonsters = [];
      document.getElementById('btnFishWave').classList.add('fishwave-active');

      // Spawn fish
      for (let i = 0; i < 6; i++) {
        const angle = Math.random() * Math.PI * 2;
        const dist = barrierRadius + 40 + Math.random() * 80;
        fishWaveFish.push({
          x: centerX + Math.cos(angle) * dist,
          y: (centerY + 20) + Math.sin(angle) * dist * 0.55,
          angle: angle,
          speed: 2 + Math.random() * 2,
          size: 12 + Math.random() * 8,
          color: ['#ff6600', '#ffaa00', '#ff4444', '#00cc66', '#4488ff', '#ff00aa'][i],
          wobble: Math.random() * Math.PI * 2,
          hunting: false,
          target: null,
          biteTimer: 0
        });
      }

      // Water rush sound
      try {
        initAudio();
        if (audioCtx) {
          const bufSize = audioCtx.sampleRate * 3;
          const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
          const d = buf.getChannelData(0);
          for (let i = 0; i < bufSize; i++) {
            const t = i / audioCtx.sampleRate;
            const env = Math.min(1, t * 2) * Math.exp(-t * 0.5);
            d[i] = (Math.random() * 2 - 1) * env * 0.15;
            d[i] += Math.sin(t * 30 + Math.sin(t * 5) * 4) * env * 0.08;
          }
          const src = audioCtx.createBufferSource();
          src.buffer = buf;
          const lp = audioCtx.createBiquadFilter();
          lp.type = 'lowpass';
          lp.frequency.value = 400;
          const g = audioCtx.createGain();
          g.gain.value = 0.3;
          src.connect(lp); lp.connect(g); g.connect(audioCtx.destination);
          src.start();
        }
      } catch(e) {}
    }

    function updateFishWave(t) {
      if (!fishWaveActive) return;
      fishWaveTimer++;

      // Phase 1 (0-90): water rises
      if (fishWaveTimer < 90) {
        waterLevel = Math.min(1, fishWaveTimer / 80);
        // Catch approaching monsters in flood
        if (waterLevel > 0.3) {
          for (const m of monsters) {
            if (m.state !== 'approaching' && m.state !== 'idle') continue;
            if (floatingMonsters.some(f => f.monster === m)) continue;
            // Monsters outside the barrier get caught
            const bx = m.x - centerX;
            const by = (m.y - (centerY + 20)) / 0.55;
            const bDist = Math.sqrt(bx * bx + by * by);
            if (bDist > barrierRadius - 10) {
              m.state = 'floating';
              floatingMonsters.push({
                monster: m,
                bobPhase: Math.random() * Math.PI * 2,
                bobAmp: 2 + Math.random() * 3,
                baseY: m.y,
                timer: 0,
                eaten: false
              });
            }
          }
        }
      }

      // Phase 2 (90-400): fish hunt floating monsters
      if (fishWaveTimer >= 60 && fishWaveTimer < 420) {
        for (const fish of fishWaveFish) {
          fish.wobble += 0.08;

          // Find a floating monster to hunt
          if (!fish.hunting || !fish.target || fish.target.eaten) {
            fish.hunting = false;
            fish.target = null;
            let closest = null;
            let closestDist = Infinity;
            for (const fm of floatingMonsters) {
              if (fm.eaten) continue;
              if (!monsters.includes(fm.monster)) continue;
              const dx = fm.monster.x - fish.x;
              const dy = fm.monster.y - fish.y;
              const d = Math.sqrt(dx * dx + dy * dy);
              // Don't target what another fish is already hunting
              const taken = fishWaveFish.some(f => f !== fish && f.target === fm);
              if (d < closestDist && !taken) {
                closestDist = d;
                closest = fm;
              }
            }
            if (closest) {
              fish.hunting = true;
              fish.target = closest;
            }
          }

          if (fish.hunting && fish.target && monsters.includes(fish.target.monster)) {
            const m = fish.target.monster;
            const dx = m.x - fish.x;
            const dy = m.y - fish.y;
            const d = Math.sqrt(dx * dx + dy * dy);
            fish.angle = Math.atan2(dy, dx);
            fish.x += Math.cos(fish.angle) * fish.speed * 1.5;
            fish.y += Math.sin(fish.angle) * fish.speed * 1.5;

            // Bite!
            if (d < 25) {
              fish.biteTimer = 20;
              fish.target.eaten = true;
              // Monster sinks and dies
              m.state = 'hit';
              m.hitTime = performance.now();
              m.flyVx = (Math.random() - 0.5) * 3;
              m.flyVy = 3 + Math.random() * 2; // sink downward first
              m.flyRotSpeed = (Math.random() - 0.5) * 0.3;
              monstersDefeated++;
              document.getElementById('monsterCount').textContent = monstersDefeated;
              shakeAmount = 5;

              // Water splash particles
              for (let p = 0; p < 20; p++) {
                impactParticles.push(new ImpactParticle(
                  m.x + (Math.random() - 0.5) * 20,
                  m.y + (Math.random() - 0.5) * 20,
                  `rgba(${50 + Math.random() * 100}, ${150 + Math.random() * 105}, 255, 1)`
                ));
              }

              // Splash sound
              try {
                if (audioCtx) {
                  const bufSize = audioCtx.sampleRate * 0.3;
                  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
                  const dd = buf.getChannelData(0);
                  for (let i = 0; i < bufSize; i++) {
                    dd[i] = (Math.random() * 2 - 1) * Math.exp(-i / bufSize * 4) * 0.2;
                  }
                  const src = audioCtx.createBufferSource();
                  src.buffer = buf;
                  const lp = audioCtx.createBiquadFilter();
                  lp.type = 'lowpass';
                  lp.frequency.value = 600;
                  const g = audioCtx.createGain();
                  g.gain.value = 0.2;
                  src.connect(lp); lp.connect(g); g.connect(audioCtx.destination);
                  src.start();
                }
              } catch(e) {}

              fish.hunting = false;
              fish.target = null;
            }
          } else {
            // Swim around in the water
            fish.x += Math.cos(fish.angle) * fish.speed;
            fish.y += Math.sin(fish.wobble) * 1.5;
            // Keep fish in the water area
            const fx = fish.x - centerX;
            const fy = (fish.y - (centerY + 20)) / 0.55;
            const fDist = Math.sqrt(fx * fx + fy * fy);
            if (fDist < barrierRadius + 10 || fDist > barrierRadius + 150) {
              fish.angle += 0.1;
            }
          }

          if (fish.biteTimer > 0) fish.biteTimer--;
        }
      }

      // Update floating monsters
      for (let i = floatingMonsters.length - 1; i >= 0; i--) {
        const fm = floatingMonsters[i];
        if (!monsters.includes(fm.monster)) {
          floatingMonsters.splice(i, 1);
          continue;
        }
        fm.timer++;
        if (!fm.eaten) {
          // Bob up and down
          fm.monster.x += Math.sin(fm.timer * 0.03) * 0.5;
          fm.monster.y = fm.baseY + Math.sin(fm.bobPhase + fm.timer * 0.06) * fm.bobAmp;
        }
      }

      // Phase 3 (400+): water recedes
      if (fishWaveTimer >= 400) {
        waterLevel = Math.max(0, 1 - (fishWaveTimer - 400) / 100);
      }

      // End
      if (fishWaveTimer >= FISHWAVE_DURATION) {
        fishWaveActive = false;
        fishWaveFish = [];
        waterLevel = 0;
        // Release any remaining floating monsters
        for (const fm of floatingMonsters) {
          if (monsters.includes(fm.monster) && fm.monster.state === 'floating') {
            fm.monster.state = 'approaching';
          }
        }
        floatingMonsters = [];
        document.getElementById('btnFishWave').classList.remove('fishwave-active');
      }
    }

    // Offscreen canvas for fish wave water (reused)
    let _fishOsc = null;

    function drawFishWave(t) {
      if (!fishWaveActive && waterLevel <= 0) return;

      ctx.save();

      // Draw flood water surrounding the house — use offscreen canvas + destination-out
      if (waterLevel > 0) {
        const bCx = centerX;
        const bCy = centerY + 20;
        const bRx = barrierRadius;
        const bRy = barrierRadius * 0.55;
        const wl = waterLevel;
        const isDay = daylight > 0.5;

        // Create/resize offscreen canvas
        if (!_fishOsc || _fishOsc.width !== W || _fishOsc.height !== H) {
          _fishOsc = document.createElement('canvas');
          _fishOsc.width = W;
          _fishOsc.height = H;
        }
        const ox = _fishOsc.getContext('2d');
        ox.clearRect(0, 0, W, H);

        // Draw water on offscreen canvas
        ox.fillStyle = isDay ? 'rgba(10, 60, 140, 0.6)' : 'rgba(5, 20, 55, 0.6)';
        ox.fillRect(0, 0, W, H);

        // Wave lines
        const waveSpeed = t * 0.0015;
        for (let wy = 10; wy < H; wy += 14) {
          ox.beginPath();
          for (let x = 0; x <= W; x += 5) {
            const yOff = Math.sin(x * 0.012 + waveSpeed + wy * 0.008) * 5 +
              Math.sin(x * 0.006 + waveSpeed * 1.3 + wy * 0.004) * 3;
            if (x === 0) ox.moveTo(x, wy + yOff);
            else ox.lineTo(x, wy + yOff);
          }
          ox.strokeStyle = isDay
            ? `rgba(100, 190, 255, ${0.3 + Math.sin(wy * 0.05 + waveSpeed) * 0.1})`
            : `rgba(50, 100, 180, ${0.25 + Math.sin(wy * 0.05 + waveSpeed) * 0.08})`;
          ox.lineWidth = 2;
          ox.stroke();
        }

        // Erase barrier ellipse (dry zone) with destination-out
        ox.save();
        ox.globalCompositeOperation = 'destination-out';
        ox.beginPath();
        ox.ellipse(bCx, bCy, bRx + 5, bRy + 5, 0, 0, Math.PI * 2);
        ox.fill();
        ox.restore();

        // Composite onto main canvas
        ctx.globalAlpha = wl;
        ctx.drawImage(_fishOsc, 0, 0);
        ctx.globalAlpha = 1;

        // Sparkles on water surface (skip inside barrier)
        ctx.save();
        ctx.globalAlpha = wl;
        for (let i = 0; i < 60; i++) {
          const sx = (i * 73.7 + t * 0.02 + Math.sin(i * 2.1) * 50) % (W + 40) - 20;
          const sy = (i * 47.3 + t * 0.008 + Math.cos(i * 1.7) * 30) % (H + 40) - 20;
          const sdx = (sx - bCx) / (bRx + 10);
          const sdy = (sy - bCy) / (bRy + 10);
          if (sdx * sdx + sdy * sdy < 1) continue;
          const sparkle = 2 + Math.sin(t * 0.004 + i * 1.7) * 1.5;
          if (sparkle > 1) {
            ctx.beginPath();
            ctx.arc(sx, sy, sparkle, 0, Math.PI * 2);
            ctx.fillStyle = isDay ? `rgba(255, 255, 255, ${0.5 + Math.sin(t * 0.005 + i) * 0.3})` : `rgba(100, 160, 220, ${0.3 + Math.sin(t * 0.005 + i) * 0.2})`;
            ctx.fill();
          }
        }
        ctx.restore();

        // BARRIER EDGE: foam / water hitting the barrier wall
        ctx.save();
        ctx.globalAlpha = 0.9 * wl;
        // Glowing water edge
        ctx.strokeStyle = isDay ? 'rgba(150, 220, 255, 0.8)' : 'rgba(60, 120, 180, 0.7)';
        ctx.lineWidth = 4;
        ctx.shadowColor = isDay ? 'rgba(80, 180, 255, 0.8)' : 'rgba(30, 80, 150, 0.6)';
        ctx.shadowBlur = 20;
        ctx.beginPath();
        ctx.ellipse(bCx, bCy, bRx + 4, bRy + 4, 0, 0, Math.PI * 2);
        ctx.stroke();
        ctx.shadowBlur = 0;

        // Thick animated foam bubbles along the edge
        for (let a = 0; a < Math.PI * 2; a += 0.08) {
          const foamR = Math.max(1, 3 + Math.sin(a * 12 + t * 0.005) * 2.5 + Math.sin(a * 7 + t * 0.003) * 1.5);
          const foamDist = bRx + 5 + foamR + Math.sin(a * 5 + t * 0.004) * 3;
          const fx = bCx + Math.cos(a) * foamDist;
          const fy = bCy + Math.sin(a) * (foamDist * bRy / bRx);
          ctx.beginPath();
          ctx.arc(fx, fy, foamR, 0, Math.PI * 2);
          const foamAlpha = 0.4 + Math.sin(a * 9 + t * 0.004) * 0.2;
          ctx.fillStyle = isDay ? `rgba(220, 240, 255, ${foamAlpha})` : `rgba(80, 120, 160, ${foamAlpha * 0.7})`;
          ctx.fill();
        }
        ctx.restore();

        // Ripple rings around floating monsters
        for (const fm of floatingMonsters) {
          if (!fm.eaten && monsters.includes(fm.monster)) {
            const m = fm.monster;
            ctx.save();
            ctx.globalAlpha = 0.5 * wl;
            ctx.strokeStyle = isDay ? 'rgba(180, 220, 255, 0.6)' : 'rgba(60, 100, 160, 0.5)';
            ctx.lineWidth = 1.5;
            for (let r = 0; r < 3; r++) {
              const rippleR = 12 + r * 14 + Math.sin(fm.timer * 0.05 + r) * 5;
              ctx.beginPath();
              ctx.ellipse(m.x, m.y + m.size * 0.3, rippleR, rippleR * 0.4, 0, 0, Math.PI * 2);
              ctx.stroke();
            }
            ctx.restore();
          }
        }
      }

      // Draw fish
      for (const fish of fishWaveFish) {
        ctx.save();
        ctx.translate(fish.x, fish.y);
        ctx.rotate(fish.angle);

        const s = fish.size;
        const biting = fish.biteTimer > 0;

        // Body
        ctx.beginPath();
        ctx.ellipse(0, 0, s, s * 0.45, 0, 0, Math.PI * 2);
        ctx.fillStyle = fish.color;
        ctx.fill();
        ctx.strokeStyle = 'rgba(0,0,0,0.3)';
        ctx.lineWidth = 1;
        ctx.stroke();

        // Belly (lighter)
        ctx.beginPath();
        ctx.ellipse(0, s * 0.1, s * 0.7, s * 0.2, 0, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.fill();

        // Tail
        ctx.beginPath();
        ctx.moveTo(-s, 0);
        const tailWag = Math.sin(t * 0.01 + fish.wobble) * 0.3;
        ctx.lineTo(-s * 1.5, -s * 0.5 + tailWag * s);
        ctx.lineTo(-s * 1.5, s * 0.5 + tailWag * s);
        ctx.closePath();
        ctx.fillStyle = fish.color;
        ctx.fill();

        // Dorsal fin
        ctx.beginPath();
        ctx.moveTo(s * 0.2, -s * 0.4);
        ctx.lineTo(-s * 0.2, -s * 0.7);
        ctx.lineTo(-s * 0.4, -s * 0.35);
        ctx.closePath();
        ctx.fillStyle = fish.color;
        ctx.globalAlpha = 0.8;
        ctx.fill();
        ctx.globalAlpha = 1;

        // Eye
        ctx.beginPath();
        ctx.arc(s * 0.5, -s * 0.1, s * 0.15, 0, Math.PI * 2);
        ctx.fillStyle = '#fff';
        ctx.fill();
        ctx.beginPath();
        ctx.arc(s * 0.55, -s * 0.1, s * 0.08, 0, Math.PI * 2);
        ctx.fillStyle = '#000';
        ctx.fill();

        // Mouth
        if (biting) {
          // Open mouth
          ctx.beginPath();
          ctx.arc(s * 0.8, s * 0.05, s * 0.2, -0.5, 0.5);
          ctx.fillStyle = '#cc0000';
          ctx.fill();
          // Teeth
          ctx.fillStyle = '#fff';
          for (let tt = 0; tt < 3; tt++) {
            const ta = -0.3 + tt * 0.3;
            ctx.fillRect(s * 0.8 + Math.cos(ta) * s * 0.18, s * 0.05 + Math.sin(ta) * s * 0.18 - 1, 2, 3);
          }
        }

        // Bubbles behind the fish
        if (Math.random() < 0.3) {
          ctx.restore();
          ctx.save();
          ctx.globalAlpha = 0.4;
          ctx.beginPath();
          ctx.arc(
            fish.x - Math.cos(fish.angle) * s * 1.5 + (Math.random() - 0.5) * 10,
            fish.y - Math.sin(fish.angle) * s * 1.5 + (Math.random() - 0.5) * 10,
            1 + Math.random() * 3, 0, Math.PI * 2
          );
          ctx.fillStyle = 'rgba(200, 230, 255, 0.6)';
          ctx.fill();
        }

        ctx.restore();
      }

      ctx.restore();
    }

    // ===== VAGUE DE REQUINS =====
    let sharkWaveActive = false;
    let sharkWaveTimer = 0;
    const SHARKWAVE_DURATION = 600; // ~10 seconds
    let sharkWaterLevel = 0;
    let sharkWaveSharks = [];
    let sharkFloatingMonsters = [];
    let sharkSurfWaves = []; // big surf waves

    function triggerSharkWave() {
      if (sharkWaveActive) return;
      sharkWaveActive = true;
      sharkWaveTimer = 0;
      sharkWaterLevel = 0;
      sharkWaveSharks = [];
      sharkFloatingMonsters = [];
      sharkSurfWaves = [];
      document.getElementById('btnSharkWave').classList.add('sharkwave-active');

      // Spawn sharks (fewer but bigger than fish)
      for (let i = 0; i < 4; i++) {
        const angle = Math.random() * Math.PI * 2;
        const dist = barrierRadius + 50 + Math.random() * 100;
        sharkWaveSharks.push({
          x: centerX + Math.cos(angle) * dist,
          y: (centerY + 20) + Math.sin(angle) * dist * 0.55,
          angle: angle,
          speed: 2.5 + Math.random() * 1.5,
          size: 24 + Math.random() * 10,
          color: ['#3a4e5e', '#2e4450', '#4a5e6e', '#1e3040'][i],
          wobble: Math.random() * Math.PI * 2,
          hunting: false,
          target: null,
          biteTimer: 0,
          finPhase: Math.random() * Math.PI * 2
        });
      }

      // Spawn surf waves that travel across the screen
      for (let i = 0; i < 5; i++) {
        sharkSurfWaves.push({
          x: -200 - i * 300,
          speed: 2 + Math.random() * 1.5,
          height: 30 + Math.random() * 25,
          width: 120 + Math.random() * 80,
          phase: Math.random() * Math.PI * 2,
          foam: Math.random() * 0.3 + 0.5
        });
      }

      // Big ocean wave sound
      try {
        initAudio();
        if (audioCtx) {
          const bufSize = audioCtx.sampleRate * 4;
          const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
          const d = buf.getChannelData(0);
          for (let i = 0; i < bufSize; i++) {
            const t = i / audioCtx.sampleRate;
            const env = Math.min(1, t * 1.5) * Math.exp(-t * 0.3);
